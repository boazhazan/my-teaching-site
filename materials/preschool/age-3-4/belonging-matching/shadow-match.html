<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>התאמת צלליות — תרגול | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f0f8;--card:#fff;--pri:#6c5ce7;--pri-l:#ede9fe;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#2d3436,#636e72);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.05);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.85;position:relative}
.mb{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.mbtn{padding:8px 18px;border-radius:24px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.mbtn:hover{border-color:var(--pri)}.mbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.pb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#a29bfe);border-radius:10px;transition:width 0.5s}
.pss{display:flex;gap:16px}.ps2{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.hb{text-align:center;padding:8px;background:#fff3cd;color:#856404;font-weight:600;font-size:0.9rem;display:none}.hb.show{display:block}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:20px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}.mc.bad{border-color:var(--no);background:var(--no-l)}
.mc.dw{touch-action:none}.mc .dc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;border-radius:var(--r)}
.mc.done .dc{display:none}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.85rem;color:var(--txt2);font-weight:500}
.zone{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:10px 0}
.zt{width:100%;text-align:center;font-size:0.75rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.llr{display:flex;gap:24px;align-items:flex-start}.llr .zone{flex:1}
.llr .dv{width:2px;background:var(--brd);align-self:stretch;border-radius:2px;min-height:200px}
.ltb .zone:first-child{border-bottom:2px dashed var(--brd);padding-bottom:20px;margin-bottom:12px}
.lsc .zone{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;min-height:auto}.lsc .si{position:relative}
.si{display:inline-flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all 0.25s;-webkit-user-select:none;user-select:none;padding:8px;border-radius:var(--rs);border:3px solid transparent}
.si:hover:not(.done):not(.dis){border-color:var(--pri);background:var(--pri-l);transform:scale(1.08)}
.si:active:not(.done){transform:scale(0.95)}
.si.pk{border-color:var(--pri);background:var(--pri-l);box-shadow:0 0 0 3px rgba(108,92,231,0.25);transform:scale(1.1)}
.si.done{opacity:0.45;cursor:default;border-color:var(--ok)}
.si.wf{border-color:var(--no);background:var(--no-l);animation:shake 0.5s}
.si .sw{width:72px;height:72px;display:flex;align-items:center;justify-content:center}
.si .sw svg{width:100%;height:100%}
.si .sw.sh svg *{fill:#2d3436!important;stroke:#1a1a2e!important}
.si .lb{font-size:0.7rem;font-weight:600;color:var(--txt2)}
.ccnt{text-align:center;font-size:0.85rem;color:var(--txt2);margin-top:10px;font-weight:600}
.cfb{text-align:center;margin-top:8px;font-weight:700;font-size:0.95rem;min-height:22px;opacity:0;transition:opacity 0.3s}
.cfb.show{opacity:1}.cfb.ok{color:var(--ok)}.cfb.bad{color:var(--no)}
.ld{background:linear-gradient(135deg,var(--pri),#a29bfe);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .sc{font-size:2.2rem;font-weight:900;margin:12px 0}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}
.mb,.ps,.tw,.acts,.nopr,.ld,.hb,.ccnt,.cfb{display:none!important}.ct{padding:8px 0}
.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.si{border-color:transparent}.si.done,.si.pk{border-color:transparent;opacity:1;background:transparent}
.dc{display:none!important}.ph{display:block!important}.plh{display:block!important;text-align:center;color:#666;font-size:0.8rem;margin-top:8px}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
.plh{display:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes mp{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.si .sw{width:58px;height:58px}.mc{padding:16px 12px}.mbtn{padding:6px 12px;font-size:0.8rem}.tb{padding:6px 12px;font-size:0.75rem}.llr{gap:12px}.zone{gap:14px}}
@media(max-width:380px){.si .sw{width:46px;height:46px}.zone{gap:10px}}
</style>
</head>

// For 'sc' (mixed), everything is shuffled together in one grid

if(lv.ly==='sc'){
  // Build mixed array with both colored and shadow items, then shuffle
  const mixed = [];
  it.forEach((k,i) => mixed.push({k,side:'l',ci:i}));
  shd.forEach((k) => mixed.push({k,side:'r'}));
  // Shuffle mixed array
  for(let i=mixed.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[mixed[i],mixed[j]]=[mixed[j],mixed[i]]}
  sL = mixed; // reuse sL for the mixed array
}
let h=`<div class="ph">🌑 התאמת צלליות — ${lv.t}</div><div class="mc ${dw?'dw':''}" id="q0" data-total="${it.length}" data-matched="0" data-wrong="0">`;
if(dw)h+=`<canvas class="dc" id="cv0"></canvas>`;
h+=`<div class="mh"><div class="mn">1</div><span class="mht">💡 חברו כל תמונה לצללית שלה</span></div>`;
if(lv.ly==='lr'){
// Shuffle the colored items order too
const litems = it.map((k,i)=>({k,ci:i}));
for(let i=litems.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[litems[i],litems[j]]=[litems[j],litems[i]]}
h+=`<div class="llr"><div class="zone"><div class="zt">תמונות</div>`;
litems.forEach(o=>h+=`<div class="si" data-id="${o.k}" data-side="l" ${md==='click'?'onclick="sel(this)"':''}><div class="sw">${sc(o.k,cl[o.ci].f,cl[o.ci].s)}</div></div>`);
h+=`</div><div class="dv"></div><div class="zone"><div class="zt">צלליות</div>`;
shd.forEach(k=>h+=`<div class="si" data-id="${k}" data-side="r" ${md==='click'?'onclick="sel(this)"':''}><div class="sw sh">${ss(k)}</div></div>`);
h+=`</div></div>`}
else if(lv.ly==='tb'){
const litems2 = it.map((k,i)=>({k,ci:i}));
for(let i=litems2.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[litems2[i],litems2[j]]=[litems2[j],litems2[i]]}
h+=`<div class="ltb"><div class="zone"><div class="zt">תמונות</div>`;
litems2.forEach(o=>h+=`<div class="si" data-id="${o.k}" data-side="l" ${md==='click'?'onclick="sel(this)"':''}><div class="sw">${sc(o.k,cl[o.ci].f,cl[o.ci].s)}</div></div>`);
h+=`</div><div class="zone"><div class="zt">צלליות</div>`;
shd.forEach(k=>h+=`<div class="si" data-id="${k}" data-side="r" ${md==='click'?'onclick="sel(this)"':''}><div class="sw sh">${ss(k)}</div></div>`);
h+=`</div></div>`}
else{
h+=`<div class="lsc"><div class="zone">`;
sL.forEach(item => {
  if(item.side==='l'){
    h+=`<div class="si" data-id="${item.k}" data-side="l" ${md==='click'?'onclick="sel(this)"':''}><div class="sw">${sc(item.k,cl[item.ci].f,cl[item.ci].s)}</div></div>`;
  } else {
    h+=`<div class="si" data-id="${item.k}" data-side="r" ${md==='click'?'onclick="sel(this)"':''}><div class="sw sh">${ss(item.k)}</div></div>`;
  }
});
h+=`</div></div>`}

h+=`<div class="ld" id="ld"><div class="big">🌟</div><h2 id="lt"></h2><p id="ls"></p><div class="sc" id="lsc"></div><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<LV.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;
ar.innerHTML=h;if(dw)initDr();rTabs();uPr()}
function sel(el){if(el.classList.contains('done'))return;if(!pk){el.classList.add('pk');pk=el;return}if(pk===el){el.classList.remove('pk');pk=null;return}
if(pk.dataset.side===el.dataset.side){pk.classList.remove('pk');el.classList.add('pk');pk=el;return}
pk.classList.remove('pk');
if(pk.dataset.id===el.dataset.id){pk.classList.add('done');el.classList.add('done');pk.style.animation='mp 0.4s';el.style.animation='mp 0.4s';g1++;uCnt()}
else{pk.classList.add('wf');el.classList.add('wf');g2++;const a=pk,b=el;setTimeout(()=>{a.classList.remove('wf');b.classList.remove('wf')},600);
document.getElementById('q0').dataset.wrong=parseInt(document.getElementById('q0').dataset.wrong)+1}
pk=null;uPr()}
function uCnt(){const c=document.getElementById('q0'),t=parseInt(c.dataset.total),m=c.querySelectorAll('.si.done[data-side="l"]').length;
document.getElementById('cnt0').textContent=m+' / '+t+' התאמות';
if(m===t){const w=parseInt(c.dataset.wrong),fb=document.getElementById('fb0');
if(w===0){c.classList.add('ok');fb.textContent=E1[Math.floor(Math.random()*E1.length)];fb.classList.add('ok','show')}
else{c.classList.add('bad');fb.textContent=`סיימתם עם ${w} טעויות 💪`;fb.classList.add('bad','show')}
setTimeout(showD,600)}}
function initDr(){document.getElementById('hb').classList.add('show');const c=document.getElementById('q0'),cv=document.getElementById('cv0');if(!cv)return;
cv.width=c.offsetWidth;cv.height=c.offsetHeight;const ctx=cv.getContext('2d');let dw=false,sE=null;
cv.addEventListener('pointerdown',function(e){if(c.dataset.matched==c.dataset.total)return;e.preventDefault();e.stopPropagation();
const u=gU(e.clientX,e.clientY);if(!u||u.classList.contains('done'))return;dw=true;sE=u;sE.classList.add('pk');
ctx.clearRect(0,0,cv.width,cv.height);const r=cv.getBoundingClientRect();ctx.beginPath();ctx.moveTo(e.clientX-r.left,e.clientY-r.top);
ctx.strokeStyle='#6c5ce7';ctx.lineWidth=4;ctx.lineCap='round';ctx.setLineDash([8,6])},{passive:false});
cv.addEventListener('pointermove',function(e){if(!dw)return;e.preventDefault();e.stopPropagation();const r=cv.getBoundingClientRect();ctx.lineTo(e.clientX-r.left,e.clientY-r.top);ctx.stroke()},{passive:false});
cv.addEventListener('pointerup',function(e){if(!dw)return;e.preventDefault();dw=false;const end=gU(e.clientX,e.clientY);sE.classList.remove('pk');
setTimeout(()=>ctx.clearRect(0,0,cv.width,cv.height),300);
if(!end||end===sE||end.classList.contains('done')){sE=null;return}
if(sE.dataset.side===end.dataset.side){sE=null;return}
if(sE.dataset.id===end.dataset.id){sE.classList.add('done');end.classList.add('done');sE.style.animation='mp 0.4s';end.style.animation='mp 0.4s';g1++;uCnt()}
else{sE.classList.add('wf');end.classList.add('wf');g2++;c.dataset.wrong=parseInt(c.dataset.wrong)+1;const a=sE,b=end;setTimeout(()=>{a.classList.remove('wf');b.classList.remove('wf')},600)}
sE=null;uPr()},{passive:false});
cv.addEventListener('pointercancel',function(){dw=false;if(sE)sE.classList.remove('pk');ctx.clearRect(0,0,cv.width,cv.height);sE=null});
function gU(cx,cy){const all=c.querySelectorAll('.si');for(const i of all){const r=i.getBoundingClientRect();if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)return i}return null}}
function showD(){res[LV[cur].id]=true;const c=document.getElementById('q0'),w=parseInt(c.dataset.wrong),t=parseInt(c.dataset.total);
const el=document.getElementById('ld');document.getElementById('lsc').textContent=(t-Math.min(w,t))+' / '+t;
if(w===0){document.getElementById('lt').textContent='🏆 מושלם!';document.getElementById('ls').textContent='כל ההתאמות נכונות!'}
else if(w<=2){document.getElementById('lt').textContent='👏 כל הכבוד!';document.getElementById('ls').textContent='כמעט מושלם!'}
else{document.getElementById('lt').textContent='💪 סיימתם!';document.getElementById('ls').textContent='נסו שוב לשיפור!'}
el.classList.add('show');el.scrollIntoView({behavior:'smooth',block:'center'});rTabs()}
function go(i){cur=i;pk=null;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function nxt(){if(cur<LV.length-1){cur++;pk=null;rLv();window.scrollTo({top:0,behavior:'smooth'})}}
function retry(){pk=null;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function setM(m){md=m;pk=null;document.getElementById('mc1').classList.toggle('on',m==='click');document.getElementById('mc2').classList.toggle('on',m==='draw');if(m==='click')document.getElementById('hb').classList.remove('show');rLv()}
function uPr(){const d=Object.keys(res).length;document.getElementById('pf').style.width=Math.round(d/LV.length*100)+'%';document.getElementById('g1').textContent=g1;document.getElementById('g2').textContent=g2}
rLv();
