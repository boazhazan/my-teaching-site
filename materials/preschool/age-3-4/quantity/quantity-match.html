<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>התאמה כמותית | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0fff4;--card:#fff;--pri:#00b894;--pri-l:#d5f5e3;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#00b894,#55efc4);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.mb{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.mbtn{padding:8px 18px;border-radius:24px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.mbtn:hover{border-color:var(--pri)}.mbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#55efc4);border-radius:10px;transition:width 0.5s}
.pss{display:flex;gap:16px}.ps2{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.hb{text-align:center;padding:8px;background:#fff3cd;color:#856404;font-weight:600;font-size:0.9rem;display:none}.hb.show{display:block}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative;overflow:hidden}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.85rem;color:var(--txt2);font-weight:500}
/* Layout: lr = left-right, tb = top-bottom */
.match-wrap{position:relative}
.match-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none}
.match-wrap.dw canvas{pointer-events:auto;cursor:crosshair;z-index:20}
.match-lr{display:flex;justify-content:space-between;gap:20px}
.match-col{display:flex;flex-direction:column;gap:14px;flex:1;max-width:45%}
.match-tb{display:flex;flex-direction:column;gap:40px}
.match-row-tb{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.grp{display:flex;flex-wrap:wrap;justify-content:center;align-content:center;gap:3px;min-width:80px;min-height:70px;padding:10px;border:3px solid var(--brd);border-radius:var(--rs);cursor:pointer;transition:all 0.25s;-webkit-user-select:none;user-select:none;position:relative;background:var(--card);z-index:6}
.grp:hover:not(.done){border-color:var(--pri);background:var(--pri-l);transform:scale(1.04)}
.grp:active:not(.done){transform:scale(0.96)}
.grp.pk{border-color:var(--pri);background:var(--pri-l);box-shadow:0 0 0 3px rgba(0,184,148,0.3);transform:scale(1.06)}
.grp.done{cursor:default}
.grp.matched{border-width:4px}
.grp.wf{border-color:var(--no);background:var(--no-l);animation:shake 0.5s}
.grp .ge{font-size:1.5rem;line-height:1}
.grp .gcount{position:absolute;bottom:-10px;right:50%;transform:translateX(50%);background:var(--pri);color:#fff;font-size:0.7rem;font-weight:800;padding:1px 8px;border-radius:10px;display:none}
.grp.matched .gcount{display:block}
.cnt{text-align:center;font-size:0.85rem;color:var(--txt2);margin-top:12px;font-weight:600}
.cfb{text-align:center;margin-top:8px;font-weight:700;font-size:0.95rem;min-height:22px;opacity:0;transition:opacity 0.3s}.cfb.show{opacity:1}.cfb.ok{color:var(--ok)}.cfb.bad{color:var(--no)}
.ld{background:linear-gradient(135deg,var(--pri),#55efc4);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .sc{font-size:2.2rem;font-weight:900;margin:12px 0}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
.ab{padding:8px 18px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.25s}
.ab:hover{border-color:var(--pri);background:var(--pri-l)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}.mb,.ps,.tw,.acts,.ld,.hb,.cfb,.cnt{display:none!important}.ct{padding:8px 0}.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.ph{display:block!important}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.mc{padding:16px 12px}.mbtn{padding:6px 12px;font-size:0.8rem}.tb{padding:6px 12px;font-size:0.75rem}.grp{min-width:65px;min-height:55px;padding:6px}.grp .ge{font-size:1.2rem}.match-lr{gap:12px}}
</style>
</head>
<body>
<div class="hd"><h1>🔗 התאמה כמותית</h1><p>חברו בין קבוצות עם אותה כמות!</p></div>
<div class="mb">
<button class="mbtn on" onclick="setM('click')" id="mc1"><span>👆</span> לחיצה</button>
<button class="mbtn" onclick="setM('draw')" id="mc2"><span>✏️</span> קו חיבור</button>
<button class="mbtn" onclick="window.print()"><span>🖨️</span> הדפסה</button>
</div>
<div class="ps"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pss"><span class="ps2" style="color:var(--ok)">✅ <span id="g1">0</span></span><span class="ps2" style="color:var(--no)">❌ <span id="g2">0</span></span></div></div></div>
<div class="tw"><div class="ts" id="tabs"></div></div>
<div class="hb" id="hb">✏️ משכו קו מקבוצה אחת לקבוצה עם אותה כמות!</div>
<div class="ct" id="area"></div>
<script>
const MATCH_COLORS=['#e74c3c','#3498db','#2ecc71','#9b59b6','#e67e22','#1abc9c','#e84393','#00cec9'];
const EMOJIS=['🍎','🐱','🚗','⭐','🌸','🐟','🦋','🍌','🐶','⚽','🎈','🍕','🌻','🐝','❤️','✏️','🎸','👕','🐸','🍇','🏀','🎂','🔑','💡','🐞','🍄'];

// Layout types: lr=left-right, tb=top-bottom, mix=scattered
const LV=[
{id:1,t:'קל — שמאל-ימין',layout:'lr',pairs:3,counts:[2,3,4]},
{id:2,t:'קל — למעלה-למטה',layout:'tb',pairs:3,counts:[1,2,3]},
{id:3,t:'קל — שמאל-ימין',layout:'lr',pairs:3,counts:[3,5,4]},
{id:4,t:'קל — למעלה-למטה',layout:'tb',pairs:3,counts:[2,4,6]},
{id:5,t:'קל — מעורב',layout:'mix',pairs:3,counts:[1,3,5]},
{id:6,t:'בינוני — שמאל-ימין',layout:'lr',pairs:4,counts:[2,3,4,5]},
{id:7,t:'בינוני — למעלה-למטה',layout:'tb',pairs:4,counts:[1,3,5,7]},
{id:8,t:'בינוני — מעורב',layout:'mix',pairs:4,counts:[2,4,6,3]},
{id:9,t:'בינוני — שמאל-ימין',layout:'lr',pairs:4,counts:[3,5,7,2]},
{id:10,t:'בינוני — מעורב',layout:'mix',pairs:4,counts:[1,4,6,8]},
{id:11,t:'קשה — שמאל-ימין',layout:'lr',pairs:5,counts:[2,3,4,5,6]},
{id:12,t:'קשה — למעלה-למטה',layout:'tb',pairs:5,counts:[1,3,5,7,4]},
{id:13,t:'קשה — מעורב',layout:'mix',pairs:5,counts:[2,4,6,8,3]},
{id:14,t:'אתגר — שמאל-ימין',layout:'lr',pairs:6,counts:[1,2,3,4,5,6]},
{id:15,t:'אתגר — מעורב',layout:'mix',pairs:6,counts:[2,3,4,5,6,7]}
];

let cur=0,md='click',g1=0,g2=0,res={},pk=null,matchCount=0,colorIdx=0;
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
const E1=['!מעולה 🔗','!התאמה מושלמת ⭐','!יופי 👏','!מדהים 🌟'];

function rTabs(){const el=document.getElementById('tabs');el.innerHTML=LV.map((l,i)=>`<button class="tb ${i===cur?'on':''} ${res[l.id]?'dn':''}" onclick="go(${i})">${l.t}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}

function rLv(){
const lv=LV[cur],ar=document.getElementById('area'),isDw=md==='draw';
pk=null;matchCount=0;colorIdx=0;

// Generate pairs: each count gets 2 groups with different emojis
const usedEmojis=sh(EMOJIS).slice(0,lv.pairs*2);
const leftGroups=[],rightGroups=[];
lv.counts.forEach((cnt,i)=>{
  leftGroups.push({e:usedEmojis[i*2],n:cnt,id:'L'+i});
  rightGroups.push({e:usedEmojis[i*2+1],n:cnt,id:'R'+i});
});
const shuffledLeft=sh(leftGroups);
const shuffledRight=sh(rightGroups);

let h=`<div class="ph">🔗 התאמה כמותית — ${lv.t}</div>`;
h+=`<div class="mc" id="q0">`;
h+=`<div class="mh"><div class="mn">🔗</div><span class="mht">💡 חברו בין קבוצות עם אותה כמות!</span></div>`;
h+=`<div class="match-wrap ${isDw?'dw':''}" id="mw0">`;
if(isDw) h+=`<canvas id="cv0"></canvas>`;

if(lv.layout==='lr'){
  h+=`<div class="match-lr">`;
  h+=`<div class="match-col">`;
  shuffledLeft.forEach(g=>{
    let emojis='';for(let i=0;i<g.n;i++) emojis+=`<span class="ge">${g.e}</span>`;
    h+=`<div class="grp" data-n="${g.n}" data-gid="${g.id}" data-side="L" ${!isDw?'onclick="sel(this)"':''}>${emojis}<span class="gcount">${g.n}</span></div>`;
  });
  h+=`</div><div class="match-col">`;
  shuffledRight.forEach(g=>{
    let emojis='';for(let i=0;i<g.n;i++) emojis+=`<span class="ge">${g.e}</span>`;
    h+=`<div class="grp" data-n="${g.n}" data-gid="${g.id}" data-side="R" ${!isDw?'onclick="sel(this)"':''}>${emojis}<span class="gcount">${g.n}</span></div>`;
  });
  h+=`</div></div>`;
} else if(lv.layout==='tb'){
  h+=`<div class="match-tb">`;
  h+=`<div class="match-row-tb">`;
  shuffledLeft.forEach(g=>{
    let emojis='';for(let i=0;i<g.n;i++) emojis+=`<span class="ge">${g.e}</span>`;
    h+=`<div class="grp" data-n="${g.n}" data-gid="${g.id}" data-side="L" ${!isDw?'onclick="sel(this)"':''}>${emojis}<span class="gcount">${g.n}</span></div>`;
  });
  h+=`</div><div class="match-row-tb">`;
  shuffledRight.forEach(g=>{
    let emojis='';for(let i=0;i<g.n;i++) emojis+=`<span class="ge">${g.e}</span>`;
    h+=`<div class="grp" data-n="${g.n}" data-gid="${g.id}" data-side="R" ${!isDw?'onclick="sel(this)"':''}>${emojis}<span class="gcount">${g.n}</span></div>`;
  });
  h+=`</div></div>`;
} else { // mix
  const all=sh([...shuffledLeft,...shuffledRight]);
  h+=`<div class="match-row-tb" style="flex-wrap:wrap;gap:14px;justify-content:center">`;
  all.forEach(g=>{
    let emojis='';for(let i=0;i<g.n;i++) emojis+=`<span class="ge">${g.e}</span>`;
    h+=`<div class="grp" data-n="${g.n}" data-gid="${g.id}" data-side="${g.id[0]}" ${!isDw?'onclick="sel(this)"':''}>${emojis}<span class="gcount">${g.n}</span></div>`;
  });
  h+=`</div>`;
}

h+=`</div>`;
h+=`<div class="cnt" id="cnt0">0 / ${lv.pairs} זוגות</div>`;
h+=`<div class="cfb" id="fb0"></div>`;
h+=`</div>`;

h+=`<div class="ld" id="ld"><div class="big">🔗</div><h2 id="lt"></h2><p id="ls"></p><div class="sc" id="lsc"></div><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<LV.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;

ar.innerHTML=h;
if(isDw) initDraw();
rTabs();uPr();
}

// === CLICK MODE ===
function sel(el){
  if(el.classList.contains('done'))return;
  if(!pk){el.classList.add('pk');pk=el;return}
  if(pk===el){el.classList.remove('pk');pk=null;return}

  pk.classList.remove('pk');
  const card=document.getElementById('q0');

  if(pk.dataset.n===el.dataset.n && pk.dataset.gid!==el.dataset.gid){
    // Match!
    const color=MATCH_COLORS[colorIdx%MATCH_COLORS.length];colorIdx++;
    [pk,el].forEach(item=>{
      item.classList.add('done','matched');
      item.style.borderColor=color;
      item.style.backgroundColor=color+'15';
    });
    g1++;matchCount++;
    document.getElementById('cnt0').textContent=matchCount+' / '+LV[cur].pairs+' זוגות';
    if(matchCount>=LV[cur].pairs) setTimeout(showDone,500);
  } else {
    pk.classList.add('wf');el.classList.add('wf');g2++;
    const a=pk,b=el;
    setTimeout(()=>{a.classList.remove('wf');b.classList.remove('wf')},600);
  }
  pk=null;uPr();
}

// === DRAW MODE ===
function initDraw(){
  document.getElementById('hb').classList.add('show');
  const wrap=document.getElementById('mw0');
  const cv=document.getElementById('cv0');
  if(!cv)return;
  cv.width=wrap.offsetWidth;cv.height=wrap.offsetHeight;
  const ctx=cv.getContext('2d');
  let dw=false,startEl=null;

  cv.addEventListener('pointerdown',function(e){
    e.preventDefault();dw=true;
    // Find which group is under pointer
    const grps=wrap.querySelectorAll('.grp:not(.done)');
    startEl=null;
    for(const g of grps){
      const r=g.getBoundingClientRect();
      if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){startEl=g;break}
    }
    if(startEl){
      startEl.classList.add('pk');
      const r=cv.getBoundingClientRect();
      ctx.beginPath();
      const color=MATCH_COLORS[colorIdx%MATCH_COLORS.length];
      ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineCap='round';ctx.setLineDash([8,6]);
      const sr=startEl.getBoundingClientRect();
      ctx.moveTo(sr.left+sr.width/2-r.left,sr.top+sr.height/2-r.top);
    }
  },{passive:false});

  cv.addEventListener('pointermove',function(e){
    if(!dw||!startEl)return;e.preventDefault();
    const r=cv.getBoundingClientRect();
    ctx.clearRect(0,0,cv.width,cv.height);
    // Redraw permanent lines
    drawPermanentLines(ctx,cv);
    // Draw current line
    const sr=startEl.getBoundingClientRect();
    const color=MATCH_COLORS[colorIdx%MATCH_COLORS.length];
    ctx.strokeStyle=color;ctx.lineWidth=3;ctx.setLineDash([8,6]);
    ctx.beginPath();
    ctx.moveTo(sr.left+sr.width/2-r.left,sr.top+sr.height/2-r.top);
    ctx.lineTo(e.clientX-r.left,e.clientY-r.top);
    ctx.stroke();
  },{passive:false});

  cv.addEventListener('pointerup',function(e){
    if(!dw)return;dw=false;
    if(!startEl){ctx.clearRect(0,0,cv.width,cv.height);drawPermanentLines(ctx,cv);return}
    startEl.classList.remove('pk');
    // Find which group is under pointer
    const grps=wrap.querySelectorAll('.grp:not(.done)');
    let endEl=null;
    for(const g of grps){
      if(g===startEl)continue;
      const r=g.getBoundingClientRect();
      if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){endEl=g;break}
    }

    if(endEl&&startEl.dataset.n===endEl.dataset.n&&startEl.dataset.gid!==endEl.dataset.gid){
      // Match!
      const color=MATCH_COLORS[colorIdx%MATCH_COLORS.length];colorIdx++;
      [startEl,endEl].forEach(item=>{
        item.classList.add('done','matched');
        item.style.borderColor=color;
        item.style.backgroundColor=color+'15';
        item.dataset.matchColor=color;
      });
      g1++;matchCount++;
      document.getElementById('cnt0').textContent=matchCount+' / '+LV[cur].pairs+' זוגות';
      if(matchCount>=LV[cur].pairs) setTimeout(showDone,500);
      uPr();
    } else if(endEl){
      startEl.classList.add('wf');endEl.classList.add('wf');g2++;uPr();
      setTimeout(()=>{startEl.classList.remove('wf');endEl.classList.remove('wf')},600);
    }

    ctx.clearRect(0,0,cv.width,cv.height);
    drawPermanentLines(ctx,cv);
    startEl=null;
  },{passive:false});

  cv.addEventListener('pointercancel',function(){dw=false;if(startEl)startEl.classList.remove('pk');startEl=null;ctx.clearRect(0,0,cv.width,cv.height);drawPermanentLines(ctx,cv)});
}

// Draw lines between matched pairs
function drawPermanentLines(ctx,cv){
  const wrap=document.getElementById('mw0');
  const matched=wrap.querySelectorAll('.grp.matched');
  const pairs={};
  matched.forEach(g=>{
    const n=g.dataset.n;
    if(!pairs[n])pairs[n]=[];
    pairs[n].push(g);
  });
  const r=cv.getBoundingClientRect();
  Object.values(pairs).forEach(pair=>{
    if(pair.length===2){
      const r1=pair[0].getBoundingClientRect(),r2=pair[1].getBoundingClientRect();
      const color=pair[0].dataset.matchColor||'#2d3436';
      ctx.strokeStyle=color;ctx.lineWidth=3;ctx.setLineDash([]);ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(r1.left+r1.width/2-r.left,r1.top+r1.height/2-r.top);
      ctx.lineTo(r2.left+r2.width/2-r.left,r2.top+r2.height/2-r.top);
      ctx.stroke();
    }
  });
}
