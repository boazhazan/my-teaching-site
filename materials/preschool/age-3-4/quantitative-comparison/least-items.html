<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>הכי מעט — מצאו את הקבוצה הקטנה | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f7ff;--card:#fff;--pri:#0984e3;--pri-l:#dfe6e9;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#0984e3,#74b9ff);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.mb{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.mbtn{padding:8px 18px;border-radius:24px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.mbtn:hover{border-color:var(--pri)}.mbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#74b9ff);border-radius:10px;transition:width 0.5s}
.pss{display:flex;gap:16px}.ps2{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.hb{text-align:center;padding:8px;background:#fff3cd;color:#856404;font-weight:600;font-size:0.9rem;display:none}.hb.show{display:block}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}.mc.bad{border-color:var(--no);background:var(--no-l)}
.mc.dw{touch-action:none}.mc .dc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;border-radius:var(--r)}.mc.done .dc{display:none}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.85rem;color:var(--txt2);font-weight:500}
.groups-row{display:flex;flex-wrap:wrap;justify-content:center;gap:20px}
.group-box{border:3px solid var(--brd);border-radius:var(--r);padding:16px;cursor:pointer;transition:all 0.25s;-webkit-user-select:none;user-select:none;display:flex;flex-wrap:wrap;justify-content:center;gap:4px;min-width:120px;max-width:200px;flex:1;position:relative}
.group-box:hover:not(.done){border-color:var(--pri);background:var(--pri-l);transform:scale(1.03)}
.group-box.ok-pick{border-color:var(--ok);background:var(--ok-l)}
.group-box.ok-pick::after{content:'✓ הכי מעט!';position:absolute;top:-14px;right:50%;transform:translateX(50%);background:var(--ok);color:#fff;padding:2px 12px;border-radius:12px;font-size:0.75rem;font-weight:700;white-space:nowrap;animation:pop 0.3s}
.group-box.no-pick{border-color:var(--no);background:var(--no-l);animation:shake 0.5s}
.group-box.done{cursor:default}
.group-box .ge{font-size:2rem;line-height:1}
.group-box.circled::before{content:'';position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px;border:4px solid var(--circ-color,var(--pri));border-radius:20px;z-index:12;animation:cpop 0.4s ease forwards}
@keyframes cpop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05);opacity:1}100%{transform:scale(1);opacity:1}}
.cfb{text-align:center;margin-top:12px;font-weight:700;font-size:0.95rem;min-height:22px;opacity:0;transition:opacity 0.3s}.cfb.show{opacity:1}.cfb.ok{color:var(--ok)}.cfb.bad{color:var(--no)}
.ld{background:linear-gradient(135deg,var(--pri),#74b9ff);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .sc{font-size:2.2rem;font-weight:900;margin:12px 0}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}.mb,.ps,.tw,.acts,.ld,.hb,.cfb{display:none!important}.ct{padding:8px 0}.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.group-box{border-color:#999}.dc{display:none!important}.ph{display:block!important}.plh{display:block!important;text-align:center;color:#666;font-size:0.8rem;margin-top:8px}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}.plh{display:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:translateX(50%) scale(0)}50%{transform:translateX(50%) scale(1.3)}100%{transform:translateX(50%) scale(1)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.mc{padding:16px 12px}.mbtn{padding:6px 12px;font-size:0.8rem}.tb{padding:6px 12px;font-size:0.75rem}.group-box{min-width:90px;max-width:150px;padding:12px 10px}.group-box .ge{font-size:1.6rem}.groups-row{gap:12px}}
</style>
</head>
<body>
<div class="hd"><h1>📉 הכי מעט</h1><p>מצאו את הקבוצה שיש בה הכי מעט!</p></div>
<div class="mb nopr"><button class="mbtn on" onclick="setM('click')" id="mc1"><span>👆</span> לחיצה</button><button class="mbtn" onclick="setM('draw')" id="mc2"><span>✏️</span> ציור עיגול</button><button class="mbtn" onclick="window.print()"><span>🖨️</span> הדפסה</button></div>
<div class="ps nopr"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pss"><span class="ps2" style="color:var(--ok)">✅ <span id="g1">0</span></span><span class="ps2" style="color:var(--no)">❌ <span id="g2">0</span></span></div></div></div>
<div class="tw nopr"><div class="ts" id="tabs"></div></div>
<div class="hb" id="hb">✏️ ציירו עיגול סביב הקבוצה עם הכי מעט פריטים!</div>
<div class="ct" id="area"></div>
<script>
const LV=[
{id:1,t:'חיות',qs:[{e:'🐱',groups:[7,3,5]},{e:'🐶',groups:[4,2,6]},{e:'🐸',groups:[5,8,3]}]},
{id:2,t:'פירות',qs:[{e:'🍎',groups:[6,2,4]},{e:'🍌',groups:[3,7,5]},{e:'🍇',groups:[8,4,1]}]},
{id:3,t:'טבע',qs:[{e:'🌸',groups:[5,3,7]},{e:'🌲',groups:[6,1,4]},{e:'🍄',groups:[3,5,2]}]},
{id:4,t:'תחבורה',qs:[{e:'🚗',groups:[4,7,2]},{e:'✈️',groups:[6,3,5]},{e:'🚌',groups:[8,5,1]}]},
{id:5,t:'ספורט',qs:[{e:'⚽',groups:[3,6,4]},{e:'🏀',groups:[7,2,5]},{e:'🎾',groups:[4,8,1]}]},
{id:6,t:'אוכל',qs:[{e:'🍕',groups:[5,2,6]},{e:'🍩',groups:[7,4,3]},{e:'🧁',groups:[1,5,4]}]},
{id:7,t:'חרקים',qs:[{e:'🐝',groups:[6,3,5]},{e:'🦋',groups:[4,7,2]},{e:'🐞',groups:[5,1,3]}]},
{id:8,t:'בגדים',qs:[{e:'👕',groups:[3,6,4]},{e:'👟',groups:[7,2,5]},{e:'👒',groups:[4,3,8]}]},
{id:9,t:'ים',qs:[{e:'🐟',groups:[5,2,7]},{e:'🐬',groups:[3,6,4]},{e:'🦀',groups:[8,4,1]}]},
{id:10,t:'כלים',qs:[{e:'✂️',groups:[6,3,5]},{e:'🔨',groups:[2,7,4]},{e:'🖊️',groups:[5,1,3]}]},
{id:11,t:'שמיים',qs:[{e:'⭐',groups:[7,4,2]},{e:'☁️',groups:[3,6,5]},{e:'🌙',groups:[8,1,4]}]},
{id:12,t:'מוזיקה',qs:[{e:'🎸',groups:[5,2,6]},{e:'🥁',groups:[4,7,1]},{e:'🎹',groups:[3,5,7]}]},
{id:13,t:'בית',qs:[{e:'🏠',groups:[6,3,5]},{e:'💡',groups:[2,4,7]},{e:'📺',groups:[5,8,1]}]},
{id:14,t:'אתגר 1',qs:[{e:'🎈',groups:[5,2,7,4]},{e:'🍬',groups:[3,8,1,5]},{e:'🎁',groups:[6,4,2,7]}]},
{id:15,t:'אתגר 2',qs:[{e:'🐱',groups:[4,6,1,8]},{e:'🌸',groups:[7,3,5,2]},{e:'⚽',groups:[5,1,6,4]}]}
];
let cur=0,md='click',g1=0,g2=0,res={};
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
const E1=['!מעולה 📉','!עין חדה 🔍','!יופי 👏','!מדהים 🌟'];
function rTabs(){const el=document.getElementById('tabs');el.innerHTML=LV.map((l,i)=>`<button class="tb ${i===cur?'on':''} ${res[l.id]?'dn':''}" onclick="go(${i})">${l.t}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}
function rLv(){const lv=LV[cur],ar=document.getElementById('area'),isDw=md==='draw';let h=`<div class="ph">📉 הכי מעט — ${lv.t}</div>`;
lv.qs.forEach((q,qi)=>{const minN=Math.min(...q.groups);const indexed=q.groups.map((n,i)=>({n,isTarget:n===minN,origIdx:i}));const shuffled=sh(indexed);
h+=`<div class="mc ${isDw?'dw':''}" id="q${qi}" data-done="0" data-wrong="0">`;if(isDw)h+=`<canvas class="dc" id="cv${qi}"></canvas>`;
h+=`<div class="mh"><div class="mn">${qi+1}</div><span class="mht">💡 איפה יש הכי מעט ${q.e}?</span></div><div class="groups-row">`;
shuffled.forEach((g,gi)=>{let emojis='';for(let i=0;i<g.n;i++)emojis+=`<span class="ge">${q.e}</span>`;h+=`<div class="group-box" data-qi="${qi}" data-target="${g.isTarget}" ${md==='click'?'onclick="pick(this)"':''}>${emojis}</div>`});
h+=`</div><div class="cfb" id="fb${qi}"></div><div class="plh">הקיפו בעיגול את הקבוצה עם הכי מעט פריטים</div></div>`});
h+=`<div class="ld" id="ld"><div class="big">📉</div><h2 id="lt"></h2><p id="ls"></p><div class="sc" id="lsc"></div><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<LV.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;
ar.innerHTML=h;ar._done=0;ar._total=lv.qs.length;if(isDw)initDraw();rTabs();uPr()}
function pick(el){if(el.classList.contains('done'))return;const qi=el.dataset.qi;const card=document.getElementById('q'+qi);if(card.dataset.done==='1')return;
if(el.dataset.target==='true'){el.classList.add('ok-pick','done');card.dataset.done='1';card.querySelectorAll('.group-box').forEach(g=>{if(!g.classList.contains('ok-pick'))g.classList.add('done')});g1++;const w=parseInt(card.dataset.wrong);const fb=document.getElementById('fb'+qi);if(w===0){card.classList.add('ok');fb.textContent=E1[Math.floor(Math.random()*E1.length)];fb.classList.add('ok','show')}else{card.classList.add('bad');fb.textContent=`נכון! עם ${w} טעויות 💪`;fb.classList.add('bad','show')}const ar=document.getElementById('area');ar._done++;if(ar._done>=ar._total)setTimeout(showD,600)}else{el.classList.add('no-pick');g2++;card.dataset.wrong=parseInt(card.dataset.wrong)+1;setTimeout(()=>el.classList.remove('no-pick'),600)}uPr()}
function initDraw(){document.getElementById('hb').classList.add('show');document.querySelectorAll('.mc.dw').forEach(card=>{const qi=card.id.replace('q','');const cv=document.getElementById('cv'+qi);if(!cv)return;cv.width=card.offsetWidth;cv.height=card.offsetHeight;const ctx=cv.getContext('2d');let dw=false,pts=[];
cv.addEventListener('pointerdown',function(e){if(card.dataset.done==='1')return;e.preventDefault();e.stopPropagation();dw=true;pts=[];ctx.clearRect(0,0,cv.width,cv.height);const r=cv.getBoundingClientRect();ctx.beginPath();ctx.moveTo(e.clientX-r.left,e.clientY-r.top);ctx.strokeStyle='#0984e3';ctx.lineWidth=4;ctx.lineCap='round';pts.push({cx:e.clientX,cy:e.clientY})},{passive:false});
cv.addEventListener('pointermove',function(e){if(!dw)return;e.preventDefault();e.stopPropagation();const r=cv.getBoundingClientRect();ctx.lineTo(e.clientX-r.left,e.clientY-r.top);ctx.stroke();pts.push({cx:e.clientX,cy:e.clientY})},{passive:false});
cv.addEventListener('pointerup',function(e){if(!dw)return;e.preventDefault();dw=false;setTimeout(()=>ctx.clearRect(0,0,cv.width,cv.height),300);if(pts.length<10)return;let cx=0,cy=0;pts.forEach(p=>{cx+=p.cx;cy+=p.cy});cx/=pts.length;cy/=pts.length;
const groups=card.querySelectorAll('.group-box:not(.done)');let best=null,bestD=Infinity;for(const g of groups){const r=g.getBoundingClientRect();const d=Math.sqrt((cx-(r.left+r.width/2))**2+(cy-(r.top+r.height/2))**2);if(d<Math.max(r.width,r.height)*1.2&&d<bestD){bestD=d;best=g}}
if(best){if(best.dataset.target==='true'){best.classList.add('ok-pick','done','circled');best.style.setProperty('--circ-color','#27ae60');card.dataset.done='1';card.querySelectorAll('.group-box').forEach(g=>{if(!g.classList.contains('ok-pick'))g.classList.add('done')});g1++;const w=parseInt(card.dataset.wrong);const fb=document.getElementById('fb'+qi);if(w===0){card.classList.add('ok');fb.textContent=E1[Math.floor(Math.random()*E1.length)];fb.classList.add('ok','show')}else{card.classList.add('bad');fb.textContent=`נכון! עם ${w} טעויות 💪`;fb.classList.add('bad','show')}const ar=document.getElementById('area');ar._done++;if(ar._done>=ar._total)setTimeout(showD,600)}else{best.classList.add('no-pick');g2++;card.dataset.wrong=parseInt(card.dataset.wrong)+1;setTimeout(()=>best.classList.remove('no-pick'),600)}uPr()}},{passive:false});
cv.addEventListener('pointercancel',function(){dw=false;ctx.clearRect(0,0,cv.width,cv.height)})})}
function showD(){res[LV[cur].id]=true;let tw=0;LV[cur].qs.forEach((q,i)=>{tw+=parseInt(document.getElementById('q'+i).dataset.wrong)});const t=LV[cur].qs.length;const el=document.getElementById('ld');document.getElementById('lsc').textContent=(t-Math.min(tw,t))+' / '+t;if(tw===0){document.getElementById('lt').textContent='🏆 מושלם!';document.getElementById('ls').textContent='מצאתם את כל הקבוצות הקטנות!'}else if(tw<=2){document.getElementById('lt').textContent='👏 כל הכבוד!';document.getElementById('ls').textContent='כמעט מושלם!'}else{document.getElementById('lt').textContent='💪 סיימתם!';document.getElementById('ls').textContent='נסו שוב לשיפור!'}el.classList.add('show');el.scrollIntoView({behavior:'smooth',block:'center'});rTabs()}
function go(i){cur=i;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function nxt(){if(cur<LV.length-1){cur++;rLv();window.scrollTo({top:0,behavior:'smooth'})}}
function retry(){rLv();window.scrollTo({top:0,behavior:'smooth'})}
function setM(m){md=m;document.getElementById('mc1').classList.toggle('on',m==='click');document.getElementById('mc2').classList.toggle('on',m==='draw');if(m==='click')document.getElementById('hb').classList.remove('show');rLv()}
function uPr(){const d=Object.keys(res).length;document.getElementById('pf').style.width=Math.round(d/LV.length*100)+'%';document.getElementById('g1').textContent=g1;document.getElementById('g2').textContent=g2}
rLv();
</script>  <script src="../../../../js/auth-gate.js"></script>
</body></html>
