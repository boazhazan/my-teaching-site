<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&family=Rubik:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#dbeafe;
  --accent:#f59e0b;--accent-dark:#d97706;
  --text:#1e293b;--text-light:#64748b;
  --bg:#ffffff;--bg-soft:#f8fafc;--border:#e2e8f0;
  --success:#10b981;--error:#ef4444;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --neg:#ef4444;--pos:#10b981;--zero:#2563eb;
}
body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#f0f9ff 0%,#e0f2fe 50%,#f0f9ff 100%);min-height:100vh;color:var(--text);line-height:1.6}
h1,h2,h3,.step-title{font-family:'Rubik','Heebo',sans-serif}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-family:'Rubik',sans-serif;font-size:1.05rem;font-weight:700;color:var(--primary-dark)}
.topbar a{color:var(--primary);text-decoration:none;font-size:.85rem;font-weight:600}
.topbar a:hover{text-decoration:underline}
.section-toggle{display:flex;justify-content:center;gap:0;margin:16px auto;max-width:340px;background:var(--bg);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
.section-btn{flex:1;padding:10px 20px;border:none;border-radius:999px;background:transparent;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.95rem;font-weight:700;color:var(--text-light);transition:.3s}
.section-btn.active{background:var(--primary);color:#fff;box-shadow:var(--shadow-md)}
.container{max-width:760px;margin:0 auto;padding:0 16px 40px}
#learnSection{animation:fadeIn .4s ease}
.step-progress{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:0 4px}
.step-progress-bar{flex:1;height:8px;background:var(--border);border-radius:999px;overflow:hidden}
.step-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:999px;transition:width .4s ease}
.step-progress-text{font-size:.8rem;color:var(--text-light);font-weight:600;white-space:nowrap}
.step-card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:28px 24px;animation:slideIn .4s ease}
.step-title{font-size:1.35rem;font-weight:700;color:var(--primary-dark);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.step-card p{margin-bottom:12px;font-size:.95rem;line-height:1.7}
.step-card .highlight{background:var(--primary-light);border-right:4px solid var(--primary);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600}
.step-card .warning{background:#fef2f2;border-right:4px solid var(--error);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600;color:#991b1b}
.step-card .success-box{background:#ecfdf5;border-right:4px solid var(--success);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600;color:#065f46}
.step-card .rule-box{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid var(--accent);padding:16px;border-radius:var(--radius);margin:16px 0;text-align:center;font-size:1.1rem;font-weight:700}
.step-card .example{background:var(--bg-soft);border:1px solid var(--border);padding:14px;border-radius:var(--radius-sm);margin:10px 0;font-size:1rem}
.step-card code{font-family:'Courier New',monospace;background:var(--primary-light);padding:2px 8px;border-radius:4px;font-weight:700;color:var(--primary-dark);font-size:1.05em;direction:ltr;display:inline-block}
.math-expr{direction:ltr;unicode-bidi:embed;display:inline;font-family:'Rubik',sans-serif;font-weight:700;color:var(--primary)}
.mini-btn{padding:8px 20px;border:none;border-radius:999px;background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:700;transition:.25s;margin:4px}
.mini-btn:hover{background:var(--primary-dark)}
.mini-btn.accent{background:var(--accent);color:#fff}
.mini-btn.accent:hover{background:var(--accent-dark)}
.mini-btn:disabled{opacity:.5;cursor:not-allowed}
.feedback-inline{margin-top:8px;padding:8px 12px;border-radius:var(--radius-sm);font-weight:600;font-size:.9rem;animation:fadeIn .3s}
.feedback-inline.ok{background:#ecfdf5;color:#065f46}
.feedback-inline.err{background:#fef2f2;color:#991b1b}
.quiz-options{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.quiz-opt{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;transition:.25s;background:var(--bg)}
.quiz-opt:hover{border-color:var(--primary);background:var(--primary-light)}
.quiz-opt.correct-answer{border-color:var(--success);background:#ecfdf5;font-weight:700}
.quiz-opt.wrong-answer{border-color:var(--error);background:#fef2f2}
.step-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.summary-item{background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.summary-item .s-icon{font-size:2rem;margin-bottom:6px}
.summary-item .s-title{font-weight:700;color:var(--primary-dark);margin-bottom:4px;font-size:.9rem}
.summary-item .s-text{font-size:.82rem;color:var(--text-light)}
.step-nav{display:flex;justify-content:space-between;margin-top:16px;gap:8px}
.step-nav-btn{padding:10px 28px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.25s}
.step-nav-btn.primary{background:var(--primary);color:#fff}
.step-nav-btn.primary:hover{background:var(--primary-dark)}
.step-nav-btn.secondary{background:var(--bg);color:var(--text);border:2px solid var(--border)}
.step-nav-btn.secondary:hover{border-color:var(--primary);color:var(--primary)}
.step-nav-btn:disabled{opacity:.4;cursor:not-allowed}
#practiceSection{display:none;animation:fadeIn .4s ease}
.level-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.level-tab{padding:8px 20px;border-radius:999px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:700;color:var(--text-light);transition:.25s;white-space:nowrap}
.level-tab.active{border-color:var(--primary);background:var(--primary);color:#fff}
.level-tab .tab-score{font-size:.75rem;font-weight:400;margin-right:4px}
.level-progress{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.level-progress-bar{flex:1;height:6px;background:var(--border);border-radius:999px;overflow:hidden}
.level-progress-fill{height:100%;background:var(--success);border-radius:999px;transition:width .4s}
.level-progress-text{font-size:.8rem;color:var(--text-light);font-weight:600;white-space:nowrap}
.q-card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:24px;animation:slideIn .3s ease}
.q-number{font-size:.8rem;color:var(--text-light);font-weight:600;margin-bottom:4px}
.q-stem{font-size:1.05rem;margin-bottom:16px;line-height:1.7}
.q-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.q-opt{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;transition:.25s;background:var(--bg);display:flex;align-items:center;gap:10px}
.q-opt:hover:not(.disabled){border-color:var(--primary);background:var(--primary-light)}
.q-opt.selected{border-color:var(--primary);background:var(--primary-light);font-weight:700}
.q-opt.correct{border-color:var(--success)!important;background:#ecfdf5!important;font-weight:700}
.q-opt.wrong{border-color:var(--error)!important;background:#fef2f2!important}
.q-opt.disabled{cursor:default;opacity:.85}
.q-opt-letter{width:28px;height:28px;border-radius:50%;background:var(--bg-soft);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;transition:.25s}
.q-opt.selected .q-opt-letter{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-opt.correct .q-opt-letter{background:var(--success);color:#fff;border-color:var(--success)}
.q-opt.wrong .q-opt-letter{background:var(--error);color:#fff;border-color:var(--error)}
.q-input-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.q-input{width:120px;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:1.1rem;font-family:inherit;font-weight:700;text-align:center;transition:.3s;direction:ltr}
.q-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.q-input.correct{border-color:var(--success);background:#ecfdf5}
.q-input.wrong{border-color:var(--error);background:#fef2f2}
.q-check-btn{padding:10px 28px;border-radius:999px;border:none;background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.25s;box-shadow:var(--shadow)}
.q-check-btn:hover{background:var(--primary-dark)}
.q-check-btn:disabled{opacity:.5;cursor:not-allowed}
.q-feedback{margin-top:12px;padding:12px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:.92rem;animation:fadeIn .3s}
.q-feedback.correct{background:#ecfdf5;border-right:4px solid var(--success);color:#065f46}
.q-feedback.wrong{background:#fef2f2;border-right:4px solid var(--error);color:#991b1b}
.q-nav{display:flex;justify-content:space-between;margin-top:16px}
.q-nav-btn{padding:10px 24px;border-radius:999px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:700;color:var(--text);transition:.25s}
.q-nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.q-nav-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-nav-btn.primary:hover{background:var(--primary-dark)}
.q-nav-btn:disabled{opacity:.4;cursor:not-allowed}
.level-complete{text-align:center;padding:24px;animation:fadeIn .5s}
.level-complete .big-emoji{font-size:4rem;margin-bottom:12px}
.level-complete h2{font-size:1.4rem;color:var(--primary-dark);margin-bottom:8px}
.level-complete .score-display{font-size:1.8rem;font-weight:800;color:var(--success);margin-bottom:16px}
.level-complete .score-display.medium-score{color:var(--accent)}
.level-complete .score-display.low-score{color:var(--error)}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;top:-10px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(.3);opacity:0}}
.print-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--primary);color:#fff;cursor:pointer;font-size:1rem;box-shadow:var(--shadow);transition:.25s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.print-btn:hover{background:var(--primary-dark);transform:scale(1.1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  .container{padding:0 10px 30px}
  .step-card,.q-card{padding:18px 14px}
  .step-title{font-size:1.15rem}
  .step-summary-grid{grid-template-columns:1fr}
  .section-toggle{max-width:280px;margin:12px auto}
  .section-btn{font-size:.88rem;padding:8px 14px}
  .q-opt{padding:10px 12px;font-size:.9rem}
  .topbar-title{font-size:.9rem}
}
@media print{
  .topbar,.section-toggle,.step-nav,.q-nav,.print-btn,.level-tabs,.confetti-container,.q-check-btn{display:none!important}
  body{background:#fff;font-size:11pt}
  .step-card,.q-card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  .container{max-width:100%}
}
</style>
</head>

<script>
/* ===== UTILITIES ===== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
var today=new Date(),dateSeed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
var rng=mulberry32(dateSeed);
function R(){return rng()}
function RI(a,b){return a+Math.floor(R()*(b-a+1))}
function pick(a){return a[Math.floor(R()*a.length)]}
function shuffle(a){var c=[].concat(a);for(var i=c.length-1;i>0;i--){var j=Math.floor(R()*(i+1));var t=c[i];c[i]=c[j];c[j]=t}return c}
var LETTERS=['א','ב','ג','ד'];

function fmtN(v){
  if(v==null)return '?';
  var n=typeof v==='number'?v:parseFloat(v);
  if(Math.abs(n)<.0001)return '0';
  if(n<0){var abs=Math.abs(n);var s=(abs===Math.floor(abs))?''+abs:parseFloat(abs.toFixed(4))+'';return s+'\u2212';}
  return (n===Math.floor(n))?''+n:parseFloat(n.toFixed(4))+'';
}

/* SVG number line */
function nlSVG(min,max,step,hl,opts){
  opts=opts||{};
  var w=opts.w||560,h=opts.h||75,pad=opts.pad||40,th=opts.th||10,fs=opts.fs||13;
  var us=w-2*pad,range=max-min;
  function tx(v){return pad+(v-min)/range*us}
  var my=h*.45;
  var s='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;max-width:'+w+'px;display:block;margin:8px auto" xmlns="http://www.w3.org/2000/svg">';
  s+='<line x1="'+(pad-14)+'" y1="'+my+'" x2="'+(w-pad+14)+'" y2="'+my+'" stroke="#1e293b" stroke-width="2"/>';
  s+='<polygon points="'+(w-pad+20)+','+my+' '+(w-pad+10)+','+(my-5)+' '+(w-pad+10)+','+(my+5)+'" fill="#1e293b"/>';
  s+='<polygon points="'+(pad-20)+','+my+' '+(pad-10)+','+(my-5)+' '+(pad-10)+','+(my+5)+'" fill="#1e293b"/>';
  for(var v=min;v<=max+step/100;v+=step){
    v=Math.round(v*10000)/10000;
    var x=tx(v),iz=Math.abs(v)<.0001;
    var col=iz?'#2563eb':v>0?'#10b981':'#ef4444';
    s+='<line x1="'+x+'" y1="'+(my-th)+'" x2="'+x+'" y2="'+(my+th)+'" stroke="'+col+'" stroke-width="'+(iz?3:2)+'"/>';
    if(!opts.noLabels){
      var lbl=fmtN(v),fc=iz?'#2563eb':'#1e293b',fw=iz?'800':'600';
      s+='<text x="'+x+'" y="'+(my+th+15)+'" text-anchor="middle" font-size="'+fs+'" font-weight="'+fw+'" fill="'+fc+'" font-family="Rubik,Heebo,sans-serif">'+lbl+'</text>';
    }
  }
  if(hl)for(var hi=0;hi<hl.length;hi++){
    var p=hl[hi],px=tx(p.value),r=p.r||6,c=p.color||'#ef4444';
    s+='<circle cx="'+px+'" cy="'+my+'" r="'+r+'" fill="'+c+'" stroke="#fff" stroke-width="2"/>';
    if(p.label)s+='<text x="'+px+'" y="'+(my-r-6)+'" text-anchor="middle" font-size="11" font-weight="700" fill="'+c+'" font-family="Rubik,Heebo,sans-serif">'+p.label+'</text>';
  }
  if(opts.zones){
    var z0=tx(0),xL=pad-14,xR=w-pad+14;
    if(min<0&&max>0){
      s+='<rect x="'+xL+'" y="'+(my-2)+'" width="'+(z0-xL)+'" height="4" fill="rgba(239,68,68,.15)" rx="2"/>';
      s+='<rect x="'+z0+'" y="'+(my-2)+'" width="'+(xR-z0)+'" height="4" fill="rgba(16,185,129,.15)" rx="2"/>';
    }
  }
  s+='</svg>';return s;
}

/* ===== STATE ===== */
var state={section:'learn',step:0,level:'easy',qIndex:0};
var scores={easy:[],medium:[],hard:[],challenge:[]};
var answered={easy:[],medium:[],hard:[],challenge:[]};
var questions={easy:null,medium:null,hard:null,challenge:null};
var LEVEL_COUNTS={easy:20,medium:20,hard:20,challenge:15};
var LEVEL_NAMES={easy:'קל',medium:'בינוני',hard:'קשה',challenge:'אתגר'};
var TOTAL_STEPS=7;
var LS_KEY='bh_g7_compare_'+dateSeed;
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify({scores:scores,answered:answered,state:state}))}catch(e){}}
function loadState(){try{var d=JSON.parse(localStorage.getItem(LS_KEY));if(d){scores=d.scores||scores;answered=d.answered||answered;if(d.state)state=d.state}}catch(e){}}

/* ===== TEACHING STEPS ===== */
var steps=[
/* Step 0 — Basic rule */
{title:'\u27A1\uFE0F הכלל הבסיסי — ימינה = גדול יותר',render:function(){return '\
<div class="rule-box">\u2728 על ציר המספרים: מספר שנמצא <strong>ימינה יותר</strong> = <strong>גדול יותר</strong></div>'+
nlSVG(-5,5,1,[{value:-3,color:'#ef4444',r:7,label:'3\u2212'},{value:2,color:'#10b981',r:7,label:'2'}],{zones:true})+'\
<p>2 נמצא <strong>ימינה</strong> מ-3\u2212, לכן <span class="math-expr">2 > 3\u2212</span></p>\
<div class="example">\
<strong>\u2022</strong> <span class="math-expr">5 > 2</span> &emsp; \
<strong>\u2022</strong> <span class="math-expr">1 > 3\u2212</span> &emsp; \
<strong>\u2022</strong> <span class="math-expr">0 > 4\u2212</span>\
</div>\
<p><strong>\u2753 שאלה:</strong> מי גדול יותר: <span class="math-expr">2</span> או <span class="math-expr">7\u2212</span>?</p>\
<div class="quiz-options" id="s0quiz">\
<div class="quiz-opt" onclick="pickOpt(this,0,\'s0quiz\',\'s0fb\',0)">2</div>\
<div class="quiz-opt" onclick="pickOpt(this,0,\'s0quiz\',\'s0fb\',0)">7\u2212</div>\
<div class="quiz-opt" onclick="pickOpt(this,0,\'s0quiz\',\'s0fb\',0)">\u05E9\u05D5\u05D5\u05D9\u05DD</div>\
<div class="quiz-opt" onclick="pickOpt(this,0,\'s0quiz\',\'s0fb\',0)">\u05DC\u05D0 \u05E0\u05D9\u05EA\u05DF \u05DC\u05D3\u05E2\u05EA</div>\
</div><div id="s0fb"></div>'}},

/* Step 1 — Two positives */
{title:'\u2795 השוואת שני מספרים חיוביים',render:function(){return '\
<p>כשמשווים שני מספרים <strong>חיוביים</strong> — אין הפתעות! הכללים הרגילים:</p>\
<div class="example">\

window.pickOpt=function(el,stepIdx,quizId,fbId,correctIdx){
  var opts=document.querySelectorAll('#'+quizId+' .quiz-opt');
  var ci=0;
  opts.forEach(function(o,i){if(o===el)ci=i;o.onclick=null;o.style.cursor='default'});
  if(ci===correctIdx){
    el.classList.add('correct-answer');
    document.getElementById(fbId).innerHTML='<div class="feedback-inline ok">\u2705 \u05E0\u05DB\u05D5\u05DF!</div>';
  } else {
    el.classList.add('wrong-answer');
    opts[correctIdx].classList.add('correct-answer');
    var explanations={0:'2 \u05D7\u05D9\u05D5\u05D1\u05D9 \u05D5-7\u2212 \u05E9\u05DC\u05D9\u05DC\u05D9 \u2014 \u05DB\u05DC \u05D7\u05D9\u05D5\u05D1\u05D9 \u05D2\u05D3\u05D5\u05DC \u05DE\u05DB\u05DC \u05E9\u05DC\u05D9\u05DC\u05D9',1:'12 > 9 \u2014 \u05D1\u05D7\u05D9\u05D5\u05D1\u05D9\u05D9\u05DD, \u05D4\u05D2\u05D3\u05D5\u05DC \u05D9\u05D5\u05EA\u05E8 \u05D4\u05D5\u05D0 \u05D4\u05D2\u05D3\u05D5\u05DC',2:'5 \u05D7\u05D9\u05D5\u05D1\u05D9, 10\u2212 \u05E9\u05DC\u05D9\u05DC\u05D9 \u2014 \u05D7\u05D9\u05D5\u05D1\u05D9 \u05EA\u05DE\u05D9\u05D3 \u05D2\u05D3\u05D5\u05DC!',3:'2\u2212 \u05E7\u05E8\u05D5\u05D1 \u05D9\u05D5\u05EA\u05E8 \u05DC-0 \u05DE-6\u2212, \u05DC\u05DB\u05DF 2\u2212 > 6\u2212',4:'0.3\u2212 \u05E7\u05E8\u05D5\u05D1 \u05D9\u05D5\u05EA\u05E8 \u05DC-0, \u05DC\u05DB\u05DF 0.3\u2212 > 0.7\u2212',5:'7\u2212 < 2\u2212 < 0 < 1 < 4'};

/* ===== STEP RENDERING ===== */
function renderStep(idx){
  state.step=idx;
  document.getElementById('stepFill').style.width=((idx+1)/TOTAL_STEPS*100)+'%';
  document.getElementById('stepText').textContent=(idx+1)+' / '+TOTAL_STEPS;
  document.getElementById('stepContent').innerHTML='<div class="step-card"><div class="step-title">'+steps[idx].title+'</div>'+steps[idx].render()+'</div>';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===TOTAL_STEPS-1?'\u05DC\u05EA\u05E8\u05D2\u05D5\u05DC \u2190':'\u05D4\u05D1\u05D0 \u2190';
  saveState();
}
function nextStep(){if(state.step<TOTAL_STEPS-1)renderStep(state.step+1);else switchSection('practice')}
function prevStep(){if(state.step>0)renderStep(state.step-1)}

/* ===== EASY (20) ===== */
function genEasy(){
  var rng2=mulberry32(dateSeed+100),R2=function(){return rng2()},RI2=function(a,b){return a+Math.floor(R2()*(b-a+1))};
  function sh2(a){var c=[].concat(a);for(var i=c.length-1;i>0;i--){var j=Math.floor(R2()*(i+1));var t=c[i];c[i]=c[j];c[j]=t}return c}
  var qs=[];
  /* Q1-5: who's bigger (2 integers) */
  for(var i=0;i<5;i++){
    var a=RI2(-10,10),b=RI2(-10,10);while(b===a)b=RI2(-10,10);
    var bigger=a>b?a:b,smaller=a>b?b:a;
    var opts=[fmtN(bigger),fmtN(smaller)];
    qs.push({type:'mc',stem:'\u05DE\u05D9 \u05D2\u05D3\u05D5\u05DC \u05D9\u05D5\u05EA\u05E8: <span class="math-expr" dir="ltr" style="unicode-bidi:embed">'+fmtN(a)+'</span> \u05D0\u05D5 <span class="math-expr" dir="ltr" style="unicode-bidi:embed">'+fmtN(b)+'</span>?',
      options:opts,answer:0,
      explanation:fmtN(bigger)+' \u05D2\u05D3\u05D5\u05DC \u05D9\u05D5\u05EA\u05E8 \u05DB\u05D9 \u05D4\u05D5\u05D0 \u05D9\u05DE\u05D9\u05E0\u05D4 \u05D9\u05D5\u05EA\u05E8 \u05E2\u05DC \u05E6\u05D9\u05E8 \u05D4\u05DE\u05E1\u05E4\u05E8\u05D9\u05DD'});
  }
  /* Q6-10: fill < or > (integers incl negatives) */
  for(var i=0;i<5;i++){
    var a=RI2(-15,15),b=RI2(-15,15);while(b===a)b=RI2(-15,15);
    var sign=a>b?'>':'<';
    var opts=['<span dir="ltr" style="unicode-bidi:embed">'+fmtN(a)+' > '+fmtN(b)+'</span>',
              '<span dir="ltr" style="unicode-bidi:embed">'+fmtN(a)+' < '+fmtN(b)+'</span>',
              '<span dir="ltr" style="unicode-bidi:embed">'+fmtN(a)+' = '+fmtN(b)+'</span>'];
    var ci=sign==='>'?0:1;
    var tmp=opts[0];opts[0]=opts[ci];opts[ci]=tmp;
    qs.push({type:'mc',stem:'\u05D4\u05E9\u05DC\u05D9\u05DE\u05D5 \u05D0\u05EA \u05D4\u05E1\u05D9\u05DE\u05DF \u05D4\u05E0\u05DB\u05D5\u05DF: <span class="math-expr" dir="ltr" style="unicode-bidi:embed">'+fmtN(a)+' \u2610 '+fmtN(b)+'</span>',
      options:opts,answer:0,
      explanation:fmtN(a)+' '+sign+' '+fmtN(b)+' \u2014 \u05DB\u05D9 '+fmtN(a>b?a:b)+' \u05D9\u05DE\u05D9\u05E0\u05D4 \u05D9\u05D5\u05EA\u05E8 \u05E2\u05DC \u05D4\u05E6\u05D9\u05E8'});
  }
  /* Q11-15: choose largest of 4 */
  for(var i=0;i<5;i++){
    var nums=[];while(nums.length<4){var n=RI2(-12,12);if(nums.indexOf(n)===-1)nums.push(n)}
    var mx=Math.max.apply(null,nums);
    var ordered=sh2(nums);
    var ansIdx=ordered.indexOf(mx);
    var opts=ordered.map(function(n){return '<span dir="ltr" style="unicode-bidi:embed">'+fmtN(n)+'</span>'});
    qs.push({type:'mc',stem:'\u05D1\u05D7\u05E8\u05D5 \u05D0\u05EA \u05D4\u05DE\u05E1\u05E4\u05E8 <strong>\u05D4\u05D2\u05D3\u05D5\u05DC \u05D1\u05D9\u05D5\u05EA\u05E8</strong> \u05DE\u05D1\u05D9\u05DF:',
      options:opts,answer:ansIdx,
      explanation:fmtN(mx)+' \u05D4\u05D5\u05D0 \u05D4\u05D2\u05D3\u05D5\u05DC \u05D1\u05D9\u05D5\u05EA\u05E8 \u2014 \u05D4\u05DB\u05D9 \u05D9\u05DE\u05D9\u05E0\u05D4 \u05E2\u05DC \u05D4\u05E6\u05D9\u05E8'});

    qs.push({type:'mc',stem:'\u05DB\u05DE\u05D4 \u05DE\u05E1\u05E4\u05E8\u05D9\u05DD <strong>\u05E9\u05DC\u05DE\u05D9\u05DD</strong> \u05E0\u05DE\u05E6\u05D0\u05D9\u05DD \u05D1\u05D9\u05DF <span class="math-expr" dir="ltr" style="unicode-bidi:embed">'+fmtN(a)+'</span> \u05DC-<span class="math-expr" dir="ltr" style="unicode-bidi:embed">'+fmtN(b)+'</span>? (\u05DC\u05D0 \u05DB\u05D5\u05DC\u05DC \u05D0\u05EA \u05D4\u05E7\u05E6\u05D5\u05D5\u05EA)',
      options:opts,answer:0,
      explanation:'\u05D4\u05DE\u05E1\u05E4\u05E8\u05D9\u05DD \u05D4\u05E9\u05DC\u05DE\u05D9\u05DD \u05D1\u05D9\u05DF '+fmtN(a)+' \u05DC-'+fmtN(b)+': '+(function(){var r=[];for(var k=a+1;k<b;k++)r.push(fmtN(k));return r.join(', ')})()+' = '+count+' \u05DE\u05E1\u05E4\u05E8\u05D9\u05DD'});
  }
  /* Q7-9: properties of a<b<0<c */
  var propQs=[
    {stem:'\u05E0\u05EA\u05D5\u05DF: <span class="math-expr">a < b < 0 < c</span>. \u05DE\u05D4 <strong>\u05D1\u05D5\u05D5\u05D3\u05D0\u05D9</strong> \u05E0\u05DB\u05D5\u05DF?',
     opts:['a \u05E9\u05DC\u05D9\u05DC\u05D9 \u05D5-c \u05D7\u05D9\u05D5\u05D1\u05D9','|a| > |b| \u05EA\u05DE\u05D9\u05D3','a > c \u05EA\u05DE\u05D9\u05D3','b \u05D7\u05D9\u05D5\u05D1\u05D9'],answer:0,
     explanation:'a < b < 0 \u05D0\u05D6 a \u05D5-b \u05E9\u05DC\u05D9\u05DC\u05D9\u05D9\u05DD. 0 < c \u05D0\u05D6 c \u05D7\u05D9\u05D5\u05D1\u05D9. \u05D6\u05D4 \u05D1\u05D5\u05D5\u05D3\u05D0\u05D9!'},
    {stem:'\u05E0\u05EA\u05D5\u05DF: <span class="math-expr">a < b < 0 < c</span>. \u05D4\u05D0\u05DD \u05D1\u05D5\u05D5\u05D3\u05D0\u05D9 \u05E9-<span class="math-expr">a < c</span>?',
     opts:['\u05DB\u05DF! a \u05E9\u05DC\u05D9\u05DC\u05D9 \u05D5-c \u05D7\u05D9\u05D5\u05D1\u05D9 \u2014 \u05D0\u05D6 a < c \u05EA\u05DE\u05D9\u05D3','\u05DC\u05D0, \u05D6\u05D4 \u05EA\u05DC\u05D5\u05D9 \u05D1\u05E2\u05E8\u05DB\u05D9\u05DD','\u05E8\u05E7 \u05D0\u05DD a = 1\u2212','\u05DC\u05D0 \u05E0\u05D9\u05EA\u05DF \u05DC\u05D3\u05E2\u05EA'],answer:0,
     explanation:'a < 0 < c \u05D0\u05D6 a < c \u05EA\u05DE\u05D9\u05D3. \u05DB\u05DC \u05E9\u05DC\u05D9\u05DC\u05D9 \u05E7\u05D8\u05DF \u05DE\u05DB\u05DC \u05D7\u05D9\u05D5\u05D1\u05D9.'},
    {stem:'\u05E0\u05EA\u05D5\u05DF: <span class="math-expr">a < b < 0 < c</span>. \u05D4\u05D0\u05DD \u05D1\u05D5\u05D5\u05D3\u05D0\u05D9 \u05E9-<span class="math-expr">|a| > |b|</span>?',
     opts:['\u05DB\u05DF! a \u05E8\u05D7\u05D5\u05E7 \u05D9\u05D5\u05EA\u05E8 \u05DE-0, \u05D0\u05D6 \u05D4\u05E2\u05E8\u05DA \u05D4\u05DE\u05D5\u05D7\u05DC\u05D8 \u05E9\u05DC\u05D5 \u05D2\u05D3\u05D5\u05DC \u05D9\u05D5\u05EA\u05E8','\u05DC\u05D0, \u05D6\u05D4 \u05D4\u05E4\u05D5\u05DA','\u05E8\u05E7 \u05DC\u05E4\u05E2\u05DE\u05D9\u05DD','\u05DC\u05D0 \u05E7\u05E9\u05D5\u05E8'],answer:0,
     explanation:'a < b < 0: \u05E9\u05E0\u05D9\u05D4\u05DD \u05E9\u05DC\u05D9\u05DC\u05D9\u05D9\u05DD, \u05D0\u05D1\u05DC a \u05E8\u05D7\u05D5\u05E7 \u05D9\u05D5\u05EA\u05E8 \u05DE-0 \u05DE-b. \u05DC\u05DB\u05DF |a| > |b| \u05EA\u05DE\u05D9\u05D3.'}
  ];
  for(var i=0;i<3;i++)qs.push({type:'mc',stem:propQs[i].stem,options:propQs[i].opts,answer:propQs[i].answer,explanation:propQs[i].explanation});
  /* Q10-12: expression comparison — flips with negation */
  var exprQs=[
    {a:16,b:14},
    {a:25,b:20},
    {a:8,b:3}
  ];
  for(var i=0;i<3;i++){
    var ea=exprQs[i].a,eb=exprQs[i].b;
    qs.push({type:'mc',
      stem:'<span class="math-expr" dir="ltr" style="unicode-bidi:embed">'+ea+' > '+eb+'</span>. \u05DE\u05D4 \u05D4\u05E7\u05E9\u05E8 \u05D1\u05D9\u05DF <span class="math-expr" dir="ltr" style="unicode-bidi:embed">'+fmtN(-ea)+'</span> \u05DC-<span class="math-expr" dir="ltr" style="unicode-bidi:embed">'+fmtN(-eb)+'</span>?',
      options:['<span dir="ltr" style="unicode-bidi:embed">'+fmtN(-ea)+' < '+fmtN(-eb)+'</span>',
               '<span dir="ltr" style="unicode-bidi:embed">'+fmtN(-ea)+' > '+fmtN(-eb)+'</span>',
               '<span dir="ltr" style="unicode-bidi:embed">'+fmtN(-ea)+' = '+fmtN(-eb)+'</span>',
               '\u05DC\u05D0 \u05E0\u05D9\u05EA\u05DF \u05DC\u05D3\u05E2\u05EA'],
      answer:0,
      explanation:'\u05D1\u05E9\u05DC\u05D9\u05DC\u05D9\u05D9\u05DD \u05D4\u05E1\u05D9\u05DE\u05DF \u05DE\u05EA\u05D4\u05E4\u05DA! '+ea+' > '+eb+' \u05D0\u05D1\u05DC '+fmtN(-ea)+' < '+fmtN(-eb)});
  }
  /* Q13-15: sort with absolute values */
  var absQs=[
    {nums:[0,-4,3,2,-2,-5],display:['0','4\u2212','|3\u2212|','2','|2\u2212|','5\u2212'],values:[0,-4,3,2,2,-5]},
    {nums:[1,-3,-1,2,-6],display:['|1\u2212|','3\u2212','1\u2212','|2\u2212|','6\u2212'],values:[1,-3,-1,2,-6]},
    {nums:[-7,5,-2,3,-8],display:['|7\u2212|','5\u2212','2\u2212','|3\u2212|','8\u2212'],values:[7,-5,-2,3,-8]}
  ];
  for(var i=0;i<3;i++){
    var aq=absQs[i];
    var sorted=[].concat(aq.values).sort(function(a,b){return a-b});
    var sortedStr=sorted.map(function(n){return fmtN(n)}).join(' , ');
    var wrong1=[].concat(aq.values).sort(function(a,b){return b-a}).map(function(n){return fmtN(n)}).join(' , ');
    /* wrong2: sort by absolute value ascending (common mistake) */
    var wrong2=[].concat(aq.values).sort(function(a,b){return Math.abs(a)-Math.abs(b)}).map(function(n){return fmtN(n)}).join(' , ');
    if(wrong2===sortedStr)wrong2=wrong1.split('').reverse().join('');
    var opts=['<span dir="ltr" style="unicode-bidi:embed">'+sortedStr+'</span>',
              '<span dir="ltr" style="unicode-bidi:embed">'+wrong1+'</span>',
              '<span dir="ltr" style="unicode-bidi:embed">'+wrong2+'</span>'];
    qs.push({type:'mc',stem:'\u05E1\u05D3\u05E8\u05D5 \u05DE\u05D4\u05E7\u05D8\u05DF \u05DC\u05D2\u05D3\u05D5\u05DC (\u05D7\u05E9\u05D1\u05D5 \u05E2\u05E8\u05DB\u05D9\u05DD \u05DE\u05D5\u05D7\u05DC\u05D8\u05D9\u05DD \u05E7\u05D5\u05D3\u05DD!): <span class="math-expr" dir="ltr" style="unicode-bidi:embed">'+aq.display.join(' , ')+'</span>',
      options:opts,answer:0,
      explanation:'\u05E7\u05D5\u05D3\u05DD \u05DE\u05D7\u05E9\u05D1\u05D9\u05DD \u05E2\u05E8\u05DB\u05D9\u05DD \u05DE\u05D5\u05D7\u05DC\u05D8\u05D9\u05DD, \u05D0\u05D7\u05E8 \u05DB\u05DA \u05DE\u05E1\u05D3\u05E8\u05D9\u05DD: '+sortedStr});
  }
  return qs;
}

function generateQuestions(level){
  if(level==='easy')return genEasy();
  if(level==='medium')return genMedium();
  if(level==='hard')return genHard();
  return genChallenge();
}

/* ===== PRACTICE RENDERING ===== */
function renderLevelTabs(){
  var container=document.getElementById('levelTabs');container.innerHTML='';
  ['easy','medium','hard','challenge'].forEach(function(lv){
    var btn=document.createElement('button');
    btn.className='level-tab'+(state.level===lv?' active':'');
    var done=scores[lv].filter(function(s){return s===1}).length;
    btn.innerHTML=LEVEL_NAMES[lv]+(done>0?' <span class="tab-score">('+done+'/'+LEVEL_COUNTS[lv]+')</span>':'');
    btn.onclick=function(){switchLevel(lv)};
    container.appendChild(btn);
  });
}
function switchLevel(lv){
  state.level=lv;state.qIndex=0;
  if(!questions[lv])questions[lv]=generateQuestions(lv);
  if(!scores[lv].length)scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
  if(!answered[lv].length)answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  renderLevelTabs();renderQuestion();saveState();
}
function updateLevelProgress(){
  var lv=state.level,total=LEVEL_COUNTS[lv];
  var done=answered[lv].filter(function(a){return a}).length;
  document.getElementById('levelFill').style.width=(done/total*100)+'%';
  document.getElementById('levelText').textContent=done+' / '+total;
}
function renderQuestion(){
  var lv=state.level,idx=state.qIndex,qs=questions[lv];
  if(!qs)return;
  if(idx>=qs.length){renderLevelComplete();return}
  if(idx>0&&typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){
    var la=document.getElementById('questionArea');
    la.innerHTML='<div class="q-card" style="text-align:center;padding:40px 20px"><div class="q-number">\u05E9\u05D0\u05DC\u05D4 '+(idx+1)+' \u05DE\u05EA\u05D5\u05DA '+qs.length+'</div><div style="font-size:3.5rem;margin:24px 0">\uD83D\uDD12</div><div style="font-size:1.15rem;font-weight:700;margin-bottom:12px">\u05EA\u05D5\u05DB\u05DF \u05D6\u05DE\u05D9\u05DF \u05DC\u05DE\u05E0\u05D5\u05D9\u05D9\u05DD</div><div style="color:var(--text-light);margin-bottom:20px">\u05E9\u05D0\u05DC\u05D4 1 \u05E4\u05EA\u05D5\u05D7\u05D4 \u05DC\u05D4\u05EA\u05E0\u05E1\u05D5\u05EA \u2014 \u05DC\u05D4\u05DE\u05E9\u05DA \u05EA\u05E8\u05D2\u05D5\u05DC \u05D9\u05E9 \u05DC\u05D4\u05D9\u05E8\u05E9\u05DD</div><button class="q-check-btn" onclick="if(typeof showAuthModal===\'function\')showAuthModal()">\u05DC\u05E4\u05EA\u05D9\u05D7\u05EA \u05D2\u05D9\u05E9\u05D4 \u05DE\u05DC\u05D0\u05D4</button></div>';
    document.getElementById('qPrev').disabled=idx===0;
    document.getElementById('qNext').textContent=idx>=qs.length-1?'\u05E1\u05D9\u05D5\u05DD':'\u05D4\u05D1\u05D0 \u2190';
    updateLevelProgress();return;
  }
  var q=qs[idx],area=document.getElementById('questionArea'),isAnswered=answered[lv][idx];
  var html='<div class="q-card"><div class="q-number">\u05E9\u05D0\u05DC\u05D4 '+(idx+1)+' \u05DE\u05EA\u05D5\u05DA '+qs.length+'</div>';
  html+='<div class="q-stem">'+q.stem+'</div>';
  if(q.type==='mc'){
    html+='<div class="q-options" id="qOpts">';
    q.options.forEach(function(opt,i){
      var letter=LETTERS[i],cls='q-opt';
      if(isAnswered){cls+=' disabled';if(i===q.answer)cls+=' correct';else if(scores[lv][idx]===0&&i===answered[lv][idx+'_sel'])cls+=' wrong'}
      html+='<div class="'+cls+'" data-i="'+i+'"><span class="q-opt-letter">'+letter+'</span><span>'+opt+'</span></div>';
    });
    html+='</div>';
    if(!isAnswered)html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkMC()" disabled>\u05D1\u05D3\u05E7\u05D5</button>';
  } else if(q.type==='input'){
    html+='<div class="q-input-row"><input type="number" class="q-input" id="qInput" placeholder="\u05EA\u05E9\u05D5\u05D1\u05D4" dir="ltr">';
    if(!isAnswered)html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkInput()">\u05D1\u05D3\u05E7\u05D5</button>';
    html+='</div>';
    if(isAnswered)html+='<div style="margin-top:4px;font-weight:700;direction:ltr">\u05EA\u05E9\u05D5\u05D1\u05D4: '+fmtN(q.answer)+'</div>';
  }
  if(isAnswered){
    var ic=scores[lv][idx]===1;
    html+='<div class="q-feedback '+(ic?'correct':'wrong')+'">'+(ic?'\u2705 \u05E0\u05DB\u05D5\u05DF! ':'\u274C ')+q.explanation+'</div>';
  }
  html+='<div id="qFeedback"></div></div>';
  area.innerHTML=html;
  if(q.type==='mc'&&!isAnswered){
    area.querySelectorAll('.q-opt').forEach(function(el){
      el.onclick=function(){
        area.querySelectorAll('.q-opt').forEach(function(o){o.classList.remove('selected')});
        el.classList.add('selected');
        document.getElementById('qCheckBtn').disabled=false;
      };
    });
  }
  var inp=document.getElementById('qInput');
  if(inp&&!isAnswered){inp.focus();inp.addEventListener('keydown',function(e){if(e.key==='Enter')checkInput()})}
  updateLevelProgress();
  document.getElementById('qPrev').disabled=idx===0;
  document.getElementById('qNext').textContent=idx>=qs.length-1?'\u05E1\u05D9\u05D5\u05DD':'\u05D4\u05D1\u05D0 \u2190';
}

window.checkMC=function(){
  var lv=state.level,idx=state.qIndex,q=questions[lv][idx];
  var selected=document.querySelector('.q-opt.selected');if(!selected)return;
  var si=parseInt(selected.dataset.i),isCorrect=si===q.answer;
  scores[lv][idx]=isCorrect?1:0;answered[lv][idx]=true;answered[lv][idx+'_sel']=si;
  document.querySelectorAll('.q-opt').forEach(function(el,i){
    el.classList.add('disabled');el.onclick=null;
    if(i===q.answer)el.classList.add('correct');
    else if(i===si&&!isCorrect)el.classList.add('wrong');
  });
  document.getElementById('qCheckBtn').remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['\u2705 \u05DB\u05DC \u05D4\u05DB\u05D1\u05D5\u05D3!','\u2705 \u05DE\u05E2\u05D5\u05DC\u05D4!','\u2705 \u05E0\u05DB\u05D5\u05DF!'])+' ':'\u274C ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();saveState();
};
window.checkInput=function(){
  var lv=state.level,idx=state.qIndex,q=questions[lv][idx];
  var inp=document.getElementById('qInput'),val=inp.value.trim();if(!val)return;
  var isCorrect=parseFloat(val)===q.answer;
  scores[lv][idx]=isCorrect?1:0;answered[lv][idx]=true;
  inp.classList.add(isCorrect?'correct':'wrong');inp.disabled=true;
  var btn=document.getElementById('qCheckBtn');if(btn)btn.remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?'\u2705 \u05E0\u05DB\u05D5\u05DF! ':'\u274C ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();saveState();
};
function nextQuestion(){
  var lv=state.level;
  if(state.qIndex>=questions[lv].length-1){renderLevelComplete();return}
  state.qIndex++;renderQuestion();saveState();
}
function prevQuestion(){if(state.qIndex>0){state.qIndex--;renderQuestion();saveState()}}
function renderLevelComplete(){
  var lv=state.level;
  var correct=scores[lv].filter(function(s){return s===1}).length;
  var total=LEVEL_COUNTS[lv],pct=Math.round(correct/total*100);
  var scoreClass=pct>=80?'':pct>=50?' medium-score':' low-score';
  var emoji=pct>=80?'\uD83C\uDF89':pct>=50?'\uD83D\uDC4F':'\uD83D\uDCAA';
  document.getElementById('questionArea').innerHTML='<div class="q-card"><div class="level-complete"><div class="big-emoji">'+emoji+'</div><h2>\u05E1\u05D9\u05D9\u05DE\u05EA\u05DD \u05D0\u05EA \u05E8\u05DE\u05EA "'+LEVEL_NAMES[lv]+'"!</h2><div class="score-display'+scoreClass+'">'+correct+' / '+total+'</div><p style="color:var(--text-light);margin-bottom:16px">'+pct+'% \u05D4\u05E6\u05DC\u05D7\u05D4</p><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="mini-btn" onclick="retryLevel()">\uD83D\uDD04 \u05E0\u05E1\u05D5 \u05E9\u05D5\u05D1</button>'+(lv!=='challenge'?'<button class="mini-btn accent" onclick="nextLevel()">\u25B6 \u05DC\u05E8\u05DE\u05D4 \u05D4\u05D1\u05D0\u05D4</button>':'')+'</div></div></div>';
  if(pct>=80)showConfetti();saveState();
}
window.retryLevel=function(){
  var lv=state.level;scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  questions[lv]=generateQuestions(lv);state.qIndex=0;renderLevelTabs();renderQuestion();saveState();
};
window.nextLevel=function(){
  var order=['easy','medium','hard','challenge'];
  var ci=order.indexOf(state.level);if(ci<order.length-1)switchLevel(order[ci+1]);
};

/* ===== SECTION SWITCHING ===== */
function switchSection(sec){
  state.section=sec;
  document.querySelectorAll('.section-btn').forEach(function(b){b.classList.toggle('active',b.dataset.section===sec)});
  document.getElementById('learnSection').style.display=sec==='learn'?'block':'none';
  document.getElementById('practiceSection').style.display=sec==='practice'?'block':'none';
  if(sec==='practice'){
    if(!questions[state.level])questions[state.level]=generateQuestions(state.level);
    if(!scores[state.level].length)scores[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(-1);
    if(!answered[state.level].length)answered[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(false);
    renderLevelTabs();renderQuestion();
  }
  saveState();
}

/* ===== CONFETTI ===== */
function showConfetti(){
  var box=document.getElementById('confettiBox');box.innerHTML='';
  var colors=['#2563eb','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899'];
  for(var i=0;i<50;i++){
    var c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'%';c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(6+Math.random()*8)+'px';c.style.height=(6+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDuration=(2+Math.random()*2)+'s';c.style.animationDelay=(Math.random()*1.5)+'s';
    box.appendChild(c);
  }
  setTimeout(function(){box.innerHTML=''},5000);
}

/* ===== INIT ===== */
function init(){
  loadState();
  ['easy','medium','hard','challenge'].forEach(function(lv){
    if(!scores[lv]||!scores[lv].length)scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
    if(!answered[lv]||!answered[lv].length)answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  });
  renderStep(state.step);
  if(state.section==='practice')switchSection('practice');
}
init();
</script>
