<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מה חסר? | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0ff;--card:#fff;--pri:#6c5ce7;--pri-l:#ede9fe;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.topbar{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#a29bfe);border-radius:10px;transition:width 0.5s}
.pss{display:flex;gap:16px}.ps2{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}.mc.bad{border-color:var(--no);background:var(--no-l)}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.85rem;color:var(--txt2);font-weight:500}
.compare{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.pic-box{border:3px solid var(--brd);border-radius:var(--rs);overflow:hidden;position:relative;background:#fafafa}
.pic-box canvas{display:block}
.pic-box.full{border-color:var(--pri);background:var(--pri-l)}
.pic-box.missing{border-color:var(--no);border-style:dashed;background:#fff5f5}
.pic-label{text-align:center;font-size:0.7rem;font-weight:700;color:var(--txt2);padding:4px 0;background:rgba(255,255,255,0.8)}
.arrow{font-size:2rem;color:var(--pri);flex-shrink:0}
.opts{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
.opt{border:3px solid var(--brd);border-radius:var(--rs);overflow:hidden;cursor:pointer;transition:all 0.25s;-webkit-user-select:none;user-select:none;position:relative;background:var(--card)}
.opt canvas{display:block}
.opt:hover:not(.done){border-color:var(--pri);background:var(--pri-l);transform:scale(1.08)}
.opt:active:not(.done){transform:scale(0.95)}
.opt.ok-pick{border-color:var(--ok);background:var(--ok-l)}
.opt.ok-pick::after{content:'✓';position:absolute;top:-6px;right:-6px;width:22px;height:22px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.7rem;display:flex;align-items:center;justify-content:center;animation:pop 0.3s}
.opt.no-pick{border-color:var(--no);background:var(--no-l);animation:shake 0.5s}
.opt.done{cursor:default;opacity:0.5}.opt.ok-pick.done{opacity:1}
.cfb{text-align:center;margin-top:12px;font-weight:700;font-size:0.95rem;min-height:22px;opacity:0;transition:opacity 0.3s}.cfb.show{opacity:1}.cfb.ok{color:var(--ok)}.cfb.bad{color:var(--no)}
.ld{background:linear-gradient(135deg,var(--pri),#a29bfe);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .sc{font-size:2.2rem;font-weight:900;margin:12px 0}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
.ab{padding:8px 18px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.25s}
.ab:hover{border-color:var(--pri);background:var(--pri-l)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}.topbar,.ps,.tw,.acts,.ld,.cfb{display:none!important}.ct{padding:8px 0}.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.ph{display:block!important}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.mc{padding:16px 12px}.tb{padding:6px 12px;font-size:0.75rem}.compare{gap:10px}}
</style>
</head>
<body>
<div class="hd"><h1>❓ מה חסר?</h1><p>מצאו את החלק החסר בציור!</p></div>
<div class="topbar"><button class="ab" onclick="window.print()">🖨️ הדפסה</button></div>
<div class="ps"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pss"><span class="ps2" style="color:var(--ok)">✅ <span id="g1">0</span></span><span class="ps2" style="color:var(--no)">❌ <span id="g2">0</span></span></div></div></div>
<div class="tw"><div class="ts" id="tabs"></div></div>
<div class="ct" id="area"></div>
<script>
// Cut positions: which quarter is removed
// tl=top-left, tr=top-right, bl=bottom-left, br=bottom-right
const CUTS=['tl','tr','bl','br'];

const LV=[
{id:1,t:'פירות',qs:[{e:'🍎',cut:'tr'},{e:'🍌',cut:'bl'},{e:'🍇',cut:'br'}]},
{id:2,t:'חיות',qs:[{e:'🐱',cut:'tl'},{e:'🐶',cut:'br'},{e:'🐸',cut:'tr'}]},
{id:3,t:'תחבורה',qs:[{e:'🚗',cut:'bl'},{e:'✈️',cut:'tr'},{e:'⛵',cut:'tl'}]},
{id:4,t:'טבע',qs:[{e:'🌸',cut:'br'},{e:'🌻',cut:'tl'},{e:'🍄',cut:'tr'}]},
{id:5,t:'אוכל',qs:[{e:'🍕',cut:'tl'},{e:'🍔',cut:'br'},{e:'🧁',cut:'tr'}]},
{id:6,t:'ספורט',qs:[{e:'⚽',cut:'bl'},{e:'🏀',cut:'tr'},{e:'🎾',cut:'tl'}]},
{id:7,t:'בגדים',qs:[{e:'👕',cut:'br'},{e:'👟',cut:'tl'},{e:'👒',cut:'bl'}]},
{id:8,t:'ים',qs:[{e:'🐟',cut:'tr'},{e:'🐙',cut:'bl'},{e:'🦀',cut:'br'}]},
{id:9,t:'בית',qs:[{e:'🏠',cut:'tl'},{e:'🔑',cut:'br'},{e:'💡',cut:'tr'}]},
{id:10,t:'מוזיקה',qs:[{e:'🎸',cut:'bl'},{e:'🥁',cut:'tr'},{e:'🎹',cut:'tl'}]},
{id:11,t:'חרקים',qs:[{e:'🐞',cut:'br'},{e:'🦋',cut:'tl'},{e:'🐝',cut:'tr'}]},
{id:12,t:'פנים',qs:[{e:'😀',cut:'bl'},{e:'😎',cut:'tr'},{e:'🤩',cut:'tl'}]},
{id:13,t:'כלים',qs:[{e:'✂️',cut:'tr'},{e:'🔨',cut:'bl'},{e:'✏️',cut:'br'}]},
{id:14,t:'שמיים',qs:[{e:'⭐',cut:'tl'},{e:'🌙',cut:'br'},{e:'☀️',cut:'tr'}]},
{id:15,t:'אתגר',qs:[{e:'🎂',cut:'tr'},{e:'🎁',cut:'bl'},{e:'🎈',cut:'tl'}]}
];

const SZ=120,OPT_SZ=80; // canvas sizes
let cur=0,g1=0,g2=0,res={};
const E1=['!מעולה ❓','!עין חדה 🔍','!יופי 👏','!מדהים 🌟'];
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// Draw emoji on canvas
function drawEmoji(cv,emoji,size){
  const ctx=cv.getContext('2d');
  cv.width=size;cv.height=size;
  ctx.clearRect(0,0,size,size);
  ctx.font=`${size*0.8}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(emoji,size/2,size/2);
}

// Draw emoji with a quarter cut out (white)
function drawEmojiMissing(cv,emoji,size,cut){
  const ctx=cv.getContext('2d');
  cv.width=size;cv.height=size;
  ctx.clearRect(0,0,size,size);
  ctx.font=`${size*0.8}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(emoji,size/2,size/2);
  // White out the cut quarter
  const h=size/2;
  let cx=0,cy=0;
  if(cut==='tl'){cx=0;cy=0}
  else if(cut==='tr'){cx=h;cy=0}
  else if(cut==='bl'){cx=0;cy=h}
  else{cx=h;cy=h}
  ctx.fillStyle='#fff5f5';
  ctx.fillRect(cx,cy,h,h);
  // Draw ? in the cut area
  ctx.fillStyle='#e74c3c';
  ctx.font=`bold ${size*0.25}px Rubik,Heebo,sans-serif`;
  ctx.fillText('?',cx+h/2,cy+h/2);
  // Draw dashed border around cut
  ctx.strokeStyle='#e74c3c';ctx.lineWidth=2;ctx.setLineDash([4,4]);
  ctx.strokeRect(cx+1,cy+1,h-2,h-2);
}

// Draw just the cut quarter of an emoji
function drawEmojiPiece(cv,emoji,size,cut){
  const ctx=cv.getContext('2d');
  cv.width=size;cv.height=size;
  ctx.clearRect(0,0,size,size);
  // Calculate source position
  const fullSz=size*2; // emoji drawn at 2x, then we crop
  const h=size;
  let sx=0,sy=0;
  if(cut==='tl'){sx=0;sy=0}
  else if(cut==='tr'){sx=h;sy=0}
  else if(cut==='bl'){sx=0;sy=h}
  else{sx=h;sy=h}
  // Draw full emoji on temp canvas then crop
  const tmp=document.createElement('canvas');
  tmp.width=fullSz;tmp.height=fullSz;
  const tc=tmp.getContext('2d');
  tc.font=`${fullSz*0.8}px serif`;
  tc.textAlign='center';tc.textBaseline='middle';
  tc.fillText(emoji,fullSz/2,fullSz/2);
  // Copy just the quarter
  ctx.drawImage(tmp,sx,sy,h,h,0,0,size,size);
}

// Draw a random quarter of a DIFFERENT emoji (wrong answer)
function drawWrongPiece(cv,emoji,size,cut){
  drawEmojiPiece(cv,emoji,size,cut);
}

function rTabs(){const lk=(typeof AuthState!=='undefined'&&!AuthState.isLoggedIn());const el=document.getElementById('tabs');el.innerHTML=LV.map((l,i)=>`<button class="tb ${i===cur?'on':''} ${res[l.id]?'dn':''}" onclick="go(${i})">${l.t}${lk&&i>0?' 🔒':''}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}

function rLv(){
const lv=LV[cur],ar=document.getElementById('area');
let h=`<div class="ph">❓ מה חסר — ${lv.t}</div>`;

lv.qs.forEach((q,qi)=>{
  // Pick 3 wrong emojis from other questions
  const allEmojis=['🍎','🍌','🍇','🐱','🐶','🐸','🚗','✈️','⛵','🌸','🌻','🍄','🍕','🍔','🧁','⚽','🏀','🎾','👕','👟','👒','🐟','🐙','🦀','🏠','🔑','💡','🎸','🥁','🎹','🐞','🦋','🐝','😀','😎','🤩','✂️','🔨','✏️','⭐','🌙','☀️','🎂','🎁','🎈'];
  const wrongEmojis=sh(allEmojis.filter(e=>e!==q.e)).slice(0,3);
  
  const options=sh([
    {emoji:q.e,cut:q.cut,correct:true},
    {emoji:wrongEmojis[0],cut:q.cut,correct:false},
    {emoji:wrongEmojis[1],cut:q.cut,correct:false},
    {emoji:wrongEmojis[2],cut:q.cut,correct:false}
  ]);

  h+=`<div class="mc" id="q${qi}" data-done="0" data-wrong="0">`;
  h+=`<div class="mh"><div class="mn">${qi+1}</div><span class="mht">💡 מצאו את החלק החסר!</span></div>`;
  h+=`<div class="compare">`;
  h+=`<div class="pic-box full"><canvas id="full_${qi}"></canvas><div class="pic-label">ציור שלם</div></div>`;
  h+=`<div class="arrow">⬅</div>`;
  h+=`<div class="pic-box missing"><canvas id="miss_${qi}"></canvas><div class="pic-label">מה חסר?</div></div>`;
  h+=`</div>`;
  h+=`<div class="opts" id="opts_${qi}">`;
  options.forEach((o,oi)=>{
    h+=`<div class="opt" data-qi="${qi}" data-correct="${o.correct}" onclick="pick(this)"><canvas id="opt_${qi}_${oi}" data-emoji="${o.emoji}" data-cut="${o.cut}"></canvas></div>`;
  });
  h+=`</div>`;
  h+=`<div class="cfb" id="fb${qi}"></div>`;
  h+=`</div>`;
});

h+=`<div class="ld" id="ld"><div class="big">❓</div><h2 id="lt"></h2><p id="ls"></p><div class="sc" id="lsc"></div><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<LV.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;

ar.innerHTML=h;
ar._done=0;ar._total=lv.qs.length;

// Draw all canvases
lv.qs.forEach((q,qi)=>{
  drawEmoji(document.getElementById('full_'+qi),q.e,SZ);
  drawEmojiMissing(document.getElementById('miss_'+qi),q.e,SZ,q.cut);
  // Draw option pieces
  document.querySelectorAll(`#opts_${qi} canvas`).forEach(cv=>{
    drawEmojiPiece(cv,cv.dataset.emoji,OPT_SZ,cv.dataset.cut);
  });
});

rTabs();uPr();
}

function pick(el){
  if(el.classList.contains('done'))return;
  const qi=el.dataset.qi;
  const card=document.getElementById('q'+qi);
  if(card.dataset.done==='1')return;

  if(el.dataset.correct==='true'){
    el.classList.add('ok-pick','done');g1++;
    card.dataset.done='1';
    card.querySelectorAll('.opt').forEach(o=>{if(!o.classList.contains('ok-pick'))o.classList.add('done')});
    // Reveal the missing piece
    const q=LV[cur].qs[qi];
    drawEmoji(document.getElementById('miss_'+qi),q.e,SZ);
    const w=parseInt(card.dataset.wrong);
    const fb=document.getElementById('fb'+qi);
    if(w===0){card.classList.add('ok');fb.textContent=E1[Math.floor(Math.random()*E1.length)];fb.classList.add('ok','show')}
    else{card.classList.add('bad');fb.textContent=`נכון! עם ${w} טעויות 💪`;fb.classList.add('bad','show')}
    const ar=document.getElementById('area');
    ar._done++;if(ar._done>=ar._total)setTimeout(showD,600);
  } else {
    el.classList.add('no-pick');g2++;card.dataset.wrong=parseInt(card.dataset.wrong)+1;
    setTimeout(()=>el.classList.remove('no-pick'),600);
  }
  uPr();
}

function showD(){
  res[LV[cur].id]=true;
  let tw=0;LV[cur].qs.forEach((q,i)=>{tw+=parseInt(document.getElementById('q'+i).dataset.wrong)});
  const t=LV[cur].qs.length;const el=document.getElementById('ld');
  document.getElementById('lsc').textContent=(t-Math.min(tw,t))+' / '+t;
  if(tw===0){document.getElementById('lt').textContent='🏆 מושלם!';document.getElementById('ls').textContent='מצאתם את כל החלקים!'}
  else if(tw<=2){document.getElementById('lt').textContent='👏 כל הכבוד!';document.getElementById('ls').textContent='כמעט מושלם!'}
  else{document.getElementById('lt').textContent='💪 סיימתם!';document.getElementById('ls').textContent='נסו שוב לשיפור!'}
  el.classList.add('show');el.scrollIntoView({behavior:'smooth',block:'center'});rTabs();
}

function go(i){if(i>0&&typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){if(typeof showAuthModal==='function')showAuthModal();return}cur=i;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function nxt(){if(typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){if(typeof showAuthModal==='function')showAuthModal();return}if(cur<LV.length-1){cur++;rLv();window.scrollTo({top:0,behavior:'smooth'})}}
function retry(){rLv();window.scrollTo({top:0,behavior:'smooth'})}
function uPr(){const d=Object.keys(res).length;document.getElementById('pf').style.width=Math.round(d/LV.length*100)+'%';document.getElementById('g1').textContent=g1;document.getElementById('g2').textContent=g2}
rLv();
document.addEventListener('DOMContentLoaded',function(){rTabs();});
</script>
  <script src="../../../../js/auth-gate.js"></script>
<script src="../../../../js/ask-teacher-btn.js"></script>
</body>
</html>
