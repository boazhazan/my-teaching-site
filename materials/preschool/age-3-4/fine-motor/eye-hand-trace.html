<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>תיאום עין-יד — עברו על הקווים | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f7ff;--card:#fff;--pri:#0984e3;--pri-l:#dfe6e9;--ok:#27ae60;--ok-l:#e8f5e9;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#0984e3,#74b9ff);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.topbar{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#74b9ff);border-radius:10px;transition:width 0.5s}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.tools{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:12px;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px;position:sticky;top:96px;z-index:12;align-items:center}
.tools-section{display:flex;align-items:center;gap:6px}
.tools-label{font-size:0.75rem;font-weight:700;color:var(--txt2)}
.pc{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.pc:hover{transform:scale(1.15)}.pc.on{border-color:#2d3436;transform:scale(1.2);box-shadow:0 0 0 2px rgba(0,0,0,0.15)}
.sz-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--brd);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.sz-btn:hover{border-color:var(--pri)}.sz-btn.on{border-color:var(--pri);background:var(--pri-l)}
.sz-btn .dot{border-radius:50%;background:#2d3436}
.divider{width:1px;height:28px;background:var(--brd);margin:0 4px}
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative;overflow:hidden}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}
.mc-head{display:flex;align-items:center;gap:10px;padding:16px 20px}
.mc-num{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mc-hint{font-size:0.85rem;color:var(--txt2);font-weight:500}
.cw{position:relative;width:100%;max-width:500px;margin:0 auto;aspect-ratio:1/1;touch-action:none;cursor:crosshair;background:#fefefe;border-radius:var(--rs)}
.cw canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.cw .cbg{z-index:1}.cw .cdw{z-index:2}
.mc-acts{display:flex;justify-content:center;gap:8px;padding:12px 16px;flex-wrap:wrap}
.ab{padding:8px 18px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.25s}
.ab:hover{border-color:var(--pri);background:var(--pri-l)}
.ld{background:linear-gradient(135deg,var(--pri),#74b9ff);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}.topbar,.ps,.tw,.acts,.ld,.tools,.mc-acts{display:none!important}.ct{padding:8px 0}.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.cdw{display:none!important}.ph{display:block!important}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.pc{width:24px;height:24px}.tools{gap:4px;padding:8px}.tb{padding:6px 12px;font-size:0.75rem}.sz-btn{width:28px;height:28px}}
</style>
</head>
<body>
<div class="hd"><h1>👁️ תיאום עין-יד</h1><p>עברו על הקווים המקווקווים בקו רציף!</p></div>
<div class="topbar"><button class="ab" onclick="window.print()">🖨️ הדפסה</button></div>
<div class="ps"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div></div></div>
<div class="tw"><div class="ts" id="tabs"></div></div>
<div class="ct" id="area"></div>
<script>
const COLORS=['#2d3436','#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60','#1abc9c','#3498db','#2980b9','#9b59b6','#8e44ad','#e84393','#fd79a8','#00cec9','#6c5ce7','#fdcb6e','#55efc4','#74b9ff','#a29bfe','#fab1a0'];
const SIZES=[3,6,10,16];

const PICS=[
{id:1,t:'🐟 דג',draw:function(c,s){
  c.beginPath();c.moveTo(s*.75,s*.45);
  c.quadraticCurveTo(s*.6,s*.2,s*.3,s*.25);c.quadraticCurveTo(s*.1,s*.3,s*.1,s*.5);
  c.quadraticCurveTo(s*.1,s*.7,s*.3,s*.75);c.quadraticCurveTo(s*.6,s*.8,s*.75,s*.55);
  c.closePath();c.stroke();
  // Tail
  c.beginPath();c.moveTo(s*.75,s*.45);c.lineTo(s*.9,s*.3);c.lineTo(s*.9,s*.7);c.lineTo(s*.75,s*.55);c.stroke();
  // Eye
  c.setLineDash([]);c.beginPath();c.arc(s*.3,s*.45,s*.03,0,Math.PI*2);c.fillStyle='#2d3436';c.fill();
}},
{id:2,t:'🌞 שמש',draw:function(c,s){
  // Circle
  c.beginPath();c.arc(s*.5,s*.5,s*.2,0,Math.PI*2);c.stroke();
  // Rays
  for(let i=0;i<12;i++){const a=i*Math.PI/6;c.beginPath();c.moveTo(s*.5+Math.cos(a)*s*.24,s*.5+Math.sin(a)*s*.24);c.lineTo(s*.5+Math.cos(a)*s*.38,s*.5+Math.sin(a)*s*.38);c.stroke()}
  // Face
  c.setLineDash([]);c.beginPath();c.arc(s*.44,s*.46,s*.025,0,Math.PI*2);c.fillStyle='#2d3436';c.fill();
  c.beginPath();c.arc(s*.56,s*.46,s*.025,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(s*.5,s*.54,s*.06,0.1*Math.PI,0.9*Math.PI);c.strokeStyle='#2d3436';c.lineWidth=2;c.stroke();
}},
{id:3,t:'🐞 חיפושית',draw:function(c,s){
  // Body oval
  c.beginPath();c.ellipse(s*.5,s*.52,s*.22,s*.25,0,0,Math.PI*2);c.stroke();
  // Head
  c.beginPath();c.arc(s*.5,s*.25,s*.1,0,Math.PI*2);c.stroke();
  // Line down middle
  c.beginPath();c.moveTo(s*.5,s*.28);c.lineTo(s*.5,s*.77);c.stroke();
  // Spots left
  c.beginPath();c.arc(s*.38,s*.45,s*.04,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.4,s*.6,s*.04,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.38,s*.72,s*.03,0,Math.PI*2);c.stroke();
  // Spots right
  c.beginPath();c.arc(s*.62,s*.45,s*.04,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.6,s*.6,s*.04,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.62,s*.72,s*.03,0,Math.PI*2);c.stroke();
  // Antennae
  c.beginPath();c.moveTo(s*.45,s*.18);c.quadraticCurveTo(s*.35,s*.08,s*.3,s*.05);c.stroke();
  c.beginPath();c.moveTo(s*.55,s*.18);c.quadraticCurveTo(s*.65,s*.08,s*.7,s*.05);c.stroke();
  // Legs
  c.beginPath();c.moveTo(s*.3,s*.42);c.lineTo(s*.18,s*.35);c.stroke();
  c.beginPath();c.moveTo(s*.28,s*.52);c.lineTo(s*.15,s*.52);c.stroke();
  c.beginPath();c.moveTo(s*.3,s*.62);c.lineTo(s*.18,s*.68);c.stroke();
  c.beginPath();c.moveTo(s*.7,s*.42);c.lineTo(s*.82,s*.35);c.stroke();
  c.beginPath();c.moveTo(s*.72,s*.52);c.lineTo(s*.85,s*.52);c.stroke();
  c.beginPath();c.moveTo(s*.7,s*.62);c.lineTo(s*.82,s*.68);c.stroke();
  // Eyes
  c.setLineDash([]);c.beginPath();c.arc(s*.46,s*.24,s*.02,0,Math.PI*2);c.fillStyle='#2d3436';c.fill();
  c.beginPath();c.arc(s*.54,s*.24,s*.02,0,Math.PI*2);c.fill();
}},
{id:4,t:'🦋 פרפר',draw:function(c,s){
  // Body
  c.beginPath();c.moveTo(s*.5,s*.2);c.lineTo(s*.5,s*.8);c.stroke();
  // Left wing top
  c.beginPath();c.moveTo(s*.5,s*.35);c.quadraticCurveTo(s*.15,s*.15,s*.15,s*.4);c.quadraticCurveTo(s*.15,s*.55,s*.5,s*.5);c.stroke();
  // Right wing top
  c.beginPath();c.moveTo(s*.5,s*.35);c.quadraticCurveTo(s*.85,s*.15,s*.85,s*.4);c.quadraticCurveTo(s*.85,s*.55,s*.5,s*.5);c.stroke();
  // Left wing bottom
  c.beginPath();c.moveTo(s*.5,s*.5);c.quadraticCurveTo(s*.2,s*.55,s*.22,s*.7);c.quadraticCurveTo(s*.25,s*.8,s*.5,s*.7);c.stroke();
  // Right wing bottom
  c.beginPath();c.moveTo(s*.5,s*.5);c.quadraticCurveTo(s*.8,s*.55,s*.78,s*.7);c.quadraticCurveTo(s*.75,s*.8,s*.5,s*.7);c.stroke();
  // Antennae
  c.beginPath();c.moveTo(s*.5,s*.2);c.quadraticCurveTo(s*.4,s*.08,s*.35,s*.1);c.stroke();
  c.beginPath();c.moveTo(s*.5,s*.2);c.quadraticCurveTo(s*.6,s*.08,s*.65,s*.1);c.stroke();
}},
{id:5,t:'🐱 חתול',draw:function(c,s){
  // Head
  c.beginPath();c.arc(s*.5,s*.35,s*.15,0,Math.PI*2);c.stroke();
  // Ears
  c.beginPath();c.moveTo(s*.38,s*.22);c.lineTo(s*.35,s*.08);c.lineTo(s*.45,s*.2);c.stroke();
  c.beginPath();c.moveTo(s*.62,s*.22);c.lineTo(s*.65,s*.08);c.lineTo(s*.55,s*.2);c.stroke();
  // Body
  c.beginPath();c.moveTo(s*.42,s*.5);c.quadraticCurveTo(s*.3,s*.65,s*.35,s*.82);c.stroke();
  c.beginPath();c.moveTo(s*.58,s*.5);c.quadraticCurveTo(s*.7,s*.65,s*.65,s*.82);c.stroke();
  // Bottom
  c.beginPath();c.moveTo(s*.35,s*.82);c.lineTo(s*.65,s*.82);c.stroke();
  // Tail
  c.beginPath();c.moveTo(s*.65,s*.78);c.quadraticCurveTo(s*.85,s*.7,s*.8,s*.55);c.stroke();
  // Eyes + nose
  c.setLineDash([]);c.beginPath();c.arc(s*.45,s*.33,s*.02,0,Math.PI*2);c.fillStyle='#2d3436';c.fill();
  c.beginPath();c.arc(s*.55,s*.33,s*.02,0,Math.PI*2);c.fill();
  c.beginPath();c.moveTo(s*.5,s*.38);c.lineTo(s*.48,s*.4);c.lineTo(s*.52,s*.4);c.closePath();c.fill();
}},
{id:6,t:'🏠 בית',draw:function(c,s){
  // Walls
  c.strokeRect(s*.2,s*.45,s*.6,s*.4);
  // Roof
  c.beginPath();c.moveTo(s*.15,s*.45);c.lineTo(s*.5,s*.15);c.lineTo(s*.85,s*.45);c.closePath();c.stroke();
  // Door
  c.strokeRect(s*.42,s*.6,s*.16,s*.25);
  // Windows
  c.strokeRect(s*.25,s*.52,s*.12,s*.12);c.strokeRect(s*.63,s*.52,s*.12,s*.12);
  // Chimney
  c.strokeRect(s*.65,s*.18,s*.08,s*.15);
}},
{id:7,t:'⭐ כוכב גדול',draw:function(c,s){
  c.beginPath();
  for(let i=0;i<5;i++){const a=(i*4*Math.PI/5)-Math.PI/2;const ai=(i*4*Math.PI/5)+2*Math.PI/5-Math.PI/2;
    c.lineTo(s*.5+Math.cos(a)*s*.38,s*.5+Math.sin(a)*s*.38);c.lineTo(s*.5+Math.cos(ai)*s*.15,s*.5+Math.sin(ai)*s*.15)}
  c.closePath();c.stroke();
}},
{id:8,t:'🌸 פרח גדול',draw:function(c,s){
  // Center
  c.beginPath();c.arc(s*.5,s*.4,s*.08,0,Math.PI*2);c.stroke();
  // Petals
  for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/2;const px=s*.5+Math.cos(a)*s*.18,py=s*.4+Math.sin(a)*s*.18;
    c.beginPath();c.arc(px,py,s*.1,0,Math.PI*2);c.stroke()}
  // Stem
  c.beginPath();c.moveTo(s*.5,s*.48);c.quadraticCurveTo(s*.48,s*.65,s*.5,s*.88);c.stroke();
  // Leaves
  c.beginPath();c.moveTo(s*.5,s*.65);c.quadraticCurveTo(s*.35,s*.58,s*.3,s*.62);c.quadraticCurveTo(s*.38,s*.68,s*.5,s*.65);c.stroke();
  c.beginPath();c.moveTo(s*.5,s*.75);c.quadraticCurveTo(s*.65,s*.68,s*.7,s*.72);c.quadraticCurveTo(s*.62,s*.78,s*.5,s*.75);c.stroke();
}},
{id:9,t:'🚗 מכונית',draw:function(c,s){
  // Body
  c.beginPath();c.moveTo(s*.1,s*.55);c.lineTo(s*.1,s*.5);c.lineTo(s*.25,s*.5);c.lineTo(s*.35,s*.3);c.lineTo(s*.65,s*.3);c.lineTo(s*.75,s*.5);c.lineTo(s*.9,s*.5);c.lineTo(s*.9,s*.65);c.lineTo(s*.1,s*.65);c.closePath();c.stroke();
  // Windows
  c.beginPath();c.moveTo(s*.37,s*.5);c.lineTo(s*.4,s*.34);c.lineTo(s*.49,s*.34);c.lineTo(s*.49,s*.5);c.closePath();c.stroke();
  c.beginPath();c.moveTo(s*.51,s*.5);c.lineTo(s*.51,s*.34);c.lineTo(s*.6,s*.34);c.lineTo(s*.63,s*.5);c.closePath();c.stroke();
  // Wheels
  c.beginPath();c.arc(s*.28,s*.68,s*.08,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.72,s*.68,s*.08,0,Math.PI*2);c.stroke();
}},
{id:10,t:'🐢 צב',draw:function(c,s){
  // Shell
  c.beginPath();c.arc(s*.5,s*.5,s*.22,Math.PI,0);c.lineTo(s*.72,s*.58);c.quadraticCurveTo(s*.5,s*.7,s*.28,s*.58);c.closePath();c.stroke();
  // Shell pattern
  c.beginPath();c.arc(s*.5,s*.45,s*.08,0,Math.PI*2);c.stroke();
  // Head
  c.beginPath();c.moveTo(s*.28,s*.52);c.quadraticCurveTo(s*.15,s*.48,s*.12,s*.52);c.quadraticCurveTo(s*.1,s*.58,s*.18,s*.6);c.lineTo(s*.28,s*.58);c.stroke();
  // Legs
  c.beginPath();c.moveTo(s*.35,s*.58);c.lineTo(s*.3,s*.72);c.stroke();
  c.beginPath();c.moveTo(s*.65,s*.58);c.lineTo(s*.7,s*.72);c.stroke();
  // Tail
  c.beginPath();c.moveTo(s*.72,s*.55);c.lineTo(s*.82,s*.52);c.stroke();
  c.setLineDash([]);c.beginPath();c.arc(s*.14,s*.52,s*.015,0,Math.PI*2);c.fillStyle='#2d3436';c.fill();
}},
{id:11,t:'🎈 בלון',draw:function(c,s){
  c.beginPath();c.ellipse(s*.5,s*.38,s*.2,s*.28,0,0,Math.PI*2);c.stroke();
  // Knot
  c.beginPath();c.moveTo(s*.5,s*.66);c.lineTo(s*.48,s*.7);c.lineTo(s*.52,s*.7);c.closePath();c.stroke();
  // String
  c.beginPath();c.moveTo(s*.5,s*.7);c.quadraticCurveTo(s*.45,s*.78,s*.52,s*.85);c.quadraticCurveTo(s*.55,s*.9,s*.48,s*.95);c.stroke();
  // Shine
  c.setLineDash([]);c.strokeStyle='#b2bec3';c.lineWidth=1.5;
  c.beginPath();c.arc(s*.42,s*.3,s*.04,0.3*Math.PI,1.2*Math.PI);c.stroke();
}},
{id:12,t:'🌈 קשת',draw:function(c,s){
  for(let i=0;i<4;i++){c.beginPath();c.arc(s*.5,s*.65,s*.15+i*s*.07,Math.PI,0);c.stroke()}
  // Clouds
  c.beginPath();c.arc(s*.15,s*.65,s*.08,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.85,s*.65,s*.08,0,Math.PI*2);c.stroke();
}},
{id:13,t:'🐌 חילזון',draw:function(c,s){
  // Shell - spiral circles
  c.beginPath();c.arc(s*.55,s*.4,s*.2,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.55,s*.4,s*.14,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.55,s*.4,s*.08,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.55,s*.4,s*.03,0,Math.PI*2);c.stroke();
  // Body - bottom slug part
  c.beginPath();
  c.moveTo(s*.35,s*.58);
  c.quadraticCurveTo(s*.25,s*.6,s*.18,s*.6);
  c.quadraticCurveTo(s*.1,s*.6,s*.08,s*.65);
  c.quadraticCurveTo(s*.08,s*.72,s*.15,s*.72);
  c.quadraticCurveTo(s*.4,s*.72,s*.6,s*.7);
  c.quadraticCurveTo(s*.75,s*.68,s*.78,s*.62);
  c.quadraticCurveTo(s*.76,s*.58,s*.7,s*.58);
  c.stroke();
  // Eye stalks
  c.beginPath();c.moveTo(s*.15,s*.6);c.quadraticCurveTo(s*.12,s*.48,s*.1,s*.45);c.stroke();
  c.beginPath();c.moveTo(s*.2,s*.58);c.quadraticCurveTo(s*.2,s*.48,s*.18,s*.45);c.stroke();
  // Eyes
  c.setLineDash([]);
  c.beginPath();c.arc(s*.1,s*.44,s*.02,0,Math.PI*2);c.fillStyle='#2d3436';c.fill();
  c.beginPath();c.arc(s*.18,s*.44,s*.02,0,Math.PI*2);c.fill();
  // Smile
  c.beginPath();c.arc(s*.14,s*.65,s*.03,0.1*Math.PI,0.9*Math.PI);c.strokeStyle='#2d3436';c.lineWidth=1.5;c.stroke();
}},
{id:14,t:'🍦 גלידה',draw:function(c,s){
  // Cone
  c.beginPath();c.moveTo(s*.35,s*.45);c.lineTo(s*.5,s*.9);c.lineTo(s*.65,s*.45);c.closePath();c.stroke();
  // Cross lines on cone
  for(let i=1;i<4;i++){const y=s*(.45+i*.11);const w=s*.15*(1-i*.2);c.beginPath();c.moveTo(s*.5-w,y);c.lineTo(s*.5+w,y);c.stroke()}
  // Scoops
  c.beginPath();c.arc(s*.42,s*.38,s*.12,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.58,s*.38,s*.12,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(s*.5,s*.25,s*.11,0,Math.PI*2);c.stroke();
  // Cherry
  c.setLineDash([]);c.beginPath();c.arc(s*.5,s*.14,s*.03,0,Math.PI*2);c.fillStyle='#2d3436';c.fill();
}},
{id:15,t:'🐰 ארנב',draw:function(c,s){
  // Head
  c.beginPath();c.arc(s*.5,s*.48,s*.16,0,Math.PI*2);c.stroke();
  // Left ear - long
  c.beginPath();
  c.moveTo(s*.42,s*.33);
  c.quadraticCurveTo(s*.35,s*.12,s*.38,s*.05);
  c.quadraticCurveTo(s*.42,s*.02,s*.45,s*.08);
  c.quadraticCurveTo(s*.47,s*.2,s*.46,s*.33);
  c.stroke();
  // Right ear - long
  c.beginPath();
  c.moveTo(s*.58,s*.33);
  c.quadraticCurveTo(s*.55,s*.15,s*.56,s*.08);
  c.quadraticCurveTo(s*.6,s*.02,s*.63,s*.07);
  c.quadraticCurveTo(s*.66,s*.15,s*.58,s*.33);
  c.stroke();
  // Body
  c.beginPath();c.ellipse(s*.5,s*.72,s*.15,s*.18,0,0,Math.PI*2);c.stroke();
  // Front paws
  c.beginPath();c.ellipse(s*.4,s*.88,s*.06,s*.03,0,0,Math.PI*2);c.stroke();
  c.beginPath();c.ellipse(s*.6,s*.88,s*.06,s*.03,0,0,Math.PI*2);c.stroke();
  // Tail - fluffy circle
  c.beginPath();c.arc(s*.65,s*.72,s*.04,0,Math.PI*2);c.stroke();
  // Whiskers
  c.beginPath();c.moveTo(s*.36,s*.48);c.lineTo(s*.22,s*.45);c.stroke();
  c.beginPath();c.moveTo(s*.36,s*.5);c.lineTo(s*.22,s*.52);c.stroke();
  c.beginPath();c.moveTo(s*.64,s*.48);c.lineTo(s*.78,s*.45);c.stroke();
  c.beginPath();c.moveTo(s*.64,s*.5);c.lineTo(s*.78,s*.52);c.stroke();
  // Nose
  c.setLineDash([]);
  c.beginPath();c.moveTo(s*.5,s*.5);c.lineTo(s*.48,s*.52);c.lineTo(s*.52,s*.52);c.closePath();c.fillStyle='#2d3436';c.fill();
  // Eyes
  c.beginPath();c.arc(s*.44,s*.45,s*.02,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(s*.56,s*.45,s*.02,0,Math.PI*2);c.fill();
}}
];

let cur=0,selC=COLORS[0],selSz=SIZES[1],reso={};

function rTabs(){const el=document.getElementById('tabs');el.innerHTML=PICS.map((p,i)=>`<button class="tb ${i===cur?'on':''} ${reso[p.id]?'dn':''}" onclick="go(${i})">${p.t}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}

function rLv(){
const pic=PICS[cur],ar=document.getElementById('area');
let h=`<div class="ph">👁️ תיאום עין-יד — ${pic.t}</div>`;
h+=`<div class="tools"><div class="tools-section"><span class="tools-label">🎨</span>`;
COLORS.forEach((c,i)=>h+=`<div class="pc ${i===0?'on':''}" style="background:${c}" data-c="${c}" onclick="pickC(this)"></div>`);
h+=`</div><div class="divider"></div><div class="tools-section"><span class="tools-label">גודל:</span>`;
SIZES.forEach((sz,i)=>{const d=Math.max(4,sz*0.8);h+=`<div class="sz-btn ${i===1?'on':''}" data-sz="${sz}" onclick="pickSz(this)"><div class="dot" style="width:${d}px;height:${d}px"></div></div>`});
h+=`</div></div>`;
h+=`<div class="mc" id="q0"><div class="mc-head"><div class="mc-num">✏️</div><span class="mc-hint">💡 עברו על הקווים המקווקווים — ${pic.t}</span></div>`;
h+=`<div class="cw" id="cw0"><canvas class="cbg" id="bg0"></canvas><canvas class="cdw" id="dw0"></canvas></div>`;
h+=`<div class="mc-acts"><button class="ab" onclick="clrDraw()">🗑️ מחק</button><button class="ab" onclick="done()">✅ סיימתי!</button></div></div>`;
h+=`<div class="ld" id="ld"><div class="big">🎨</div><h2>יופי של ציור!</h2><p>עבודה מצוינת!</p><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<PICS.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;
ar.innerHTML=h;initCanvas();rTabs();uPr();
}

function initCanvas(){
const wrap=document.getElementById('cw0');const bg=document.getElementById('bg0');const dw=document.getElementById('dw0');
const sz=Math.min(wrap.offsetWidth,500);
[bg,dw].forEach(c=>{c.width=sz;c.height=sz;c.style.width=sz+'px';c.style.height=sz+'px'});
wrap.style.height=sz+'px';wrap.style.maxWidth=sz+'px';
const ctx=bg.getContext('2d');ctx.setLineDash([10,8]);ctx.lineWidth=2.5;ctx.strokeStyle='#b2bec3';ctx.lineCap='round';ctx.lineJoin='round';
PICS[cur].draw(ctx,sz);
const dwCtx=dw.getContext('2d');let drawing=false;
dw.addEventListener('pointerdown',function(e){e.preventDefault();drawing=true;const r=dw.getBoundingClientRect();dwCtx.beginPath();dwCtx.moveTo(e.clientX-r.left,e.clientY-r.top);dwCtx.strokeStyle=selC;dwCtx.lineWidth=selSz;dwCtx.lineCap='round';dwCtx.lineJoin='round';dwCtx.setLineDash([])},{passive:false});
dw.addEventListener('pointermove',function(e){if(!drawing)return;e.preventDefault();const r=dw.getBoundingClientRect();dwCtx.lineTo(e.clientX-r.left,e.clientY-r.top);dwCtx.stroke()},{passive:false});
dw.addEventListener('pointerup',function(){drawing=false},{passive:false});
dw.addEventListener('pointercancel',function(){drawing=false});
}

function pickC(el){document.querySelectorAll('.pc').forEach(c=>c.classList.remove('on'));el.classList.add('on');selC=el.dataset.c}
function pickSz(el){document.querySelectorAll('.sz-btn').forEach(c=>c.classList.remove('on'));el.classList.add('on');selSz=parseInt(el.dataset.sz)}
function clrDraw(){const dw=document.getElementById('dw0');dw.getContext('2d').clearRect(0,0,dw.width,dw.height)}
function done(){reso[PICS[cur].id]=true;document.getElementById('q0').classList.add('ok');document.getElementById('ld').classList.add('show');document.getElementById('ld').scrollIntoView({behavior:'smooth',block:'center'});rTabs();uPr()}
function go(i){cur=i;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function nxt(){if(cur<PICS.length-1){cur++;rLv();window.scrollTo({top:0,behavior:'smooth'})}}
function retry(){rLv();window.scrollTo({top:0,behavior:'smooth'})}
function uPr(){document.getElementById('pf').style.width=Math.round(Object.keys(reso).length/PICS.length*100)+'%'}
rLv();
</script>
