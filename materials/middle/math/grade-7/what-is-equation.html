/* Container */
.container{max-width:760px;margin:0 auto;padding:0 16px 40px}

.q-opt.selected .q-opt-letter{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-opt.correct .q-opt-letter{background:var(--success);color:#fff;border-color:var(--success)}
.q-opt.wrong .q-opt-letter{background:var(--error);color:#fff;border-color:var(--error)}

/* Multi-select options in practice */
.q-multi-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.q-multi-opt{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;transition:.25s;background:var(--bg);display:flex;align-items:center;gap:10px}
.q-multi-opt:hover:not(.disabled){border-color:var(--primary);background:var(--primary-light)}
.q-multi-opt.checked{border-color:var(--accent);background:#e0f2fe;font-weight:700}
.q-multi-opt.correct{border-color:var(--success)!important;background:#ecfdf5!important;font-weight:700}

.q-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(26,47,90,.15)}

.q-check-btn{padding:10px 28px;border-radius:999px;border:none;background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.25s;box-shadow:var(--shadow)}

.q-feedback.wrong{background:#fef2f2;border-right:4px solid var(--error);color:#991b1b}

.q-nav{display:flex;justify-content:space-between;margin-top:16px}
.q-nav-btn{padding:10px 24px;border-radius:999px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:700;color:var(--text);transition:.25s}
.q-nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.q-nav-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-nav-btn.primary:hover{background:var(--primary-dark)}

/* Level complete */
.level-complete{text-align:center;padding:24px;animation:fadeIn .5s}

.level-complete h2{font-size:1.4rem;color:var(--primary-dark);margin-bottom:8px}
.level-complete .score-display{font-size:1.8rem;font-weight:800;color:var(--success);margin-bottom:16px}

/* Celebration confetti */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}

  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .container{padding:0 10px 30px}

<script>
/* ===== UTILITIES ===== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const today=new Date();const dateSeed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
let rng=mulberry32(dateSeed);
function R(){return rng()}
function RI(a,b){return a+Math.floor(R()*(b-a+1))}
function pick(arr){return arr[Math.floor(R()*arr.length)]}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(R()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const boyNames=["דני","יואב","עמית","אורי","נועם","גיא","איתי","רון","תומר","עידו"];
const girlNames=["מיכל","נועה","שירה","תמר","רונית","יעל","דנה","אורית","הילה","ליאת"];
function boyName(){return pick(boyNames)}
function girlName(){return pick(girlNames)}
function anyName(){return R()>.5?boyName():girlName()}

const LETTERS=['א','ב','ג','ד'];

/* ===== STATE ===== */
let state={section:'learn',step:0,level:'easy',qIndex:0};
let scores={easy:[],medium:[],hard:[],challenge:[]};
let answered={easy:[],medium:[],hard:[],challenge:[]};
let questions={easy:null,medium:null,hard:null,challenge:null};
const LEVEL_COUNTS={easy:20,medium:20,hard:20,challenge:15};
const LEVEL_NAMES={easy:'קל',medium:'בינוני',hard:'קשה',challenge:'אתגר'};
const TOTAL_STEPS=7;

/* No localStorage for quiz state (stateless) — but use dateSeed PRNG */

/* ===== TEACHING SECTION ===== */
const steps=[
/* Step 0: What is an equation? */
{title:'⚖️ מהי משוואה?', render(){return `
<div class="rule-box">📌 משוואה היא <strong>משפט מתמטי</strong> עם סימן <strong>שוויון (=)</strong> שבו יש <strong>נעלם</strong> (אות)</div>
<p>בואו נבדוק — איזה מהביטויים הבאים הוא משוואה?</p>
<div class="example">
<p><span class="math-expr">3 + 5 = 8</span> — זו <strong>לא</strong> משוואה! אין כאן נעלם (אות).</p>
<p><span class="math-expr">x + 5 = 8</span> — <strong>זו משוואה!</strong> יש סימן = ויש נעלם <span class="math-expr">x</span>.</p>
<p><span class="math-expr">2x > 10</span> — זו <strong>לא</strong> משוואה! אין סימן = (יש סימן &gt;).</p>
</div>

function renderStep(idx){
  state.step=idx;
  const s=steps[idx];
  const fill=((idx+1)/TOTAL_STEPS*100).toFixed(0);
  document.getElementById('stepFill').style.width=fill+'%';
  document.getElementById('stepText').textContent='שלב '+(idx+1)+' מתוך '+TOTAL_STEPS;
  document.getElementById('stepContent').innerHTML='<div class="step-card"><div class="step-title">'+s.title+'</div>'+s.render()+'</div>';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===TOTAL_STEPS-1?'לתרגול ←':'הבא ←';

/* ===== QUESTION GENERATORS ===== */

function genEasy(){
  rng=mulberry32(dateSeed+100);
  const qs=[];

  /* Q1-Q5: "Is this an equation? Yes/No" */
  const eqItems=[
    {expr:'3 + 5 = 8',isEq:false,reason:'אין נעלם (אות)'},
    {expr:'x + 5 = 8',isEq:true,reason:'יש סימן = ויש נעלם x'},
    {expr:'2x - 3',isEq:false,reason:'אין סימן שוויון ='},
    {expr:'7 = 7',isEq:false,reason:'אין נעלם (אות)'},
    {expr:'y · 3 = 12',isEq:true,reason:'יש סימן = ויש נעלם y'},
    {expr:'4a + 1 = 9',isEq:true,reason:'יש סימן = ויש נעלם a'},
    {expr:'15 - 8 = 7',isEq:false,reason:'אין נעלם (אות)'},
    {expr:'n / 2 = 6',isEq:true,reason:'יש סימן = ויש נעלם n'},
    {expr:'3x > 10',isEq:false,reason:'אין סימן =, יש רק >'},
    {expr:'b + b = 2b',isEq:true,reason:'יש סימן = ויש נעלם b'}
  ];
  const picked=shuffle(eqItems).slice(0,5);
  picked.forEach(item=>{
    const yes='כן, זו משוואה';
    const no='לא, זו לא משוואה';
    const correct=item.isEq?yes:no;
    const opts=[yes,no];
    qs.push({type:'mc',stem:'האם הביטוי הבא הוא <strong>משוואה</strong>?<br><div style="text-align:center;font-size:1.2rem;margin:12px 0"><span class="math-expr">'+item.expr+'</span></div>',options:opts,answer:opts.indexOf(correct),explanation:item.reason});
  });

  /* Q6-Q10: Identify variable / left side / right side */
  for(let i=0;i<5;i++){
    const vr=pick(['x','y','a','n','b']);
    const a=RI(2,9);const b=RI(10,30);
    const op=pick(['+','-']);
    const leftSide=vr+' '+op+' '+a;
    const rightSide=''+b;
    const eq=leftSide+' = '+rightSide;
    const qType=i%3; /* 0=variable, 1=right side, 2=left side */
    if(qType===0){
      const correct=vr;
      const opts=shuffle([vr,''+a,''+b,op==='+'?''+a:'=']);
      qs.push({type:'mc',stem:'במשוואה <span class="math-expr">'+eq+'</span> — מהו <strong>הנעלם</strong>?',options:opts,answer:opts.indexOf(correct),explanation:'הנעלם הוא האות <span class="math-expr">'+vr+'</span> — היא מייצגת את המספר שאנחנו מחפשים.'});
    } else if(qType===1){
      const correct=leftSide;
      const opts=shuffle([leftSide,rightSide,vr,''+a]);
      qs.push({type:'mc',stem:'במשוואה <span class="math-expr">'+eq+'</span> — מהו <strong>אגף ימין</strong>?',options:opts,answer:opts.indexOf(correct),explanation:'אגף ימין הוא <span class="math-expr">'+leftSide+'</span> (מה שנמצא מימין לסימן =).'});
    } else {
      const correct=rightSide;
      const opts=shuffle([rightSide,leftSide,vr,op+' '+a]);
      qs.push({type:'mc',stem:'במשוואה <span class="math-expr">'+eq+'</span> — מהו <strong>אגף שמאל</strong>?',options:opts,answer:opts.indexOf(correct),explanation:'אגף שמאל הוא <span class="math-expr">'+rightSide+'</span> (מה שנמצא משמאל לסימן =).'});
    }
  }

  /* Q11-Q15: "Is x=N a solution of [simple equation]?" */
  for(let i=0;i<5;i++){
    const vr=pick(['x','a','n']);
    if(i<3){
      /* x + a = b type */
      const a=RI(2,9);const sol=RI(1,10);const b=sol+a;
      const testVal=R()>.5?sol:sol+RI(1,3);
      const isSol=testVal===sol;
      const leftResult=testVal+a;
      const correct=isSol?'כן':'לא';
      const opts=['כן','לא'];
      qs.push({type:'mc',stem:'האם <span class="math-expr">'+vr+' = '+testVal+'</span> פתרון של <span class="math-expr">'+vr+' + '+a+' = '+b+'</span>?',options:opts,answer:opts.indexOf(correct),explanation:'נציב: <span class="math-expr">'+testVal+' + '+a+' = '+leftResult+'</span>. '+(isSol?'<span class="math-expr">'+leftResult+' = '+b+'</span> ✓ — כן, זה פתרון!':'<span class="math-expr">'+leftResult+' ≠ '+b+'</span> — לא, זה לא פתרון.')});
    } else {
      /* ax = b type */
      const a=RI(2,6);const sol=RI(2,8);const b=a*sol;
      const testVal=R()>.5?sol:sol+RI(1,3);
      const isSol=testVal===sol;
      const leftResult=a*testVal;
      const correct=isSol?'כן':'לא';
      const opts=['כן','לא'];
      qs.push({type:'mc',stem:'האם <span class="math-expr">'+vr+' = '+testVal+'</span> פתרון של <span class="math-expr">'+a+vr+' = '+b+'</span>?',options:opts,answer:opts.indexOf(correct),explanation:'נציב: <span class="math-expr">'+a+' · '+testVal+' = '+leftResult+'</span>. '+(isSol?'<span class="math-expr">'+leftResult+' = '+b+'</span> ✓ — כן!':'<span class="math-expr">'+leftResult+' ≠ '+b+'</span> — לא!')});
    }
  }

  /* Q16-Q20: "Fill in the blank: ___ + 8 = 12" etc. */
  for(let i=0;i<5;i++){
    let stem,answer,explanation;
    if(i<2){
      /* ___ + a = b */
      const a=RI(3,9);const b=RI(a+2,a+12);const ans=b-a;
      stem='השלימו: <span class="math-expr">___ + '+a+' = '+b+'</span>';
      answer=ans;
      explanation='<span class="math-expr">'+ans+' + '+a+' = '+b+'</span> ✓';
    } else if(i<4){
      /* a + ___ = b */
      const a=RI(3,9);const b=RI(a+2,a+12);const ans=b-a;
      stem='השלימו: <span class="math-expr">'+a+' + ___ = '+b+'</span>';
      answer=ans;
      explanation='<span class="math-expr">'+a+' + '+ans+' = '+b+'</span> ✓';
    } else {
      /* a + b = ___ + c */
      const a=RI(3,8);const b=RI(2,6);const c=RI(1,a+b-1);const ans=a+b-c;
      stem='השלימו: <span class="math-expr">'+a+' + '+b+' = ___ + '+c+'</span>';
      answer=ans;
      explanation='<span class="math-expr">'+a+' + '+b+' = '+(a+b)+'</span>, לכן <span class="math-expr">___ + '+c+' = '+(a+b)+'</span> → <span class="math-expr">___ = '+ans+'</span>';
    }
    qs.push({type:'input',stem:stem,answer:answer,explanation:explanation});
  }

  return qs;
}

function genMedium(){
  rng=mulberry32(dateSeed+200);
  const qs=[];

  /* Q1-Q5: "Find the solution" (numeric input) */
  const medEqs=[
    ()=>{const a=RI(3,9);const sol=RI(2,12);const b=sol+a;return{stem:'מצאו את הפתרון: <span class="math-expr">x + '+a+' = '+b+'</span>',answer:sol,explanation:'<span class="math-expr">x = '+b+' - '+a+' = '+sol+'</span>'}},
    ()=>{const a=RI(2,6);const sol=RI(2,10);const b=a*sol;return{stem:'מצאו את הפתרון: <span class="math-expr">'+a+'x = '+b+'</span>',answer:sol,explanation:'<span class="math-expr">x = '+b+' / '+a+' = '+sol+'</span>'}},
    ()=>{const a=RI(10,30);const sol=RI(2,9);const b=a-sol;return{stem:'מצאו את הפתרון: <span class="math-expr">x - '+sol+' = '+b+'</span>',answer:a,explanation:'<span class="math-expr">x = '+b+' + '+sol+' = '+a+'</span>'}},
    ()=>{const d=RI(2,5);const sol=d*RI(2,8);const b=sol/d;return{stem:'מצאו את הפתרון: <span class="math-expr">x : '+d+' = '+b+'</span>',answer:sol,explanation:'<span class="math-expr">x = '+b+' · '+d+' = '+sol+'</span>'}},
    ()=>{const a=RI(5,15);const sol=RI(2,8);const b=a-sol;return{stem:'מצאו את הפתרון: <span class="math-expr">'+a+' - x = '+b+'</span>',answer:sol,explanation:'<span class="math-expr">x = '+a+' - '+b+' = '+sol+'</span>'}}
  ];
  shuffle(medEqs).slice(0,5).forEach(fn=>{const q=fn();qs.push({type:'input',stem:q.stem,answer:q.answer,explanation:q.explanation})});

  /* Q6-Q10: "Is x=N solution?" with fractions/harder */
  for(let i=0;i<5;i++){
    const vr=pick(['a','x','n']);
    if(i<2){
      /* (a-b)/c = d */
      const c=RI(2,5);const d=RI(2,6);const b=RI(1,5);const sol=c*d+b;
      const testVal=R()>.5?sol:sol+RI(1,4);
      const isSol=testVal===sol;
      const numerator=testVal-b;const result=numerator/c;
      const correct=isSol?'כן':'לא';
      const opts=['כן','לא'];
      qs.push({type:'mc',stem:'האם <span class="math-expr">'+vr+' = '+testVal+'</span> פתרון של <span class="math-expr">('+vr+' - '+b+') / '+c+' = '+d+'</span>?',options:opts,answer:opts.indexOf(correct),explanation:'נציב: <span class="math-expr">('+testVal+' - '+b+') / '+c+' = '+numerator+' / '+c+' = '+result+'</span>. '+(isSol?'<span class="math-expr">'+result+' = '+d+'</span> ✓':'<span class="math-expr">'+result+' ≠ '+d+'</span> ✗')});
    } else if(i<4){
      /* ax + b = c */
      const a=RI(2,5);const b=RI(1,8);const sol=RI(2,8);const c=a*sol+b;
      const testVal=R()>.5?sol:sol+RI(-2,2)||sol+1;
      const isSol=testVal===sol;
      const leftResult=a*testVal+b;
      const correct=isSol?'כן':'לא';
      const opts=['כן','לא'];
      qs.push({type:'mc',stem:'האם <span class="math-expr">'+vr+' = '+testVal+'</span> פתרון של <span class="math-expr">'+a+vr+' + '+b+' = '+c+'</span>?',options:opts,answer:opts.indexOf(correct),explanation:'נציב: <span class="math-expr">'+a+' · '+testVal+' + '+b+' = '+(a*testVal)+' + '+b+' = '+leftResult+'</span>. '+(isSol?'<span class="math-expr">'+leftResult+' = '+c+'</span> ✓':'<span class="math-expr">'+leftResult+' ≠ '+c+'</span> ✗')});
    } else {
      /* x/a = b/c (integer solution) */
      const a=RI(2,6);const sol=RI(2,8);
      const testVal=R()>.5?sol:sol+RI(1,3);
      const isSol=testVal===sol;
      const leftResult=testVal;const rightVal=sol;
      const correct=isSol?'כן':'לא';
      const opts=['כן','לא'];
      qs.push({type:'mc',stem:'האם <span class="math-expr">'+vr+' = '+testVal+'</span> פתרון של <span class="math-expr">'+vr+' / '+a+' = '+(sol/a)+'</span>?',options:opts,answer:opts.indexOf(correct),explanation:'נציב: <span class="math-expr">'+testVal+' / '+a+' = '+(testVal/a)+'</span>. '+(isSol?'✓ נכון!':'✗ לא שווה ל-<span class="math-expr">'+(sol/a)+'</span>')});
    }
  }

  /* Q11-Q15: "Which numbers are solutions?" (multi-select from 4) */
  for(let i=0;i<5;i++){
    const vr=pick(['x','y','b']);
    const a=RI(2,5);const b2=RI(3,10);
    /* equation: a*vr + b2 = target, sol = (target-b2)/a */
    const sol=RI(2,8);const target=a*sol+b2;
    const candidates=shuffle([sol,sol+1,sol-1>0?sol-1:sol+2,sol+RI(2,4)]);
    const correctIndices=[];
    candidates.forEach((c,ci)=>{if(c===sol)correctIndices.push(ci)});
    const options=candidates.map(c=>''+c);
    const eq=a+vr+' + '+b2+' = '+target;
    qs.push({type:'multi',stem:'אילו מהמספרים הם פתרונות של <span class="math-expr">'+eq+'</span>?<br>(בחרו את כל הנכונים)',options:options,correctIndices:correctIndices,explanation:'נציב כל מספר: <span class="math-expr">'+vr+' = '+sol+'</span> → <span class="math-expr">'+a+' · '+sol+' + '+b2+' = '+(a*sol)+' + '+b2+' = '+target+'</span> ✓. השאר לא מתאימים.'});
  }

  /* Q16-Q20: Word problems → equation */
  const wordProblems=[
    ()=>{const n=anyName();const mult=RI(2,4);const add=RI(1,5);const result=RI(15,30);return{stem:n+' חשב/ה על מספר, כפל/ה אותו ב-'+mult+' והוסיף/ה '+add+'. התוצאה היא '+result+'. מהו המספר?',answer:Math.floor((result-add)/mult),explanation:'המשוואה: <span class="math-expr">'+mult+'x + '+add+' = '+result+'</span> → <span class="math-expr">'+mult+'x = '+(result-add)+'</span> → <span class="math-expr">x = '+Math.floor((result-add)/mult)+'</span>',valid:(result-add)%mult===0}},
    ()=>{const n=anyName();const per=RI(3,8);const result=per*RI(3,7);return{stem:n+' קנה/תה '+result/per+' מחברות במחיר זהה ושילמ/ה '+result+' ש"ח. כמה עולה כל מחברת?',answer:per,explanation:'המשוואה: <span class="math-expr">'+result/per+'x = '+result+'</span> → <span class="math-expr">x = '+per+'</span> ש"ח'}},
    ()=>{const n=anyName();const sub=RI(5,15);const remain=RI(10,30);return{stem:'ל'+n+' היו כמה גולות. אחרי שנתנ/ה '+sub+' גולות לחבר/ה, נשארו ל'+n+' '+remain+' גולות. כמה גולות היו ל'+n+' בהתחלה?',answer:remain+sub,explanation:'המשוואה: <span class="math-expr">x - '+sub+' = '+remain+'</span> → <span class="math-expr">x = '+(remain+sub)+'</span>'}},
    ()=>{const n=anyName();const add=RI(5,12);const total=RI(20,40);return{stem:n+' אסף/ה בולים. אחרי שקיבל/ה עוד '+add+' בולים, יש ל'+n+' '+total+' בולים. כמה בולים היו ל'+n+' לפני כן?',answer:total-add,explanation:'המשוואה: <span class="math-expr">x + '+add+' = '+total+'</span> → <span class="math-expr">x = '+(total-add)+'</span>'}},
    ()=>{const n=anyName();const mult=2;const add=1;const result=mult*RI(4,10)+add;return{stem:'קבוצת ילדים קיבלה הנחיה: לבחור מספר, לכפול ב-'+mult+' ולהוסיף '+add+'. '+n+' קיבל/ה '+result+'. איזה מספר בחר/ה?',answer:(result-add)/mult,explanation:'המשוואה: <span class="math-expr">'+mult+'x + '+add+' = '+result+'</span> → <span class="math-expr">x = '+((result-add)/mult)+'</span>'}}
  ];
  shuffle(wordProblems).slice(0,5).forEach(fn=>{
    let q=fn();
    /* Retry if not integer answer */
    let tries=0;
    while(q.answer!==Math.floor(q.answer)&&tries<5){q=fn();tries++}
    qs.push({type:'input',stem:q.stem,answer:q.answer,explanation:q.explanation});
  });

  return qs;
}

function genHard(){
  rng=mulberry32(dateSeed+300);
  const qs=[];

  /* Q1-Q5: "Which equations have x=4 as solution?" (from list) */
  for(let i=0;i<5;i++){
    const sol=RI(2,6);
    const eqList=shuffle([
      {eq:'x + '+(15-sol)+' = 15',hasSol:true},
      {eq:'x · '+(Math.floor(35/sol))+' = '+(Math.floor(35/sol)*sol),hasSol:Math.floor(35/sol)*sol===35},
      {eq:sol+'x = '+(sol*sol),hasSol:true},
      {eq:(sol+5)+' - x = 5',hasSol:true},
      {eq:'x + x = '+(2*sol),hasSol:true},
      {eq:'3x = '+(3*sol+1),hasSol:false},
      {eq:'x + 1 = '+(sol-1),hasSol:false},
      {eq:'2x + 1 = '+(2*sol+1),hasSol:true}
    ]).slice(0,4);
    const correctIndices=[];
    eqList.forEach((e,ei)=>{if(e.hasSol)correctIndices.push(ei)});
    const options=eqList.map(e=>e.eq);
    qs.push({type:'multi',stem:'באילו מהמשוואות הבאות <span class="math-expr">x = '+sol+'</span> הוא <strong>פתרון</strong>?<br>(בחרו את כל הנכונים)',options:options,correctIndices:correctIndices,explanation:'מציבים <span class="math-expr">x = '+sol+'</span> בכל משוואה ובודקים אם שני האגפים שווים.'});
  }

  /* Q6-Q10: Solve fraction equations */
  for(let i=0;i<5;i++){
    let stem,answer,explanation;
    if(i<2){
      /* x/a = b */
      const a=RI(2,8);const b=RI(1,6);const sol=a*b;
      stem='פתרו: <span class="math-expr">x / '+a+' = '+b+'</span>';
      answer=sol;
      explanation='<span class="math-expr">x = '+b+' · '+a+' = '+sol+'</span>';
    } else if(i<4){
      /* x/a = b/c → x = a*b/c, ensure integer */
      const a=RI(2,6);const c=RI(2,4);const mult=RI(1,3);const b=mult;const sol=a*mult;
      stem='פתרו: <span class="math-expr">x / '+a+' = '+(b<c?b+'/'+c:b/c)+'</span>';
      answer=sol/c*c===sol?a*b/c:a*b;
      /* simplify */
      const ans2=a*b/c;
      if(ans2===Math.floor(ans2)){answer=ans2;explanation='<span class="math-expr">x = '+a+' · '+b+'/'+c+' = '+(a*b)+'/'+c+' = '+ans2+'</span>'}
      else{answer=a*b;explanation='<span class="math-expr">x = '+a+' · '+b+' = '+(a*b)+'</span>'}
    } else {
      /* a/x = b, x = a/b */
      const b=RI(2,5);const sol=RI(2,6);const a=b*sol;
      stem='פתרו: <span class="math-expr">'+a+' / x = '+b+'</span>';
      answer=sol;
      explanation='<span class="math-expr">x = '+a+' / '+b+' = '+sol+'</span>';
    }
    qs.push({type:'input',stem:stem,answer:answer,explanation:explanation});
  }

  /* Q11-Q15: Geometry → equation */
  for(let i=0;i<5;i++){
    let stem,answer,explanation;
    if(i<3){
      /* Triangle with perimeter */
      const p=RI(20,40);
      const s1=RI(3,Math.floor(p/4));const s2=RI(3,Math.floor(p/4));const s3=p-s1-s2;
      if(i===0){
        /* one side is x */
        stem='היקף משולש הוא <span class="math-expr">'+p+'</span> ס"מ. שתי צלעות הן <span class="math-expr">'+s1+'</span> ו-<span class="math-expr">'+s2+'</span> ס"מ. מהו אורך הצלע השלישית?';
        answer=s3;
        explanation='המשוואה: <span class="math-expr">'+s1+' + '+s2+' + x = '+p+'</span> → <span class="math-expr">x = '+p+' - '+(s1+s2)+' = '+s3+'</span>';
      } else if(i===1){
        /* equal-sided triangle with one different */
        const side=RI(5,12);const perim=3*side;
        stem='משולש שווה-צלעות שהיקפו <span class="math-expr">'+perim+'</span> ס"מ. מהו אורך כל צלע?';
        answer=side;
        explanation='המשוואה: <span class="math-expr">3x = '+perim+'</span> → <span class="math-expr">x = '+side+'</span>';
      } else {
        /* isosceles triangle */
        const equalSide=RI(5,10);const base=RI(3,8);const perim=2*equalSide+base;
        stem='משולש שווה-שוקיים שהיקפו <span class="math-expr">'+perim+'</span> ס"מ. הבסיס הוא <span class="math-expr">'+base+'</span> ס"מ. מהו אורך כל שוק?';
        answer=equalSide;
        explanation='המשוואה: <span class="math-expr">2x + '+base+' = '+perim+'</span> → <span class="math-expr">2x = '+(perim-base)+'</span> → <span class="math-expr">x = '+equalSide+'</span>';
      }
    } else {
      /* Rectangle with area or perimeter */
      const w=RI(3,8);const l=RI(w+1,15);
      if(i===3){
        const area=w*l;
        stem='שטח מלבן הוא <span class="math-expr">'+area+'</span> סמ"ר. רוחבו <span class="math-expr">'+w+'</span> ס"מ. מהו אורכו?';
        answer=l;
        explanation='המשוואה: <span class="math-expr">'+w+' · x = '+area+'</span> → <span class="math-expr">x = '+area+' / '+w+' = '+l+'</span>';
      } else {
        const perim=2*(w+l);
        stem='היקף מלבן הוא <span class="math-expr">'+perim+'</span> ס"מ. רוחבו <span class="math-expr">'+w+'</span> ס"מ. מהו אורכו?';
        answer=l;
        explanation='המשוואה: <span class="math-expr">2('+w+' + x) = '+perim+'</span> → <span class="math-expr">'+w+' + x = '+(perim/2)+'</span> → <span class="math-expr">x = '+l+'</span>';
      }
    }
    qs.push({type:'input',stem:stem,answer:answer,explanation:explanation});
  }

  /* Q16-Q20: Word problem → equation + solve */
  for(let i=0;i<5;i++){
    const n=anyName();
    let stem,answer,explanation;
    if(i===0){
      const mult=RI(2,5);const sub=RI(1,5);const result=RI(10,25);const sol=(result+sub)/mult;
      if(sol===Math.floor(sol)){
        stem=n+' חשב/ה על מספר, כפל/ה ב-'+mult+' וחיסר/ה '+sub+'. התוצאה: '+result+'. מהו המספר?';
        answer=sol;
        explanation='המשוואה: <span class="math-expr">'+mult+'x - '+sub+' = '+result+'</span> → <span class="math-expr">'+mult+'x = '+(result+sub)+'</span> → <span class="math-expr">x = '+sol+'</span>';
      } else {
        const sol2=RI(3,8);const result2=mult*sol2-sub;
        stem=n+' חשב/ה על מספר, כפל/ה ב-'+mult+' וחיסר/ה '+sub+'. התוצאה: '+result2+'. מהו המספר?';
        answer=sol2;
        explanation='המשוואה: <span class="math-expr">'+mult+'x - '+sub+' = '+result2+'</span> → <span class="math-expr">x = '+sol2+'</span>';
      }
    } else if(i===1){
      const age=RI(8,14);const diff=RI(3,8);
      stem='גיל '+n+' הוא '+age+'. '+n+' גדול/ה מאחיו/ה ב-'+diff+' שנים. מה גיל האח/ות?';
      answer=age-diff;
      explanation='המשוואה: <span class="math-expr">x + '+diff+' = '+age+'</span> → <span class="math-expr">x = '+(age-diff)+'</span>';
    } else if(i===2){
      const total=RI(30,60);const price=RI(5,12);const sol=Math.floor(total/price);const spent=sol*price;
      stem=n+' הלכ/ה לחנות עם '+spent+' ש"ח וקנתה עפרונות ב-'+price+' ש"ח כל אחד. כמה עפרונות קנתה?';
      answer=sol;
      explanation='המשוואה: <span class="math-expr">'+price+'x = '+spent+'</span> → <span class="math-expr">x = '+sol+'</span>';
    } else if(i===3){
      const perChild=RI(3,7);const numChildren=RI(4,8);const total=perChild*numChildren;
      stem=n+' חילקה '+total+' ממתקים שווה בשווה בין '+numChildren+' ילדים. כמה ממתקים קיבל כל ילד?';
      answer=perChild;
      explanation='המשוואה: <span class="math-expr">'+numChildren+'x = '+total+'</span> → <span class="math-expr">x = '+perChild+'</span>';
    } else {
      const double=RI(3,8);const add=RI(2,6);const sol2=RI(5,12);const total2=2*sol2+add;
      stem=n+' ובועז אספו ביחד '+total2+' מדבקות. לבועז יש '+add+' מדבקות יותר מ'+n+'. כמה מדבקות יש ל'+n+'?';
      answer=sol2;
      explanation='אם ל'+n+' יש <span class="math-expr">x</span> מדבקות, לבועז <span class="math-expr">x + '+add+'</span>. ביחד: <span class="math-expr">x + (x + '+add+') = '+total2+'</span> → <span class="math-expr">2x = '+(total2-add)+'</span> → <span class="math-expr">x = '+sol2+'</span>';
    }
    qs.push({type:'input',stem:stem,answer:answer,explanation:explanation});
  }

  return qs;
}

function genChallenge(){
  rng=mulberry32(dateSeed+400);
  const qs=[];

  /* Q1-Q3: Special equations (multiple/no solutions, R, empty set) */
  const specialEqs=[
    {stem:'פתרו: <span class="math-expr">x(x - 2) = 0</span><br>כמה פתרונות יש?',options:['פתרון אחד: x = 0','פתרון אחד: x = 2','שני פתרונות: x = 0 או x = 2','אין פתרון'],answer:2,explanation:'מכפלה שווה 0 כאשר לפחות אחד מהגורמים שווה 0: <span class="math-expr">x = 0</span> או <span class="math-expr">x - 2 = 0</span> → <span class="math-expr">x = 2</span>. שני פתרונות.'},
    {stem:'פתרו: <span class="math-expr">5 + 3x - 3x = 8</span><br>מה התשובה?',options:['x = 1','x = 3','אין פתרון (Ø)','כל מספר (ℝ)'],answer:2,explanation:'נפשט: <span class="math-expr">5 = 8</span> — זה אף פעם לא נכון! אין פתרון → Ø'},
    {stem:'פתרו: <span class="math-expr">x + 1 = x + 1</span><br>מה התשובה?',options:['x = 0','x = 1','אין פתרון (Ø)','כל מספר (ℝ)'],answer:3,explanation:'זה תמיד נכון לכל <span class="math-expr">x</span>! הפתרון: ℝ (כל המספרים).'}
  ];
  specialEqs.forEach(q=>{qs.push({type:'mc',stem:q.stem,options:q.options,answer:q.answer,explanation:q.explanation})});

  /* Q4-Q6: Complex word problems */
  const n1=anyName(),n2=anyName(),n3=anyName();
  qs.push({type:'input',stem:n1+' בחר/ה מספר, כפל/ה ב-4 וחיסר/ה 3. התוצאה 17. מהו המספר שבחר/ה?',answer:5,explanation:'המשוואה: <span class="math-expr">4x - 3 = 17</span> → <span class="math-expr">4x = 20</span> → <span class="math-expr">x = 5</span>'});
  const pricePerKid=RI(30,50);const numKids=RI(15,25);const budget=pricePerKid*numKids;
  qs.push({type:'input',stem:n2+' מארגנ/ת טיול. עלות ההסעה '+budget+' ש"ח, מתחלקת שווה בשווה. כל תלמיד/ה משלם/ת '+pricePerKid+' ש"ח. כמה תלמידים נוסעים?',answer:numKids,explanation:'המשוואה: <span class="math-expr">'+pricePerKid+'x = '+budget+'</span> → <span class="math-expr">x = '+numKids+'</span>'});
  const ageN3=RI(12,15);const ageParent=RI(35,45);const yearsAgo=RI(2,6);
  const sumBack=ageN3-yearsAgo+ageParent-yearsAgo;
  qs.push({type:'input',stem:'גיל '+n3+' היום: '+ageN3+'. גיל ההורה היום: '+ageParent+'. מהו סכום הגילאים שלהם לפני '+yearsAgo+' שנים?',answer:sumBack,explanation:'לפני '+yearsAgo+' שנים: <span class="math-expr">('+ageN3+' - '+yearsAgo+') + ('+ageParent+' - '+yearsAgo+') = '+(ageN3-yearsAgo)+' + '+(ageParent-yearsAgo)+' = '+sumBack+'</span>'});

  /* Q7-Q9: Card game matching — "which card gives same solution?" */
  for(let i=0;i<3;i++){
    const origSol=RI(2,8);
    /* Original equation with solution origSol */
    const a1=RI(2,5);const b1=a1*origSol;
    const origEq=a1+'x = '+b1;
    /* Create 4 candidate equations, some with same solution */
    const candidates=shuffle([
      {eq:'x + '+(15-origSol)+' = 15',sol:origSol},
      {eq:'2x = '+(2*origSol),sol:origSol},
      {eq:'x + 1 = '+(origSol+2),sol:origSol+1},
      {eq:'3x = '+(3*(origSol+1)),sol:origSol+1}
    ]);
    const correctIndices=[];
    candidates.forEach((c,ci)=>{if(c.sol===origSol)correctIndices.push(ci)});
    qs.push({type:'multi',stem:'המשוואה המקורית: <span class="math-expr">'+origEq+'</span> (פתרון: <span class="math-expr">x = '+origSol+'</span>)<br>באילו מהמשוואות הבאות הפתרון <strong>זהה</strong>?',options:candidates.map(c=>c.eq),correctIndices:correctIndices,explanation:'הפתרון המקורי <span class="math-expr">x = '+origSol+'</span>. מציבים בכל משוואה ובודקים.'});
  }

  /* Q10-Q12: Factored equations "(x-a)(x-b)(x-c)=0" — find all solutions */
  for(let i=0;i<3;i++){
    const a=RI(1,6);const b=RI(a+1,10);const c=RI(b+1,15);
    const factors=['(x - '+a+')','(2x - '+(2*b)+')','('+(c*2)+' - 2x)'];
    const eq=factors.join(' · ')+' = 0';
    /* solutions: x=a, 2x=2b→x=b, c*2-2x=0→x=c */
    const sols=[a,b,c].sort((x,y)=>x-y);
    qs.push({type:'input-text',stem:'מצאו את <strong>כל הפתרונות</strong> של:<br><div style="text-align:center;font-size:1.1rem;margin:12px 0"><span class="math-expr">'+eq+'</span></div>כתבו את הפתרונות מופרדים בפסיקים (למשל: 2,5,7):',answer:[sols.join(','),sols.join(', '),sols.join(' , ')],display:sols.join(', '),explanation:'כל גורם מתאפס: <span class="math-expr">x = '+a+'</span>, <span class="math-expr">x = '+b+'</span>, <span class="math-expr">x = '+c+'</span>'});
  }

  /* Q13-Q15: "Write an equation with solution x=N" */
  for(let i=0;i<3;i++){
    if(i<2){
      const sol=RI(3,10);
      const a=RI(2,5);const b=a*sol+RI(1,9);
      qs.push({type:'input-text',stem:'כתבו משוואה שהפתרון שלה הוא <span class="math-expr">x = '+sol+'</span><br>(למשל: <span class="math-expr">x + 3 = '+(sol+3)+'</span>)',answer:['x+'+RI(1,9)+'='+(sol+RI(1,9))],display:'דוגמה: x + 3 = '+(sol+3),explanation:'כל משוואה שמקיימת <span class="math-expr">x = '+sol+'</span> מתקבלת. למשל: <span class="math-expr">x + 3 = '+(sol+3)+'</span>, <span class="math-expr">2x = '+(2*sol)+'</span>, וכו\'.',validate:function(val){
        /* Accept any equation where substituting sol makes it true */
        try{
          const cleaned=val.replace(/\s/g,'').replace(/x/gi,'('+sol+')');
          const parts=cleaned.split('=');
          if(parts.length!==2)return false;
          /* Safe eval for simple arithmetic */
          const left=Function('"use strict";return('+parts[0].replace(/[^0-9+\-*/().]/g,'')+')')();
          const right=Function('"use strict";return('+parts[1].replace(/[^0-9+\-*/().]/g,'')+')')();
          return Math.abs(left-right)<0.001;
        }catch(e){return false}
      }});
    } else {
      qs.push({type:'input-text',stem:'כתבו משוואה <strong>שאין לה פתרון</strong> (Ø)<br>(למשל: <span class="math-expr">x + 1 = x + 2</span>)',answer:['x+1=x+2','x=x+1','x+0=x+1','2x-2x=1'],display:'דוגמה: x + 1 = x + 2',explanation:'כל משוואה שנותנת סתירה (כמו <span class="math-expr">0 = 1</span>) לאחר פישוט — אין לה פתרון.',validate:function(val){
        /* Accept anything with x on both sides that simplifies to contradiction */
        return val.includes('x')&&val.includes('=');
      }});
    }
  }

  return qs;
}

function generateQuestions(level){
  if(level==='easy') return genEasy();
  if(level==='medium') return genMedium();
  if(level==='hard') return genHard();
  return genChallenge();
}

/* ===== PRACTICE RENDERING ===== */
function renderLevelTabs(){
  const container=document.getElementById('levelTabs');
  container.innerHTML='';
  ['easy','medium','hard','challenge'].forEach(lv=>{
    const btn=document.createElement('button');
    btn.className='level-tab'+(state.level===lv?' active':'');
    const done=scores[lv].filter(s=>s===1).length;
    const total=LEVEL_COUNTS[lv];
    btn.innerHTML=LEVEL_NAMES[lv]+(done>0?' <span class="tab-score">('+done+'/'+total+')</span>':'');
    btn.onclick=()=>switchLevel(lv);
    container.appendChild(btn);
  });
}

function switchLevel(lv){
  state.level=lv;state.qIndex=0;
  if(!questions[lv]) questions[lv]=generateQuestions(lv);
  if(!scores[lv].length) scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
  if(!answered[lv].length) answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  renderLevelTabs();renderQuestion();
}

function updateLevelProgress(){
  const lv=state.level;const total=LEVEL_COUNTS[lv];
  const done=answered[lv].filter(a=>a).length;
  document.getElementById('levelFill').style.width=(done/total*100)+'%';
  document.getElementById('levelText').textContent=done+' / '+total;
}

function renderQuestion(){
  const lv=state.level;const idx=state.qIndex;
  const qs=questions[lv];
  if(!qs) return;
  if(idx>=qs.length){renderLevelComplete();return}
  const q=qs[idx];
  const area=document.getElementById('questionArea');
  const isAnswered=answered[lv][idx];

  let html='<div class="q-card"><div class="q-number">שאלה '+(idx+1)+' מתוך '+qs.length+'</div>';
  html+='<div class="q-stem">'+q.stem+'</div>';

  if(q.type==='mc'){
    html+='<div class="q-options" id="qOpts">';
    q.options.forEach((opt,i)=>{
      const letter=LETTERS[i];
      let cls='q-opt';
      if(isAnswered){
        cls+=' disabled';
        if(i===q.answer) cls+=' correct';
        else if(scores[lv][idx]===0&&i===answered[lv][idx+'_sel']) cls+=' wrong';
      }
      html+='<div class="'+cls+'" data-i="'+i+'"><span class="q-opt-letter">'+letter+'</span><span dir="ltr" style="unicode-bidi:embed">'+opt+'</span></div>';
    });
    html+='</div>';
    if(!isAnswered) html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkMC()" disabled>בדקו</button>';
  } else if(q.type==='input'||q.type==='input-text'){
    html+='<div class="q-input-row"><input type="'+(q.type==='input'?'number':'text')+'" class="q-input" id="qInput" placeholder="תשובה" dir="ltr" aria-label="תשובה">';
    if(!isAnswered) html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkInput()">בדקו</button>';
    html+='</div>';
    if(isAnswered){
      const inp=q.type==='input'?q.answer:(q.display||q.answer[0]);
      html+='<div style="margin-top:4px;font-weight:700;direction:ltr">תשובה: '+inp+'</div>';
    }
  } else if(q.type==='multi'){
    html+='<div class="q-multi-opts" id="qMultiOpts">';
    q.options.forEach((opt,i)=>{
      let cls='q-multi-opt';
      if(isAnswered){
        cls+=' disabled';
        if(q.correctIndices.includes(i)) cls+=' correct';
        else if(answered[lv][idx+'_sels']&&answered[lv][idx+'_sels'].includes(i)) cls+=' wrong';
      }
      html+='<div class="'+cls+'" data-i="'+i+'"><span class="q-checkbox">'+(isAnswered&&q.correctIndices.includes(i)?'✓':'')+'</span><span dir="ltr" style="unicode-bidi:embed">'+opt+'</span></div>';
    });
    html+='</div>';
    if(!isAnswered) html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkMulti()">בדקו</button>';
  }

  if(isAnswered){
    const isCorrect=scores[lv][idx]===1;
    html+='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?'✅ נכון! ':'❌ ')+q.explanation+'</div>';
  }
  html+='<div id="qFeedback"></div></div>';
  area.innerHTML=html;

  /* Set up MC click handlers */
  if(q.type==='mc'&&!isAnswered){
    area.querySelectorAll('.q-opt').forEach(el=>{
      el.onclick=()=>{
        area.querySelectorAll('.q-opt').forEach(o=>o.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('qCheckBtn').disabled=false;
      };
    });
  }
  /* Set up multi-select click handlers */
  if(q.type==='multi'&&!isAnswered){
    area.querySelectorAll('.q-multi-opt').forEach(el=>{
      el.onclick=()=>{
        el.classList.toggle('checked');
        el.querySelector('.q-checkbox').textContent=el.classList.contains('checked')?'✓':'';
      };
    });
  }
  /* Set up input enter key */
  const inp=document.getElementById('qInput');
  if(inp&&!isAnswered){
    inp.focus();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkInput()});
  }

  updateLevelProgress();
  document.getElementById('qPrev').disabled=idx===0;
  document.getElementById('qNext').textContent=idx>=qs.length-1?'סיום':'הבא ←';
}

window.checkMC=function(){
  const lv=state.level;const idx=state.qIndex;const q=questions[lv][idx];
  const selected=document.querySelector('.q-opt.selected');
  if(!selected) return;
  const si=parseInt(selected.dataset.i);
  const isCorrect=si===q.answer;
  scores[lv][idx]=isCorrect?1:0;
  answered[lv][idx]=true;
  answered[lv][idx+'_sel']=si;

  document.querySelectorAll('.q-opt').forEach((el,i)=>{
    el.classList.add('disabled');el.onclick=null;
    if(i===q.answer) el.classList.add('correct');
    else if(i===si&&!isCorrect) el.classList.add('wrong');
  });
  document.getElementById('qCheckBtn').remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['✅ כל הכבוד!','✅ מעולה!','✅ נכון מאוד!','✅ יפה!'])+' ':'❌ לא נכון. ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();
};

window.checkInput=function(){
  const lv=state.level;const idx=state.qIndex;const q=questions[lv][idx];
  const inp=document.getElementById('qInput');
  const val=inp.value.trim();
  if(!val) return;
  let isCorrect=false;
  if(q.type==='input'){
    isCorrect=parseFloat(val)===q.answer;
  } else if(q.validate){
    isCorrect=q.validate(val);
  } else {
    const norm=val.replace(/\s+/g,'').toLowerCase();
    isCorrect=q.answer.some(a=>a.replace(/\s+/g,'').toLowerCase()===norm);
  }
  scores[lv][idx]=isCorrect?1:0;
  answered[lv][idx]=true;
  inp.classList.add(isCorrect?'correct':'wrong');
  inp.disabled=true;
  const btn=document.getElementById('qCheckBtn');if(btn)btn.remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['✅ כל הכבוד!','✅ מעולה!','✅ נכון!'])+' ':'❌ ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();
};

window.checkMulti=function(){
  const lv=state.level;const idx=state.qIndex;const q=questions[lv][idx];
  const opts=document.querySelectorAll('.q-multi-opt');
  const selected=[];
  opts.forEach((el,i)=>{if(el.classList.contains('checked'))selected.push(i)});
  const isCorrect=selected.length===q.correctIndices.length&&selected.every(s=>q.correctIndices.includes(s));
  scores[lv][idx]=isCorrect?1:0;
  answered[lv][idx]=true;
  answered[lv][idx+'_sels']=selected;

  opts.forEach((el,i)=>{
    el.classList.add('disabled');el.onclick=null;
    if(q.correctIndices.includes(i)){el.classList.add('correct');el.querySelector('.q-checkbox').textContent='✓'}
    else if(selected.includes(i)){el.classList.add('wrong')}
  });
  document.getElementById('qCheckBtn').remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['✅ כל הכבוד!','✅ מעולה!','✅ נכון!'])+' ':'❌ ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();
};

function nextQuestion(){
  const lv=state.level;
  if(state.qIndex>=questions[lv].length-1){renderLevelComplete();return}
  /* Auth check: Q1 (index 0) is free, Q2+ requires auth */
  if(state.qIndex>=0&&typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){
    if(typeof showAuthModal==='function')showAuthModal();
    return;
  }
  state.qIndex++;renderQuestion();
}
function prevQuestion(){if(state.qIndex>0){state.qIndex--;renderQuestion()}}

function renderLevelComplete(){
  const lv=state.level;
  const correct=scores[lv].filter(s=>s===1).length;
  const total=LEVEL_COUNTS[lv];
  const pct=Math.round(correct/total*100);
  const scoreClass=pct>=80?'':pct>=50?' medium-score':' low-score';
  const emoji=pct>=80?'🎉':pct>=50?'👏':'💪';

  document.getElementById('questionArea').innerHTML=`
    <div class="q-card"><div class="level-complete">
      <div class="big-emoji">${emoji}</div>
      <h2>סיימתם את רמת "${LEVEL_NAMES[lv]}"!</h2>
      <div class="score-display${scoreClass}">${correct} / ${total}</div>
      <p style="color:var(--text-light);margin-bottom:16px">${pct}% הצלחה</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="mini-btn" onclick="retryLevel()">🔄 נסו שוב</button>
        ${lv!=='challenge'?'<button class="mini-btn accent" onclick="nextLevel()">▶ לרמה הבאה</button>':''}
      </div>
    </div></div>`;

  if(pct>=80) showConfetti();
}

window.retryLevel=function(){
  const lv=state.level;
  scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
  answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  questions[lv]=generateQuestions(lv);
  state.qIndex=0;
  renderLevelTabs();renderQuestion();
};

window.nextLevel=function(){
  const order=['easy','medium','hard','challenge'];
  const ci=order.indexOf(state.level);
  if(ci<order.length-1) switchLevel(order[ci+1]);
};

/* ===== SECTION SWITCHING ===== */
function switchSection(sec){
  state.section=sec;
  document.querySelectorAll('.section-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.section===sec);
  });
  document.getElementById('learnSection').style.display=sec==='learn'?'block':'none';
  document.getElementById('practiceSection').style.display=sec==='practice'?'block':'none';
  if(sec==='practice'){
    if(!questions[state.level]) questions[state.level]=generateQuestions(state.level);
    if(!scores[state.level].length) scores[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(-1);
    if(!answered[state.level].length) answered[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(false);
    renderLevelTabs();renderQuestion();
  }
}

/* ===== CONFETTI ===== */
function showConfetti(){
  const box=document.getElementById('confettiBox');
  box.innerHTML='';
  const colors=['#1a2f5a','#4a9eda','#10b981','#ef4444','#8b5cf6','#ec4899'];
  for(let i=0;i<50;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(6+Math.random()*8)+'px';
    c.style.height=(6+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*1.5)+'s';
    box.appendChild(c);
  }
  setTimeout(()=>box.innerHTML='',5000);
}

/* ===== INIT ===== */
function init(){
  Object.keys(LEVEL_COUNTS).forEach(lv=>{
    if(!scores[lv]||!scores[lv].length) scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
    if(!answered[lv]||!answered[lv].length) answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  });
  renderStep(state.step);
  if(state.section==='practice') switchSection('practice');
}
init();
</script>
