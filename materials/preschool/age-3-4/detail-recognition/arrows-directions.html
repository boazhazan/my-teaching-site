<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>חיצים וכיוונים — השלימו את הדוגמה | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4ff;--card:#fff;--pri:#0984e3;--pri-l:#dfe6e9;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#0984e3,#74b9ff);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.legend{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;font-size:.85rem;font-weight:600;margin-top:8px;position:relative}
.legend span{display:inline-flex;align-items:center;gap:4px;opacity:0.95}
.legend svg{width:18px;height:18px}
.mb{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.mbtn{padding:8px 18px;border-radius:24px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.mbtn:hover{border-color:var(--pri)}.mbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#0984e3,#74b9ff);border-radius:10px;transition:width 0.5s}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.tb.err{border-color:var(--no)}.tb.err::after{content:'✗';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--no);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}.mc.bad{border-color:var(--no);background:var(--no-l)}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.9rem;color:var(--txt);font-weight:700}
.score-bar{display:flex;gap:12px;font-size:.88rem;font-weight:600;justify-content:center;margin-top:8px}
.score-ok{color:var(--ok)}.score-err{color:var(--no)}

/* Grid */
.grid-wrap{display:flex;justify-content:center;margin-bottom:16px}
.arrow-grid{display:inline-grid;gap:6px;background:var(--card);padding:16px;border-radius:var(--r);box-shadow:var(--sh)}
.cell{width:64px;height:64px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;background:#f8fafc;border:2px solid var(--brd);position:relative;transition:all .25s;user-select:none}
.cell svg{width:38px;height:38px;transition:transform .2s}
.cell.empty-cell{border:2.5px dashed #94a3b8;background:#fefce8;cursor:pointer}
.cell.empty-cell .q-mark{font-size:1.6rem;font-weight:700;color:#94a3b8}
.cell.empty-cell.selected{border-color:var(--pri);background:var(--pri-l);box-shadow:0 0 0 3px rgba(9,132,227,.25)}
.cell.empty-cell.draw-mode{touch-action:none}
.cell.filled-correct{border-color:var(--ok);background:var(--ok-l)}
.cell.filled-correct svg{color:var(--ok)}
.cell.filled-wrong{border-color:var(--no);background:var(--no-l)}

/* Direction buttons */
.dir-buttons{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.dir-btn{width:60px;height:60px;border-radius:14px;border:2px solid var(--brd);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:0}
.dir-btn:hover{border-color:var(--pri);background:var(--pri-l);transform:scale(1.08)}
.dir-btn:active{transform:scale(.95)}
.dir-btn svg{width:32px;height:32px;color:var(--txt)}
.dir-btn[data-dir="0"]{background:#dbeafe}.dir-btn[data-dir="1"]{background:#fef3c7}
.dir-btn[data-dir="2"]{background:#fce7f3}.dir-btn[data-dir="3"]{background:#d1fae5}

/* Completion card */
.ld{background:linear-gradient(135deg,#0984e3,#74b9ff);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .stats{display:flex;justify-content:center;gap:20px;margin:12px 0;font-size:1.1rem;font-weight:700}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}

/* Summary */
.summary-screen{display:none;background:var(--card);border-radius:var(--r);padding:24px;box-shadow:var(--sh);text-align:center;animation:fi 0.4s}
.summary-screen.show{display:block}
.summary-screen h2{font-family:'Rubik','Heebo',sans-serif;font-size:1.3rem;margin-bottom:12px}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.summary-cell{width:100%;aspect-ratio:1;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:.88rem;font-weight:700;cursor:pointer;border:2px solid var(--brd);transition:all .2s}
.summary-cell:hover{transform:scale(1.05)}
.summary-cell.s-ok{background:var(--ok-l);border-color:var(--ok);color:#065f46}
.summary-cell.s-err{background:var(--no-l);border-color:var(--no);color:#991b1b}
.summary-cell.s-skip{background:#f1f5f9;color:var(--txt2)}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes glow{0%{box-shadow:0 0 0 0 rgba(39,174,96,.5)}70%{box-shadow:0 0 0 10px rgba(39,174,96,0)}100%{box-shadow:0 0 0 0 rgba(39,174,96,0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.cell.shake{animation:shake .4s ease}.cell.glow{animation:glow .6s ease}

/* Print */
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}.mb,.ps,.tw,.acts,.ld,.dir-buttons,.score-bar,.summary-screen{display:none!important}.ct{padding:8px 0}.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.arrow-grid{box-shadow:none;border:1px solid #ccc}.cell{border:1px solid #999!important;background:#fff!important}.cell.empty-cell{border:2px dashed #333!important;background:#fff!important}.cell svg{color:#000!important}.cell.filled-correct,.cell.filled-wrong{background:#fff!important;border-color:#999!important}.ph{display:block!important}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}

/* Responsive */
@media(max-width:600px){.hd h1{font-size:1.5rem}.mc{padding:16px 12px}.mbtn{padding:6px 12px;font-size:0.8rem}.tb{padding:6px 12px;font-size:0.75rem}.cell{width:52px;height:52px}.cell svg{width:30px;height:30px}.cell .q-mark{font-size:1.3rem}.dir-btn{width:52px;height:52px}.dir-btn svg{width:26px;height:26px}.legend{font-size:.75rem;gap:10px}.summary-grid{grid-template-columns:repeat(5,1fr)}}
</style>
</head>
<body>
<div class="hd">
  <h1>🧭 חיצים וכיוונים</h1>
  <p>השלימו את החץ החסר בדוגמה!</p>
  <div class="legend">
    <span><svg viewBox="0 0 40 40"><path d="M20 6L33 22H25v14H15V22H7Z" fill="currentColor"/></svg> למעלה</span>
    <span><svg viewBox="0 0 40 40"><path d="M20 34L7 18h8V4h10v14h8Z" fill="currentColor"/></svg> למטה</span>
    <span><svg viewBox="0 0 40 40"><path d="M34 20L18 7v8H4v10h14v8Z" fill="currentColor"/></svg> לימין</span>
    <span><svg viewBox="0 0 40 40"><path d="M6 20L22 7v8h14v10H22v8Z" fill="currentColor"/></svg> לשמאל</span>
  </div>
</div>
<div class="mb">
  <button class="mbtn on" id="mClick" data-mode="click">👆 לחיצה</button>
  <button class="mbtn" id="mDraw" data-mode="draw">✏️ ציור</button>
  <button class="mbtn" id="mPrint" data-mode="print">🖨️ הדפסה</button>
</div>
<div class="ps"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div></div></div>
<div class="tw"><div class="ts" id="levelTabs"></div></div>
<div class="ct">
  <div class="ph">🧭 חיצים וכיוונים — השלימו את הדוגמה</div>
  <div class="mc" id="mainCard">
    <div class="mh"><div class="mn" id="lvNum">1</div><span class="mht" id="lvTitle">השלימו את החץ החסר</span></div>
    <div class="grid-wrap"><div class="arrow-grid" id="arrowGrid"></div></div>
    <div class="dir-buttons" id="dirButtons">
      <button class="dir-btn" data-dir="0"><svg viewBox="0 0 40 40"><path d="M20 6L33 22H25v14H15V22H7Z" fill="currentColor"/></svg></button>
      <button class="dir-btn" data-dir="2"><svg viewBox="0 0 40 40"><path d="M20 34L7 18h8V4h10v14h8Z" fill="currentColor"/></svg></button>
      <button class="dir-btn" data-dir="3"><svg viewBox="0 0 40 40"><path d="M6 20L22 7v8h14v10H22v8Z" fill="currentColor"/></svg></button>
      <button class="dir-btn" data-dir="1"><svg viewBox="0 0 40 40"><path d="M34 20L18 7v8H4v10h14v8Z" fill="currentColor"/></svg></button>
    </div>
    <div class="score-bar">
      <span class="score-ok">✅ <span id="okCount">0</span></span>
      <span class="score-err">❌ <span id="errCount">0</span></span>
    </div>
  </div>

  <div class="ld" id="levelDone">
    <div class="big" id="compEmoji">🌟</div>
    <h2 id="compTitle">מושלם!</h2>
    <p id="compMsg">כל החיצים במקום הנכון!</p>
    <div class="stats"><span>✅ <span id="compOk">0</span></span><span>❌ <span id="compErr">0</span></span></div>
    <div class="acts">
      <button class="btn bw" id="compNext">➡️ לשלב הבא</button>
      <button class="btn bo" onclick="window.print()">🖨️ הדפס</button>
    </div>
  </div>

  <div class="summary-screen" id="summaryScreen">
    <h2>🏆 סיכום</h2>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="acts" id="redoButtons"></div>
  </div>
</div>

<script>
(function(){
// --- Arrow SVGs ---
var ARROW_SVGS = [
  '<svg viewBox="0 0 40 40"><path d="M20 6L33 22H25v14H15V22H7Z" fill="currentColor"/></svg>',
  '<svg viewBox="0 0 40 40"><path d="M34 20L18 7v8H4v10h14v8Z" fill="currentColor"/></svg>',
  '<svg viewBox="0 0 40 40"><path d="M20 34L7 18h8V4h10v14h8Z" fill="currentColor"/></svg>',
  '<svg viewBox="0 0 40 40"><path d="M6 20L22 7v8h14v10H22v8Z" fill="currentColor"/></svg>'
]; // 0=up,1=right,2=down,3=left

function rand(n){return Math.floor(Math.random()*n)}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=rand(i+1);var t=a[i];a[i]=a[j];a[j]=t}return a}
function pickN(arr,n){var copy=arr.slice();shuffle(copy);return copy.slice(0,n)}

// --- Pattern generators ---
function genUniform(rows,cols){var d=rand(4),g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=d}return g}
function genRowUniform(rows,cols){var dirs=shuffle([0,1,2,3]).slice(0,rows),g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=dirs[r%dirs.length]}return g}
function genRowAlternate(rows,cols){var d1=rand(4),d2=(d1+2)%4,g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(c%2===0)?d1:d2}return g}
function genColAlternate(rows,cols){var d1=rand(4),d2=(d1+2)%4,g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(r%2===0)?d1:d2}return g}
function genCheckerboard(rows,cols){var d1=rand(4),d2=(d1+2)%4,g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=((r+c)%2===0)?d1:d2}return g}
function genRowRotate(rows,cols){var start=rand(4),g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(start+r)%4}return g}
function genColUniform(rows,cols){var dirs=shuffle([0,1,2,3]).slice(0,cols),g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=dirs[c%dirs.length]}return g}
function genColRotate(rows,cols){var start=rand(4),g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(start+c)%4}return g}
function genDiagonal(rows,cols){var start=rand(4),g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(start+r+c)%4}return g}
function genMirrorRows(rows,cols){var d1=rand(4),d2=(d1+2)%4,g=[];for(var r=0;r<rows;r++){g[r]=[];var half=Math.floor(cols/2);for(var c=0;c<cols;c++)g[r][c]=(c<half)?d1:d2}return g}
function genSpiral(rows,cols){var start=rand(4),g=[];for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++){var ring=Math.min(r,c,rows-1-r,cols-1-c);g[r][c]=(start+ring)%4}}return g}

// --- Level definitions ---
var LEVELS=[
  {rows:3,cols:3,empties:1,gen:genUniform},
  {rows:3,cols:3,empties:1,gen:genUniform},
  {rows:3,cols:3,empties:1,gen:genRowUniform},
  {rows:3,cols:4,empties:1,gen:genRowAlternate},
  {rows:3,cols:4,empties:1,gen:genColAlternate},
  {rows:3,cols:4,empties:1,gen:genCheckerboard},
  {rows:4,cols:4,empties:2,gen:genRowUniform},
  {rows:4,cols:4,empties:2,gen:genRowAlternate},
  {rows:4,cols:4,empties:2,gen:genRowRotate},
  {rows:4,cols:4,empties:2,gen:genColUniform},
  {rows:4,cols:4,empties:2,gen:genColAlternate},
  {rows:4,cols:4,empties:2,gen:genColRotate},
  {rows:4,cols:4,empties:3,gen:genCheckerboard},
  {rows:4,cols:4,empties:3,gen:genDiagonal},
  {rows:4,cols:4,empties:3,gen:genSpiral}
];

// --- State ---
var currentLevel=0,mode='click',grids=[],emptyMap=[],answers=[],levelDoneArr=[],selectedCell=null,okTotal=0,errTotal=0;

function initLevels(){
  grids=[];emptyMap=[];answers=[];levelDoneArr=[];
  for(var i=0;i<LEVELS.length;i++){
    var L=LEVELS[i],g=L.gen(L.rows,L.cols);
    grids.push(g);
    var allCells=[];
    for(var r=0;r<L.rows;r++)for(var c=0;c<L.cols;c++)allCells.push({r:r,c:c});
    var empties=pickN(allCells,L.empties);
    emptyMap.push(empties);
    var ans=[];
    for(var e=0;e<empties.length;e++)ans.push({r:empties[e].r,c:empties[e].c,correct:g[empties[e].r][empties[e].c],answered:false,userDir:-1,isCorrect:false});
    answers.push(ans);
    levelDoneArr.push(false);
  }
}

function buildTabs(){
  var wrap=document.getElementById('levelTabs');wrap.innerHTML='';
  for(var i=0;i<LEVELS.length;i++){
    var b=document.createElement('button');
    b.className='tb'+(i===currentLevel?' on':'');
    b.textContent=(i+1);
    b.dataset.idx=i;
    if(levelDoneArr[i]){
      var hasErr=answers[i].some(function(a){return a.answered&&!a.isCorrect});
      b.classList.add(hasErr?'err':'dn');
    }
    wrap.appendChild(b);
  }
  setTimeout(function(){var a=wrap.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100);
}

function updateProgress(){
  var done=0;for(var i=0;i<levelDoneArr.length;i++)if(levelDoneArr[i])done++;
  var pct=Math.round(done/LEVELS.length*100);
  document.getElementById('pf').style.width=pct+'%';
}

function renderGrid(){
  var L=LEVELS[currentLevel],g=grids[currentLevel],emp=emptyMap[currentLevel],ans=answers[currentLevel];
  var grid=document.getElementById('arrowGrid');
  var sz=(window.innerWidth<=600)?52:64;
  grid.style.gridTemplateColumns='repeat('+L.cols+','+sz+'px)';
  grid.innerHTML='';
  document.getElementById('lvNum').textContent=(currentLevel+1);
  document.getElementById('lvTitle').textContent='השלימו '+emp.length+' חיצים חסרים';

  for(var r=0;r<L.rows;r++){
    for(var c=0;c<L.cols;c++){
      var cell=document.createElement('div');
      cell.className='cell';cell.dataset.r=r;cell.dataset.c=c;
      cell.style.width=sz+'px';cell.style.height=sz+'px';
      var emptyIdx=-1;
      for(var e=0;e<emp.length;e++){if(emp[e].r===r&&emp[e].c===c){emptyIdx=e;break}}
      if(emptyIdx>=0){
        var a=ans[emptyIdx];
        if(a.answered){
          cell.innerHTML=ARROW_SVGS[a.userDir];
          cell.classList.add(a.isCorrect?'filled-correct':'filled-wrong');
        } else {
          cell.classList.add('empty-cell');
          if(mode==='draw')cell.classList.add('draw-mode');
          cell.innerHTML='<span class="q-mark">?</span>';
          cell.dataset.emptyIdx=emptyIdx;
        }
      } else {
        cell.innerHTML=ARROW_SVGS[g[r][c]];
      }
      grid.appendChild(cell);
    }
  }
}

function updateScore(){
  document.getElementById('okCount').textContent=okTotal;
  document.getElementById('errCount').textContent=errTotal;
}

function selectLevel(idx){
  currentLevel=idx;selectedCell=null;
  document.getElementById('mainCard').style.display='';
  document.getElementById('mainCard').className='mc';
  document.getElementById('levelDone').classList.remove('show');
  document.getElementById('summaryScreen').classList.remove('show');
  buildTabs();updateProgress();
  if(levelDoneArr[idx]&&allLevelsDone()){showSummary()}
  else{renderGrid()}
  updateScore();
}

function tryAnswer(dir){
  if(selectedCell===null)return;
  var ans=answers[currentLevel],a=ans[selectedCell];
  if(a.answered)return;
  a.answered=true;a.userDir=dir;a.isCorrect=(dir===a.correct);
  if(a.isCorrect)okTotal++;else errTotal++;
  updateScore();

  var cells=document.getElementById('arrowGrid').querySelectorAll('.cell');
  var targetCell=null;
  for(var i=0;i<cells.length;i++){if(parseInt(cells[i].dataset.r)===a.r&&parseInt(cells[i].dataset.c)===a.c){targetCell=cells[i];break}}
  if(targetCell){
    targetCell.innerHTML=ARROW_SVGS[dir];
    targetCell.classList.remove('empty-cell','selected','draw-mode');
    if(a.isCorrect){targetCell.classList.add('filled-correct','glow')}
    else{targetCell.classList.add('filled-wrong','shake')}
  }
  selectedCell=null;

  var allDone=ans.every(function(x){return x.answered});
  if(allDone){
    levelDoneArr[currentLevel]=true;
    var hasErr=ans.some(function(x){return!x.isCorrect});
    var card=document.getElementById('mainCard');
    card.classList.add(hasErr?'bad':'ok');
    buildTabs();updateProgress();
    setTimeout(function(){showCompletion()},600);
  }
}

function showCompletion(){
  var ans=answers[currentLevel];
  var ok=ans.filter(function(a){return a.isCorrect}).length;
  var err=ans.length-ok;
  var pct=Math.round(ok/ans.length*100);
  var emoji,title,msg;
  if(pct===100){emoji='\u{1F31F}';title='מושלם!';msg='כל החיצים במקום הנכון!'}
  else if(pct>=50){emoji='\u{1F44D}';title='כל הכבוד!';msg='רוב החיצים נכונים!'}
  else{emoji='\u{1F4AA}';title='נסו שוב!';msg='תרגול עושה מאסטר!'}

  document.getElementById('compEmoji').textContent=emoji;
  document.getElementById('compTitle').textContent=title;
  document.getElementById('compMsg').textContent=msg;
  document.getElementById('compOk').textContent=ok;
  document.getElementById('compErr').textContent=err;

  var nextBtn=document.getElementById('compNext');
  if(currentLevel<LEVELS.length-1){
    nextBtn.textContent='\u27A1\uFE0F לשלב הבא';
    nextBtn.onclick=function(){document.getElementById('levelDone').classList.remove('show');selectLevel(currentLevel+1)};
  } else if(allLevelsDone()){
    nextBtn.textContent='\u{1F3C6} לסיכום';
    nextBtn.onclick=function(){document.getElementById('levelDone').classList.remove('show');showSummary()};
  } else {
    nextBtn.textContent='המשך';
    nextBtn.onclick=function(){document.getElementById('levelDone').classList.remove('show')};
  }
  document.getElementById('levelDone').classList.add('show');
}

function allLevelsDone(){return levelDoneArr.every(function(d){return d})}

function showSummary(){
  document.getElementById('mainCard').style.display='none';
  var sg=document.getElementById('summaryGrid');sg.innerHTML='';
  for(var i=0;i<LEVELS.length;i++){
    var d=document.createElement('div');
    d.className='summary-cell';d.textContent=(i+1);d.dataset.idx=i;
    if(!levelDoneArr[i])d.classList.add('s-skip');
    else{var hasErr=answers[i].some(function(a){return a.answered&&!a.isCorrect});d.classList.add(hasErr?'s-err':'s-ok')}
    sg.appendChild(d);
  }
  var rb=document.getElementById('redoButtons');rb.innerHTML='';
  var hasErr=false,hasSkip=false;
  for(var i=0;i<LEVELS.length;i++){
    if(!levelDoneArr[i])hasSkip=true;
    if(levelDoneArr[i]&&answers[i].some(function(a){return!a.isCorrect}))hasErr=true;
  }
  if(hasErr){var b=document.createElement('button');b.className='btn bo';b.textContent='\u274C חזרו על שגיאות';b.onclick=function(){redoFiltered('err')};rb.appendChild(b)}
  if(hasSkip){var b=document.createElement('button');b.className='btn bo';b.textContent='\u23ED\uFE0F דילוגים';b.onclick=function(){redoFiltered('skip')};rb.appendChild(b)}
  var b2=document.createElement('button');b2.className='btn bw';b2.textContent='\u2728 התחלה מחדש';b2.onclick=function(){resetAll()};rb.appendChild(b2);
  document.getElementById('summaryScreen').classList.add('show');
}

function redoFiltered(type){
  for(var i=0;i<LEVELS.length;i++){
    var shouldRedo=false;
    if(type==='err'&&levelDoneArr[i]&&answers[i].some(function(a){return!a.isCorrect}))shouldRedo=true;
    if(type==='skip'&&!levelDoneArr[i])shouldRedo=true;
    if(type==='both'&&(!levelDoneArr[i]||(levelDoneArr[i]&&answers[i].some(function(a){return!a.isCorrect}))))shouldRedo=true;
    if(shouldRedo){
      levelDoneArr[i]=false;
      var emp=emptyMap[i],g=grids[i];answers[i]=[];
      for(var e=0;e<emp.length;e++)answers[i].push({r:emp[e].r,c:emp[e].c,correct:g[emp[e].r][emp[e].c],answered:false,userDir:-1,isCorrect:false});
    }
  }
  for(var i=0;i<LEVELS.length;i++){if(!levelDoneArr[i]){selectLevel(i);return}}
}

function resetAll(){okTotal=0;errTotal=0;initLevels();selectLevel(0)}

// --- Event handlers ---
document.getElementById('levelTabs').addEventListener('click',function(e){
  var tab=e.target.closest('.tb');if(tab)selectLevel(parseInt(tab.dataset.idx));
});
document.getElementById('summaryGrid').addEventListener('click',function(e){
  var cell=e.target.closest('.summary-cell');if(cell)selectLevel(parseInt(cell.dataset.idx));
});

// Mode toggle
document.querySelector('.mb').addEventListener('click',function(e){
  var btn=e.target.closest('.mbtn');if(!btn)return;
  var m=btn.dataset.mode;
  if(m==='print'){window.print();return}
  mode=m;selectedCell=null;
  document.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  renderGrid();
  document.getElementById('dirButtons').style.display=(mode==='click')?'flex':'none';
});

// Click mode: select empty cell
document.getElementById('arrowGrid').addEventListener('click',function(e){
  if(mode!=='click')return;
  var cell=e.target.closest('.cell.empty-cell');if(!cell)return;
  document.querySelectorAll('.cell.selected').forEach(function(c){c.classList.remove('selected')});
  cell.classList.add('selected');
  selectedCell=parseInt(cell.dataset.emptyIdx);
});

// Click mode: direction button
document.getElementById('dirButtons').addEventListener('click',function(e){
  var btn=e.target.closest('.dir-btn');if(!btn||mode!=='click')return;
  tryAnswer(parseInt(btn.dataset.dir));
});

// Draw mode: pointer events
var drawState={active:false,startX:0,startY:0,cellIdx:-1};
document.getElementById('arrowGrid').addEventListener('pointerdown',function(e){
  if(mode!=='draw')return;
  var cell=e.target.closest('.cell.empty-cell');if(!cell)return;
  e.preventDefault();
  drawState.active=true;drawState.startX=e.clientX;drawState.startY=e.clientY;
  drawState.cellIdx=parseInt(cell.dataset.emptyIdx);
  cell.classList.add('selected');selectedCell=drawState.cellIdx;
},{passive:false});
document.addEventListener('pointermove',function(e){if(!drawState.active)return;e.preventDefault()},{passive:false});
document.addEventListener('pointerup',function(e){
  if(!drawState.active)return;drawState.active=false;
  var dx=e.clientX-drawState.startX,dy=e.clientY-drawState.startY;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<15){document.querySelectorAll('.cell.selected').forEach(function(c){c.classList.remove('selected')});selectedCell=null;return}
  var dir;
  if(Math.abs(dx)>Math.abs(dy)){dir=dx>0?1:3}else{dir=dy>0?2:0}
  selectedCell=drawState.cellIdx;tryAnswer(dir);
});

// Responsive resize
window.addEventListener('resize',function(){renderGrid()});

// --- Start ---
initLevels();buildTabs();renderGrid();updateScore();updateProgress();
document.getElementById('dirButtons').style.display='flex';

})();
</script>
</body>
</html>
