<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מספר וכמות | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0ff;--card:#fff;--pri:#6c5ce7;--pri-l:#ede9fe;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.mb{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.mbtn{padding:8px 18px;border-radius:24px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.mbtn:hover{border-color:var(--pri)}.mbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#a29bfe);border-radius:10px;transition:width 0.5s}
.pss{display:flex;gap:16px}.ps2{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.hb{text-align:center;padding:8px;background:#fff3cd;color:#856404;font-weight:600;font-size:0.9rem;display:none}.hb.show{display:block}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}.mc.bad{border-color:var(--no);background:var(--no-l)}
.mc.dw{touch-action:none}.mc .dc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;border-radius:var(--r)}.mc.done .dc{display:none}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.85rem;color:var(--txt2);font-weight:500}
.num-center{text-align:center;margin:16px 0}
.num-big{display:inline-flex;align-items:center;justify-content:center;width:100px;height:100px;border-radius:50%;background:var(--pri);color:#fff;font-family:'Rubik','Heebo',sans-serif;font-size:3.5rem;font-weight:900;box-shadow:0 6px 20px rgba(108,92,231,0.3)}
.circles-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;padding:10px 0}
.circ{display:inline-flex;flex-wrap:wrap;justify-content:center;align-content:center;gap:2px;width:130px;height:130px;border-radius:50%;border:3px solid var(--brd);cursor:pointer;transition:all 0.25s;-webkit-user-select:none;user-select:none;padding:14px;position:relative;background:var(--card)}
.circ:hover:not(.done){border-color:var(--pri);background:var(--pri-l);transform:scale(1.06)}
.circ:active:not(.done){transform:scale(0.95)}
.circ.ok-pick{border-color:var(--ok);background:var(--ok-l);box-shadow:0 0 0 3px rgba(39,174,96,0.2)}
.circ.ok-pick::after{content:'✓';position:absolute;top:-6px;right:-6px;width:22px;height:22px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.7rem;display:flex;align-items:center;justify-content:center;animation:pop 0.3s}
.circ.no-pick{border-color:var(--no);background:var(--no-l);animation:shake 0.5s}
.circ.done{cursor:default;opacity:0.5}.circ.ok-pick.done{opacity:1}
.circ .ce{font-size:1.15rem;line-height:1}
.circ.circled::before{content:'';position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px;border:4px solid var(--ok);border-radius:50%;z-index:12;animation:cpop 0.4s ease forwards}
@keyframes cpop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05);opacity:1}100%{transform:scale(1);opacity:1}}
.ccnt{text-align:center;font-size:0.85rem;color:var(--txt2);margin-top:10px;font-weight:600}
.cfb{text-align:center;margin-top:8px;font-weight:700;font-size:0.95rem;min-height:22px;opacity:0;transition:opacity 0.3s}.cfb.show{opacity:1}.cfb.ok{color:var(--ok)}.cfb.bad{color:var(--no)}
.ld{background:linear-gradient(135deg,var(--pri),#a29bfe);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .sc{font-size:2.2rem;font-weight:900;margin:12px 0}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}.mb,.ps,.tw,.acts,.ld,.hb,.ccnt,.cfb{display:none!important}.ct{padding:8px 0}.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.circ{border-color:#999}.dc{display:none!important}.ph{display:block!important}.plh{display:block!important;text-align:center;color:#666;font-size:0.8rem;margin-top:8px}}.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}.plh{display:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.mc{padding:16px 12px}.mbtn{padding:6px 12px;font-size:0.8rem}.tb{padding:6px 12px;font-size:0.75rem}.circ{width:100px;height:100px;padding:10px}.circ .ce{font-size:1rem}.num-big{width:80px;height:80px;font-size:2.8rem}.circles-grid{gap:10px}}
@media(max-width:380px){.circ{width:85px;height:85px;padding:8px}.circ .ce{font-size:0.9rem}}
</style>
</head>
<body>
<div class="hd"><h1>🔢 מספר וכמות</h1><p>מצאו את כל העיגולים עם הכמות שמתאימה למספר!</p></div>
<div class="mb nopr"><button class="mbtn on" onclick="setM('click')" id="mc1"><span>👆</span> לחיצה</button><button class="mbtn" onclick="setM('draw')" id="mc2"><span>✏️</span> קו חיבור</button><button class="mbtn" onclick="window.print()"><span>🖨️</span> הדפסה</button></div>
<div class="ps nopr"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pss"><span class="ps2" style="color:var(--ok)">✅ <span id="g1">0</span></span><span class="ps2" style="color:var(--no)">❌ <span id="g2">0</span></span></div></div></div>
<div class="tw nopr"><div class="ts" id="tabs"></div></div>
<div class="hb" id="hb">✏️ ציירו קו מהמספר לכל עיגול עם הכמות הנכונה!</div>
<div class="ct" id="area"></div>
<script>
const LV=[
{id:1,t:'מספר 3',num:3,circles:[
  {e:'✂️',n:3},{e:'🐱',n:2},{e:'🌸',n:3},{e:'🐶',n:4},{e:'🦋',n:5},{e:'🍌',n:3},{e:'🎂',n:2},{e:'🍎',n:1}
]},
{id:2,t:'מספר 1',num:1,circles:[
  {e:'👗',n:1},{e:'🐝',n:2},{e:'🦁',n:1},{e:'🏀',n:3},{e:'🐴',n:1},{e:'🐧',n:4},{e:'🎈',n:2},{e:'🔔',n:5}
]},
{id:3,t:'מספר 5',num:5,circles:[
  {e:'🍎',n:5},{e:'🐱',n:4},{e:'🐭',n:3},{e:'🍊',n:5},{e:'✏️',n:6},{e:'🌲',n:5},{e:'🔨',n:3},{e:'🎁',n:1}
]},
{id:4,t:'מספר 2',num:2,circles:[
  {e:'🐦',n:2},{e:'🌸',n:3},{e:'🍇',n:1},{e:'🐟',n:2},{e:'⭐',n:4},{e:'🍎',n:2},{e:'🎈',n:5},{e:'🐱',n:3}
]},
{id:5,t:'מספר 4',num:4,circles:[
  {e:'🔔',n:3},{e:'🐶',n:4},{e:'🍌',n:2},{e:'🐟',n:4},{e:'🐝',n:4},{e:'🌸',n:1},{e:'🎾',n:2},{e:'🏈',n:5}
]},
{id:6,t:'מספר 7',num:7,circles:[
  {e:'🐟',n:7},{e:'🍌',n:5},{e:'🦋',n:7},{e:'🔔',n:4},{e:'🐶',n:6},{e:'🌲',n:7},{e:'🎾',n:8},{e:'👕',n:3}
]},
{id:7,t:'מספר 6',num:6,circles:[
  {e:'🐱',n:6},{e:'🍎',n:4},{e:'🌸',n:6},{e:'🚗',n:3},{e:'⚽',n:5},{e:'🐝',n:6},{e:'🎈',n:7},{e:'✂️',n:2}
]},
{id:8,t:'מספר 9',num:9,circles:[
  {e:'🏀',n:9},{e:'🐬',n:7},{e:'🍕',n:9},{e:'🔨',n:6},{e:'🦀',n:8},{e:'✈️',n:9},{e:'🐙',n:5},{e:'🎹',n:10}
]},
{id:9,t:'מספר 8',num:8,circles:[
  {e:'⭐',n:8},{e:'🐸',n:6},{e:'🍇',n:8},{e:'🚌',n:5},{e:'🎸',n:7},{e:'🌻',n:8},{e:'🐞',n:4},{e:'🥁',n:9}
]},
{id:10,t:'מספר 10',num:10,circles:[
  {e:'🌸',n:10},{e:'🐱',n:8},{e:'⚽',n:10},{e:'🍩',n:7},{e:'🐝',n:9},{e:'🎈',n:10},{e:'🔑',n:6},{e:'🐟',n:5}
]},
{id:11,t:'חזרה — 2',num:2,circles:[
  {e:'🎁',n:2},{e:'🐴',n:5},{e:'🍊',n:2},{e:'🦋',n:3},{e:'🔔',n:4},{e:'🧁',n:2},{e:'🐧',n:1},{e:'✂️',n:6}
]},
{id:12,t:'חזרה — 6',num:6,circles:[
  {e:'🐶',n:6},{e:'🍌',n:4},{e:'🌲',n:6},{e:'🎾',n:3},{e:'🐝',n:7},{e:'👟',n:6},{e:'🚗',n:5},{e:'🍄',n:2}
]},
{id:13,t:'חזרה — 8',num:8,circles:[
  {e:'🌻',n:8},{e:'🐟',n:6},{e:'⭐',n:8},{e:'🍕',n:5},{e:'🎸',n:7},{e:'🐞',n:8},{e:'🐬',n:9},{e:'🏀',n:4}
]},
{id:14,t:'אתגר — 11',num:11,circles:[
  {e:'🐱',n:11},{e:'🍎',n:9},{e:'🌸',n:10},{e:'⚽',n:11},{e:'🎈',n:8},{e:'🐝',n:12},{e:'✂️',n:11},{e:'🐟',n:7}
]},
{id:15,t:'אתגר — 12',num:12,circles:[
  {e:'🦋',n:12},{e:'🐶',n:10},{e:'🍌',n:11},{e:'🌲',n:12},{e:'🎾',n:9},{e:'🔨',n:8},{e:'🐸',n:12},{e:'👕',n:7}
]}
];

let cur=0,md='click',g1=0,g2=0,res={};
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
const E1=['!מעולה 🔢','!ספירה מושלמת ⭐','!יופי 👏','!מדהים 🌟'];

function rTabs(){const lk=(typeof AuthState!=='undefined'&&!AuthState.isLoggedIn());const el=document.getElementById('tabs');el.innerHTML=LV.map((l,i)=>`<button class="tb ${i===cur?'on':''} ${res[l.id]?'dn':''}" onclick="go(${i})">${l.t}${lk&&i>0?' 🔒':''}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}

function rLv(){
const lv=LV[cur],ar=document.getElementById('area'),isDw=md==='draw';
const shuffled=sh(lv.circles);
const need=shuffled.filter(c=>c.n===lv.num).length;

let h=`<div class="ph">🔢 מספר וכמות — ${lv.t}</div>`;
h+=`<div class="mc ${isDw?'dw':''}" id="q0" data-need="${need}" data-found="0" data-wrong="0">`;
if(isDw) h+=`<canvas class="dc" id="cv0"></canvas>`;
h+=`<div class="mh"><div class="mn">🔢</div><span class="mht">💡 מצאו את כל העיגולים עם בדיוק ${lv.num} פריטים</span></div>`;
h+=`<div class="num-center"><div class="num-big">${lv.num}</div></div>`;
h+=`<div class="circles-grid">`;
shuffled.forEach((c,i)=>{
  let emojis='';for(let j=0;j<c.n;j++) emojis+=`<span class="ce">${c.e}</span>`;
  h+=`<div class="circ" data-correct="${c.n===lv.num}" data-idx="${i}" ${md==='click'?'onclick="pick(this)"':''}>${emojis}</div>`;
});
h+=`</div>`;
h+=`<div class="ccnt" id="cnt0">0 / ${need} נמצאו</div>`;
h+=`<div class="cfb" id="fb0"></div>`;
h+=`<div class="plh">מתחו קו מהמספר לכל עיגול עם הכמות הנכונה</div>`;
h+=`</div>`;

h+=`<div class="ld" id="ld"><div class="big">🔢</div><h2 id="lt"></h2><p id="ls"></p><div class="sc" id="lsc"></div><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<LV.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;

ar.innerHTML=h;
if(isDw) initDraw();
rTabs();uPr();
}

function pick(el){
  if(el.classList.contains('done'))return;
  const card=document.getElementById('q0');
  if(el.dataset.correct==='true'){
    el.classList.add('ok-pick','done');g1++;
    card.dataset.found=parseInt(card.dataset.found)+1;checkDone();
  } else {
    el.classList.add('no-pick');g2++;card.dataset.wrong=parseInt(card.dataset.wrong)+1;
    setTimeout(()=>el.classList.remove('no-pick'),600);
  }
  uPr();
}

function checkDone(){
  const card=document.getElementById('q0');
  const found=parseInt(card.dataset.found),need=parseInt(card.dataset.need);
  document.getElementById('cnt0').textContent=found+' / '+need+' נמצאו';
  if(found>=need){
    const w=parseInt(card.dataset.wrong),fb=document.getElementById('fb0');
    if(w===0){card.classList.add('ok');fb.textContent=E1[Math.floor(Math.random()*E1.length)];fb.classList.add('ok','show')}
    else{card.classList.add('bad');fb.textContent=`מצאתם הכל עם ${w} טעויות 💪`;fb.classList.add('bad','show')}
    card.classList.add('done');card.querySelectorAll('.circ:not(.ok-pick)').forEach(c=>c.classList.add('done'));
    setTimeout(showD,600);
  }
}

function initDraw(){
  document.getElementById('hb').classList.add('show');
  const card=document.getElementById('q0');const cv=document.getElementById('cv0');
  if(!cv)return;cv.width=card.offsetWidth;cv.height=card.offsetHeight;
  const ctx=cv.getContext('2d');let dw=false,pts=[];
  cv.addEventListener('pointerdown',function(e){if(card.classList.contains('done'))return;e.preventDefault();e.stopPropagation();dw=true;pts=[];ctx.clearRect(0,0,cv.width,cv.height);const r=cv.getBoundingClientRect();ctx.beginPath();ctx.moveTo(e.clientX-r.left,e.clientY-r.top);ctx.strokeStyle='#6c5ce7';ctx.lineWidth=4;ctx.lineCap='round';ctx.setLineDash([8,6]);pts.push({cx:e.clientX,cy:e.clientY})},{passive:false});
  cv.addEventListener('pointermove',function(e){if(!dw)return;e.preventDefault();e.stopPropagation();const r=cv.getBoundingClientRect();ctx.lineTo(e.clientX-r.left,e.clientY-r.top);ctx.stroke();pts.push({cx:e.clientX,cy:e.clientY})},{passive:false});
  cv.addEventListener('pointerup',function(e){if(!dw)return;e.preventDefault();dw=false;setTimeout(()=>ctx.clearRect(0,0,cv.width,cv.height),300);if(pts.length<5)return;
    const endX=e.clientX,endY=e.clientY;const items=card.querySelectorAll('.circ:not(.done)');let best=null,bestD=Infinity;
    for(const it of items){const r=it.getBoundingClientRect();const d=Math.sqrt((endX-(r.left+r.width/2))**2+(endY-(r.top+r.height/2))**2);if(d<Math.max(r.width,r.height)&&d<bestD){bestD=d;best=it}}
    if(best){if(best.dataset.correct==='true'){best.classList.add('ok-pick','done','circled');g1++;card.dataset.found=parseInt(card.dataset.found)+1;checkDone()}else{best.classList.add('no-pick');g2++;card.dataset.wrong=parseInt(card.dataset.wrong)+1;setTimeout(()=>best.classList.remove('no-pick'),600)}uPr()}
  },{passive:false});
  cv.addEventListener('pointercancel',function(){dw=false;ctx.clearRect(0,0,cv.width,cv.height)});
}

function showD(){
  res[LV[cur].id]=true;const w=parseInt(document.getElementById('q0').dataset.wrong);const t=parseInt(document.getElementById('q0').dataset.need);
  const el=document.getElementById('ld');document.getElementById('lsc').textContent=(t-Math.min(w,t))+' / '+t;
  if(w===0){document.getElementById('lt').textContent='🏆 מושלם!';document.getElementById('ls').textContent='מצאתם את כל הכמויות!'}
  else if(w<=2){document.getElementById('lt').textContent='👏 כל הכבוד!';document.getElementById('ls').textContent='כמעט מושלם!'}
  else{document.getElementById('lt').textContent='💪 סיימתם!';document.getElementById('ls').textContent='נסו שוב לשיפור!'}
  el.classList.add('show');el.scrollIntoView({behavior:'smooth',block:'center'});rTabs();
}

function go(i){if(i>0&&typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){if(typeof showAuthModal==='function')showAuthModal();return}cur=i;rLv();window.scrollTo({top:0,behavior:'smooth'})}
