<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>השוואה — מצאו את השונה | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff8f0;--card:#fff;--pri:#e17055;--pri-l:#ffeaa7;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#e17055,#d63031);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.mb{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.mbtn{padding:8px 18px;border-radius:24px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.mbtn:hover{border-color:var(--pri)}.mbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.pb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#fab1a0);border-radius:10px;transition:width 0.5s}
.pss{display:flex;gap:16px}.ps2{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.hb{text-align:center;padding:8px;background:#fff3cd;color:#856404;font-weight:600;font-size:0.9rem;display:none}.hb.show{display:block}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}.mc.bad{border-color:var(--no);background:var(--no-l)}
.mc.dw{touch-action:none}.mc .dc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;border-radius:var(--r)}
.mc.done .dc{display:none}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.85rem;color:var(--txt2);font-weight:500}
/* Groups */
.groups{display:flex;flex-direction:column;gap:0}
.group-box{border:3px dashed var(--brd);border-radius:var(--r);padding:16px;display:flex;flex-wrap:wrap;justify-content:center;gap:16px;min-height:90px;transition:all 0.3s;background:rgba(255,255,255,0.5)}
.group-box.g-a{border-color:#74b9ff;background:rgba(116,185,255,0.06)}
.group-box.g-b{border-color:#fd79a8;background:rgba(253,121,168,0.06)}
.group-label{text-align:center;font-size:0.8rem;font-weight:700;padding:6px 0}
.group-label.la{color:#0984e3}.group-label.lb{color:#e84393}
.arrow-row{display:flex;justify-content:center;padding:4px 0;font-size:1.4rem;color:var(--txt2)}
/* Items */
.gi{display:inline-flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all 0.25s;-webkit-user-select:none;user-select:none;padding:8px;border-radius:var(--rs);border:3px solid transparent;position:relative}
.gi:hover:not(.found):not(.dis){border-color:var(--pri);background:var(--pri-l);transform:scale(1.08)}
.gi:active:not(.found){transform:scale(0.95)}
.gi.found-ok{border-color:var(--ok);background:var(--ok-l)}
.gi.found-ok::after{content:'✓';position:absolute;top:-8px;right:-8px;width:24px;height:24px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.75rem;display:flex;align-items:center;justify-content:center;animation:pop 0.3s ease}
.gi.found-no{border-color:var(--no);background:var(--no-l);animation:shake 0.5s}
.gi .emoji{font-size:3.2rem;line-height:1}
.gi .lb{font-size:0.7rem;font-weight:600;color:var(--txt2)}
/* Circled in draw mode */
.gi.circled{border-color:transparent}
.gi.circled::before{content:'';position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px;border:4px solid var(--pri);border-radius:50%;z-index:12;animation:cpop 0.4s ease forwards}
.gi.circled.found-ok::before{border-color:var(--ok);border-width:5px}
.gi.circled.found-no::before{border-color:var(--no);border-width:5px}
@keyframes cpop{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
.cfb{text-align:center;margin-top:12px;font-weight:700;font-size:0.95rem;min-height:22px;opacity:0;transition:opacity 0.3s}
.cfb.show{opacity:1}.cfb.ok{color:var(--ok)}.cfb.bad{color:var(--no)}
.ld{background:linear-gradient(135deg,var(--pri),#fab1a0);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .sc{font-size:2.2rem;font-weight:900;margin:12px 0}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}
.mb,.ps,.tw,.acts,.nopr,.ld,.hb,.cfb{display:none!important}.ct{padding:8px 0}
.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.gi{border-color:transparent}
.dc{display:none!important}.ph{display:block!important}.plh{display:block!important;text-align:center;color:#666;font-size:0.8rem;margin-top:8px}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
.plh{display:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.gi .emoji{font-size:2.5rem}.mc{padding:16px 12px}.mbtn{padding:6px 12px;font-size:0.8rem}.tb{padding:6px 12px;font-size:0.75rem}.group-box{gap:10px;padding:12px}.arrow-row{font-size:1.1rem}}
@media(max-width:380px){.gi .emoji{font-size:2rem}.group-box{gap:8px;padding:10px}}
</style>
</head>
<body>
<div class="hd"><h1>🔍 השוואה</h1><p>השוו בין הקבוצות ומצאו את הפריט השונה!</p></div>
<div class="mb nopr">
<button class="mbtn on" onclick="setM('click')" id="mc1"><span>👆</span> לחיצה</button>
<button class="mbtn" onclick="setM('draw')" id="mc2"><span>✏️</span> ציור עיגול</button>
<button class="mbtn" onclick="window.print()"><span>🖨️</span> הדפסה</button>
</div>
<div class="ps nopr"><div class="pr"><span class="pl">התקדמות:</span><div class="pb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pss"><span class="ps2" style="color:var(--ok)">✅ <span id="g1">0</span></span><span class="ps2" style="color:var(--no)">❌ <span id="g2">0</span></span></div></div></div>
<div class="tw nopr"><div class="ts" id="tabs"></div></div>
<div class="hb" id="hb">✏️ ציירו עיגול סביב הפריט השונה בכל קבוצה!</div>
<div class="ct" id="area"></div>
<script>
// Each level has questions. Each question has groupA and groupB.
// In each group, one item is "odd" (different from the other group).
// The child needs to find the odd item in BOTH groups.
// Format: {a:[items], b:[items], oddA:index, oddB:index}
// oddA = index in group A that doesn't appear in group B
// oddB = index in group B that doesn't appear in group A

const LV=[
{id:1,t:'חיות וחפצים',qs:[
  {a:['🏀','🦒','🪣','🍃'],b:['🏀','🐻','🪣','🍃'],oA:1,oB:1},
  {a:['✂️','🪣','📖'],b:['✂️','📖','🍎'],oA:1,oB:2}
]},
{id:2,t:'בית וגן',qs:[
  {a:['👕','🐟','👟','🫖'],b:['👕','🐟','🎂','🫖'],oA:2,oB:2},
  {a:['👕','🎂','🐟'],b:['👕','🎂','🌂'],oA:2,oB:2}
]},
{id:3,t:'צעצועים',qs:[
  {a:['🐟','🐘','🌂'],b:['🐟','👕','🌂'],oA:1,oB:1},
  {a:['🐘','🪣','🎂'],b:['🐘','🐟','🎂'],oA:1,oB:1}
]},
{id:4,t:'אוכל',qs:[
  {a:['🍎','🍌','🍇','🍊'],b:['🍎','🍰','🍇','🍊'],oA:1,oB:1},
  {a:['🍕','🍔','🌮'],b:['🍕','🍔','🧁'],oA:2,oB:2}
]},
{id:5,t:'בעלי חיים',qs:[
  {a:['🐱','🐶','🐰','🐸'],b:['🐱','🦊','🐰','🐸'],oA:1,oB:1},
  {a:['🐟','🐬','🦈'],b:['🐟','🐬','🐙'],oA:2,oB:2}
]},
{id:6,t:'כלי תחבורה',qs:[
  {a:['🚗','✈️','🚌','⛵'],b:['🚗','✈️','🚂','⛵'],oA:2,oB:2},
  {a:['🚲','🛵','🚀'],b:['🚲','🚁','🚀'],oA:1,oB:1}
]},
{id:7,t:'ספורט',qs:[
  {a:['⚽','🏀','🎾','🏈'],b:['⚽','🏀','🏓','🏈'],oA:2,oB:2},
  {a:['🥊','🏹','⛳'],b:['🥊','🎣','⛳'],oA:1,oB:1}
]},
{id:8,t:'טבע',qs:[
  {a:['🌸','🌲','🌵','🍄'],b:['🌸','🌻','🌵','🍄'],oA:1,oB:1},
  {a:['☀️','🌙','⭐','☁️'],b:['☀️','🌙','⭐','🌈'],oA:3,oB:3}
]},
{id:9,t:'כלי מוזיקה',qs:[
  {a:['🎹','🎸','🥁','🎻'],b:['🎹','🎺','🥁','🎻'],oA:1,oB:1},
  {a:['🎷','🪘','🎵'],b:['🎷','🪗','🎵'],oA:1,oB:1}
]},
{id:10,t:'בגדים',qs:[
  {a:['👕','👗','🧥','👟'],b:['👕','👗','🧦','👟'],oA:2,oB:2},
  {a:['👒','🧤','👜','🧣'],b:['👒','🧤','👜','👢'],oA:3,oB:3}
]},
{id:11,t:'כלים',qs:[
  {a:['🔨','🔧','✂️','📏'],b:['🔨','🔑','✂️','📏'],oA:1,oB:1},
  {a:['🖊️','📎','🧲'],b:['🖊️','📎','🔒'],oA:2,oB:2}
]},
{id:12,t:'מזון מתוק',qs:[
  {a:['🍩','🧁','🍰','🍪'],b:['🍩','🧁','🎂','🍪'],oA:2,oB:2},
  {a:['🍫','🍬','🍭','🍡'],b:['🍫','🍬','🍭','🧇'],oA:3,oB:3}
]},
{id:13,t:'פירות וירקות',qs:[
  {a:['🥕','🥒','🌽','🍅'],b:['🥕','🥒','🫑','🍅'],oA:2,oB:2},
  {a:['🍎','🍐','🍇','🍓'],b:['🍎','🍐','🍇','🍑'],oA:3,oB:3}
]},
{id:14,t:'אתגר 1',qs:[
  {a:['🐱','🏀','✂️','🌸','🚗'],b:['🐱','🏀','🔨','🌸','🚗'],oA:2,oB:2},
  {a:['🎹','👕','🍕','⭐'],b:['🎹','👕','🍕','🌙'],oA:3,oB:3}
]},
{id:15,t:'אתגר 2',qs:[
  {a:['🐶','🍌','🚌','🎸','🧥'],b:['🦊','🍌','🚌','🎸','🧥'],oA:0,oB:0},
  {a:['⚽','🌲','🔧','🍩','👟'],b:['⚽','🌲','🔧','🍩','👢'],oA:4,oB:4}
]}
];

let cur=0,md='click',g1=0,g2=0,res={};
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
const E1=['!מעולה 🎉','!עין חדה 🔍','!יופי 👏','!מדהים 🌟','!בול 🎯'];
const E2=['לא נכון... נסו שוב! 💪','כמעט! 🤔','ממשיכים! 😊'];

function rTabs(){const el=document.getElementById('tabs');el.innerHTML=LV.map((l,i)=>`<button class="tb ${i===cur?'on':''} ${res[l.id]?'dn':''}" onclick="go(${i})">${l.t}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}

function rLv(){
const lv=LV[cur],ar=document.getElementById('area');
let h=`<div class="ph">🔍 השוואה — ${lv.t}</div>`;

lv.qs.forEach((q,qi)=>{
  const isDw=md==='draw';
  // Shuffle both groups independently but keep track of odd index
  const aOrder=q.a.map((e,i)=>({e,isOdd:i===q.oA}));
  const bOrder=q.b.map((e,i)=>({e,isOdd:i===q.oB}));
  const aShuf=sh(aOrder);
  const bShuf=sh(bOrder);

  h+=`<div class="mc ${isDw?'dw':''}" id="q${qi}" data-found="0" data-need="2" data-wrong="0">`;
  if(isDw) h+=`<canvas class="dc" id="cv${qi}"></canvas>`;
  h+=`<div class="mh"><div class="mn">${qi+1}</div><span class="mht">💡 מצאו את הפריט השונה בכל קבוצה</span></div>`;
  h+=`<div class="groups">`;
  h+=`<div class="group-label la">קבוצה א׳</div>`;
  h+=`<div class="group-box g-a">`;
  aShuf.forEach((item,i)=>{
    h+=`<div class="gi" data-qi="${qi}" data-grp="a" data-odd="${item.isOdd}" ${md==='click'?`onclick="pick(this)"`:''}><span class="emoji">${item.e}</span></div>`;
  });
  h+=`</div>`;
  h+=`<div class="arrow-row">⬇️ השוו ⬇️</div>`;
  h+=`<div class="group-label lb">קבוצה ב׳</div>`;
  h+=`<div class="group-box g-b">`;
  bShuf.forEach((item,i)=>{
    h+=`<div class="gi" data-qi="${qi}" data-grp="b" data-odd="${item.isOdd}" ${md==='click'?`onclick="pick(this)"`:''}><span class="emoji">${item.e}</span></div>`;
  });
  h+=`</div></div>`;
  h+=`<div class="cfb" id="fb${qi}"></div>`;
  h+=`<div class="plh">הקיפו בעיגול את הפריט השונה בכל קבוצה</div>`;
  h+=`</div>`;
});

h+=`<div class="ld" id="ld"><div class="big">🌟</div><h2 id="lt"></h2><p id="ls"></p><div class="sc" id="lsc"></div><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<LV.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;

ar.innerHTML=h;
ar._done=0;ar._total=lv.qs.length;
if(md==='draw') initDraw();
rTabs();uPr();
}

// ===== CLICK MODE =====
function pick(el){
  if(el.classList.contains('found-ok')||el.classList.contains('dis'))return;
  const qi=el.dataset.qi;
  const card=document.getElementById('q'+qi);
  const grp=el.dataset.grp;

  // Check if this group already found
  if(card.querySelector(`.gi.found-ok[data-grp="${grp}"]`))return;

  if(el.dataset.odd==='true'){
    el.classList.add('found-ok');
    g1++;
    card.dataset.found=parseInt(card.dataset.found)+1;
    // Disable other items in same group
    card.querySelectorAll(`.gi[data-grp="${grp}"]`).forEach(i=>{if(!i.classList.contains('found-ok'))i.classList.add('dis')});
    checkCard(qi);
  } else {
    el.classList.add('found-no');
    g2++;
    card.dataset.wrong=parseInt(card.dataset.wrong)+1;
    setTimeout(()=>el.classList.remove('found-no'),600);
  }
  uPr();
}

function checkCard(qi){
  const card=document.getElementById('q'+qi);
  const found=parseInt(card.dataset.found);
  const need=parseInt(card.dataset.need);
  if(found>=need){
    const w=parseInt(card.dataset.wrong);
    const fb=document.getElementById('fb'+qi);
    if(w===0){card.classList.add('ok');fb.textContent=E1[Math.floor(Math.random()*E1.length)];fb.classList.add('ok','show')}
    else{card.classList.add('bad');fb.textContent=`מצאתם עם ${w} טעויות 💪`;fb.classList.add('bad','show')}
    card.classList.add('done');
    const ar=document.getElementById('area');
    ar._done++;
    if(ar._done>=ar._total) setTimeout(showD,600);
  }
}

// ===== DRAW MODE =====
function initDraw(){
  document.getElementById('hb').classList.add('show');
  document.querySelectorAll('.mc.dw').forEach(card=>{
    const qi=card.id.replace('q','');
    const cv=document.getElementById('cv'+qi);
    if(!cv)return;
    cv.width=card.offsetWidth;cv.height=card.offsetHeight;
    const ctx=cv.getContext('2d');
    let dw=false,pts=[];

    cv.addEventListener('pointerdown',function(e){
      if(card.classList.contains('done'))return;
      e.preventDefault();e.stopPropagation();
      dw=true;pts=[];
      ctx.clearRect(0,0,cv.width,cv.height);
      const r=cv.getBoundingClientRect();
      const p={x:e.clientX-r.left,y:e.clientY-r.top,cx:e.clientX,cy:e.clientY};
      pts.push(p);ctx.beginPath();ctx.moveTo(p.x,p.y);
      ctx.strokeStyle='#e17055';ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';
    },{passive:false});

    cv.addEventListener('pointermove',function(e){
      if(!dw)return;e.preventDefault();e.stopPropagation();
      const r=cv.getBoundingClientRect();
      const p={x:e.clientX-r.left,y:e.clientY-r.top,cx:e.clientX,cy:e.clientY};
      pts.push(p);ctx.lineTo(p.x,p.y);ctx.stroke();
    },{passive:false});

    cv.addEventListener('pointerup',function(e){
      if(!dw)return;e.preventDefault();dw=false;
      if(pts.length<10){ctx.clearRect(0,0,cv.width,cv.height);return}
      let cx=0,cy=0;pts.forEach(p=>{cx+=p.cx;cy+=p.cy});cx/=pts.length;cy/=pts.length;
      setTimeout(()=>ctx.clearRect(0,0,cv.width,cv.height),300);

      // Find closest item
      const items=card.querySelectorAll('.gi:not(.found-ok):not(.dis)');
      let best=null,bestD=Infinity;
      for(const it of items){
        const r=it.getBoundingClientRect();
        const d=Math.sqrt((cx-(r.left+r.width/2))**2+(cy-(r.top+r.height/2))**2);
        if(d<Math.max(r.width,r.height)*1.5&&d<bestD){bestD=d;best=it}
      }
      if(best){
        best.classList.add('circled');
        const qi2=best.dataset.qi;
        const grp=best.dataset.grp;
        if(card.querySelector(`.gi.found-ok[data-grp="${grp}"]`))return;
        if(best.dataset.odd==='true'){
          best.classList.add('found-ok');g1++;
          card.dataset.found=parseInt(card.dataset.found)+1;
          card.querySelectorAll(`.gi[data-grp="${grp}"]`).forEach(i=>{if(!i.classList.contains('found-ok'))i.classList.add('dis')});
          checkCard(qi2);
        } else {
          best.classList.add('found-no');g2++;
          card.dataset.wrong=parseInt(card.dataset.wrong)+1;
          setTimeout(()=>{best.classList.remove('found-no','circled')},600);
        }
        uPr();
      }
    },{passive:false});

    cv.addEventListener('pointercancel',function(){dw=false;ctx.clearRect(0,0,cv.width,cv.height)});
  });
}

function showD(){
  res[LV[cur].id]=true;
  let tw=0;LV[cur].qs.forEach((q,i)=>{tw+=parseInt(document.getElementById('q'+i).dataset.wrong)});
  const t=LV[cur].qs.length*2;
  const el=document.getElementById('ld');
  document.getElementById('lsc').textContent=(t-Math.min(tw,t))+' / '+t;
  if(tw===0){document.getElementById('lt').textContent='🏆 מושלם!';document.getElementById('ls').textContent='מצאתם את כל ההבדלים!'}
  else if(tw<=2){document.getElementById('lt').textContent='👏 כל הכבוד!';document.getElementById('ls').textContent='כמעט מושלם!'}
  else{document.getElementById('lt').textContent='💪 סיימתם!';document.getElementById('ls').textContent='נסו שוב לשיפור!'}
  el.classList.add('show');el.scrollIntoView({behavior:'smooth',block:'center'});rTabs();
}

function go(i){cur=i;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function nxt(){if(cur<LV.length-1){cur++;rLv();window.scrollTo({top:0,behavior:'smooth'})}}
function retry(){rLv();window.scrollTo({top:0,behavior:'smooth'})}
function setM(m){md=m;document.getElementById('mc1').classList.toggle('on',m==='click');document.getElementById('mc2').classList.toggle('on',m==='draw');if(m==='click')document.getElementById('hb').classList.remove('show');rLv()}
function uPr(){const d=Object.keys(res).length;document.getElementById('pf').style.width=Math.round(d/LV.length*100)+'%';document.getElementById('g1').textContent=g1;document.getElementById('g2').textContent=g2}
rLv();
</script>
