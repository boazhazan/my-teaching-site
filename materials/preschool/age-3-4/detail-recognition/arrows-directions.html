<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כיוונים — השלימו את החץ החסר</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2563eb;--primary-light:#dbeafe;--success:#10b981;--success-light:#d1fae5;--error:#ef4444;--error-light:#fee2e2;--text:#1e293b;--text-light:#64748b;--bg:#f0f4ff;--bg-card:#fff;--border:#e2e8f0;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.08)}
body{font-family:'Heebo','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;text-align:right;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}

.container{max-width:700px;margin:0 auto;padding:16px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.88rem;color:var(--text-light);margin-bottom:12px}
.back-link:hover{color:var(--primary)}

.exercise-header{text-align:center;margin-bottom:16px}
.exercise-header h1{font-size:1.5rem;font-weight:800;color:var(--text);margin-bottom:6px}
.legend{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;font-size:.9rem;font-weight:600;color:var(--text-light)}
.legend span{display:inline-flex;align-items:center;gap:4px}
.legend svg{width:18px;height:18px}

/* Tabs */
.level-tabs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:10px;scrollbar-width:none}
.level-tabs-wrap::-webkit-scrollbar{display:none}
.level-tabs{display:flex;gap:6px;padding:4px 0;min-width:max-content}
.level-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg-card);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.level-tab:hover{border-color:var(--primary);color:var(--primary)}
.level-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.level-tab.done{background:var(--success-light);border-color:var(--success);color:#065f46}
.level-tab.has-errors{background:var(--error-light);border-color:var(--error);color:#991b1b}

/* Mode bar */
.mode-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.mode-buttons{display:flex;gap:6px}
.mode-btn{padding:6px 14px;border-radius:18px;border:1.5px solid var(--border);background:var(--bg-card);font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s}
.mode-btn:hover{border-color:var(--primary)}
.mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.score-bar{display:flex;gap:12px;font-size:.88rem;font-weight:600}
.score-ok{color:var(--success)}
.score-err{color:var(--error)}

/* Grid */
.grid-wrap{display:flex;justify-content:center;margin-bottom:16px}
.arrow-grid{display:inline-grid;gap:6px;background:var(--bg-card);padding:16px;border-radius:var(--radius);box-shadow:var(--shadow)}
.cell{width:64px;height:64px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:#f8fafc;border:2px solid var(--border);position:relative;transition:all .25s;user-select:none}
.cell svg{width:38px;height:38px;transition:transform .2s}
.cell.empty-cell{border:2.5px dashed #94a3b8;background:#fefce8;cursor:pointer}
.cell.empty-cell .q-mark{font-size:1.6rem;font-weight:700;color:#94a3b8}
.cell.empty-cell.selected{border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 3px rgba(37,99,235,.25)}
.cell.empty-cell.draw-mode{touch-action:none}
.cell.filled-correct{border-color:var(--success);background:var(--success-light)}
.cell.filled-correct svg{color:var(--success)}
.cell.filled-wrong{border-color:var(--error);background:var(--error-light)}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes glow{0%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}70%{box-shadow:0 0 0 10px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
.cell.shake{animation:shake .4s ease}
.cell.glow{animation:glow .6s ease}

/* Direction buttons */
.dir-buttons{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.dir-btn{width:60px;height:60px;border-radius:14px;border:2px solid var(--border);background:var(--bg-card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:0}
.dir-btn:hover{border-color:var(--primary);background:var(--primary-light);transform:scale(1.08)}
.dir-btn:active{transform:scale(.95)}
.dir-btn svg{width:32px;height:32px;color:var(--text)}
.dir-btn[data-dir="0"]{background:#dbeafe}.dir-btn[data-dir="1"]{background:#fef3c7}
.dir-btn[data-dir="2"]{background:#fce7f3}.dir-btn[data-dir="3"]{background:#d1fae5}

/* Completion card */
.completion-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.completion-overlay.show{display:flex}
.completion-card{background:#fff;border-radius:20px;padding:32px 28px;text-align:center;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.completion-card h2{font-size:1.4rem;margin-bottom:6px}
.completion-card .emoji{font-size:3rem;margin-bottom:8px}
.completion-card .msg{font-size:1rem;color:var(--text-light);margin-bottom:16px}
.completion-card .stats{display:flex;justify-content:center;gap:20px;margin-bottom:18px;font-size:1.1rem;font-weight:700}
.btn{padding:10px 24px;border-radius:20px;border:none;font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}

/* Summary */
.summary-screen{display:none;background:var(--bg-card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);text-align:center}
.summary-screen.show{display:block}
.summary-screen h2{font-size:1.3rem;margin-bottom:12px}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.summary-cell{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.88rem;font-weight:700;cursor:pointer;border:2px solid var(--border);transition:all .2s}
.summary-cell:hover{transform:scale(1.05)}
.summary-cell.s-ok{background:var(--success-light);border-color:var(--success);color:#065f46}
.summary-cell.s-err{background:var(--error-light);border-color:var(--error);color:#991b1b}
.summary-cell.s-skip{background:#f1f5f9;color:var(--text-light)}
.redo-buttons{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}

/* Print */
@media print{
  body{background:#fff!important}
  .back-link,.mode-bar,.dir-buttons,.level-tabs-wrap,.completion-overlay,.summary-screen,.score-bar{display:none!important}
  .arrow-grid{box-shadow:none;border:1px solid #ccc}
  .cell{border:1px solid #999!important;background:#fff!important}
  .cell.empty-cell{border:2px dashed #333!important;background:#fff!important}
  .cell svg{color:#000!important}
  .cell.filled-correct,.cell.filled-wrong{background:#fff!important;border-color:#999!important}
  .exercise-header h1{font-size:1.2rem}
  .legend{font-size:.8rem}
}

/* Responsive */
@media(max-width:480px){
  .cell{width:52px;height:52px}
  .cell svg{width:30px;height:30px}
  .cell .q-mark{font-size:1.3rem}
  .dir-btn{width:52px;height:52px}
  .dir-btn svg{width:26px;height:26px}
  .exercise-header h1{font-size:1.2rem}
  .legend{font-size:.78rem;gap:10px}
  .summary-grid{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>
<div class="container">
  <a href="javascript:history.back()" class="back-link">&#8592; חזרה</a>

  <div class="exercise-header">
    <h1>כיוונים — השלימו את החץ החסר</h1>
    <div class="legend">
      <span><svg viewBox="0 0 40 40"><path d="M20 6L33 22H25v14H15V22H7Z" fill="currentColor"/></svg> למעלה</span>
      <span><svg viewBox="0 0 40 40"><path d="M20 34L7 18h8V4h10v14h8Z" fill="currentColor"/></svg> למטה</span>
      <span><svg viewBox="0 0 40 40"><path d="M34 20L18 7v8H4v10h14v8Z" fill="currentColor"/></svg> לימין</span>
      <span><svg viewBox="0 0 40 40"><path d="M6 20L22 7v8h14v10H22v8Z" fill="currentColor"/></svg> לשמאל</span>
    </div>
  </div>

  <div class="level-tabs-wrap"><div class="level-tabs" id="levelTabs"></div></div>

  <div class="mode-bar">
    <div class="mode-buttons">
      <button class="mode-btn active" data-mode="click">&#128070; לחיצה</button>
      <button class="mode-btn" data-mode="draw">&#9997;&#65039; ציור</button>
      <button class="mode-btn" data-mode="print">&#128424;&#65039; הדפסה</button>
    </div>
    <div class="score-bar">
      <span class="score-ok">&#9989; <span id="okCount">0</span></span>
      <span class="score-err">&#10060; <span id="errCount">0</span></span>
    </div>
  </div>

  <div class="grid-wrap"><div class="arrow-grid" id="arrowGrid"></div></div>
  <div class="dir-buttons" id="dirButtons">
    <button class="dir-btn" data-dir="0"><svg viewBox="0 0 40 40"><path d="M20 6L33 22H25v14H15V22H7Z" fill="currentColor"/></svg></button>
    <button class="dir-btn" data-dir="2"><svg viewBox="0 0 40 40"><path d="M20 34L7 18h8V4h10v14h8Z" fill="currentColor"/></svg></button>
    <button class="dir-btn" data-dir="3"><svg viewBox="0 0 40 40"><path d="M6 20L22 7v8h14v10H22v8Z" fill="currentColor"/></svg></button>
    <button class="dir-btn" data-dir="1"><svg viewBox="0 0 40 40"><path d="M34 20L18 7v8H4v10h14v8Z" fill="currentColor"/></svg></button>
  </div>

  <div class="completion-overlay" id="completionOverlay">
    <div class="completion-card">
      <div class="emoji" id="compEmoji"></div>
      <h2 id="compTitle"></h2>
      <div class="msg" id="compMsg"></div>
      <div class="stats"><span class="score-ok">&#9989; <span id="compOk"></span></span><span class="score-err">&#10060; <span id="compErr"></span></span></div>
      <button class="btn btn-primary" id="compNext">לשלב הבא &#8594;</button>
    </div>
  </div>

  <div class="summary-screen" id="summaryScreen">
    <h2>&#127942; סיכום</h2>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="redo-buttons" id="redoButtons"></div>
  </div>
</div>

<script>
(function(){
// --- Arrow SVGs ---
var ARROW_SVGS = [
  '<svg viewBox="0 0 40 40"><path d="M20 6L33 22H25v14H15V22H7Z" fill="currentColor"/></svg>',
  '<svg viewBox="0 0 40 40"><path d="M34 20L18 7v8H4v10h14v8Z" fill="currentColor"/></svg>',
  '<svg viewBox="0 0 40 40"><path d="M20 34L7 18h8V4h10v14h8Z" fill="currentColor"/></svg>',
  '<svg viewBox="0 0 40 40"><path d="M6 20L22 7v8h14v10H22v8Z" fill="currentColor"/></svg>'
]; // 0=up,1=right,2=down,3=left

function rand(n){return Math.floor(Math.random()*n)}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=rand(i+1);var t=a[i];a[i]=a[j];a[j]=t}return a}
function pickN(arr,n){var copy=arr.slice();shuffle(copy);return copy.slice(0,n)}

// --- Pattern generators ---
function genUniform(rows,cols){
  var d=rand(4),g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=d}
  return g;
}
function genRowUniform(rows,cols){
  var dirs=shuffle([0,1,2,3]).slice(0,rows),g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=dirs[r%dirs.length]}
  return g;
}
function genRowAlternate(rows,cols){
  var d1=rand(4),d2=(d1+2)%4,g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(c%2===0)?d1:d2}
  return g;
}
function genColAlternate(rows,cols){
  var d1=rand(4),d2=(d1+2)%4,g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(r%2===0)?d1:d2}
  return g;
}
function genCheckerboard(rows,cols){
  var d1=rand(4),d2=(d1+2)%4,g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=((r+c)%2===0)?d1:d2}
  return g;
}
function genRowRotate(rows,cols){
  var start=rand(4),g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(start+r)%4}
  return g;
}
function genColUniform(rows,cols){
  var dirs=shuffle([0,1,2,3]).slice(0,cols),g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=dirs[c%dirs.length]}
  return g;
}
function genColRotate(rows,cols){
  var start=rand(4),g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(start+c)%4}
  return g;
}
function genDiagonal(rows,cols){
  var start=rand(4),g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++)g[r][c]=(start+r+c)%4}
  return g;
}
function genMirrorRows(rows,cols){
  var d1=rand(4),d2=(d1+2)%4,g=[];
  for(var r=0;r<rows;r++){g[r]=[];var half=Math.floor(cols/2);for(var c=0;c<cols;c++)g[r][c]=(c<half)?d1:d2}
  return g;
}
function genSpiral(rows,cols){
  var start=rand(4),g=[];
  for(var r=0;r<rows;r++){g[r]=[];for(var c=0;c<cols;c++){
    var ring=Math.min(r,c,rows-1-r,cols-1-c);
    g[r][c]=(start+ring)%4;
  }}
  return g;
}

// --- Level definitions ---
var LEVELS=[
  {rows:3,cols:3,empties:1,gen:genUniform},
  {rows:3,cols:3,empties:1,gen:genUniform},
  {rows:3,cols:3,empties:1,gen:genRowUniform},
  {rows:3,cols:4,empties:1,gen:genRowAlternate},
  {rows:3,cols:4,empties:1,gen:genColAlternate},
  {rows:3,cols:4,empties:1,gen:genCheckerboard},
  {rows:4,cols:4,empties:2,gen:genRowUniform},
  {rows:4,cols:4,empties:2,gen:genRowAlternate},
  {rows:4,cols:4,empties:2,gen:genRowRotate},
  {rows:4,cols:4,empties:2,gen:genColUniform},
  {rows:4,cols:4,empties:2,gen:genColAlternate},
  {rows:4,cols:4,empties:2,gen:genColRotate},
  {rows:4,cols:4,empties:3,gen:genCheckerboard},
  {rows:4,cols:4,empties:3,gen:genDiagonal},
  {rows:4,cols:4,empties:3,gen:genSpiral}
];

// --- State ---
var currentLevel=0;
var mode='click'; // click|draw
var grids=[];     // generated grids per level
var emptyMap=[];  // empty cell positions per level
var answers=[];   // user answers per level: [{r,c,correct,answered}]
var levelDone=[];
var selectedCell=null;
var okTotal=0,errTotal=0;

// --- Init ---
function initLevels(){
  grids=[];emptyMap=[];answers=[];levelDone=[];
  for(var i=0;i<LEVELS.length;i++){
    var L=LEVELS[i];
    var g=L.gen(L.rows,L.cols);
    grids.push(g);
    // pick empty cells
    var allCells=[];
    for(var r=0;r<L.rows;r++)for(var c=0;c<L.cols;c++)allCells.push({r:r,c:c});
    var empties=pickN(allCells,L.empties);
    emptyMap.push(empties);
    var ans=[];
    for(var e=0;e<empties.length;e++)ans.push({r:empties[e].r,c:empties[e].c,correct:g[empties[e].r][empties[e].c],answered:false,userDir:-1,isCorrect:false});
    answers.push(ans);
    levelDone.push(false);
  }
}

function buildTabs(){
  var wrap=document.getElementById('levelTabs');
  wrap.innerHTML='';
  for(var i=0;i<LEVELS.length;i++){
    var b=document.createElement('button');
    b.className='level-tab'+(i===currentLevel?' active':'');
    b.textContent=(i+1);
    b.dataset.idx=i;
    if(levelDone[i]){
      var hasErr=answers[i].some(function(a){return a.answered&&!a.isCorrect});
      b.classList.add(hasErr?'has-errors':'done');
    }
    wrap.appendChild(b);
  }
}

function renderGrid(){
  var L=LEVELS[currentLevel];
  var g=grids[currentLevel];
  var emp=emptyMap[currentLevel];
  var ans=answers[currentLevel];
  var grid=document.getElementById('arrowGrid');
  grid.style.gridTemplateColumns='repeat('+L.cols+',64px)';
  grid.innerHTML='';

  for(var r=0;r<L.rows;r++){
    for(var c=0;c<L.cols;c++){
      var cell=document.createElement('div');
      cell.className='cell';
      cell.dataset.r=r;cell.dataset.c=c;

      // check if empty
      var emptyIdx=-1;
      for(var e=0;e<emp.length;e++){if(emp[e].r===r&&emp[e].c===c){emptyIdx=e;break}}

      if(emptyIdx>=0){
        var a=ans[emptyIdx];
        if(a.answered){
          cell.innerHTML=ARROW_SVGS[a.userDir];
          cell.classList.add(a.isCorrect?'filled-correct':'filled-wrong');
        } else {
          cell.classList.add('empty-cell');
          if(mode==='draw')cell.classList.add('draw-mode');
          cell.innerHTML='<span class="q-mark">?</span>';
          cell.dataset.emptyIdx=emptyIdx;
        }
      } else {
        cell.innerHTML=ARROW_SVGS[g[r][c]];
      }
      grid.appendChild(cell);
    }
  }
  updateGridSize();
}

function updateGridSize(){
  var w=window.innerWidth;
  var L=LEVELS[currentLevel];
  var sz=(w<=480)?52:64;
  var grid=document.getElementById('arrowGrid');
  grid.style.gridTemplateColumns='repeat('+L.cols+','+sz+'px)';
  var cells=grid.querySelectorAll('.cell');
  for(var i=0;i<cells.length;i++){cells[i].style.width=sz+'px';cells[i].style.height=sz+'px'}
}

function updateScore(){
  document.getElementById('okCount').textContent=okTotal;
  document.getElementById('errCount').textContent=errTotal;
}

function selectLevel(idx){
  currentLevel=idx;
  selectedCell=null;
  buildTabs();
  var summary=document.getElementById('summaryScreen');
  summary.classList.remove('show');
  if(levelDone[idx]&&allLevelsDone()){
    showSummary();
  } else {
    renderGrid();
  }
  updateScore();
}

// --- Answer logic ---
function tryAnswer(dir){
  if(selectedCell===null)return;
  var ans=answers[currentLevel];
  var a=ans[selectedCell];
  if(a.answered)return;

  a.answered=true;
  a.userDir=dir;
  a.isCorrect=(dir===a.correct);
  if(a.isCorrect)okTotal++;else errTotal++;
  updateScore();

  // animate
  var cells=document.getElementById('arrowGrid').querySelectorAll('.cell');
  var targetCell=null;
  for(var i=0;i<cells.length;i++){
    if(parseInt(cells[i].dataset.r)===a.r&&parseInt(cells[i].dataset.c)===a.c){targetCell=cells[i];break}
  }
  if(targetCell){
    targetCell.innerHTML=ARROW_SVGS[dir];
    targetCell.classList.remove('empty-cell','selected','draw-mode');
    if(a.isCorrect){
      targetCell.classList.add('filled-correct','glow');
    } else {
      targetCell.classList.add('filled-wrong','shake');
    }
  }
  selectedCell=null;

  // check level complete
  var allDone=ans.every(function(x){return x.answered});
  if(allDone){
    levelDone[currentLevel]=true;
    buildTabs();
    setTimeout(function(){showCompletion()},600);
  }
}

function showCompletion(){
  var ans=answers[currentLevel];
  var ok=ans.filter(function(a){return a.isCorrect}).length;
  var err=ans.length-ok;
  var pct=Math.round(ok/ans.length*100);

  var emoji,title,msg;
  if(pct===100){emoji='🌟';title='מושלם!';msg='כל החיצים במקום הנכון!';}
  else if(pct>=50){emoji='👍';title='כל הכבוד!';msg='רוב החיצים נכונים, נסו שוב את השאר!';}
  else{emoji='💪';title='נסו שוב!';msg='תרגול עושה מאסטר!';}

  document.getElementById('compEmoji').textContent=emoji;
  document.getElementById('compTitle').textContent=title;
  document.getElementById('compMsg').textContent=msg;
  document.getElementById('compOk').textContent=ok;
  document.getElementById('compErr').textContent=err;

  var nextBtn=document.getElementById('compNext');
  if(currentLevel<LEVELS.length-1){
    nextBtn.textContent='לשלב הבא \u2192';
    nextBtn.onclick=function(){
      document.getElementById('completionOverlay').classList.remove('show');
      selectLevel(currentLevel+1);
    };
  } else if(allLevelsDone()){
    nextBtn.textContent='לסיכום \u2192';
    nextBtn.onclick=function(){
      document.getElementById('completionOverlay').classList.remove('show');
      showSummary();
    };
  } else {
    nextBtn.textContent='המשך';
    nextBtn.onclick=function(){document.getElementById('completionOverlay').classList.remove('show')};
  }
  document.getElementById('completionOverlay').classList.add('show');
}

function allLevelsDone(){return levelDone.every(function(d){return d})}

function showSummary(){
  var sg=document.getElementById('summaryGrid');
  sg.innerHTML='';
  for(var i=0;i<LEVELS.length;i++){
    var d=document.createElement('div');
    d.className='summary-cell';
    d.textContent=(i+1);
    d.dataset.idx=i;
    if(!levelDone[i]){d.classList.add('s-skip');}
    else{
      var hasErr=answers[i].some(function(a){return a.answered&&!a.isCorrect});
      d.classList.add(hasErr?'s-err':'s-ok');
    }
    sg.appendChild(d);
  }
  // redo buttons
  var rb=document.getElementById('redoButtons');
  rb.innerHTML='';
  var hasErr=false,hasSkip=false;
  for(var i=0;i<LEVELS.length;i++){
    if(!levelDone[i])hasSkip=true;
    if(levelDone[i]&&answers[i].some(function(a){return!a.isCorrect}))hasErr=true;
  }
  if(hasErr){var b=document.createElement('button');b.className='btn btn-outline';b.textContent='\u274C חזרו על שגיאות';b.onclick=function(){redoFiltered('err')};rb.appendChild(b)}
  if(hasSkip){var b=document.createElement('button');b.className='btn btn-outline';b.textContent='\u23ED\uFE0F דילוגים';b.onclick=function(){redoFiltered('skip')};rb.appendChild(b)}
  if(hasErr&&hasSkip){var b=document.createElement('button');b.className='btn btn-outline';b.textContent='\U0001F504 שגיאות + דילוגים';b.onclick=function(){redoFiltered('both')};rb.appendChild(b)}
  var b2=document.createElement('button');b2.className='btn btn-primary';b2.textContent='\u2728 התחלה מחדש';b2.onclick=function(){resetAll()};rb.appendChild(b2);

  document.getElementById('summaryScreen').classList.add('show');
}

function redoFiltered(type){
  for(var i=0;i<LEVELS.length;i++){
    var shouldRedo=false;
    if(type==='err'&&levelDone[i]&&answers[i].some(function(a){return!a.isCorrect}))shouldRedo=true;
    if(type==='skip'&&!levelDone[i])shouldRedo=true;
    if(type==='both'&&(!levelDone[i]||(levelDone[i]&&answers[i].some(function(a){return!a.isCorrect}))))shouldRedo=true;
    if(shouldRedo){
      levelDone[i]=false;
      var emp=emptyMap[i];
      var g=grids[i];
      answers[i]=[];
      for(var e=0;e<emp.length;e++)answers[i].push({r:emp[e].r,c:emp[e].c,correct:g[emp[e].r][emp[e].c],answered:false,userDir:-1,isCorrect:false});
    }
  }
  // find first redo level
  for(var i=0;i<LEVELS.length;i++){if(!levelDone[i]){selectLevel(i);return}}
}

function resetAll(){
  okTotal=0;errTotal=0;
  initLevels();
  selectLevel(0);
}

// --- Event handlers ---

// Tab clicks
document.getElementById('levelTabs').addEventListener('click',function(e){
  var tab=e.target.closest('.level-tab');
  if(tab)selectLevel(parseInt(tab.dataset.idx));
});

// Summary cell clicks
document.getElementById('summaryGrid').addEventListener('click',function(e){
  var cell=e.target.closest('.summary-cell');
  if(cell)selectLevel(parseInt(cell.dataset.idx));
});

// Mode toggle
document.querySelector('.mode-buttons').addEventListener('click',function(e){
  var btn=e.target.closest('.mode-btn');
  if(!btn)return;
  var m=btn.dataset.mode;
  if(m==='print'){window.print();return}
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  selectedCell=null;
  renderGrid();
  document.getElementById('dirButtons').style.display=(mode==='click')?'flex':'none';
});

// Click mode: select empty cell
document.getElementById('arrowGrid').addEventListener('click',function(e){
  if(mode!=='click')return;
  var cell=e.target.closest('.cell.empty-cell');
  if(!cell)return;
  // deselect previous
  document.querySelectorAll('.cell.selected').forEach(function(c){c.classList.remove('selected')});
  cell.classList.add('selected');
  selectedCell=parseInt(cell.dataset.emptyIdx);
});

// Click mode: direction button
document.getElementById('dirButtons').addEventListener('click',function(e){
  var btn=e.target.closest('.dir-btn');
  if(!btn||mode!=='click')return;
  tryAnswer(parseInt(btn.dataset.dir));
});

// Draw mode: pointer events
var drawState={active:false,startX:0,startY:0,cellIdx:-1};

document.getElementById('arrowGrid').addEventListener('pointerdown',function(e){
  if(mode!=='draw')return;
  var cell=e.target.closest('.cell.empty-cell');
  if(!cell)return;
  e.preventDefault();
  drawState.active=true;
  drawState.startX=e.clientX;
  drawState.startY=e.clientY;
  drawState.cellIdx=parseInt(cell.dataset.emptyIdx);
  cell.classList.add('selected');
  selectedCell=drawState.cellIdx;
},{passive:false});

document.addEventListener('pointermove',function(e){
  if(!drawState.active)return;
  e.preventDefault();
},{passive:false});

document.addEventListener('pointerup',function(e){
  if(!drawState.active)return;
  drawState.active=false;
  var dx=e.clientX-drawState.startX;
  var dy=e.clientY-drawState.startY;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<15){
    // too short, just deselect
    document.querySelectorAll('.cell.selected').forEach(function(c){c.classList.remove('selected')});
    selectedCell=null;
    return;
  }
  // determine direction
  var dir;
  if(Math.abs(dx)>Math.abs(dy)){
    dir=dx>0?1:3; // right or left
  } else {
    dir=dy>0?2:0; // down or up
  }
  selectedCell=drawState.cellIdx;
  tryAnswer(dir);
});

// Close completion overlay on outside click
document.getElementById('completionOverlay').addEventListener('click',function(e){
  if(e.target===this)this.classList.remove('show');
});

// Responsive resize
window.addEventListener('resize',updateGridSize);

// --- Start ---
initLevels();
buildTabs();
renderGrid();
updateScore();
document.getElementById('dirButtons').style.display='flex';

})();
</script>
</body>
</html>
