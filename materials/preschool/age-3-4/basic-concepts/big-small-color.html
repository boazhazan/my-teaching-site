<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>גדול וקטן — צבעו את הגדול והקטן | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0ff;--card:#fff;--pri:#6c5ce7;--pri-l:#ede9fe;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.mb{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.mbtn{padding:8px 18px;border-radius:24px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.mbtn:hover{border-color:var(--pri)}.mbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#a29bfe);border-radius:10px;transition:width 0.5s}
.pss{display:flex;gap:16px}.ps2{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.hb{text-align:center;padding:8px;background:#fff3cd;color:#856404;font-weight:600;font-size:0.9rem;display:none}.hb.show{display:block}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
/* Card */
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}.mc.bad{border-color:var(--no);background:var(--no-l)}
.mc.dw{touch-action:none}.mc .dc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;border-radius:var(--r)}
.mc.done .dc{display:none}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.85rem;color:var(--txt2);font-weight:500}
/* Color picker */
.color-picker{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;position:relative;z-index:15}
.cpick{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:24px;border:3px solid var(--brd);cursor:pointer;transition:all 0.25s;font-weight:700;font-size:0.9rem;-webkit-user-select:none;user-select:none}
.cpick:hover{transform:scale(1.05)}.cpick.active{box-shadow:0 0 0 3px rgba(0,0,0,0.2);transform:scale(1.08)}
.cpick .dot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(0,0,0,0.15)}
.cpick.done-pick{opacity:0.5;pointer-events:none}
/* Items */
.items-row{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;align-items:flex-end;padding:20px 10px}
.item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all 0.3s;-webkit-user-select:none;user-select:none;padding:8px;border-radius:var(--rs);border:3px solid transparent;position:relative}
.item:hover:not(.colored){transform:scale(1.05);border-color:var(--brd)}
.item.colored{cursor:default}
.item .emoji{line-height:1;transition:all 0.3s}
.item .ring{position:absolute;top:-6px;left:-6px;right:-6px;bottom:-6px;border-radius:50%;border:5px solid transparent;transition:all 0.3s;pointer-events:none}
.item.colored .ring{opacity:1}
.item .lb{font-size:0.7rem;font-weight:600;color:var(--txt2)}
/* Draw mode circle */
.item.circled::before{content:'';position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px;border:5px solid var(--circ-color, var(--pri));border-radius:50%;z-index:12;animation:cpop 0.4s ease forwards}
@keyframes cpop{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
.cfb{text-align:center;margin-top:12px;font-weight:700;font-size:0.95rem;min-height:22px;opacity:0;transition:opacity 0.3s}
.cfb.show{opacity:1}.cfb.ok{color:var(--ok)}.cfb.bad{color:var(--no)}
/* Level done */
.ld{background:linear-gradient(135deg,var(--pri),#a29bfe);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .sc{font-size:2.2rem;font-weight:900;margin:12px 0}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}
.mb,.ps,.tw,.acts,.nopr,.ld,.hb,.cfb,.color-picker{display:none!important}.ct{padding:8px 0}
.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}
.dc{display:none!important}.ph{display:block!important}.plh{display:block!important;text-align:center;color:#666;font-size:0.8rem;margin-top:8px}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
.plh{display:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.mc{padding:16px 12px}.mbtn{padding:6px 12px;font-size:0.8rem}.tb{padding:6px 12px;font-size:0.75rem}.items-row{gap:10px}.cpick{padding:6px 12px;font-size:0.8rem}.cpick .dot{width:20px;height:20px}}
</style>
</head>
<body>
<div class="hd"><h1>📏 גדול וקטן</h1><p>צבעו את הגדול ביותר בצבע אחד ואת הקטן ביותר בצבע אחר!</p></div>
<div class="mb nopr">
<button class="mbtn on" onclick="setM('click')" id="mc1"><span>👆</span> לחיצה</button>
<button class="mbtn" onclick="setM('draw')" id="mc2"><span>✏️</span> ציור עיגול</button>
<button class="mbtn" onclick="window.print()"><span>🖨️</span> הדפסה</button>
</div>
<div class="ps nopr"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pss"><span class="ps2" style="color:var(--ok)">✅ <span id="g1">0</span></span><span class="ps2" style="color:var(--no)">❌ <span id="g2">0</span></span></div></div></div>
<div class="tw nopr"><div class="ts" id="tabs"></div></div>
<div class="hb" id="hb">✏️ בחרו צבע ואז ציירו עיגול סביב הפריט המתאים!</div>
<div class="ct" id="area"></div>
<script>
// Color pairs for big/small per level (different each level)
const CPAIRS=[
  {big:{c:'#e74c3c',n:'אדום'},small:{c:'#3498db',n:'כחול'}},
  {big:{c:'#27ae60',n:'ירוק'},small:{c:'#e67e22',n:'כתום'}},
  {big:{c:'#9b59b6',n:'סגול'},small:{c:'#f1c40f',n:'צהוב'}},
  {big:{c:'#2980b9',n:'כחול'},small:{c:'#e84393',n:'ורוד'}},
  {big:{c:'#d35400',n:'כתום'},small:{c:'#1abc9c',n:'טורקיז'}},
  {big:{c:'#c0392b',n:'בורדו'},small:{c:'#2ecc71',n:'ירוק'}},
  {big:{c:'#8e44ad',n:'סגול'},small:{c:'#e74c3c',n:'אדום'}},
  {big:{c:'#16a085',n:'טורקיז'},small:{c:'#d35400',n:'כתום'}},
  {big:{c:'#2c3e50',n:'כהה'},small:{c:'#f39c12',n:'צהוב'}},
  {big:{c:'#e84393',n:'ורוד'},small:{c:'#0984e3',n:'כחול'}},
  {big:{c:'#6c5ce7',n:'סגול'},small:{c:'#00b894',n:'ירוק'}},
  {big:{c:'#fd79a8',n:'ורוד'},small:{c:'#636e72',n:'אפור'}},
  {big:{c:'#e17055',n:'כתום'},small:{c:'#74b9ff',n:'תכלת'}},
  {big:{c:'#00cec9',n:'טורקיז'},small:{c:'#d63031',n:'אדום'}},
  {big:{c:'#fdcb6e',n:'צהוב'},small:{c:'#6c5ce7',n:'סגול'}}
];

// Levels: each has questions, each question has an emoji and sizes array
// sizes are relative font sizes, biggest=correct for big, smallest=correct for small
const LV=[
{id:1,t:'חיות',qs:[
  {e:'🦌',sizes:[2.5,1.2,3.8,2]},
  {e:'📖',sizes:[3.5,1.5,3,1]},
  {e:'🌳',sizes:[2,4,1.3,3]}
]},
{id:2,t:'תחבורה',qs:[
  {e:'🪥',sizes:[2.8,2,3.2,2.5,1.2]},
  {e:'✈️',sizes:[2,4,1,2.8]},
  {e:'🐬',sizes:[1.5,3,2.2,3.5,1]}
]},
{id:3,t:'פירות',qs:[
  {e:'🍎',sizes:[3,1.5,2.5,1]},
  {e:'🍌',sizes:[1.2,3.5,2,2.8]},
  {e:'🍇',sizes:[2.5,1,3,2]}
]},
{id:4,t:'בעלי חיים',qs:[
  {e:'🐱',sizes:[1,3,2,3.5]},
  {e:'🐶',sizes:[3.2,1.5,2.5,1]},
  {e:'🐸',sizes:[2,1,3.5,2.5]}
]},
{id:5,t:'כלים',qs:[
  {e:'✂️',sizes:[3,1.5,2,3.5,1]},
  {e:'🔨',sizes:[1.2,2.5,3.8,2]},
  {e:'🖊️',sizes:[2,3,1,2.5]}
]},
{id:6,t:'ספורט',qs:[
  {e:'⚽',sizes:[3.5,2,1,2.5]},
  {e:'🏀',sizes:[1.5,3,2.5,1]},
  {e:'🎾',sizes:[2,1,3,2.5,1.5]}
]},
{id:7,t:'טבע',qs:[
  {e:'🌸',sizes:[1,2.5,3.5,2]},
  {e:'🌲',sizes:[3,1.5,2,4]},
  {e:'🍄',sizes:[2.5,1,3,1.5]}
]},
{id:8,t:'ים',qs:[
  {e:'🐟',sizes:[1,2,3,4]},
  {e:'🐚',sizes:[3.5,1.5,2.5,1]},
  {e:'🦀',sizes:[2,3,1,2.5]}
]},
{id:9,t:'מזון',qs:[
  {e:'🍕',sizes:[3,1,2.5,2]},
  {e:'🍩',sizes:[1.5,3.5,2,1]},
  {e:'🧁',sizes:[2,1,3,2.5]}
]},
{id:10,t:'בגדים',qs:[
  {e:'👕',sizes:[3.5,2,1.5,1]},
  {e:'👟',sizes:[1,2.5,3,2]},
  {e:'👒',sizes:[2,3.5,1,2.5]}
]},
{id:11,t:'שמיים',qs:[
  {e:'⭐',sizes:[1.5,3,2,1,3.5]},
  {e:'☁️',sizes:[3,1,2.5,2]},
  {e:'🌙',sizes:[2,3.5,1.5,1]}
]},
{id:12,t:'חרקים',qs:[
  {e:'🐛',sizes:[3,1,2,2.5]},
  {e:'🦋',sizes:[1.5,3.5,2,1]},
  {e:'🐞',sizes:[2,1,3,1.5]}
]},
{id:13,t:'בית',qs:[
  {e:'🏠',sizes:[3.5,2,1,2.5]},
  {e:'🪑',sizes:[1,2.5,3,2]},
  {e:'🔑',sizes:[2,1,3.5,1.5]}
]},
{id:14,t:'אתגר 1',qs:[
  {e:'🎈',sizes:[1,2,3,4,2.5]},
  {e:'🎁',sizes:[3.5,1.5,2.5,1,3]},
  {e:'🎂',sizes:[2,3,1,2.5,3.5]}
]},
{id:15,t:'אתגר 2',qs:[
  {e:'🚀',sizes:[2,4,1,3,2.5]},
  {e:'💎',sizes:[3,1,2,3.5,1.5]},
  {e:'👑',sizes:[1.5,2.5,3.5,1,3]}
]}
];

let cur=0,md='click',g1=0,g2=0,res={},selColor=null;
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
const E1=['!מעולה 🎉','!עין חדה 🔍','!יופי 👏','!מדהים 🌟'];

function rTabs(){const el=document.getElementById('tabs');el.innerHTML=LV.map((l,i)=>`<button class="tb ${i===cur?'on':''} ${res[l.id]?'dn':''}" onclick="go(${i})">${l.t}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}

function rLv(){
const lv=LV[cur],ar=document.getElementById('area'),cp=CPAIRS[cur%CPAIRS.length];
const isDw=md==='draw';
selColor=null;

let h=`<div class="ph">📏 גדול וקטן — ${lv.t}</div>`;

lv.qs.forEach((q,qi)=>{
  // Shuffle positions
  const indexed=q.sizes.map((s,i)=>({s,origIdx:i}));
  const shuffled=sh(indexed);
  const maxS=Math.max(...q.sizes);
  const minS=Math.min(...q.sizes);

  h+=`<div class="mc ${isDw?'dw':''}" id="q${qi}" data-found-big="0" data-found-small="0" data-wrong="0">`;
  if(isDw) h+=`<canvas class="dc" id="cv${qi}"></canvas>`;
  h+=`<div class="mh"><div class="mn">${qi+1}</div><span class="mht">💡 צבעו את הגדול ביותר ואת הקטן ביותר</span></div>`;

  // Color picker
  h+=`<div class="color-picker" id="cp${qi}">`;
  h+=`<div class="cpick" id="cpBig${qi}" data-qi="${qi}" data-type="big" onclick="pickColor(this)" style="border-color:${cp.big.c}"><div class="dot" style="background:${cp.big.c}"></div>גדול = ${cp.big.n}</div>`;
  h+=`<div class="cpick" id="cpSmall${qi}" data-qi="${qi}" data-type="small" onclick="pickColor(this)" style="border-color:${cp.small.c}"><div class="dot" style="background:${cp.small.c}"></div>קטן = ${cp.small.n}</div>`;
  h+=`</div>`;

  // Items
  h+=`<div class="items-row">`;
  shuffled.forEach((item,i)=>{
    const sz=item.s;
    const isBig=sz===maxS;
    const isSmall=sz===minS;
    h+=`<div class="item" data-qi="${qi}" data-is-big="${isBig}" data-is-small="${isSmall}" data-idx="${i}" onclick="pickItem(this)">`;
    h+=`<div class="ring"></div>`;
    h+=`<span class="emoji" style="font-size:${sz}rem">${q.e}</span>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  h+=`<div class="cfb" id="fb${qi}"></div>`;
  h+=`<div class="plh">צבעו את הגדול ביותר בצבע אחד ואת הקטן ביותר בצבע אחר</div>`;
  h+=`</div>`;
});

h+=`<div class="ld" id="ld"><div class="big">🌟</div><h2 id="lt"></h2><p id="ls"></p><div class="sc" id="lsc"></div><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<LV.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;

ar.innerHTML=h;
ar._done=0;ar._total=lv.qs.length;
if(isDw) initDraw();
rTabs();uPr();
}

// Color picking
function pickColor(el){
  const qi=el.dataset.qi;
  // Deselect others in same card
  document.querySelectorAll(`#cp${qi} .cpick`).forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  selColor={qi,type:el.dataset.type};
}

// Item picking (click mode)
function pickItem(el){
  if(el.classList.contains('colored'))return;
  if(!selColor)return;
  const qi=el.dataset.qi;
  if(selColor.qi!==qi)return;

  const card=document.getElementById('q'+qi);
  const cp=CPAIRS[cur%CPAIRS.length];
  const type=selColor.type;
  const isCorrect=(type==='big'&&el.dataset.isBig==='true')||(type==='small'&&el.dataset.isSmall==='true');

  if(isCorrect){
    const color=type==='big'?cp.big.c:cp.small.c;
    el.classList.add('colored');
    el.querySelector('.ring').style.borderColor=color;
    el.querySelector('.emoji').style.textShadow=`0 0 20px ${color}`;
    if(type==='big'){card.dataset.foundBig='1';document.getElementById('cpBig'+qi).classList.add('done-pick')}
    else{card.dataset.foundSmall='1';document.getElementById('cpSmall'+qi).classList.add('done-pick')}
    g1++;
    // Deselect color
    document.querySelectorAll(`#cp${qi} .cpick`).forEach(c=>c.classList.remove('active'));
    selColor=null;
    checkDone(qi);
  } else {
    el.style.animation='shake 0.5s';
    setTimeout(()=>el.style.animation='',600);
    g2++;
    card.dataset.wrong=parseInt(card.dataset.wrong)+1;
  }
  uPr();
}

function checkDone(qi){
  const card=document.getElementById('q'+qi);
  if(card.dataset.foundBig==='1'&&card.dataset.foundSmall==='1'){
    const w=parseInt(card.dataset.wrong);
    const fb=document.getElementById('fb'+qi);
    if(w===0){card.classList.add('ok');fb.textContent=E1[Math.floor(Math.random()*E1.length)];fb.classList.add('ok','show')}
    else{card.classList.add('bad');fb.textContent=`סיימתם עם ${w} טעויות 💪`;fb.classList.add('bad','show')}
    card.classList.add('done');
    const ar=document.getElementById('area');
    ar._done++;
    if(ar._done>=ar._total)setTimeout(showD,600);
  }
}

// Draw mode
function initDraw(){
  document.getElementById('hb').classList.add('show');
  document.querySelectorAll('.mc.dw').forEach(card=>{
    const qi=card.id.replace('q','');
    const cv=document.getElementById('cv'+qi);
    if(!cv)return;
    cv.width=card.offsetWidth;cv.height=card.offsetHeight;
    const ctx=cv.getContext('2d');
    let dw=false,pts=[];

    cv.addEventListener('pointerdown',function(e){
      if(card.classList.contains('done'))return;
      if(!selColor||selColor.qi!==qi)return;
      e.preventDefault();e.stopPropagation();
      const cp=CPAIRS[cur%CPAIRS.length];
      const col=selColor.type==='big'?cp.big.c:cp.small.c;
      dw=true;pts=[];ctx.clearRect(0,0,cv.width,cv.height);
      const r=cv.getBoundingClientRect();
      const p={x:e.clientX-r.left,y:e.clientY-r.top,cx:e.clientX,cy:e.clientY};
      pts.push(p);ctx.beginPath();ctx.moveTo(p.x,p.y);
      ctx.strokeStyle=col;ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';
    },{passive:false});

    cv.addEventListener('pointermove',function(e){
      if(!dw)return;e.preventDefault();e.stopPropagation();
      const r=cv.getBoundingClientRect();
      const p={x:e.clientX-r.left,y:e.clientY-r.top,cx:e.clientX,cy:e.clientY};
      pts.push(p);ctx.lineTo(p.x,p.y);ctx.stroke();
    },{passive:false});

    cv.addEventListener('pointerup',function(e){
      if(!dw)return;e.preventDefault();dw=false;
      if(pts.length<10){ctx.clearRect(0,0,cv.width,cv.height);return}
      let cx=0,cy=0;pts.forEach(p=>{cx+=p.cx;cy+=p.cy});cx/=pts.length;cy/=pts.length;
      setTimeout(()=>ctx.clearRect(0,0,cv.width,cv.height),300);

      const items=card.querySelectorAll('.item:not(.colored)');
      let best=null,bestD=Infinity;
      for(const it of items){const r=it.getBoundingClientRect();const d=Math.sqrt((cx-(r.left+r.width/2))**2+(cy-(r.top+r.height/2))**2);if(d<Math.max(r.width,r.height)*1.5&&d<bestD){bestD=d;best=it}}

      if(best){
        const type=selColor.type;
        const isCorrect=(type==='big'&&best.dataset.isBig==='true')||(type==='small'&&best.dataset.isSmall==='true');
        const cp=CPAIRS[cur%CPAIRS.length];
        if(isCorrect){
          const color=type==='big'?cp.big.c:cp.small.c;
          best.classList.add('colored','circled');
          best.style.setProperty('--circ-color',color);
          best.querySelector('.ring').style.borderColor=color;
          best.querySelector('.emoji').style.textShadow=`0 0 20px ${color}`;
          if(type==='big'){card.dataset.foundBig='1';document.getElementById('cpBig'+qi).classList.add('done-pick')}
          else{card.dataset.foundSmall='1';document.getElementById('cpSmall'+qi).classList.add('done-pick')}
          g1++;
          document.querySelectorAll(`#cp${qi} .cpick`).forEach(c=>c.classList.remove('active'));
          selColor=null;
          checkDone(qi);
        } else {
          best.style.animation='shake 0.5s';
          setTimeout(()=>best.style.animation='',600);
          g2++;card.dataset.wrong=parseInt(card.dataset.wrong)+1;
        }
        uPr();
      }
    },{passive:false});

    cv.addEventListener('pointercancel',function(){dw=false;ctx.clearRect(0,0,cv.width,cv.height)});
  });
}

function showD(){
  res[LV[cur].id]=true;
  let tw=0;LV[cur].qs.forEach((q,i)=>{tw+=parseInt(document.getElementById('q'+i).dataset.wrong)});
  const t=LV[cur].qs.length*2;
  const el=document.getElementById('ld');
  document.getElementById('lsc').textContent=(t-Math.min(tw,t))+' / '+t;
  if(tw===0){document.getElementById('lt').textContent='🏆 מושלם!';document.getElementById('ls').textContent='צבעתם הכל נכון!'}
  else if(tw<=2){document.getElementById('lt').textContent='👏 כל הכבוד!';document.getElementById('ls').textContent='כמעט מושלם!'}
  else{document.getElementById('lt').textContent='💪 סיימתם!';document.getElementById('ls').textContent='נסו שוב לשיפור!'}
  el.classList.add('show');el.scrollIntoView({behavior:'smooth',block:'center'});rTabs();
}

function go(i){cur=i;selColor=null;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function nxt(){if(cur<LV.length-1){cur++;selColor=null;rLv();window.scrollTo({top:0,behavior:'smooth'})}}
function retry(){selColor=null;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function setM(m){md=m;selColor=null;document.getElementById('mc1').classList.toggle('on',m==='click');document.getElementById('mc2').classList.toggle('on',m==='draw');if(m==='click')document.getElementById('hb').classList.remove('show');rLv()}
function uPr(){const d=Object.keys(res).length;document.getElementById('pf').style.width=Math.round(d/LV.length*100)+'%';document.getElementById('g1').textContent=g1;document.getElementById('g2').textContent=g2}
rLv();
</script>
