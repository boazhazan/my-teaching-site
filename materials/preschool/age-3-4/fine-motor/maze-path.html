<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מה הדרך? — מבוכים | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff8f0;--card:#fff;--pri:#e17055;--pri-l:#ffeaa7;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#e17055,#fab1a0);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.topbar{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#fab1a0);border-radius:10px;transition:width 0.5s}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.palette{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:12px;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px;position:sticky;top:96px;z-index:12}
.pc{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.pc:hover{transform:scale(1.15)}.pc.on{border-color:#2d3436;transform:scale(1.2);box-shadow:0 0 0 3px rgba(0,0,0,0.15)}
.plb{font-size:0.8rem;font-weight:600;color:var(--txt2);padding:0 8px;display:flex;align-items:center}
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative;overflow:hidden}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}
.mc-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;flex-wrap:wrap;gap:8px}
.mc-r{display:flex;align-items:center;gap:10px}
.mc-n{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mc-h{font-size:0.85rem;color:var(--txt2);font-weight:500}
.diff-badge{padding:4px 12px;border-radius:12px;font-size:0.75rem;font-weight:700;color:#fff}
.diff-easy{background:#27ae60}.diff-med{background:#e67e22}.diff-hard{background:#e74c3c}
.maze-outer{max-width:520px;margin:0 auto;padding:0 16px 16px}
.mw{position:relative;width:100%;touch-action:none;cursor:crosshair}
.mw canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.mw .cbg{z-index:1}.mw .cdw{z-index:2}
.ms{text-align:center;padding:12px;font-weight:700;font-size:1rem;min-height:40px}
.ms.ok{color:var(--ok)}.ms.info{color:var(--pri)}.ms.no{color:var(--no)}
.ma{display:flex;justify-content:center;gap:8px;padding:0 16px 16px;flex-wrap:wrap}
.ab{padding:8px 18px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.25s}
.ab:hover{border-color:var(--pri);background:var(--pri-l)}
.ld{background:linear-gradient(135deg,var(--pri),#fab1a0);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}
.topbar,.ps,.tw,.acts,.ld,.palette,.ma,.ms,.diff-badge{display:none!important}.ct{padding:8px 0}
.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.cdw{display:none!important}.ph{display:block!important}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.pc{width:28px;height:28px}.palette{gap:4px;padding:8px}.tb{padding:6px 12px;font-size:0.75rem}}
</style>
</head>
<body>
<div class="hd"><h1>🏁 מה הדרך?</h1><p>מצאו את הדרך במבוך — ציירו עם האצבע!</p></div>
<div class="topbar"><button class="ab" onclick="window.print()">🖨️ הדפסה</button></div>
<div class="ps"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div></div></div>
<div class="tw"><div class="ts" id="tabs"></div></div>
<div class="ct" id="area"></div>
<script>
const COLS=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60','#1abc9c','#3498db','#2980b9','#9b59b6','#8e44ad','#e84393','#fd79a8','#00cec9','#6c5ce7','#fdcb6e','#55efc4','#74b9ff','#a29bfe','#fab1a0','#2d3436'];

const THEMES=[
  {eS:'🐦',eE:'🏠',t:'ציפור לבית',sz:5,d:'easy'},
  {eS:'🐟',eE:'🌊',t:'דג לים',sz:5,d:'easy'},
  {eS:'🐶',eE:'🦴',t:'כלב לעצם',sz:5,d:'easy'},
  {eS:'🐝',eE:'🌸',t:'דבורה לפרח',sz:6,d:'easy'},
  {eS:'🐱',eE:'🥛',t:'חתול לחלב',sz:6,d:'easy'},
  {eS:'🐰',eE:'🥕',t:'ארנב לגזר',sz:7,d:'med'},
  {eS:'🦋',eE:'🌺',t:'פרפר לפרח',sz:7,d:'med'},
  {eS:'🐭',eE:'🧀',t:'עכבר לגבינה',sz:7,d:'med'},
  {eS:'🚂',eE:'🏠',t:'רכבת לתחנה',sz:8,d:'med'},
  {eS:'⭐',eE:'🌙',t:'כוכב לירח',sz:8,d:'med'},
  {eS:'🐵',eE:'🍌',t:'קוף לבננה',sz:9,d:'hard'},
  {eS:'⛵',eE:'🏝️',t:'ספינה לאי',sz:9,d:'hard'},
  {eS:'🐜',eE:'🍬',t:'נמלה לסוכר',sz:10,d:'hard'},
  {eS:'🐌',eE:'🍃',t:'חילזון לעלה',sz:10,d:'hard'},
  {eS:'🦅',eE:'💧',t:'נשר למים',sz:10,d:'hard'}
];
const DLABELS={easy:'קל 🟢',med:'בינוני 🟠',hard:'קשה 🔴'};
const DCLS={easy:'diff-easy',med:'diff-med',hard:'diff-hard'};

let cur=0,selC=COLS[0],reso={},mazeData=null;

// ===== MAZE GENERATOR — Recursive Backtracker =====
function genMaze(n){
  const g=[];
  for(let r=0;r<n;r++){g[r]=[];for(let c=0;c<n;c++)g[r][c]={t:true,r:true,b:true,l:true,v:false}}
  const stk=[];let cr=0,cc=0;g[0][0].v=true;let vis=1,tot=n*n;
  function nb(r,c){const a=[];
    if(r>0&&!g[r-1][c].v)a.push([r-1,c,'t','b']);
    if(r<n-1&&!g[r+1][c].v)a.push([r+1,c,'b','t']);
    if(c>0&&!g[r][c-1].v)a.push([r,c-1,'l','r']);
    if(c<n-1&&!g[r][c+1].v)a.push([r,c+1,'r','l']);
    return a}
  while(vis<tot){const ns=nb(cr,cc);
    if(ns.length){const p=ns[Math.floor(Math.random()*ns.length)];stk.push([cr,cc]);
      g[cr][cc][p[2]]=false;g[p[0]][p[1]][p[3]]=false;cr=p[0];cc=p[1];g[cr][cc].v=true;vis++}
    else if(stk.length){const prev=stk.pop();cr=prev[0];cc=prev[1]}}
  const startC=Math.floor(Math.random()*n);
  const endC=Math.floor(Math.random()*n);
  g[0][startC].t=false;
  g[n-1][endC].b=false;
  return {grid:g,startC,endC};
}

// ===== DRAW MAZE — emojis drawn on canvas =====
function drawMaze(ctx,maze,canW,canH,n,th){
  const {grid,startC,endC}=maze;
  const emoZone=canW*0.12;
  const mazeW=canW;
  const cell=mazeW/n;
  const mazeTop=emoZone;

  ctx.clearRect(0,0,canW,canH);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canW,canH);
  const wallW=Math.max(2.5,canW/100);
  ctx.strokeStyle='#2d3436';ctx.lineWidth=wallW;ctx.lineCap='square';

  for(let r=0;r<n;r++){for(let c=0;c<n;c++){
    const x=c*cell,y=mazeTop+r*cell;
    if(grid[r][c].t){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cell,y);ctx.stroke()}
    if(grid[r][c].l){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cell);ctx.stroke()}
    if(c===n-1&&grid[r][c].r){ctx.beginPath();ctx.moveTo(x+cell,y);ctx.lineTo(x+cell,y+cell);ctx.stroke()}
    if(r===n-1&&grid[r][c].b){ctx.beginPath();ctx.moveTo(x,y+cell);ctx.lineTo(x+cell,y+cell);ctx.stroke()}
  }}

  // Emojis
  const eSz=Math.min(cell*0.8,emoZone*0.8);
  ctx.font=eSz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(th.eS, startC*cell+cell/2, emoZone*0.5);
  ctx.fillText(th.eE, endC*cell+cell/2, canH-emoZone*0.5);

  // Dots
  const dotR=Math.max(2,cell*0.1);
  ctx.fillStyle='#27ae60';ctx.beginPath();ctx.arc(startC*cell+cell/2,mazeTop+cell*0.15,dotR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(endC*cell+cell/2,mazeTop+(n-1)*cell+cell*0.85,dotR,0,Math.PI*2);ctx.fill();

  maze._mazeTop=mazeTop;maze._cell=cell;maze._emoZone=emoZone;
}

// ===== RENDER =====
function rTabs(){const el=document.getElementById('tabs');el.innerHTML=THEMES.map((t,i)=>`<button class="tb ${i===cur?'on':''} ${reso[i]?'dn':''}" onclick="go(${i})">${t.t}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}

function rLv(){
const th=THEMES[cur],ar=document.getElementById('area');
let h=`<div class="ph">🏁 מה הדרך — ${th.t}</div>`;
h+=`<div class="palette"><span class="plb">🎨 צבע:</span>`;
COLS.forEach((c,i)=>h+=`<div class="pc ${i===0?'on':''}" style="background:${c}" data-c="${c}" onclick="pickC(this)"></div>`);
h+=`</div>`;
h+=`<div class="mc" id="q0">`;
h+=`<div class="mc-head"><div class="mc-r"><div class="mc-n">🏁</div><span class="mc-h">עזרו ל-${th.eS} להגיע אל ${th.eE}</span></div>`;
h+=`<span class="diff-badge ${DCLS[th.d]}">${DLABELS[th.d]}</span></div>`;
h+=`<div class="maze-outer"><div class="mw" id="mw0"><canvas class="cbg" id="bg0"></canvas><canvas class="cdw" id="dw0"></canvas></div></div>`;
h+=`<div class="ms" id="st0"></div>`;
h+=`<div class="ma"><button class="ab" onclick="clr()">🗑️ מחק</button><button class="ab" onclick="chk()">✅ בדיקה</button></div>`;
h+=`</div>`;
h+=`<div class="ld" id="ld"><div class="big">🏆</div><h2>מצאתם את הדרך!</h2><p>יופי של מבוך!</p><div class="acts"><button class="btn bw" onclick="retry()">🔄 מבוך חדש</button>${cur<THEMES.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;
ar.innerHTML=h;
initMaze();rTabs();uPr();
}

function initMaze(){
const th=THEMES[cur];
const wrap=document.getElementById('mw0');
const bg=document.getElementById('bg0');
const dw=document.getElementById('dw0');
const w=Math.min(wrap.offsetWidth,500);
const h=Math.round(w*1.24);
[bg,dw].forEach(c=>{c.width=w;c.height=h;c.style.width=w+'px';c.style.height=h+'px'});
wrap.style.height=h+'px';wrap.style.maxWidth=w+'px';

mazeData=genMaze(th.sz);
drawMaze(bg.getContext('2d'),mazeData,w,h,th.sz,th);

const cell=mazeData._cell;
const dwCtx=dw.getContext('2d');
let drawing=false;
const lineW=Math.max(3,cell*0.35);

dw.addEventListener('pointerdown',function(e){
  e.preventDefault();drawing=true;
  const r=dw.getBoundingClientRect();
  dwCtx.beginPath();dwCtx.moveTo(e.clientX-r.left,e.clientY-r.top);
  dwCtx.strokeStyle=selC;dwCtx.lineWidth=lineW;dwCtx.lineCap='round';dwCtx.lineJoin='round';
},{passive:false});
dw.addEventListener('pointermove',function(e){
  if(!drawing)return;e.preventDefault();
  const r=dw.getBoundingClientRect();dwCtx.lineTo(e.clientX-r.left,e.clientY-r.top);dwCtx.stroke();
},{passive:false});
dw.addEventListener('pointerup',function(){drawing=false},{passive:false});
dw.addEventListener('pointercancel',function(){drawing=false});
}

function pickC(el){document.querySelectorAll('.pc').forEach(c=>c.classList.remove('on'));el.classList.add('on');selC=el.dataset.c}

function clr(){
  const dw=document.getElementById('dw0');
  dw.getContext('2d').clearRect(0,0,dw.width,dw.height);
  document.getElementById('st0').textContent='';document.getElementById('st0').className='ms';
}

function chk(){
  const th=THEMES[cur];const dw=document.getElementById('dw0');
  const w=dw.width;const h=dw.height;const n=th.sz;
  const mazeTop=mazeData._mazeTop;const cell=mazeData._cell;
  const grid=mazeData.grid;
  const ctx=dw.getContext('2d');
  const imgData=ctx.getImageData(0,0,w,h).data;

  // Check if a cell has drawing in it (scan most of the cell area)
  function cellHasDrawing(r,c){
    const cellX=Math.round(c*cell);
    const cellY=Math.round(mazeTop+r*cell);
    const margin=Math.max(2,Math.round(cell*0.1)); // skip edges near walls
    const step=Math.max(1,Math.round(cell/12)); // sample every few pixels
    for(let px=cellX+margin;px<cellX+cell-margin;px+=step){
      for(let py=cellY+margin;py<cellY+cell-margin;py+=step){
        if(px<0||py<0||px>=w||py>=h)continue;
        if(imgData[(py*w+px)*4+3]>50)return true;
      }
    }
    return false;
  }

  // BFS: find if there's a drawn path from start to end through connected cells
  const startR=0, startC=mazeData.startC;
  const endR=n-1, endC=mazeData.endC;

  // First check if drawing exists near start and end
  if(!cellHasDrawing(startR,startC)){
    document.getElementById('st0').textContent='✏️ התחילו לצייר מ-'+th.eS+' למעלה';
    document.getElementById('st0').className='ms info';return;
  }
  if(!cellHasDrawing(endR,endC)){
    document.getElementById('st0').textContent='🤔 עוד לא הגעתם אל '+th.eE+' — המשיכו!';
    document.getElementById('st0').className='ms no';return;
  }

  // BFS through cells that have drawing AND are connected (no wall between them)
  const visited=Array.from({length:n},()=>Array(n).fill(false));
  const queue=[[startR,startC]];
  visited[startR][startC]=true;
  let reachedEnd=false;

  while(queue.length>0){
    const [cr,cc]=queue.shift();
    if(cr===endR&&cc===endC){reachedEnd=true;break}
    // Check 4 neighbors
    const dirs=[
      [-1,0,'t','b'], // up: current cell has no top wall
      [1,0,'b','t'],  // down: current cell has no bottom wall
      [0,-1,'l','r'],  // left
      [0,1,'r','l']    // right
    ];
    for(const [dr,dc,myWall] of dirs){
      const nr=cr+dr,nc=cc+dc;
      if(nr<0||nr>=n||nc<0||nc>=n)continue;
      if(visited[nr][nc])continue;
      // Check no wall between current and neighbor
      if(grid[cr][cc][myWall])continue; // wall exists, can't pass
      // Check if neighbor cell has drawing
      if(!cellHasDrawing(nr,nc))continue;
      visited[nr][nc]=true;
      queue.push([nr,nc]);
    }
  }

  const st=document.getElementById('st0');
  if(reachedEnd){
    st.textContent='🎉 מצאתם את הדרך! כל הכבוד!';st.className='ms ok';
    document.getElementById('q0').classList.add('ok');
    reso[cur]=true;
    setTimeout(()=>{document.getElementById('ld').classList.add('show');document.getElementById('ld').scrollIntoView({behavior:'smooth',block:'center'})},500);
    rTabs();uPr();
  } else {
    st.textContent='🤔 הציור לא עובר דרך המבוך — נסו לעקוב אחרי השבילים!';st.className='ms no';
  }
}

function go(i){cur=i;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function nxt(){if(cur<THEMES.length-1){cur++;rLv();window.scrollTo({top:0,behavior:'smooth'})}}
function retry(){rLv();window.scrollTo({top:0,behavior:'smooth'})}
function uPr(){document.getElementById('pf').style.width=Math.round(Object.keys(reso).length/THEMES.length*100)+'%'}
rLv();
</script>
  <script src="../../../../js/auth-gate.js"></script>
</body>
