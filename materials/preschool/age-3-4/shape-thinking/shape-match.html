<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>צורות — מצאו את הצורות | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff5f5;--card:#fff;--pri:#6c5ce7;--pri-l:#ede9fe;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.mb{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.mbtn{padding:8px 18px;border-radius:24px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.mbtn:hover{border-color:var(--pri)}.mbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#a29bfe);border-radius:10px;transition:width 0.5s}
.pss{display:flex;gap:16px}.ps2{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.hb{text-align:center;padding:8px;background:#fff3cd;color:#856404;font-weight:600;font-size:0.9rem;display:none}.hb.show{display:block}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
/* Card */
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}.mc.bad{border-color:var(--no);background:var(--no-l)}
.mc.dw{touch-action:none}.mc .dc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;border-radius:var(--r)}
.mc.done .dc{display:none}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.85rem;color:var(--txt2);font-weight:500}
/* Center shape */
.center-shape{display:flex;justify-content:center;margin-bottom:20px}
.center-shape .shape-box{width:100px;height:100px;border:4px solid var(--pri);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;background:var(--pri-l)}
.center-shape .shape-box svg{width:70px;height:70px}
.center-shape .shape-label{display:flex;flex-direction:column;align-items:center;gap:4px}
.center-shape .shape-name{font-size:0.9rem;font-weight:700;color:var(--pri)}
/* Items grid */
.items-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px}
.gi{display:inline-flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all 0.25s;-webkit-user-select:none;user-select:none;padding:10px;border-radius:var(--rs);border:3px solid transparent;position:relative}
.gi:hover:not(.done){border-color:var(--pri);background:var(--pri-l);transform:scale(1.08)}
.gi.done-ok{border-color:var(--ok);background:var(--ok-l)}
.gi.done-ok::after{content:'✓';position:absolute;top:-8px;right:-8px;width:24px;height:24px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.75rem;display:flex;align-items:center;justify-content:center;animation:pop 0.3s}
.gi.done-no{border-color:var(--no);background:var(--no-l);animation:shake 0.5s}
.gi .emoji{font-size:3rem;line-height:1}
.gi .lb{font-size:0.7rem;font-weight:600;color:var(--txt2)}
/* Circled */
.gi.circled::before{content:'';position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px;border:4px solid var(--ok);border-radius:50%;z-index:12;animation:cpop 0.4s ease forwards}
@keyframes cpop{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
.cfb{text-align:center;margin-top:12px;font-weight:700;font-size:0.95rem;min-height:22px;opacity:0;transition:opacity 0.3s}
.cfb.show{opacity:1}.cfb.ok{color:var(--ok)}.cfb.bad{color:var(--no)}
.ccnt{text-align:center;font-size:0.85rem;color:var(--txt2);margin-top:10px;font-weight:600}
/* Level done */
.ld{background:linear-gradient(135deg,var(--pri),#a29bfe);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .sc{font-size:2.2rem;font-weight:900;margin:12px 0}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}
.mb,.ps,.tw,.acts,.ld,.hb,.cfb,.ccnt{display:none!important}.ct{padding:8px 0}
.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.gi{border-color:transparent}
.dc{display:none!important}.ph{display:block!important}.plh{display:block!important;text-align:center;color:#666;font-size:0.8rem;margin-top:8px}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
.plh{display:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.gi .emoji{font-size:2.3rem}.mc{padding:16px 12px}.mbtn{padding:6px 12px;font-size:0.8rem}.tb{padding:6px 12px;font-size:0.75rem}.items-grid{gap:10px}.center-shape .shape-box{width:80px;height:80px}.center-shape .shape-box svg{width:55px;height:55px}}
</style>
</head>
<body>
<div class="hd"><h1>🔷 צורות — מצאו את הדומות</h1><p>מצאו את כל הפריטים שדומים לצורה שבאמצע!</p></div>
<div class="mb nopr">
<button class="mbtn on" onclick="setM('click')" id="mc1"><span>👆</span> לחיצה</button>
<button class="mbtn" onclick="setM('draw')" id="mc2"><span>✏️</span> קו חיבור</button>
<button class="mbtn" onclick="window.print()"><span>🖨️</span> הדפסה</button>
</div>
<div class="ps nopr"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pss"><span class="ps2" style="color:var(--ok)">✅ <span id="g1">0</span></span><span class="ps2" style="color:var(--no)">❌ <span id="g2">0</span></span></div></div></div>
<div class="tw nopr"><div class="ts" id="tabs"></div></div>
<div class="hb" id="hb">✏️ ציירו קו מהצורה באמצע אל כל פריט שדומה לה!</div>
<div class="ct" id="area"></div>
<script>
// SVG shapes for center display
const SV={
  circle:'<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" fill="none" stroke="#6c5ce7" stroke-width="3"/></svg>',
  triangle:'<svg viewBox="0 0 64 64"><polygon points="32,6 58,56 6,56" fill="none" stroke="#6c5ce7" stroke-width="3"/></svg>',
  square:'<svg viewBox="0 0 64 64"><rect x="8" y="8" width="48" height="48" fill="none" stroke="#6c5ce7" stroke-width="3"/></svg>',
  rectangle:'<svg viewBox="0 0 64 64"><rect x="4" y="16" width="56" height="32" fill="none" stroke="#6c5ce7" stroke-width="3"/></svg>',
  star:'<svg viewBox="0 0 64 64"><polygon points="32,4 40,24 60,24 44,38 50,58 32,46 14,58 20,38 4,24 24,24" fill="none" stroke="#6c5ce7" stroke-width="3"/></svg>',
  heart:'<svg viewBox="0 0 64 64"><path d="M32,56C18,44 4,34 4,20C4,10 12,4 20,4C26,4 30,8 32,12C34,8 38,4 44,4C52,4 60,10 60,20C60,34 46,44 32,56Z" fill="none" stroke="#6c5ce7" stroke-width="3"/></svg>',
  diamond:'<svg viewBox="0 0 64 64"><polygon points="32,4 58,32 32,60 6,32" fill="none" stroke="#6c5ce7" stroke-width="3"/></svg>',
  oval:'<svg viewBox="0 0 64 64"><ellipse cx="32" cy="32" rx="28" ry="20" fill="none" stroke="#6c5ce7" stroke-width="3"/></svg>',
};

// Each level: target shape + items (some match, some don't)
// match=true means the item's shape is same as target
const LV=[
{id:1,t:'עיגול',shape:'circle',n:'עיגול',items:[
  {e:'⚽',l:'כדורגל',m:true},{e:'🕰️',l:'שעון',m:true},{e:'🍊',l:'תפוז',m:true},
  {e:'🎁',l:'מתנה',m:false},{e:'📖',l:'ספר',m:false},{e:'🏠',l:'בית',m:false},{e:'🎈',l:'בלון',m:true}
]},
{id:2,t:'משולש',shape:'triangle',n:'משולש',items:[
  {e:'🎄',l:'עץ חג',m:true},{e:'🔺',l:'משולש',m:true},{e:'⛺',l:'אוהל',m:true},
  {e:'📺',l:'טלוויזיה',m:false},{e:'🍎',l:'תפוח',m:false},{e:'🎸',l:'גיטרה',m:false},{e:'🏔️',l:'הר',m:true}
]},
{id:3,t:'ריבוע',shape:'square',n:'ריבוע',items:[
  {e:'📺',l:'טלוויזיה',m:true},{e:'🖼️',l:'תמונה',m:true},{e:'🧊',l:'קוביה',m:true},
  {e:'⚽',l:'כדור',m:false},{e:'🌙',l:'ירח',m:false},{e:'🍕',l:'פיצה',m:false},{e:'🎲',l:'קוביה',m:true}
]},
{id:4,t:'עיגול 2',shape:'circle',n:'עיגול',items:[
  {e:'🍪',l:'עוגיה',m:true},{e:'🏐',l:'כדור',m:true},{e:'🔴',l:'עיגול',m:true},
  {e:'🏠',l:'בית',m:false},{e:'📐',l:'סרגל',m:false},{e:'🎪',l:'אוהל',m:false},{e:'🍩',l:'סופגניה',m:true}
]},
{id:5,t:'משולש 2',shape:'triangle',n:'משולש',items:[
  {e:'🔔',l:'פעמון',m:true},{e:'🎂',l:'עוגה',m:true},{e:'📐',l:'סרגל',m:true},
  {e:'🍌',l:'בננה',m:false},{e:'📱',l:'טלפון',m:false},{e:'🎸',l:'גיטרה',m:false},{e:'🧀',l:'גבינה',m:true}
]},
{id:6,t:'ריבוע 2',shape:'square',n:'ריבוע',items:[
  {e:'📦',l:'קופסה',m:true},{e:'🖼️',l:'תמונה',m:true},{e:'💻',l:'מחשב',m:true},
  {e:'🌸',l:'פרח',m:false},{e:'🐟',l:'דג',m:false},{e:'🎈',l:'בלון',m:false},{e:'📋',l:'לוח',m:true}
]},
{id:7,t:'כוכב',shape:'star',n:'כוכב',items:[
  {e:'⭐',l:'כוכב',m:true},{e:'🌟',l:'כוכב',m:true},{e:'✡️',l:'מגן דוד',m:true},
  {e:'🏀',l:'כדורסל',m:false},{e:'🎵',l:'תו',m:false},{e:'🐱',l:'חתול',m:false},{e:'💫',l:'כוכב',m:true}
]},
{id:8,t:'לב',shape:'heart',n:'לב',items:[
  {e:'❤️',l:'לב',m:true},{e:'💝',l:'לב',m:true},{e:'💖',l:'לב',m:true},
  {e:'🔶',l:'מעוין',m:false},{e:'📚',l:'ספרים',m:false},{e:'🎭',l:'מסכות',m:false},{e:'💕',l:'לבבות',m:true}
]},
{id:9,t:'מלבן',shape:'rectangle',n:'מלבן',items:[
  {e:'📱',l:'טלפון',m:true},{e:'🚪',l:'דלת',m:true},{e:'🛏️',l:'מיטה',m:true},
  {e:'⚽',l:'כדור',m:false},{e:'🌙',l:'ירח',m:false},{e:'🔔',l:'פעמון',m:false},{e:'📏',l:'סרגל',m:true}
]},
{id:10,t:'יהלום',shape:'diamond',n:'יהלום',items:[
  {e:'💎',l:'יהלום',m:true},{e:'🔷',l:'יהלום',m:true},{e:'🪁',l:'עפיפון',m:true},
  {e:'🏐',l:'כדור',m:false},{e:'📖',l:'ספר',m:false},{e:'🌲',l:'עץ',m:false},{e:'♦️',l:'יהלום',m:true}
]},
{id:11,t:'עיגול ומשולש',shape:'circle',n:'עיגול',items:[
  {e:'🍎',l:'תפוח',m:true},{e:'⛺',l:'אוהל',m:false},{e:'🏀',l:'כדורסל',m:true},
  {e:'🔺',l:'משולש',m:false},{e:'🍊',l:'תפוז',m:true},{e:'🎄',l:'עץ',m:false},{e:'🌍',l:'כדור הארץ',m:true},{e:'📐',l:'סרגל',m:false}
]},
{id:12,t:'ריבוע ועיגול',shape:'square',n:'ריבוע',items:[
  {e:'📺',l:'טלוויזיה',m:true},{e:'⚽',l:'כדור',m:false},{e:'🖼️',l:'תמונה',m:true},
  {e:'🍪',l:'עוגיה',m:false},{e:'🧊',l:'קוביה',m:true},{e:'🍊',l:'תפוז',m:false},{e:'📦',l:'קופסה',m:true},{e:'🌙',l:'ירח',m:false}
]},
{id:13,t:'כוכב ולב',shape:'star',n:'כוכב',items:[
  {e:'⭐',l:'כוכב',m:true},{e:'❤️',l:'לב',m:false},{e:'🌟',l:'כוכב',m:true},
  {e:'💝',l:'לב',m:false},{e:'💫',l:'כוכב',m:true},{e:'💕',l:'לבבות',m:false},{e:'✡️',l:'מגן דוד',m:true},{e:'💜',l:'לב',m:false}
]},
{id:14,t:'אתגר — עיגול',shape:'circle',n:'עיגול',items:[
  {e:'⚽',l:'כדורגל',m:true},{e:'📺',l:'טלוויזיה',m:false},{e:'🍊',l:'תפוז',m:true},{e:'⛺',l:'אוהל',m:false},
  {e:'🕰️',l:'שעון',m:true},{e:'📦',l:'קופסה',m:false},{e:'🍪',l:'עוגיה',m:true},{e:'💎',l:'יהלום',m:false},{e:'🌍',l:'כדור הארץ',m:true}
]},
{id:15,t:'אתגר — משולש',shape:'triangle',n:'משולש',items:[
  {e:'🎄',l:'עץ חג',m:true},{e:'🍪',l:'עוגיה',m:false},{e:'⛺',l:'אוהל',m:true},{e:'⚽',l:'כדור',m:false},
  {e:'🏔️',l:'הר',m:true},{e:'📦',l:'קופסה',m:false},{e:'📐',l:'סרגל',m:true},{e:'🍊',l:'תפוז',m:false},{e:'🧀',l:'גבינה',m:true}
]}
];

let cur=0,md='click',g1=0,g2=0,res={};
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
const E1=['!מעולה 🎉','!עין חדה 🔍','!יופי 👏','!מדהים 🌟'];

function rTabs(){const lk=(typeof AuthState!=='undefined'&&!AuthState.isLoggedIn());const el=document.getElementById('tabs');el.innerHTML=LV.map((l,i)=>`<button class="tb ${i===cur?'on':''} ${res[l.id]?'dn':''}" onclick="go(${i})">${l.t}${lk&&i>0?' 🔒':''}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}

function rLv(){
const lv=LV[cur],ar=document.getElementById('area'),isDw=md==='draw';
const shuffled=sh(lv.items);
const need=lv.items.filter(x=>x.m).length;

let h=`<div class="ph">🔷 צורות — ${lv.t}</div>`;
h+=`<div class="mc ${isDw?'dw':''}" id="q0" data-need="${need}" data-found="0" data-wrong="0">`;
if(isDw) h+=`<canvas class="dc" id="cv0"></canvas>`;
h+=`<div class="mh"><div class="mn">${cur+1}</div><span class="mht">💡 מצאו את כל הפריטים שצורתם ${lv.n}</span></div>`;

// Center shape
h+=`<div class="center-shape"><div class="shape-label"><div class="shape-box">${SV[lv.shape]}</div><span class="shape-name">${lv.n}</span></div></div>`;

// Items
h+=`<div class="items-grid">`;
shuffled.forEach((item,i)=>{
  h+=`<div class="gi" data-match="${item.m}" data-idx="${i}" ${md==='click'?'onclick="pick(this)"':''}>`;
  h+=`<span class="emoji">${item.e}</span>`;
  h+=`<span class="lb">${item.l}</span>`;
  h+=`</div>`;
});
h+=`</div>`;
h+=`<div class="ccnt" id="cnt0">0 / ${need} נמצאו</div>`;
h+=`<div class="cfb" id="fb0"></div>`;
h+=`<div class="plh">מתחו קו מהצורה באמצע לכל פריט שדומה לה</div>`;
h+=`</div>`;

h+=`<div class="ld" id="ld"><div class="big">🌟</div><h2 id="lt"></h2><p id="ls"></p><div class="sc" id="lsc"></div><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<LV.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;

ar.innerHTML=h;
if(isDw) initDraw();
rTabs();uPr();
}

function pick(el){
  if(el.classList.contains('done-ok')||el.classList.contains('dis'))return;
  const card=document.getElementById('q0');
  if(el.dataset.match==='true'){
    el.classList.add('done-ok');g1++;
    card.dataset.found=parseInt(card.dataset.found)+1;
    checkDone();
  } else {
    el.classList.add('done-no');g2++;
    card.dataset.wrong=parseInt(card.dataset.wrong)+1;
    setTimeout(()=>el.classList.remove('done-no'),600);
  }
  uPr();
}

function checkDone(){
  const card=document.getElementById('q0');
  const found=parseInt(card.dataset.found),need=parseInt(card.dataset.need);
  document.getElementById('cnt0').textContent=found+' / '+need+' נמצאו';
  if(found>=need){
    const w=parseInt(card.dataset.wrong),fb=document.getElementById('fb0');
    if(w===0){card.classList.add('ok');fb.textContent=E1[Math.floor(Math.random()*E1.length)];fb.classList.add('ok','show')}
    else{card.classList.add('bad');fb.textContent=`מצאתם הכל עם ${w} טעויות 💪`;fb.classList.add('bad','show')}
    card.classList.add('done');
    setTimeout(showD,600);
  }
}

function initDraw(){
  document.getElementById('hb').classList.add('show');
  const card=document.getElementById('q0');
  const cv=document.getElementById('cv0');
  if(!cv)return;cv.width=card.offsetWidth;cv.height=card.offsetHeight;
  const ctx=cv.getContext('2d');let dw=false,pts=[];

  cv.addEventListener('pointerdown',function(e){
    if(card.classList.contains('done'))return;e.preventDefault();e.stopPropagation();
    dw=true;pts=[];ctx.clearRect(0,0,cv.width,cv.height);
    const r=cv.getBoundingClientRect();
    ctx.beginPath();ctx.moveTo(e.clientX-r.left,e.clientY-r.top);
    ctx.strokeStyle='#6c5ce7';ctx.lineWidth=4;ctx.lineCap='round';ctx.setLineDash([8,6]);
  },{passive:false});

  cv.addEventListener('pointermove',function(e){
    if(!dw)return;e.preventDefault();e.stopPropagation();
    const r=cv.getBoundingClientRect();
    pts.push({cx:e.clientX,cy:e.clientY});
    ctx.lineTo(e.clientX-r.left,e.clientY-r.top);ctx.stroke();
  },{passive:false});

  cv.addEventListener('pointerup',function(e){
    if(!dw)return;e.preventDefault();dw=false;
    setTimeout(()=>ctx.clearRect(0,0,cv.width,cv.height),300);
    if(pts.length<5)return;
    // Find item at end point
    const endX=e.clientX,endY=e.clientY;
    const items=card.querySelectorAll('.gi:not(.done-ok)');
    let best=null,bestD=Infinity;
    for(const it of items){const r=it.getBoundingClientRect();const d=Math.sqrt((endX-(r.left+r.width/2))**2+(endY-(r.top+r.height/2))**2);
    if(d<Math.max(r.width,r.height)*1.5&&d<bestD){bestD=d;best=it}}
    if(best){
      if(best.dataset.match==='true'){best.classList.add('done-ok','circled');g1++;card.dataset.found=parseInt(card.dataset.found)+1;checkDone()}
      else{best.classList.add('done-no');g2++;card.dataset.wrong=parseInt(card.dataset.wrong)+1;setTimeout(()=>best.classList.remove('done-no'),600)}
      uPr();
    }
  },{passive:false});
  cv.addEventListener('pointercancel',function(){dw=false;ctx.clearRect(0,0,cv.width,cv.height)});
}

function showD(){
  res[LV[cur].id]=true;const card=document.getElementById('q0');
  const w=parseInt(card.dataset.wrong),n=parseInt(card.dataset.need);
  const el=document.getElementById('ld');
  document.getElementById('lsc').textContent=(n-Math.min(w,n))+' / '+n;
  if(w===0){document.getElementById('lt').textContent='🏆 מושלם!';document.getElementById('ls').textContent='מצאתם את כל הצורות!'}
  else if(w<=2){document.getElementById('lt').textContent='👏 כל הכבוד!';document.getElementById('ls').textContent='כמעט מושלם!'}
  else{document.getElementById('lt').textContent='💪 סיימתם!';document.getElementById('ls').textContent='נסו שוב לשיפור!'}
  el.classList.add('show');el.scrollIntoView({behavior:'smooth',block:'center'});rTabs();
}

function go(i){if(i>0&&typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){if(typeof showAuthModal==='function')showAuthModal();return}cur=i;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function nxt(){if(typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){if(typeof showAuthModal==='function')showAuthModal();return}if(cur<LV.length-1){cur++;rLv();window.scrollTo({top:0,behavior:'smooth'})}}
function retry(){rLv();window.scrollTo({top:0,behavior:'smooth'})}
function setM(m){md=m;document.getElementById('mc1').classList.toggle('on',m==='click');document.getElementById('mc2').classList.toggle('on',m==='draw');if(m==='click')document.getElementById('hb').classList.remove('show');rLv()}
function uPr(){const d=Object.keys(res).length;document.getElementById('pf').style.width=Math.round(d/LV.length*100)+'%';document.getElementById('g1').textContent=g1;document.getElementById('g2').textContent=g2}
rLv();
document.addEventListener('DOMContentLoaded',function(){rTabs();});
</script>
