<!DOCTYPE html>

<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a2f5a;--primary-dark:#0f1d3a;--primary-light:#d6e4f7;
  --accent:#4a9eda;--accent-dark:#2d7ab8;
  --text:#1e293b;--text-light:#64748b;
  --bg:#ffffff;--bg-soft:#f8fafc;--border:#e2e8f0;
  --success:#10b981;--error:#ef4444;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
}
body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#edf2f7 0%,#d6e4f7 50%,#edf2f7 100%);min-height:100vh;color:var(--text);line-height:1.6}
h1,h2,h3,.step-title{font-family:'Rubik','Heebo',sans-serif}

/* Top bar */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-family:'Rubik',sans-serif;font-size:1.05rem;font-weight:700;color:var(--primary-dark)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.85rem;font-weight:600}
.topbar a:hover{text-decoration:underline}

/* Section toggle */
.section-toggle{display:flex;justify-content:center;gap:0;margin:16px auto;max-width:340px;background:var(--bg);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
.section-btn{flex:1;padding:10px 20px;border:none;border-radius:999px;background:transparent;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.95rem;font-weight:700;color:var(--text-light);transition:.3s}
.section-btn.active{background:var(--primary);color:#fff;box-shadow:var(--shadow-md)}

/* Container */
.container{max-width:760px;margin:0 auto;padding:0 16px 40px}

/* ===== TEACHING SECTION ===== */
#learnSection{animation:fadeIn .4s ease}
.step-progress{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:0 4px}
.step-progress-bar{flex:1;height:8px;background:var(--border);border-radius:999px;overflow:hidden}
.step-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:999px;transition:width .4s ease}
.step-progress-text{font-size:.8rem;color:var(--text-light);font-weight:600;white-space:nowrap}
.step-card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:28px 24px;animation:slideIn .4s ease}
.step-title{font-size:1.35rem;font-weight:700;color:var(--primary-dark);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.step-card p{margin-bottom:12px;font-size:.95rem;line-height:1.7}
.step-card .highlight{background:var(--primary-light);border-right:4px solid var(--primary);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600}
.step-card .warning{background:#fef2f2;border-right:4px solid var(--error);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600;color:#991b1b}
.step-card .success-box{background:#ecfdf5;border-right:4px solid var(--success);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600;color:#065f46}
.step-card .rule-box{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid var(--accent);padding:16px;border-radius:var(--radius);margin:16px 0;text-align:center;font-size:1.1rem;font-weight:700}
.step-card .example{background:var(--bg-soft);border:1px solid var(--border);padding:14px;border-radius:var(--radius-sm);margin:10px 0;font-size:1rem}
.step-card .example .arrow{color:var(--primary);font-weight:800;margin:0 6px}
.step-card code,.expr{font-family:'Courier New',monospace;background:var(--primary-light);padding:2px 8px;border-radius:4px;font-weight:700;color:var(--primary-dark);font-size:1.05em;direction:ltr;display:inline-block}
.math-expr{direction:ltr;unicode-bidi:embed;display:inline;font-family:'Rubik',sans-serif;font-weight:700;color:var(--primary)}

/* Interactive elements inside steps */
.mini-table{border-collapse:collapse;margin:12px auto;direction:ltr}
.mini-table th,.mini-table td{border:2px solid var(--border);padding:8px 16px;text-align:center;font-size:1rem}
.mini-table th{background:var(--primary-light);color:var(--primary-dark);font-weight:700}
.mini-table td{background:var(--bg)}
.mini-input{width:80px;padding:6px;border:2px solid var(--border);border-radius:var(--radius-sm);text-align:center;font-size:1rem;font-family:inherit;font-weight:700;transition:.3s;direction:ltr}
.mini-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(26,47,90,.15)}
.mini-input.correct{border-color:var(--success);background:#ecfdf5}
.mini-input.wrong{border-color:var(--error);background:#fef2f2}
.mini-btn{padding:8px 20px;border:none;border-radius:999px;background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:700;transition:.25s;margin:4px}
.mini-btn:hover{background:var(--primary-dark)}
.mini-btn.accent{background:var(--accent);color:#fff}
.mini-btn.accent:hover{background:var(--accent-dark)}
.mini-btn:disabled{opacity:.5;cursor:not-allowed}
.reveal{display:none;animation:fadeIn .5s ease}
.reveal.show{display:block}
.feedback-inline{margin-top:8px;padding:8px 12px;border-radius:var(--radius-sm);font-weight:600;font-size:.9rem;animation:fadeIn .3s}
.feedback-inline.ok{background:#ecfdf5;color:#065f46}
.feedback-inline.err{background:#fef2f2;color:#991b1b}
.quiz-options{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.quiz-opt{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;transition:.25s;background:var(--bg)}
.quiz-opt:hover{border-color:var(--primary);background:var(--primary-light)}
.quiz-opt.selected{border-color:var(--primary);background:var(--primary-light);font-weight:700}
.quiz-opt.correct-answer{border-color:var(--success);background:#ecfdf5;font-weight:700}
.quiz-opt.wrong-answer{border-color:var(--error);background:#fef2f2}
.step-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.summary-item{background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.summary-item .s-icon{font-size:2rem;margin-bottom:6px}
.summary-item .s-title{font-weight:700;color:var(--primary-dark);margin-bottom:4px;font-size:.9rem}
.summary-item .s-text{font-size:.82rem;color:var(--text-light)}

/* Step nav */
.step-nav{display:flex;justify-content:space-between;margin-top:16px;gap:8px}
.step-nav-btn{padding:10px 28px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.25s}
.step-nav-btn.primary{background:var(--primary);color:#fff}
.step-nav-btn.primary:hover{background:var(--primary-dark)}
.step-nav-btn.secondary{background:var(--bg);color:var(--text);border:2px solid var(--border)}
.step-nav-btn.secondary:hover{border-color:var(--primary);color:var(--primary)}
.step-nav-btn:disabled{opacity:.4;cursor:not-allowed}

/* ===== PRACTICE SECTION ===== */
#practiceSection{display:none;animation:fadeIn .4s ease}
.level-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.level-tab{padding:8px 20px;border-radius:999px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:700;color:var(--text-light);transition:.25s;white-space:nowrap}
.level-tab.active{border-color:var(--primary);background:var(--primary);color:#fff}
.level-tab .tab-score{font-size:.75rem;font-weight:400;margin-right:4px}
.level-progress{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.level-progress-bar{flex:1;height:6px;background:var(--border);border-radius:999px;overflow:hidden}
.level-progress-fill{height:100%;background:var(--success);border-radius:999px;transition:width .4s}
.level-progress-text{font-size:.8rem;color:var(--text-light);font-weight:600;white-space:nowrap}

.q-card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:24px;animation:slideIn .3s ease}
.q-number{font-size:.8rem;color:var(--text-light);font-weight:600;margin-bottom:4px}
.q-stem{font-size:1.05rem;margin-bottom:16px;line-height:1.7}
.q-stem code,.q-stem .expr{font-size:1.1em}
.q-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.q-opt{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;transition:.25s;background:var(--bg);display:flex;align-items:center;gap:10px}
.q-opt:hover:not(.disabled){border-color:var(--primary);background:var(--primary-light)}
.q-opt.selected{border-color:var(--primary);background:var(--primary-light);font-weight:700}
.q-opt.correct{border-color:var(--success)!important;background:#ecfdf5!important;font-weight:700}
.q-opt.wrong{border-color:var(--error)!important;background:#fef2f2!important}
.q-opt.disabled{cursor:default;opacity:.85}
.q-opt-letter{width:28px;height:28px;border-radius:50%;background:var(--bg-soft);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;transition:.25s}
.q-opt.selected .q-opt-letter{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-opt.correct .q-opt-letter{background:var(--success);color:#fff;border-color:var(--success)}
.q-opt.wrong .q-opt-letter{background:var(--error);color:#fff;border-color:var(--error)}

.q-input-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.q-input{width:120px;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:1.1rem;font-family:inherit;font-weight:700;text-align:center;transition:.3s;direction:ltr}
.q-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(26,47,90,.15)}
.q-input.correct{border-color:var(--success);background:#ecfdf5}
.q-input.wrong{border-color:var(--error);background:#fef2f2}

.q-table{border-collapse:collapse;margin:12px auto;direction:ltr}
.q-table th,.q-table td{border:2px solid var(--border);padding:8px 14px;text-align:center;font-size:1rem;min-width:60px}
.q-table th{background:var(--primary-light);color:var(--primary-dark);font-weight:700}
.q-table input{width:55px;padding:5px;border:2px solid var(--border);border-radius:4px;text-align:center;font-size:1rem;font-family:inherit;font-weight:700}
.q-table input:focus{border-color:var(--primary);outline:none}
.q-table input.correct{border-color:var(--success);background:#ecfdf5}
.q-table input.wrong{border-color:var(--error);background:#fef2f2}

.q-check-btn{padding:10px 28px;border-radius:999px;border:none;background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.25s;box-shadow:var(--shadow)}
.q-check-btn:hover{background:var(--primary-dark)}
.q-check-btn:disabled{opacity:.5;cursor:not-allowed}

.q-feedback{margin-top:12px;padding:12px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:.92rem;animation:fadeIn .3s}
.q-feedback.correct{background:#ecfdf5;border-right:4px solid var(--success);color:#065f46}
.q-feedback.wrong{background:#fef2f2;border-right:4px solid var(--error);color:#991b1b}

.q-nav{display:flex;justify-content:space-between;margin-top:16px}
.q-nav-btn{padding:10px 24px;border-radius:999px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:700;color:var(--text);transition:.25s}
.q-nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.q-nav-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-nav-btn.primary:hover{background:var(--primary-dark)}
.q-nav-btn:disabled{opacity:.4;cursor:not-allowed}

/* Level complete */
.level-complete{text-align:center;padding:24px;animation:fadeIn .5s}
.level-complete .big-emoji{font-size:4rem;margin-bottom:12px}
.level-complete h2{font-size:1.4rem;color:var(--primary-dark);margin-bottom:8px}
.level-complete .score-display{font-size:1.8rem;font-weight:800;color:var(--success);margin-bottom:16px}
.level-complete .score-display.medium-score{color:var(--accent)}
.level-complete .score-display.low-score{color:var(--error)}

/* Celebration confetti */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;top:-10px;animation:confettiFall linear forwards}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  100%{transform:translateY(105vh) rotate(720deg) scale(.3);opacity:0}
}

/* Print button */
.print-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--primary);color:#fff;cursor:pointer;font-size:1rem;box-shadow:var(--shadow);transition:.25s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.print-btn:hover{background:var(--primary-dark);transform:scale(1.1)}

/* Solution steps */
.sol-step{direction:ltr;text-align:center;font-size:1.08rem;line-height:2.2;margin:4px 0;font-family:'Rubik',sans-serif;font-weight:700;color:var(--primary)}
.sol-comment{direction:rtl;text-align:center;font-size:.88rem;color:var(--text-light);font-weight:600;margin-top:-4px;margin-bottom:4px}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* Responsive */
@media(max-width:600px){
  .container{padding:0 10px 30px}
  .step-card,.q-card{padding:18px 14px}
  .step-title{font-size:1.15rem}
  .step-summary-grid{grid-template-columns:1fr}
  .section-toggle{max-width:280px;margin:12px auto}
  .section-btn{font-size:.88rem;padding:8px 14px}
  .q-opt{padding:10px 12px;font-size:.9rem}
  .topbar-title{font-size:.9rem}
}

/* Print */
@media print{
  .topbar,.section-toggle,.step-nav,.q-nav,.print-btn,.level-tabs,.confetti-container,.q-check-btn{display:none!important}
  body{background:#fff;font-size:11pt}
  .step-card,.q-card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;page-break-inside:avoid}
  .container{max-width:100%}
  .q-feedback{break-inside:avoid}
}
</style>
</head>

<script>
/* ===== UTILITIES ===== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const today=new Date();const dateSeed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
let rng=mulberry32(dateSeed);
function R(){return rng()}
function RI(a,b){return a+Math.floor(R()*(b-a+1))}
function pick(arr){return arr[Math.floor(R()*arr.length)]}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(R()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const LETTERS=['א','ב','ג','ד'];

/* Format a number for display: uses minus sign U+2212 for negatives */
function fmt(n){return n<0?'\u2212'+Math.abs(n):''+n}
/* Format a coefficient: 1x->x, -1x->-x */
function fmtCoef(c,v){
  if(c===1) return v;
  if(c===-1) return '\u2212'+v;
  if(c<0) return '\u2212'+Math.abs(c)+v;
  return c+v;
}
/* Format signed term for addition: +3 or -3 */
function fmtSigned(n){return n>=0?'+ '+n:'\u2212 '+Math.abs(n)}
/* Build a linear expression string ax+b in display form */
function fmtLinear(a,b,v){
  v=v||'x';
  let s='';
  if(a===0){return fmt(b)}
  s=fmtCoef(a,v);
  if(b>0) s+=' + '+b;
  else if(b<0) s+=' \u2212 '+Math.abs(b);
  return s;
}

/* ===== STATE ===== */
let state={section:'learn',step:0,level:'easy',qIndex:0};
let scores={easy:[],medium:[],hard:[],challenge:[]};
let answered={easy:[],medium:[],hard:[],challenge:[]};
let questions={easy:null,medium:null,hard:null,challenge:null};
const LEVEL_COUNTS={easy:20,medium:20,hard:20,challenge:15};
const LEVEL_NAMES={easy:'קל',medium:'בינוני',hard:'קשה',challenge:'אתגר'};
const TOTAL_STEPS=7;

/* ===== LOCAL STORAGE ===== */
const LS_KEY='bh_g7_eq_brackets_'+dateSeed;
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify({scores,answered,state}))}catch(e){}}
function loadState(){try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d){scores=d.scores||scores;answered=d.answered||answered;if(d.state)state=d.state}}catch(e){}}

/* ===== TEACHING SECTION ===== */
const steps=[
/* Step 0: Equivalent equations review */
{title:'🔄 משוואות שקולות — חזרה', render(){return `
<p>לפני שנלמד על סוגריים, בואו ניזכר: כשעושים אותה פעולה על <strong>שני האגפים</strong>, מקבלים <strong>משוואה שקולה</strong> — עם אותו פתרון!</p>
<p>הנה 5 משוואות שקולות, שלכולן אותו פתרון <span class="math-expr">x = -1</span>:</p>
<div class="example" style="direction:ltr;text-align:center;line-height:2.4">
<div><code>x = -1</code></div>
<div style="color:var(--text-light);font-size:.85rem">&#8595; כפל ב-5</div>
<div><code>5x = -5</code></div>
<div style="color:var(--text-light);font-size:.85rem">&#8595; חיבור 7</div>
<div><code>7 + 5x = 2</code></div>
<div style="color:var(--text-light);font-size:.85rem">&#8595; חיסור 4x</div>
<div><code>7 + x = 2 - 4x</code></div>
<div style="color:var(--text-light);font-size:.85rem">&#8595; כפל ב-7</div>
<div><code>49 + 7x = 14 - 28x</code></div>
</div>
<p><strong>שאלה:</strong> נתון <span class="math-expr">x = -6</span>. בצעו פעולה על שני האגפים כדי לקבל משוואה שקולה. מה מקבלים אם כופלים ב-3?</p>

/* ===== QUESTION GENERATORS ===== */

function genEasy(){
  rng=mulberry32(dateSeed+100);
  const qs=[];

  /* Q1-Q5: "Expand brackets" */
  const expandData=[
    ()=>{const a=RI(2,5);const b=RI(1,6);const c=RI(1,5);
      return{expr:a+'('+b+'x + '+c+')',ans:fmtLinear(a*b,a*c),wrongs:[fmtLinear(a*b,-a*c),fmtLinear(b,a*c),fmtLinear(a+b,c)]}},
    ()=>{const a=RI(2,5);const b=RI(1,6);const c=RI(1,5);
      return{expr:'-'+a+'('+b+'x - '+c+')',ans:fmtLinear(-a*b,a*c),wrongs:[fmtLinear(-a*b,-a*c),fmtLinear(a*b,-a*c),fmtLinear(-a*b,0)]}},
    ()=>{const a=RI(2,4);const b=RI(1,5);
      return{expr:a+'(1 - '+b+'x)',ans:fmtLinear(-a*b,a),wrongs:[fmtLinear(a*b,a),fmtLinear(-a*b,-a),fmtLinear(a*b,-a)]}},
    ()=>{const a=RI(2,4);const b=RI(1,4);const c=RI(2,5);
      return{expr:'(-'+b+' - '+c+'x)\\u00b7(-'+a+')',ans:fmtLinear(a*c,a*b),wrongs:[fmtLinear(-a*c,-a*b),fmtLinear(a*c,-a*b),fmtLinear(-a*c,a*b)]}},
    ()=>{const a=RI(2,6);const b=RI(2,5);const c=RI(1,4);
      return{expr:'-'+a+'('+b+'x - '+c+')',ans:fmtLinear(-a*b,a*c),wrongs:[fmtLinear(-a*b,-a*c),fmtLinear(a*b,a*c),fmtLinear(a*b,-a*c)]}}
  ];
  for(let i=0;i<5;i++){
    const d=expandData[i]();
    const opts=shuffle([d.ans,...d.wrongs.slice(0,3)]);
    qs.push({type:'mc',stem:'פתחו סוגריים: <code>'+d.expr.replace(/\\u00b7/g,'\u00b7')+'</code>',
      options:opts,answer:opts.indexOf(d.ans),
      explanation:'פתיחת סוגריים: <code>'+d.expr.replace(/\\u00b7/g,'\u00b7')+' = '+d.ans+'</code>'});
  }

  /* Q6-Q10: "Which expressions are equivalent?" */
  for(let i=0;i<5;i++){
    const a=RI(2,5);const b=pick([1,2,3]);const c=RI(1,4);const neg=R()>0.5;
    const coef=neg?-a:a;const cSign=R()>0.5?c:-c;
    const expanded_a=coef*b;const expanded_b=coef*cSign;
    const correct=fmtLinear(expanded_a,expanded_b);
    const w1=fmtLinear(expanded_a,-expanded_b);
    const w2=fmtLinear(-expanded_a,expanded_b);
    const w3=fmtLinear(-expanded_a,-expanded_b);
    const exprInner=fmtLinear(b,cSign);
    const prefix=neg?'-'+a:''+a;
    const opts=shuffle([correct,w1,w2,w3]);
    qs.push({type:'mc',stem:'איזה ביטוי שקול ל-<code>'+prefix+'('+exprInner+')</code>?',
      options:opts,answer:opts.indexOf(correct),
      explanation:'<code>'+prefix+'('+exprInner+') = '+correct+'</code>'});
  }

  /* Q11-Q15: Guided step-by-step solving */
  for(let i=0;i<5;i++){
    const a=pick([-2,-3,-4,2,3]);const b=RI(1,6);const c=pick(['x']);
    /* equation: a(b + x) = rhs, solution: x = rhs/a - b */
    const sol=RI(-5,5);const rhs=a*(b+sol);
    /* Ask for the solution after expansion */

  }

  /* Q16-Q20: "Solve" — simple equations with one bracket */
  for(let i=0;i<5;i++){
    const sol=RI(-7,7);

    /* -(c - x) = d - x  style: pick random structures */
    const a=pick([-1,1,-2,2,3]);const b=RI(-5,5);
    /* a(x + b) + e = f => a*sol + a*b + e = f */
    const e=RI(-4,4);const f=a*sol+a*b+e;
    const inner=b>=0?'x + '+b:'x - '+Math.abs(b);
    qs.push({type:'input',stem:'פתרו: <code>'+fmt(a)+'('+inner+') + '+fmt(e)+' = '+fmt(f)+'</code>',
      answer:sol,
      explanation:'פתיחה: <span class="math-expr">'+fmtLinear(a,a*b)+' + '+fmt(e)+' = '+fmt(f)+'</span> &rarr; <span class="math-expr">'+fmtLinear(a,a*b+e)+' = '+fmt(f)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }
  /* Ensure exactly 20 */
  while(qs.length<20){
    const sol=RI(-5,5)||1;const a=pick([2,3,-2,-3]);const b=RI(1,5);
    const rhs=a*(sol+b);
    qs.push({type:'input',stem:'פתרו: <code>'+fmt(a)+'(x + '+b+') = '+fmt(rhs)+'</code>',
      answer:sol,explanation:'חילוק ב-'+fmt(a)+': <span class="math-expr">x + '+b+' = '+fmt(rhs/a)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }
  return qs.slice(0,20);
}

function genMedium(){
  rng=mulberry32(dateSeed+200);
  const qs=[];

  /* Q1-Q5: Match equivalent equations */
  for(let i=0;i<5;i++){
    const a=pick([2,3,-2,-3,4]);const b=RI(1,5);const c=pick([1,-1,2]);
    const sol=RI(-4,4)||1;
    /* Original: a(cx + b) = rhs */
    const rhs=a*(c*sol+b);
    const expanded_a=a*c;const expanded_b=a*b;
    const correct=fmtLinear(expanded_a,expanded_b)+' = '+fmt(rhs);
    const w1=fmtLinear(expanded_a,-expanded_b)+' = '+fmt(rhs);
    const w2=fmtLinear(-expanded_a,expanded_b)+' = '+fmt(rhs);
    const w3=fmtLinear(expanded_a,expanded_b)+' = '+fmt(-rhs);
    const opts=shuffle([correct,w1,w2,w3]);
    qs.push({type:'mc',stem:'איזו משוואה שקולה ל-<code>'+fmt(a)+'('+fmtLinear(c,b)+') = '+fmt(rhs)+'</code>?',
      options:opts,answer:opts.indexOf(correct),
      explanation:'פתיחת סוגריים: <code>'+correct+'</code>'});
  }

  /* Q6-Q10: Guided solving with steps shown */
  for(let i=0;i<5;i++){
    const sol=RI(-5,5)||1;
    const a=pick([2,3,-2,-3]);const b=RI(1,4);const c=RI(-3,3)||1;
    /* c + a(bx - d) = ex -> find d and e */
    const d=RI(1,4);
    /* c + a(bx - d) = ex => c + abx - ad = ex => (ab - e)x = ad - c => sol = (ad-c)/(ab-e) */
    /* Let's set e so it works: e = ab - (ad-c)/sol ... pick: just compute rhs */
    const lhsVal=c+a*(b*sol-d);
    /* equation: c + a(bx - d) = lhsVal */
    qs.push({type:'input',stem:'השלימו את הפתרון: <code>'+fmt(c)+' + '+fmt(a)+'('+fmtLinear(b,-d)+') = '+fmt(lhsVal)+'</code><br>'+
      '<span style="font-size:.88rem;color:var(--text-light)">פתיחה &rarr; '+fmt(c)+' + '+fmtLinear(a*b,-a*d)+' = '+fmt(lhsVal)+' &rarr; כינוס &rarr; פתרו</span>',
      answer:sol,
      explanation:'כינוס: <span class="math-expr">'+fmtLinear(a*b,c-a*d)+' = '+fmt(lhsVal)+'</span> &rarr; <span class="math-expr">'+fmtCoef(a*b,'x')+' = '+fmt(lhsVal-c+a*d)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }

  /* Q11-Q15: "Solve and detail" */
  for(let i=0;i<5;i++){
    const sol=RI(-4,4)||1;
    const a1=pick([-3,-2,2,3]);const b1=RI(1,4);const c1=RI(-5,5);
    /* a1(b1x + c1) + extra = rhs */
    const extra=RI(-3,3);
    const rhs=a1*(b1*sol+c1)+extra;
    const inner=fmtLinear(b1,c1);
    qs.push({type:'input',stem:'פתרו ופרטו: <code>'+fmt(a1)+'('+inner+') + '+fmt(extra)+' = '+fmt(rhs)+'</code>',
      answer:sol,
      explanation:'פתיחה: <span class="math-expr">'+fmtLinear(a1*b1,a1*c1)+' + '+fmt(extra)+' = '+fmt(rhs)+'</span> &rarr; <span class="math-expr">'+fmtLinear(a1*b1,a1*c1+extra)+' = '+fmt(rhs)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }

  /* Q16-Q20: Two bracket terms */
  for(let i=0;i<5;i++){
    const sol=RI(-3,3)||1;
    const a1=pick([2,3,4,7]);const b1=RI(1,3);const c1=RI(-2,2);
    const a2=pick([-4,-3,-2,2]);const b2=RI(1,2);const c2=RI(-2,2);
    /* a1(b1x+c1)+a2(b2x+c2)=rhs */
    const rhs=a1*(b1*sol+c1)+a2*(b2*sol+c2);
    const expA=a1*b1+a2*b2;const expB=a1*c1+a2*c2;
    qs.push({type:'input',stem:'פתרו: <code>'+fmt(a1)+'('+fmtLinear(b1,c1)+') + '+fmt(a2)+'('+fmtLinear(b2,c2)+') = '+fmt(rhs)+'</code>',
      answer:sol,
      explanation:'פתיחה וכינוס: <span class="math-expr">'+fmtLinear(expA,expB)+' = '+fmt(rhs)+'</span> &rarr; <span class="math-expr">'+fmtCoef(expA,'x')+' = '+fmt(rhs-expB)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }

  return qs.slice(0,20);
}

function genHard(){
  rng=mulberry32(dateSeed+300);
  const qs=[];

  /* Q1-Q5: "Was the operation done correctly? Are the two equations equivalent?" */
  for(let i=0;i<5;i++){
    const sol=RI(-4,4)||1;
    const a=pick([-4,-3,-2,2,3,4]);const b=RI(1,4);const c=RI(-3,3);
    /* Original: a(b - x) + x = rhs */
    const rhs_val=a*(b-sol)+sol;
    /* Correct expansion: ab - ax + x = rhs => (1-a)x + ab = rhs */
    const correctA=1-a;const correctB=a*b;
    /* Make a wrong expansion (common mistake: forget to distribute minus) */
    const isWrong=R()>0.5;
    let shownA,shownB;
    if(isWrong){
      shownA=-a+1;shownB=a*b; /* wrong: -ax+x+ab but sign error */
      if(shownA===correctA&&shownB===correctB){shownB=a*b+a;} /* ensure different */
    } else {
      shownA=correctA;shownB=correctB;
    }
    const isEquiv=shownA===correctA&&shownB===correctB;
    const correct=isEquiv?'כן, שקולות':'לא, לא שקולות';
    const wrong=isEquiv?'לא, לא שקולות':'כן, שקולות';
    const opts=shuffle([correct,wrong,'חסרים נתונים','לא ניתן לקבוע']);
    qs.push({type:'mc',
      stem:'האם הפעולה בוצעה נכון?<br><code>'+fmt(a)+'('+fmtLinear(-1,b,'x')+') + x = '+fmt(rhs_val)+'</code><br>פתיחת סוגריים &rarr;<br><code>'+fmtLinear(shownA,shownB)+' = '+fmt(rhs_val)+'</code>',
      options:opts,answer:opts.indexOf(correct),
      explanation:'פתיחה נכונה: <span class="math-expr">'+fmtLinear(correctA,correctB)+' = '+fmt(rhs_val)+'</span>. '+(isEquiv?'הפעולה נכונה!':'הפעולה שגויה!')});
  }

  /* Q6-Q10: Complex solve and detail */
  for(let i=0;i<5;i++){
    const sol=RI(-4,4)||1;
    const a1=pick([2,3,6]);const b1=pick([3,2,1]);const c1=RI(-2,2);
    const a2=pick([-5,-2,-1,1,2]);const b2=pick([2,1,-1]);const c2=RI(-3,3);
    const lhsCoef=a1*b1+a2*b2;const lhsConst=a1*c1+a2*c2;
    /* Make sure lhsCoef != 0 */
    if(lhsCoef===0){qs.push(null);continue}
    const rhs2Coef=pick([1,2,-1]);const rhs2Const=RI(-3,3);
    const rhsVal=(lhsCoef-rhs2Coef)*sol+lhsConst-rhs2Const;
    /* equation: a1(b1x+c1)+a2(b2x+c2) = rhs2Coef*x + rhs2Const + rhsVal ... hmm too complex */
    /* Simpler: a1(b1x+c1)+a2(b2x+c2)=rhs */
    const rhs=lhsCoef*sol+lhsConst;
    qs.push({type:'input',stem:'פתרו ופרטו: <code>'+fmt(a1)+'('+fmtLinear(b1,c1)+') + '+fmt(a2)+'('+fmtLinear(b2,c2)+') = '+fmt(rhs)+'</code>',
      answer:sol,
      explanation:'פתיחה וכינוס: <span class="math-expr">'+fmtLinear(lhsCoef,lhsConst)+' = '+fmt(rhs)+'</span> &rarr; <span class="math-expr">'+fmtCoef(lhsCoef,'x')+' = '+fmt(rhs-lhsConst)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }
  /* Remove nulls */
  while(qs.indexOf(null)!==-1)qs.splice(qs.indexOf(null),1);

  /* Q11-Q15: Combine before opening (repeated expression) */
  for(let i=0;i<5;i++){
    const sol=RI(-4,4)||1;
    const innerB=RI(-3,3);
    const c1=RI(2,6);const c2=RI(1,5);const isAdd=R()>0.5;
    const totalC=isAdd?c1+c2:c1-c2;
    if(totalC===0) continue;
    const rhs=totalC*(sol+innerB);
    const op=isAdd?' + ':' - ';
    const inner=innerB>=0?'x + '+innerB:'x - '+Math.abs(innerB);
    qs.push({type:'input',stem:'היעזרו בכינוס לפני פתיחת סוגריים:<br><code>'+c1+'('+inner+')'+op+c2+'('+inner+') = '+fmt(rhs)+'</code>',
      answer:sol,
      explanation:'כינוס: <span class="math-expr">'+totalC+'('+inner+') = '+fmt(rhs)+'</span> &rarr; <span class="math-expr">'+inner+' = '+fmt(rhs/totalC)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }

  /* Q16-Q20: Rectangle perimeter with bracket expressions */
  for(let i=0;i<5;i++){
    const sol=RI(2,6);
    /* side1 = a*x, side2 expression with brackets: b(cx + d) */
    const a=RI(2,4);const b=RI(1,3);const c=RI(1,2);const d=RI(1,3);
    const side1=a*sol;const side2=b*(c*sol+d);
    const perim=2*(side1+side2);
    qs.push({type:'input',stem:'היקף מלבן הוא '+perim+' ס"מ. צלעותיו: <code>'+a+'x</code> ו-<code>'+b+'('+fmtLinear(c,d)+')</code>.<br>מצאו את <span class="math-expr">x</span>.',
      answer:sol,
      explanation:'היקף = <span class="math-expr">2('+a+'x + '+b+'('+fmtLinear(c,d)+')) = '+perim+'</span> &rarr; <span class="math-expr">'+(a+b*c*2)+'x + '+(b*d*2)+' = '+perim+'</span>... <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }

  /* Ensure exactly 20 */
  while(qs.length<20){
    const sol=RI(-3,3)||1;const a=pick([2,3,-2]);const b=RI(1,4);
    const rhs=a*(sol+b);
    qs.push({type:'input',stem:'פתרו: <code>'+fmt(a)+'(x + '+b+') = '+fmt(rhs)+'</code>',answer:sol,
      explanation:'<span class="math-expr">x + '+b+' = '+fmt(rhs/a)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }
  return qs.slice(0,20);
}

function genChallenge(){
  rng=mulberry32(dateSeed+400);
  const qs=[];

  /* Q1-Q3: Fractions/decimals with brackets */
  for(let i=0;i<3;i++){
    const sol=RI(-4,4)||1;
    const a1=pick([2,4,10]);const a2=pick([3,6,12]);
    const b1=RI(-3,3);const b2=RI(-3,3);
    /* a1(x/a1_div + b1) - a2(x/a2_div - b2) = rhs => simplify */
    /* Simpler: use structure from spec */
    /* 4(x+1) - (2x+2) - 3(x+1) = rhs */
    const c1=RI(2,5);const c2=RI(1,3);const c3=RI(1,4);
    const innerB=RI(-3,3)||1;
    const totalCoef=c1-c2-c3;
    if(totalCoef===0) continue;
    const totalConst=(c1-c3)*innerB-c2*2;
    /* Hmm, let me simplify: c1(x+innerB)-(c2*x+c2*2)-c3(x+innerB) */
    /* = c1*x+c1*innerB-c2*x-c2*2-c3*x-c3*innerB = (c1-c2-c3)x + (c1-c3)*innerB - 2*c2 */
    const rhs=totalCoef*sol+totalConst;
    qs.push({type:'input',
      stem:'פתרו: <code>'+c1+'(x + '+fmt(innerB)+') - ('+fmtLinear(c2,c2*2)+') - '+c3+'(x + '+fmt(innerB)+') = '+fmt(rhs)+'</code>',
      answer:sol,
      explanation:'כינוס: <span class="math-expr">'+fmtLinear(totalCoef,totalConst)+' = '+fmt(rhs)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }

  /* Q4-Q6: Identify equivalent equations with brackets */
  for(let i=0;i<3;i++){
    const sol=RI(-3,3)||1;
    const a=pick([2,4,-2,3]);const b=RI(1,3);const c=RI(-2,2);
    /* a(bx+c) = rhs */
    const rhs=a*(b*sol+c);
    /* Correct equivalent: divide both sides by a => bx+c = rhs/a */
    const eqDiv=fmtLinear(b,c)+' = '+fmt(rhs/a);
    /* Wrong equivalents */
    const w1=fmtLinear(a*b,c)+' = '+fmt(rhs); /* forgot to multiply c */
    const w2=fmtLinear(a*b,-a*c)+' = '+fmt(rhs); /* sign error */
    const w3=fmtLinear(a*b,a*c)+' = '+fmt(-rhs); /* negated rhs */
    const correct=eqDiv;
    const opts=shuffle([correct,w1,w2,w3]);
    qs.push({type:'mc',stem:'איזו משוואה שקולה ל-<code>'+fmt(a)+'('+fmtLinear(b,c)+') = '+fmt(rhs)+'</code>?',
      options:opts,answer:opts.indexOf(correct),
      explanation:'חילוק שני האגפים ב-'+fmt(a)+': <code>'+correct+'</code>'});
  }

  /* Q7-Q9: Triangle perimeter with bracket expressions */
  for(let i=0;i<3;i++){
    const sol=RI(2,5);
    const a=RI(3,5);const b=RI(1,3);const c=RI(1,2);const d=RI(1,3);
    const e=RI(2,4);const f=RI(-2,2);
    const side1=a*sol;
    const side2=b*(c*sol+d);
    const side3=e*sol+f;
    const perim=side1+side2+side3;
    qs.push({type:'input',
      stem:'היקף משולש הוא '+perim+' ס"מ. צלעותיו: <code>'+a+'x</code>, <code>'+b+'('+fmtLinear(c,d)+')</code>, <code>'+fmtLinear(e,f)+'</code>.<br>מצאו את <span class="math-expr">x</span>.',
      answer:sol,
      explanation:'<span class="math-expr">'+a+'x + '+b+'('+fmtLinear(c,d)+') + '+fmtLinear(e,f)+' = '+perim+'</span> &rarr; פתיחה וכינוס &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }

  /* Q10-Q12: Combine with decimals */
  for(let i=0;i<3;i++){
    const sol=RI(-3,3)||1;
    /* a(expr) + b(expr) where a+b is a nice number */
    const innerB=RI(-3,3)||1;
    const totalParts=RI(2,5)*2; /* even number of tenths */
    const a10=RI(1,totalParts-1);const b10=totalParts-a10;
    const aDisp=(a10/10).toFixed(1);const bDisp=(b10/10).toFixed(1);
    const totalC=totalParts/10;
    const rhs=totalC*(sol+innerB);
    const inner=innerB>=0?'1 + x':'1 - '+Math.abs(innerB);
    /* Use simpler structure: a(1-2t) + b(1-2t) = rhs */
    const tSol=sol;
    const rhsT=totalC*(1-2*tSol);
    qs.push({type:'input',
      stem:'פתרו: <code>'+aDisp+'(1 - 2t) + '+bDisp+'(1 - 2t) = '+fmt(rhsT)+'</code><br><span style="font-size:.88rem;color:var(--text-light)">רמז: כנסו את המקדמים</span>',
      answer:tSol,
      explanation:'כינוס: <span class="math-expr">'+totalC+'(1 - 2t) = '+fmt(rhsT)+'</span> &rarr; <span class="math-expr">1 - 2t = '+fmt(rhsT/totalC)+'</span> &rarr; <span class="math-expr">t = '+fmt(tSol)+'</span>'});
  }

  /* Q13-Q15: Complex with brackets on both sides */
  for(let i=0;i<3;i++){
    const sol=RI(-4,4)||1;
    const a=pick([3,5,2]);const b=RI(1,3);
    const c=pick([2,3,7]);const d=RI(-2,2);
    /* ax + b(x-d) = c(x+d) - extra => find extra */
    const lhs=a*sol+b*(sol-d);
    const rhs_partial=c*(sol+d);
    const extra=rhs_partial-lhs;
    /* equation: ax+b(x-d) = c(x+d) + extra (if extra negative, show as -|extra|) */
    const lhsCoef=a+b;const lhsConst=-b*d;
    const rhsCoef=c;const rhsConst=c*d+extra;
    const finalRhs=c*(sol+d)+extra;
    qs.push({type:'input',
      stem:'פתרו: <code>'+a+'x + '+b+'(x - '+fmt(d)+') = '+c+'(x + '+fmt(d)+') + '+fmt(extra)+'</code>',
      answer:sol,
      explanation:'פתיחה: <span class="math-expr">'+fmtLinear(lhsCoef,lhsConst)+' = '+fmtLinear(rhsCoef,rhsConst)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }

  while(qs.length<15){
    const sol=RI(-3,3)||1;const a=pick([2,3,-2]);const b=RI(1,4);
    const rhs=a*(sol+b);
    qs.push({type:'input',stem:'פתרו: <code>'+fmt(a)+'(x + '+b+') = '+fmt(rhs)+'</code>',answer:sol,
      explanation:'<span class="math-expr">x + '+b+' = '+fmt(rhs/a)+'</span> &rarr; <span class="math-expr">x = '+fmt(sol)+'</span>'});
  }
  return qs.slice(0,15);
}

function generateQuestions(level){
  if(level==='easy') return genEasy();
  if(level==='medium') return genMedium();
  if(level==='hard') return genHard();
  return genChallenge();
}

/* ===== PRACTICE RENDERING ===== */
function renderLevelTabs(){
  const container=document.getElementById('levelTabs');
  container.innerHTML='';
  ['easy','medium','hard','challenge'].forEach(lv=>{
    const btn=document.createElement('button');
    btn.className='level-tab'+(state.level===lv?' active':'');
    const done=scores[lv].filter(s=>s===1).length;
    const total=LEVEL_COUNTS[lv];
    btn.innerHTML=LEVEL_NAMES[lv]+(done>0?' <span class="tab-score">('+done+'/'+total+')</span>':'');
    btn.onclick=()=>switchLevel(lv);
    container.appendChild(btn);
  });
}

function switchLevel(lv){
  state.level=lv;state.qIndex=0;
  if(!questions[lv]) questions[lv]=generateQuestions(lv);
  if(!scores[lv].length) scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
  if(!answered[lv].length) answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  renderLevelTabs();renderQuestion();saveState();
}

function updateLevelProgress(){
  const lv=state.level;const total=LEVEL_COUNTS[lv];
  const done=answered[lv].filter(a=>a).length;
  document.getElementById('levelFill').style.width=(done/total*100)+'%';
  document.getElementById('levelText').textContent=done+' / '+total;
}

function renderQuestion(){
  const lv=state.level;const idx=state.qIndex;
  const qs=questions[lv];
  if(!qs) return;
  if(idx>=qs.length){renderLevelComplete();return}
  const q=qs[idx];
  const area=document.getElementById('questionArea');
  const isAnswered=answered[lv][idx];

  let html='<div class="q-card"><div class="q-number">שאלה '+(idx+1)+' מתוך '+qs.length+'</div>';
  html+='<div class="q-stem">'+q.stem+'</div>';

  if(q.type==='mc'){
    html+='<div class="q-options" id="qOpts">';
    q.options.forEach((opt,i)=>{
      const letter=LETTERS[i];
      let cls='q-opt';
      if(isAnswered){
        cls+=' disabled';
        if(i===q.answer) cls+=' correct';
        else if(scores[lv][idx]===0&&i===answered[lv][idx+'_sel']) cls+=' wrong';
      }
      html+='<div class="'+cls+'" data-i="'+i+'"><span class="q-opt-letter">'+letter+'</span><span dir="ltr" style="unicode-bidi:embed">'+opt+'</span></div>';
    });
    html+='</div>';
    if(!isAnswered) html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkMC()" disabled>בדקו</button>';
  } else if(q.type==='input'||q.type==='input-text'){
    html+='<div class="q-input-row"><input type="'+(q.type==='input'?'number':'text')+'" class="q-input" id="qInput" placeholder="תשובה" dir="ltr" aria-label="תשובה"'+(q.type==='input'?' step="any"':'')+'>';
    if(!isAnswered) html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkInput()">בדקו</button>';
    html+='</div>';
    if(isAnswered){
      const inp=q.type==='input'?q.answer:(q.display||q.answer[0]);
      html+='<div style="margin-top:4px;font-weight:700;direction:ltr">תשובה: '+inp+'</div>';
    }
  }

  if(isAnswered){
    const isCorrect=scores[lv][idx]===1;
    html+='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?'✅ נכון! ':'❌ ')+q.explanation+'</div>';
  }
  html+='<div id="qFeedback"></div></div>';
  area.innerHTML=html;

  /* Set up MC click handlers */
  if(q.type==='mc'&&!isAnswered){
    area.querySelectorAll('.q-opt').forEach(el=>{
      el.onclick=()=>{
        area.querySelectorAll('.q-opt').forEach(o=>o.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('qCheckBtn').disabled=false;
      };
    });
  }
  /* Set up input enter key */
  const inp=document.getElementById('qInput');
  if(inp&&!isAnswered){
    inp.focus();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkInput()});
  }

  updateLevelProgress();
  document.getElementById('qPrev').disabled=idx===0;
  document.getElementById('qNext').textContent=idx>=qs.length-1?'סיום':'הבא ←';
}

window.checkMC=function(){
  const lv=state.level;const idx=state.qIndex;const q=questions[lv][idx];
  const selected=document.querySelector('.q-opt.selected');
  if(!selected) return;
  const si=parseInt(selected.dataset.i);
  const isCorrect=si===q.answer;
  scores[lv][idx]=isCorrect?1:0;
  answered[lv][idx]=true;
  answered[lv][idx+'_sel']=si;

  document.querySelectorAll('.q-opt').forEach((el,i)=>{
    el.classList.add('disabled');el.onclick=null;
    if(i===q.answer) el.classList.add('correct');
    else if(i===si&&!isCorrect) el.classList.add('wrong');
  });
  document.getElementById('qCheckBtn').remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['✅ כל הכבוד!','✅ מעולה!','✅ נכון מאוד!','✅ יפה!'])+' ':'❌ לא נכון. ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();saveState();
};

window.checkInput=function(){
  const lv=state.level;const idx=state.qIndex;const q=questions[lv][idx];
  const inp=document.getElementById('qInput');
  const val=inp.value.trim();
  if(!val) return;
  let isCorrect=false;
  if(q.type==='input'){
    isCorrect=Math.abs(parseFloat(val)-q.answer)<0.001;
  } else {
    const norm=val.replace(/\s+/g,'').toLowerCase();
    isCorrect=q.answer.some(a=>a.replace(/\s+/g,'').toLowerCase()===norm);
  }
  scores[lv][idx]=isCorrect?1:0;
  answered[lv][idx]=true;
  inp.classList.add(isCorrect?'correct':'wrong');
  inp.disabled=true;
  const btn=document.getElementById('qCheckBtn');if(btn)btn.remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['✅ כל הכבוד!','✅ מעולה!','✅ נכון!'])+' ':'❌ ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();saveState();
};

function nextQuestion(){
  const lv=state.level;
  if(state.qIndex>=questions[lv].length-1){renderLevelComplete();return}
  if(typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){
    if(typeof showAuthModal==='function')showAuthModal();
    return;
  }
  state.qIndex++;renderQuestion();saveState();
}
function prevQuestion(){if(state.qIndex>0){state.qIndex--;renderQuestion();saveState()}}

function renderLevelComplete(){
  const lv=state.level;
  const correct=scores[lv].filter(s=>s===1).length;
  const total=LEVEL_COUNTS[lv];
  const pct=Math.round(correct/total*100);
  const scoreClass=pct>=80?'':pct>=50?' medium-score':' low-score';
  const emoji=pct>=80?'🎉':pct>=50?'👏':'💪';

  document.getElementById('questionArea').innerHTML=
    '<div class="q-card"><div class="level-complete">'+
      '<div class="big-emoji">'+emoji+'</div>'+
      '<h2>סיימתם את רמת "'+LEVEL_NAMES[lv]+'"!</h2>'+
      '<div class="score-display'+scoreClass+'">'+correct+' / '+total+'</div>'+
      '<p style="color:var(--text-light);margin-bottom:16px">'+pct+'% הצלחה</p>'+
      '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'+
        '<button class="mini-btn" onclick="retryLevel()">🔄 נסו שוב</button>'+
        (lv!=='challenge'?'<button class="mini-btn accent" onclick="nextLevel()">▶ לרמה הבאה</button>':'')+
      '</div>'+
    '</div></div>';

  if(pct>=80) showConfetti();
  saveState();
}

window.retryLevel=function(){
  const lv=state.level;
  scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
  answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  questions[lv]=generateQuestions(lv);
  state.qIndex=0;
  renderLevelTabs();renderQuestion();saveState();
};

window.nextLevel=function(){
  const order=['easy','medium','hard','challenge'];
  const ci=order.indexOf(state.level);
  if(ci<order.length-1) switchLevel(order[ci+1]);
};

/* ===== SECTION SWITCHING ===== */
function switchSection(sec){
  state.section=sec;
  document.querySelectorAll('.section-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.section===sec);
  });
  document.getElementById('learnSection').style.display=sec==='learn'?'block':'none';
  document.getElementById('practiceSection').style.display=sec==='practice'?'block':'none';
  if(sec==='practice'){
    if(!questions[state.level]) questions[state.level]=generateQuestions(state.level);
    if(!scores[state.level].length) scores[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(-1);
    if(!answered[state.level].length) answered[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(false);
    renderLevelTabs();renderQuestion();
  }
  saveState();
}

/* ===== CONFETTI ===== */
function showConfetti(){
  const box=document.getElementById('confettiBox');
  box.innerHTML='';
  const colors=['#1a2f5a','#4a9eda','#10b981','#f59e0b','#8b5cf6','#ec4899'];
  for(let i=0;i<50;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(6+Math.random()*8)+'px';
    c.style.height=(6+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*1.5)+'s';
    box.appendChild(c);
  }
  setTimeout(()=>box.innerHTML='',5000);
}

/* ===== INIT ===== */
function init(){
  loadState();
  Object.keys(LEVEL_COUNTS).forEach(lv=>{
    if(!scores[lv]||!scores[lv].length) scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
    if(!answered[lv]||!answered[lv].length) answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  });
  renderStep(state.step);
  if(state.section==='practice') switchSection('practice');
}
init();
</script>
