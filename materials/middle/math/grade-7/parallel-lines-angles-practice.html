<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a2f5a;--primary-dark:#0f1d3a;--primary-light:#dbeafe;
  --accent:#4a9eda;--accent-dark:#2e7dba;
  --text:#1e293b;--text-light:#64748b;
  --bg:#ffffff;--bg-soft:#f8fafc;--border:#e2e8f0;
  --success:#10b981;--error:#ef4444;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
}
body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#f0f4ff 0%,#dce8f8 50%,#f0f4ff 100%);min-height:100vh;color:var(--text);line-height:1.6}
h1,h2,h3,.step-title{font-family:'Rubik','Heebo',sans-serif}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-family:'Rubik',sans-serif;font-size:1.05rem;font-weight:700;color:var(--primary-dark)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.85rem;font-weight:600}
.topbar a:hover{text-decoration:underline}
.section-toggle{display:flex;justify-content:center;gap:0;margin:16px auto;max-width:340px;background:var(--bg);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
.section-btn{flex:1;padding:10px 20px;border:none;border-radius:999px;background:transparent;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.95rem;font-weight:700;color:var(--text-light);transition:.3s}
.section-btn.active{background:var(--primary);color:#fff;box-shadow:var(--shadow-md)}
.container{max-width:760px;margin:0 auto;padding:0 16px 40px}
#learnSection{animation:fadeIn .4s ease}
.step-progress{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:0 4px}
.step-progress-bar{flex:1;height:8px;background:var(--border);border-radius:999px;overflow:hidden}
.step-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:999px;transition:width .4s ease}
.step-progress-text{font-size:.8rem;color:var(--text-light);font-weight:600;white-space:nowrap}
.step-card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:28px 24px;animation:slideIn .4s ease}
.step-title{font-size:1.35rem;font-weight:700;color:var(--primary-dark);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.step-card p{margin-bottom:12px;font-size:.95rem;line-height:1.7}
.step-card .highlight{background:var(--primary-light);border-right:4px solid var(--primary);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600}
.step-card .warning{background:#fef2f2;border-right:4px solid var(--error);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600;color:#991b1b}
.step-card .success-box{background:#ecfdf5;border-right:4px solid var(--success);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600;color:#065f46}
.step-card .rule-box{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;padding:16px;border-radius:var(--radius);margin:16px 0;text-align:center;font-size:1.1rem;font-weight:700}
.step-card .example{background:var(--bg-soft);border:1px solid var(--border);padding:14px;border-radius:var(--radius-sm);margin:10px 0;font-size:1rem}
.step-card .example .arrow{color:var(--primary);font-weight:800;margin:0 6px}
.step-card code,.expr{font-family:'Courier New',monospace;background:var(--primary-light);padding:2px 8px;border-radius:4px;font-weight:700;color:var(--primary-dark);font-size:1.05em;direction:ltr;display:inline-block}
.math-expr{direction:ltr;unicode-bidi:embed;display:inline;font-family:'Rubik',sans-serif;font-weight:700;color:var(--primary)}

.mini-table{border-collapse:collapse;margin:12px auto;direction:ltr}
.mini-table th,.mini-table td{border:2px solid var(--border);padding:8px 16px;text-align:center;font-size:1rem}
.mini-table th{background:var(--primary-light);color:var(--primary-dark);font-weight:700}
.mini-table td{background:var(--bg)}
.mini-input{width:60px;padding:6px;border:2px solid var(--border);border-radius:var(--radius-sm);text-align:center;font-size:1rem;font-family:inherit;font-weight:700;transition:.3s}
.mini-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(26,47,90,.15)}
.mini-input.correct{border-color:var(--success);background:#ecfdf5}
.mini-input.wrong{border-color:var(--error);background:#fef2f2}
.mini-btn{padding:8px 20px;border:none;border-radius:999px;background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:700;transition:.25s;margin:4px}
.mini-btn:hover{background:var(--primary-dark)}
.mini-btn.accent{background:var(--accent);color:#fff}
.mini-btn.accent:hover{background:var(--accent-dark)}
.mini-btn:disabled{opacity:.5;cursor:not-allowed}
.reveal{display:none;animation:fadeIn .5s ease}
.reveal.show{display:block}
.feedback-inline{margin-top:8px;padding:8px 12px;border-radius:var(--radius-sm);font-weight:600;font-size:.9rem;animation:fadeIn .3s}
.feedback-inline.ok{background:#ecfdf5;color:#065f46}
.feedback-inline.err{background:#fef2f2;color:#991b1b}
.quiz-options{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.quiz-opt{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;transition:.25s;background:var(--bg)}
.quiz-opt:hover{border-color:var(--primary);background:var(--primary-light)}
.quiz-opt.selected{border-color:var(--primary);background:var(--primary-light);font-weight:700}
.quiz-opt.correct-answer{border-color:var(--success);background:#ecfdf5;font-weight:700}
.quiz-opt.wrong-answer{border-color:var(--error);background:#fef2f2}
.step-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.summary-item{background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.summary-item .s-icon{font-size:2rem;margin-bottom:6px}
.summary-item .s-title{font-weight:700;color:var(--primary-dark);margin-bottom:4px;font-size:.9rem}
.summary-item .s-text{font-size:.82rem;color:var(--text-light)}
.step-nav{display:flex;justify-content:space-between;margin-top:16px;gap:8px}
.step-nav-btn{padding:10px 28px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.25s}
.step-nav-btn.primary{background:var(--primary);color:#fff}
.step-nav-btn.primary:hover{background:var(--primary-dark)}
.step-nav-btn.secondary{background:var(--bg);color:var(--text);border:2px solid var(--border)}
.step-nav-btn.secondary:hover{border-color:var(--primary);color:var(--primary)}
.step-nav-btn:disabled{opacity:.4;cursor:not-allowed}

#practiceSection{display:none;animation:fadeIn .4s ease}
.level-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.level-tab{padding:8px 20px;border-radius:999px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:700;color:var(--text-light);transition:.25s;white-space:nowrap}
.level-tab.active{border-color:var(--primary);background:var(--primary);color:#fff}
.level-tab .tab-score{font-size:.75rem;font-weight:400;margin-right:4px}
.level-progress{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.level-progress-bar{flex:1;height:6px;background:var(--border);border-radius:999px;overflow:hidden}
.level-progress-fill{height:100%;background:var(--success);border-radius:999px;transition:width .4s}
.level-progress-text{font-size:.8rem;color:var(--text-light);font-weight:600;white-space:nowrap}

.q-card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:24px;animation:slideIn .3s ease}
.q-number{font-size:.8rem;color:var(--text-light);font-weight:600;margin-bottom:4px}
.q-stem{font-size:1.05rem;margin-bottom:16px;line-height:1.7}
.q-stem code,.q-stem .expr{font-size:1.1em}
.q-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.q-opt{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;transition:.25s;background:var(--bg);display:flex;align-items:center;gap:10px}
.q-opt:hover:not(.disabled){border-color:var(--primary);background:var(--primary-light)}
.q-opt.selected{border-color:var(--primary);background:var(--primary-light);font-weight:700}
.q-opt.correct{border-color:var(--success)!important;background:#ecfdf5!important;font-weight:700}
.q-opt.wrong{border-color:var(--error)!important;background:#fef2f2!important}
.q-opt.disabled{cursor:default;opacity:.85}
.q-opt-letter{width:28px;height:28px;border-radius:50%;background:var(--bg-soft);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;transition:.25s}
.q-opt.selected .q-opt-letter{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-opt.correct .q-opt-letter{background:var(--success);color:#fff;border-color:var(--success)}
.q-opt.wrong .q-opt-letter{background:var(--error);color:#fff;border-color:var(--error)}

.q-input-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.q-input{width:120px;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:1.1rem;font-family:inherit;font-weight:700;text-align:center;transition:.3s;direction:ltr}
.q-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(26,47,90,.15)}
.q-input.correct{border-color:var(--success);background:#ecfdf5}
.q-input.wrong{border-color:var(--error);background:#fef2f2}

.q-check-btn{padding:10px 28px;border-radius:999px;border:none;background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.25s;box-shadow:var(--shadow)}
.q-check-btn:hover{background:var(--primary-dark)}
.q-check-btn:disabled{opacity:.5;cursor:not-allowed}

.q-feedback{margin-top:12px;padding:12px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:.92rem;animation:fadeIn .3s}
.q-feedback.correct{background:#ecfdf5;border-right:4px solid var(--success);color:#065f46}
.q-feedback.wrong{background:#fef2f2;border-right:4px solid var(--error);color:#991b1b}

.q-nav{display:flex;justify-content:space-between;margin-top:16px}
.q-nav-btn{padding:10px 24px;border-radius:999px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:700;color:var(--text);transition:.25s}
.q-nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.q-nav-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-nav-btn.primary:hover{background:var(--primary-dark)}
.q-nav-btn:disabled{opacity:.4;cursor:not-allowed}

.level-complete{text-align:center;padding:24px;animation:fadeIn .5s}
.level-complete .big-emoji{font-size:4rem;margin-bottom:12px}
.level-complete h2{font-size:1.4rem;color:var(--primary-dark);margin-bottom:8px}
.level-complete .score-display{font-size:1.8rem;font-weight:800;color:var(--success);margin-bottom:16px}
.level-complete .score-display.medium-score{color:#f59e0b}
.level-complete .score-display.low-score{color:var(--error)}

.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;top:-10px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(.3);opacity:0}}

.print-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--primary);color:#fff;cursor:pointer;font-size:1rem;box-shadow:var(--shadow);transition:.25s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.print-btn:hover{background:var(--primary-dark);transform:scale(1.1)}

/* SVG diagrams */
.diagram-box{text-align:center;margin:14px 0;overflow-x:auto}
.diagram-box svg{max-width:100%;height:auto}
.angle-type-table{border-collapse:collapse;margin:12px auto;width:100%}
.angle-type-table th,.angle-type-table td{border:2px solid var(--border);padding:10px 12px;text-align:center;font-size:.92rem}
.angle-type-table th{background:var(--primary);color:#fff;font-weight:700}
.angle-type-table td{background:var(--bg)}
.angle-type-table tr:nth-child(even) td{background:var(--bg-soft)}
.solution-step{background:var(--bg-soft);border:1px solid var(--border);padding:10px 14px;border-radius:var(--radius-sm);margin:6px 0;display:flex;align-items:flex-start;gap:8px}
.solution-step .step-num{background:var(--primary);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;margin-top:2px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

@media(max-width:600px){
  .container{padding:0 10px 30px}
  .step-card,.q-card{padding:18px 14px}
  .step-title{font-size:1.15rem}
  .step-summary-grid{grid-template-columns:1fr}
  .section-toggle{max-width:280px;margin:12px auto}
  .section-btn{font-size:.88rem;padding:8px 14px}
  .q-opt{padding:10px 12px;font-size:.9rem}
  .topbar-title{font-size:.9rem}
  .angle-type-table{font-size:.82rem}
  .angle-type-table th,.angle-type-table td{padding:6px 8px}
}
@media print{
  .topbar,.section-toggle,.step-nav,.q-nav,.print-btn,.level-tabs,.confetti-container,.q-check-btn{display:none!important}
  body{background:#fff;font-size:11pt}
  .step-card,.q-card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;page-break-inside:avoid}
  .container{max-width:100%}
  .q-feedback{break-inside:avoid}
}
</style>
</head>

<script>
/* ===== UTILITIES ===== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const today=new Date();const dateSeed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
let rng=mulberry32(dateSeed);
function R(){return rng()}
function RI(a,b){return a+Math.floor(R()*(b-a+1))}
function pick(arr){return arr[Math.floor(R()*arr.length)]}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(R()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const LETTERS=['א','ב','ג','ד'];

/* ===== STATE ===== */
let state={section:'learn',step:0,level:'easy',qIndex:0};
let scores={easy:[],medium:[],hard:[],challenge:[]};
let answered={easy:[],medium:[],hard:[],challenge:[]};

const LEVEL_NAMES={easy:'קל',medium:'בינוני',hard:'קשה',challenge:'אתגר'};
const TOTAL_STEPS=7;

/* ===== LOCAL STORAGE ===== */
const LS_KEY='bh_grade7_parallel_practice_'+dateSeed;
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify({scores,answered,state}))}catch(e){}}
function loadState(){try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d){scores=d.scores||scores;answered=d.answered||answered;if(d.state)state=d.state}}catch(e){}}

/* ===== TEACHING SECTION ===== */
const steps=[
/* Step 0: Review — angle types between parallel lines */
{title:'🔄 חזרה: סוגי זוויות בין ישרים מקבילים', render(){return `
<p>לפני שנתרגל, בואו נחזור על כל סוגי הזוויות שלמדנו:</p>

  <path d="M195,80 A20,20 0 0,1 178,67" fill="none" stroke="#e74c3c" stroke-width="2"/>

/* ===== SVG HELPERS ===== */
function svgParallel(w,h,alpha,label1,label2,highlightType){
  /* Draw two parallel horizontal lines + transversal, mark angles
     highlightType: 'corresponding','alternate','co-interior','supplementary','vertical'
     alpha = the acute/obtuse angle at top-left (angle between transversal going down-right and line a, measured above-right) */
  const W=w||360,H=h||200;
  const y1=55,y2=H-55;
  const midY=(y1+y2)/2;
  /* transversal: goes from top-left-ish to bottom-right-ish */
  const dx=(y2-y1)/Math.tan(alpha*Math.PI/180);
  const cx1=W/2-dx/2, cy1=y1, cx2=W/2+dx/2, cy2=y2;
  /* extend transversal beyond lines */
  const ext=25;
  const vx=cx2-cx1,vy=cy2-cy1,vlen=Math.sqrt(vx*vx+vy*vy);
  const ux=vx/vlen,uy=vy/vlen;
  const tx1=cx1-ux*ext,ty1=cy1-uy*ext,tx2=cx2+ux*ext,ty2=cy2+uy*ext;
  /* intersection points */
  const ix1=cx1,iy1=y1; // transversal with line a
  const ix2=cx2,iy2=y2; // transversal with line b

  let s='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" style="direction:ltr">';
  /* parallel lines */
  s+='<line x1="10" y1="'+y1+'" x2="'+(W-10)+'" y2="'+y1+'" stroke="#1a2f5a" stroke-width="2.5"/>';
  s+='<line x1="10" y1="'+y2+'" x2="'+(W-10)+'" y2="'+y2+'" stroke="#1a2f5a" stroke-width="2.5"/>';
  /* parallel arrows */
  const arrowX=W/2+40;
  s+='<polygon points="'+(arrowX-5)+','+(y1-4)+' '+(arrowX+5)+','+(y1-4)+' '+arrowX+','+(y1-10)+'" fill="#1a2f5a"/>';
  s+='<polygon points="'+(arrowX-5)+','+(y2-4)+' '+(arrowX+5)+','+(y2-4)+' '+arrowX+','+(y2-10)+'" fill="#1a2f5a"/>';
  /* transversal */
  s+='<line x1="'+tx1+'" y1="'+ty1+'" x2="'+tx2+'" y2="'+ty2+'" stroke="#4a9eda" stroke-width="2"/>';
  /* labels */
  s+='<text x="'+(W-8)+'" y="'+(y1-6)+'" font-size="15" font-weight="700" fill="#1a2f5a" text-anchor="end">a</text>';
  s+='<text x="'+(W-8)+'" y="'+(y2-6)+'" font-size="15" font-weight="700" fill="#1a2f5a" text-anchor="end">b</text>';
  s+='<text x="'+(tx2+4)+'" y="'+(ty2+12)+'" font-size="14" font-weight="700" fill="#4a9eda">t</text>';

  /* angle labels */
  const supp=180-alpha;
  if(label1){
    /* label1 at top intersection, label2 at bottom intersection */
    const lx1=ix1-30, ly1=iy1-12;
    s+='<text x="'+lx1+'" y="'+ly1+'" font-size="13" fill="#e74c3c" font-weight="700">'+label1+'</text>';
  }
  if(label2){
    if(highlightType==='corresponding'){
      const lx2=ix2-30, ly2=iy2-12;
      s+='<text x="'+lx2+'" y="'+ly2+'" font-size="13" fill="#e74c3c" font-weight="700">'+label2+'</text>';
    } else if(highlightType==='alternate'){
      const lx2=ix2+8, ly2=iy2+18;
      s+='<text x="'+lx2+'" y="'+ly2+'" font-size="13" fill="#e74c3c" font-weight="700">'+label2+'</text>';
    } else if(highlightType==='co-interior'){
      const lx2=ix2-30, ly2=iy2+18;
      s+='<text x="'+lx2+'" y="'+ly2+'" font-size="13" fill="#e74c3c" font-weight="700">'+label2+'</text>';
    } else if(highlightType==='supplementary'){
      const lx2=ix1+8, ly2=iy1-12;
      s+='<text x="'+lx2+'" y="'+ly2+'" font-size="13" fill="#e74c3c" font-weight="700">'+label2+'</text>';
    } else if(highlightType==='vertical'){
      const lx2=ix1+8, ly2=iy1+18;
      s+='<text x="'+lx2+'" y="'+ly2+'" font-size="13" fill="#e74c3c" font-weight="700">'+label2+'</text>';
    } else {
      const lx2=ix2+8, ly2=iy2-12;
      s+='<text x="'+lx2+'" y="'+ly2+'" font-size="13" fill="#e74c3c" font-weight="700">'+label2+'</text>';
    }
  }
  s+='<text x="20" y="'+midY+'" font-size="14" font-weight="700" fill="#1a2f5a">a ‖ b</text>';
  s+='</svg>';
  return s;
}

function svgTriangleParallel(w,h,angA,angB,labelDE,labelTarget){
  /* Triangle ABC with DE parallel to BC */
  const W=w||360,H=h||240;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" style="direction:ltr">';
  s+='<polygon points="'+(W/2)+',30 60,'+(H-30)+' '+(W-60)+','+(H-30)+'" fill="none" stroke="#1a2f5a" stroke-width="2.5"/>';
  s+='<line x1="120" y1="'+(H/2)+'" x2="'+(W-120)+'" y2="'+(H/2)+'" stroke="#4a9eda" stroke-width="2.5" stroke-dasharray="6,3"/>';
  s+='<text x="'+(W/2-5)+'" y="22" font-size="14" font-weight="700" fill="#1a2f5a">A</text>';
  s+='<text x="42" y="'+(H-15)+'" font-size="14" font-weight="700" fill="#1a2f5a">B</text>';
  s+='<text x="'+(W-55)+'" y="'+(H-15)+'" font-size="14" font-weight="700" fill="#1a2f5a">C</text>';
  s+='<text x="102" y="'+(H/2-5)+'" font-size="14" font-weight="700" fill="#4a9eda">D</text>';
  s+='<text x="'+(W-115)+'" y="'+(H/2-5)+'" font-size="14" font-weight="700" fill="#4a9eda">E</text>';
  if(angA) s+='<text x="'+(W/2-15)+'" y="55" font-size="12" fill="#e74c3c" font-weight="600">'+angA+'</text>';
  if(angB) s+='<text x="78" y="'+(H-45)+'" font-size="12" fill="#e74c3c" font-weight="600">'+angB+'</text>';
  if(labelDE) s+='<text x="'+(W/2-15)+'" y="'+(H/2-10)+'" font-size="12" fill="#4a9eda" font-weight="600">'+labelDE+'</text>';
  if(labelTarget) s+='<text x="'+(W-100)+'" y="'+(H-45)+'" font-size="12" fill="#e74c3c" font-weight="600">'+labelTarget+'</text>';
  /* parallel arrows */
  s+='<polygon points="'+(W/2-5)+','+(H/2-4)+' '+(W/2+5)+','+(H/2-4)+' '+(W/2)+','+(H/2-10)+'" fill="#4a9eda"/>';
  s+='<polygon points="'+(W/2-5)+','+(H-34)+' '+(W/2+5)+','+(H-34)+' '+(W/2)+','+(H-40)+'" fill="#1a2f5a"/>';
  s+='</svg>';
  return s;
}

function svgThreeParallels(w,h,labels){
  /* 3 horizontal parallel lines with 1 transversal */
  const W=w||380,H=h||260;

  let s='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" style="direction:ltr">';

  s+='<line x1="15" y1="'+y3+'" x2="'+(W-15)+'" y2="'+y3+'" stroke="#1a2f5a" stroke-width="2.5"/>';
  /* parallel arrows */
  [y1,y2,y3].forEach(y=>{s+='<polygon points="200,'+(y-4)+' 210,'+(y-4)+' 205,'+(y-10)+'" fill="#1a2f5a"/>';});
  /* transversal */
  s+='<line x1="100" y1="20" x2="280" y2="240" stroke="#4a9eda" stroke-width="2"/>';
  s+='<text x="'+(W-12)+'" y="'+(y1-6)+'" font-size="14" font-weight="700" fill="#1a2f5a" text-anchor="end">a</text>';
  s+='<text x="'+(W-12)+'" y="'+(y2-6)+'" font-size="14" font-weight="700" fill="#1a2f5a" text-anchor="end">b</text>';
  s+='<text x="'+(W-12)+'" y="'+(y3-6)+'" font-size="14" font-weight="700" fill="#1a2f5a" text-anchor="end">c</text>';
  if(labels&&labels[0]) s+='<text x="132" y="'+(y1-8)+'" font-size="13" fill="#e74c3c" font-weight="700">'+labels[0]+'</text>';

  if(labels&&labels[2]) s+='<text x="218" y="'+(y3-8)+'" font-size="13" fill="#e74c3c" font-weight="700">'+labels[2]+'</text>';
  s+='</svg>';
  return s;
}

const angleTypes=['corresponding','alternate','co-interior'];
const typeNamesHe={'corresponding':'מתאימות','alternate':'מתחלפות','co-interior':'חד-צדדיות'};

function genEasy(){
  rng=mulberry32(dateSeed+100);

  /* Q1-6: Given one angle, find corresponding/alternate/co-interior (direct) */
  for(let i=0;i<6;i++){
    const alpha=RI(30,150);
    const tp=angleTypes[i%3];
    const ans=tp==='co-interior'?180-alpha:alpha;
    const correct=''+ans;
    const d1=''+(180-ans);
    const d2=''+(ans+RI(5,20));
    const d3=''+(ans-RI(5,15)>0?ans-RI(5,15):ans+RI(25,35));

    const svg=svgParallel(340,180,alpha>=90?alpha:180-alpha,alpha+'°','?',tp);

      options:opts.map(o=>o+'°'),answer:opts.indexOf(correct),
      explanation:'זוויות '+explRel});
  }

  /* Q7-12: Given angle, find supplementary at same intersection, then use corresponding */
  for(let i=0;i<6;i++){
    const alpha=RI(35,145);
    const supp=180-alpha;
    const tp=pick(['corresponding','alternate']);
    /* We give the supplementary of the "source" angle and ask for the target */
    const ans=tp==='corresponding'?alpha:alpha;
    const givenAngle=supp;
    const correct=''+ans;
    const d1=''+supp; const d2=''+(ans+10); const d3=''+((ans-10)>0?ans-10:ans+20);
    const opts=shuffle([correct,d1,d2,d3]);
    const svg=svgParallel(340,180,alpha>=90?alpha:180-alpha,supp+'°','?','supplementary');
    qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span>. הזווית המסומנת ליד a שווה <span class="math-expr">'+supp+'°</span>. מצאו את הזווית המסומנת ליד b (ה'+typeNamesHe[tp]+' לזווית הצמודה).<div class="diagram-box">'+svg+'</div>',
      options:opts.map(o=>o+'°'),answer:opts.indexOf(correct),
      explanation:'הזווית הצמודה ל-'+supp+'° היא <span class="math-expr">180 - '+supp+' = '+alpha+'°</span>. זוויות '+typeNamesHe[tp]+' שוות, לכן התשובה <span class="math-expr">'+ans+'°</span>'});
  }

  /* Q13-16: Find vertical angle at intersection with parallel lines */
  for(let i=0;i<4;i++){
    const alpha=RI(25,155);
    const vert=alpha;
    const correct=''+vert;
    const d1=''+(180-alpha); const d2=''+(alpha+15); const d3=''+(alpha-15>0?alpha-15:alpha+25);
    const opts=shuffle([correct,d1,d2,d3]);
    const svg=svgParallel(340,180,alpha>=90?alpha:180-alpha,alpha+'°','?','vertical');
    qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span>. הזווית המסומנת היא <span class="math-expr">'+alpha+'°</span>. מצאו את הזווית ה<strong>קודקודית</strong> לה (באותה נקודת חיתוך).<div class="diagram-box">'+svg+'</div>',
      options:opts.map(o=>o+'°'),answer:opts.indexOf(correct),
      explanation:'זוויות קודקודיות שוות! לכן: <span class="math-expr">'+alpha+'°</span>'});
  }

  /* Q17-20: Identify angle type between parallel lines */
  for(let i=0;i<4;i++){
    const alpha=RI(30,150);
    const tp=angleTypes[i%3];
    const tpName=typeNamesHe[tp];
    const opts=shuffle(['מתאימות','מתחלפות','חד-צדדיות','קודקודיות']);
    const svg=svgParallel(340,180,alpha>=90?alpha:180-alpha,alpha+'°',tp==='co-interior'?(180-alpha)+'°':alpha+'°',tp);
    const explText=tp==='corresponding'?'שתי הזוויות באותו מיקום (שתיהן מעל / שתיהן משמאל) → מתאימות'
      :tp==='alternate'?'הזוויות בצדדים מנוגדים של החותך, בין שני הישרים → מתחלפות'
      :'הזוויות באותו צד של החותך, בין שני הישרים, סכומן 180° → חד-צדדיות';
    qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span>. מהו סוג הזוויות המסומנות?<div class="diagram-box">'+svg+'</div>',
      options:opts,answer:opts.indexOf(tpName),
      explanation:explText});
  }

  return qs;
}

        explanation:'חד-צדדיות: <span class="math-expr">2x + 10 + '+bf+' = 180</span> → <span class="math-expr">2x = '+(180-bf-10)+'</span> → <span class="math-expr">x = '+xf+'</span>'});
    } else {
      const exprStr=c1+'x + '+b1;
      const correct=''+x;
      const d1=''+(x+RI(3,8)); const d2=''+(x-RI(2,4)>0?x-RI(2,4):x+10); const d3=''+angA;

      qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span>. הזוויות המסומנות הן <strong>חד-צדדיות</strong>. מצאו את <span class="math-expr">x</span>.<div class="diagram-box">'+svg+'</div><p>חד-צדדיות → סכום 180°: <span class="math-expr">'+exprStr+' + '+angB+' = 180</span></p>',
        options:opts,answer:opts.indexOf(correct),
        explanation:'חד-צדדיות: <span class="math-expr">'+exprStr+' + '+angB+' = 180</span> → <span class="math-expr">'+c1+'x = '+(180-angB-b1)+'</span> → <span class="math-expr">x = '+x+'</span>'});
    }
  }

  /* Q16-20: Identify type + write equation */
  for(let i=0;i<5;i++){
    const tp=angleTypes[i%3];
    const alpha=RI(40,140);
    const beta=tp==='co-interior'?180-alpha:alpha;
    const correct=typeNamesHe[tp];
    const opts=shuffle(['מתאימות','מתחלפות','חד-צדדיות','קודקודיות']);
    const svg=svgParallel(340,180,alpha>=90?alpha:180-alpha,alpha+'°',beta+'°',tp);
    const eqText=tp==='co-interior'?alpha+' + '+beta+' = 180':alpha+' = '+beta;
    qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span>. זהו את סוג הזוויות וכתבו משוואה.<div class="diagram-box">'+svg+'</div>',
      options:opts,answer:opts.indexOf(correct),
      explanation:'הזוויות הן <strong>'+correct+'</strong>. המשוואה: <span class="math-expr">'+eqText+'</span>'});
  }

  return qs;
}

function genHard(){
  rng=mulberry32(dateSeed+300);
  const qs=[];

  /* Q1-5: Triangle + parallel line — find angle */
  for(let i=0;i<5;i++){
    const angA=RI(30,70);
    const angB=RI(30,Math.min(80,179-angA-15));
    const angC=180-angA-angB;
    /* DE || BC, so angle ADE = angB (corresponding) */
    const target=pick(['ADE','AED']);
    const ans=target==='ADE'?angB:angC;
    const correct=''+ans;
    const d1=''+(180-ans); const d2=''+angA; const d3=''+(ans+10);
    const opts=shuffle([correct,d1,d2,d3]);
    const svg=svgTriangleParallel(340,220,angA+'°',angB+'°','DE ‖ BC','?');
    qs.push({type:'mc',stem:'במשולש ABC, <span class="math-expr">DE ‖ BC</span>. ∠A = <span class="math-expr">'+angA+'°</span>, ∠B = <span class="math-expr">'+angB+'°</span>. מצאו את <span class="math-expr">∠'+target+'</span>.<div class="diagram-box">'+svg+'</div>',
      options:opts.map(o=>o+'°'),answer:opts.indexOf(correct),
      explanation:'∠C = <span class="math-expr">180 - '+angA+' - '+angB+' = '+angC+'°</span>. '+(target==='ADE'?'∠ADE ו-∠ABC מתאימות (DE‖BC) → <span class="math-expr">∠ADE = '+angB+'°</span>':'∠AED ו-∠ACB מתאימות (DE‖BC) → <span class="math-expr">∠AED = '+angC+'°</span>')});
  }

  /* Q6-10: Two parallel lines + transversal + vertical angles — multi-step */
  for(let i=0;i<5;i++){
    const alpha=RI(35,145);
    const supp=180-alpha;
    const vert=alpha;
    /* Give alpha, ask for angle at other intersection that requires 2 steps */
    const stepType=pick(['supp-then-corresponding','vert-then-alternate']);
    let ans, expl;
    if(stepType==='supp-then-corresponding'){
      /* supplementary of alpha = supp, then corresponding of supp at b */
      ans=supp;
      expl='הזווית הצמודה ל-'+alpha+'° היא <span class="math-expr">180 - '+alpha+' = '+supp+'°</span>. זוויות מתאימות שוות → <span class="math-expr">'+supp+'°</span>';
    } else {
      /* vertical of alpha = alpha, then alternate at b */
      ans=alpha;
      expl='הזווית הקודקודית ל-'+alpha+'° שווה <span class="math-expr">'+alpha+'°</span>. זוויות מתחלפות שוות → <span class="math-expr">'+alpha+'°</span>';
    }
    const correct=''+ans;
    const d1=''+(180-ans); const d2=''+(ans+15); const d3=''+(ans-15>0?ans-15:ans+25);
    const opts=shuffle([correct,d1,d2,d3]);
    const svg=svgParallel(340,180,alpha>=90?alpha:180-alpha,alpha+'°','?',stepType==='supp-then-corresponding'?'corresponding':'alternate');
    qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span>. הזווית ליד a היא <span class="math-expr">'+alpha+'°</span>. מצאו את הזווית המסומנת ליד b (דרך '+
      (stepType==='supp-then-corresponding'?'צמודות ואז מתאימות':'קודקודיות ואז מתחלפות')+').<div class="diagram-box">'+svg+'</div>',
      options:opts.map(o=>o+'°'),answer:opts.indexOf(correct),
      explanation:expl});
  }

  /* Q11-15: Solve expression equation — two expressions, co-interior */
  for(let i=0;i<5;i++){
    const x=RI(5,25);
    const c1=RI(2,5); const b1=RI(5,20);
    const angA=c1*x+b1;
    const angB=180-angA;
    const c2=RI(1,4); const b2=angB-c2*x;
    if(b2<=0||angA<=10||angA>=170){
      /* fallback */
      const xf=RI(10,20); const af=3*xf+10; const bf=180-af;
      const ans=xf;
      const correct=''+ans;
      const d1=''+(ans+5); const d2=''+(ans-3>0?ans-3:ans+8); const d3=''+af;
      const opts=shuffle([correct,d1,d2,d3]);
      qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span>. זוויות חד-צדדיות: <span class="math-expr">3x + 10</span> ו-<span class="math-expr">'+bf+'°</span>. מצאו את <span class="math-expr">x</span>.',
        options:opts,answer:opts.indexOf(correct),
        explanation:'חד-צדדיות → סכום 180°: <span class="math-expr">3x + 10 + '+bf+' = 180</span> → <span class="math-expr">3x = '+(180-bf-10)+'</span> → <span class="math-expr">x = '+ans+'</span>'});
    } else {
      const expr1=c1+'x + '+b1;
      const expr2=(b2>=0?(c2>0?c2+'x + '+b2:''+b2):c2+'x - '+(-b2));
      const correct=''+x;
      const d1=''+(x+4); const d2=''+(x-3>0?x-3:x+8); const d3=''+angA;
      const opts=shuffle([correct,d1,d2,d3]);
      qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span>. זוויות חד-צדדיות: <span class="math-expr">'+expr1+'</span> ו-<span class="math-expr">'+expr2+'</span>. מצאו את <span class="math-expr">x</span>.',
        options:opts,answer:opts.indexOf(correct),
        explanation:'חד-צדדיות → סכום 180°: <span class="math-expr">('+expr1+') + ('+expr2+') = 180</span> → <span class="math-expr">'+(c1+c2)+'x + '+(b1+b2)+' = 180</span> → <span class="math-expr">x = '+x+'</span>'});
    }
  }

  /* Q16-20: Exam-style — given one angle in parallel system, find all 4 angles at that intersection */
  for(let i=0;i<5;i++){
    const alpha=RI(25,155);
    const supp=180-alpha;
    /* Ask: how many of the 8 angles equal alpha? */
    const countAlpha=4; /* 2 vertical at top + 2 corresponding at bottom */
    const questionType=pick(['count','specific']);
    if(questionType==='count'){
      const correct=''+countAlpha;
      const opts=shuffle(['2','4','6','8']);
      qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span> עם חותך t. אחת הזוויות היא <span class="math-expr">'+alpha+'°</span>. כמה מבין 8 הזוויות (4 בכל חיתוך) שוות ל-<span class="math-expr">'+alpha+'°</span>?',
        options:opts,answer:opts.indexOf(correct),
        explanation:'בכל חיתוך יש 2 זוויות של '+alpha+'° (קודקודיות). בשני חיתוכים: <span class="math-expr">2 × 2 = 4</span> זוויות.'});
    } else {
      const correct=''+supp;
      const d1=''+alpha; const d2=''+(supp+10); const d3=''+(360-alpha);
      const opts=shuffle([correct,d1,d2,d3]);
      qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span> עם חותך t. אחת הזוויות היא <span class="math-expr">'+alpha+'°</span>. כמה שוות שאר הזוויות (אלה שלא שוות ל-'+alpha+'°)?',
        options:opts.map(o=>o+'°'),answer:opts.indexOf(correct),
        explanation:'4 זוויות שוות ל-'+alpha+'° ו-4 זוויות שוות ל-<span class="math-expr">180 - '+alpha+' = '+supp+'°</span>'});
    }
  }

  return qs;
}

function genChallenge(){
  rng=mulberry32(dateSeed+400);
  const qs=[];

  /* Q1-4: 3 parallel lines — find angle at line c given angle at line a */
  for(let i=0;i<4;i++){
    const alpha=RI(30,150);
    const tp=pick(['corresponding','alternate','co-interior']);
    const ans=tp==='co-interior'?180-alpha:alpha;
    const correct=''+ans;
    const d1=''+(180-ans); const d2=''+(ans+20); const d3=''+(ans-20>0?ans-20:ans+30);
    const opts=shuffle([correct,d1,d2,d3]);
    const labels=[alpha+'°','',tp==='co-interior'?(180-alpha)+'°':'?'];
    const svg=svgThreeParallels(360,240,labels);
    const relName=tp==='co-interior'?'חד-צדדיות':tp==='corresponding'?'מתאימות':'מתחלפות';
    qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b ‖ c</span>. הזווית ליד a היא <span class="math-expr">'+alpha+'°</span>. מצאו את הזווית המסומנת ליד c ('+relName+' ל-a).<div class="diagram-box">'+svg+'</div>',
      options:opts.map(o=>o+'°'),answer:opts.indexOf(correct),
      explanation:'a‖b‖c → ניתן להשתמש בכל זוג. a‖c → זוויות '+relName+': '+(tp==='co-interior'?'סכום 180° → <span class="math-expr">180 - '+alpha+' = '+ans+'°</span>':'שוות → <span class="math-expr">'+ans+'°</span>')});
  }

  /* Q5-8: Quadrilateral with parallel sides (trapezoid) */
  for(let i=0;i<4;i++){
    const angB=RI(40,140);
    const angA=180-angB; /* co-interior with B since AD||BC */
    const angC=RI(40,140);
    const angD=180-angC; /* co-interior with C */
    /* Check sum = 360: angA+angB+angC+angD = (180-angB)+angB+angC+(180-angC) = 360 ✓ */
    const askAngle=pick(['A','D']);
    const ans=askAngle==='A'?angA:angD;
    const givenAngles=askAngle==='A'?'∠B = '+angB+'°':'∠C = '+angC+'°';
    const reason=askAngle==='A'?'∠A ו-∠B חד-צדדיות (AD‖BC) → סכום 180°: <span class="math-expr">180 - '+angB+' = '+angA+'°</span>':'∠D ו-∠C חד-צדדיות (AD‖BC) → סכום 180°: <span class="math-expr">180 - '+angC+' = '+angD+'°</span>';
    const correct=''+ans;
    const d1=''+(180-ans); const d2=''+(ans+15); const d3=''+(askAngle==='A'?angC:angB);
    const opts=shuffle([correct,d1,d2,d3]);
    let svg='<svg viewBox="0 0 360 180" width="360" height="180" style="direction:ltr">';
    svg+='<polygon points="80,40 280,40 310,150 50,150" fill="none" stroke="#1a2f5a" stroke-width="2.5"/>';
    svg+='<text x="67" y="32" font-size="14" font-weight="700" fill="#1a2f5a">A</text>';
    svg+='<text x="285" y="32" font-size="14" font-weight="700" fill="#1a2f5a">B</text>';
    svg+='<text x="315" y="165" font-size="14" font-weight="700" fill="#1a2f5a">C</text>';
    svg+='<text x="32" y="165" font-size="14" font-weight="700" fill="#1a2f5a">D</text>';
    svg+='<text x="90" y="60" font-size="12" fill="#e74c3c" font-weight="600">'+(askAngle==='A'?'?':angA+'°')+'</text>';
    svg+='<text x="255" y="60" font-size="12" fill="#e74c3c" font-weight="600">'+angB+'°</text>';
    svg+='<text x="278" y="142" font-size="12" fill="#e74c3c" font-weight="600">'+angC+'°</text>';
    svg+='<text x="62" y="142" font-size="12" fill="#e74c3c" font-weight="600">'+(askAngle==='D'?'?':angD+'°')+'</text>';
    svg+='<polygon points="175,36 185,36 180,30" fill="#1a2f5a"/><polygon points="175,146 185,146 180,140" fill="#1a2f5a"/>';
    svg+='</svg>';
    qs.push({type:'mc',stem:'במרובע ABCD, <span class="math-expr">AD ‖ BC</span>. '+givenAngles+'. מצאו את <span class="math-expr">∠'+askAngle+'</span>.<div class="diagram-box">'+svg+'</div>',
      options:opts.map(o=>o+'°'),answer:opts.indexOf(correct),
      explanation:reason});
  }

  /* Q9-12: "Can you compute?" — determine if angle is computable from given info */
  for(let i=0;i<4;i++){
    const canCompute=i<2;
    if(canCompute){
      const alpha=RI(30,150);
      const ans=180-alpha;
      const correct='כן, '+ans+'°';
      const opts=shuffle([correct,'כן, '+alpha+'°','כן, '+(360-alpha)+'°','לא, אי אפשר לחשב']);
      qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b</span>. ידוע ש-∠1 = <span class="math-expr">'+alpha+'°</span> (ליד a). ∠1 ו-∠2 הן חד-צדדיות. האם אפשר לחשב את ∠2?',
        options:opts,answer:opts.indexOf(correct),
        explanation:'כן! חד-צדדיות → סכום 180°. <span class="math-expr">∠2 = 180 - '+alpha+' = '+ans+'°</span>'});
    } else {
      const alpha=RI(30,150);
      const opts=shuffle(['לא, חסר מידע','כן, '+alpha+'°','כן, '+(180-alpha)+'°','כן, '+(360-alpha)+'°']);
      qs.push({type:'mc',stem:'שני ישרים (לא מקבילים!) נחתכים ע"י חותך. ∠1 = <span class="math-expr">'+alpha+'°</span>. האם אפשר לחשב את הזווית שנוצרת ליד הישר השני?',
        options:opts,answer:opts.indexOf('לא, חסר מידע'),
        explanation:'לא! בלי מקביליות אי אפשר להשתמש בכללי זוויות מתאימות/מתחלפות/חד-צדדיות. צריך מידע נוסף.'});
    }
  }

  /* Q13-15: Complex — 3 parallel lines with expression */
  for(let i=0;i<3;i++){
    const x=RI(5,20);
    const c1=RI(2,5); const b1=RI(5,20);
    const angAtA=c1*x+b1;
    if(angAtA<=15||angAtA>=165){
      /* fallback */
      const xf=RI(10,20);
      const af=2*xf+30;
      const cf=180-af;
      const correct=''+xf;
      const d1=''+(xf+5); const d2=''+(xf-5>0?xf-5:xf+8); const d3=''+af;
      const opts=shuffle([correct,d1,d2,d3]);
      const labels=['2x + 30','',cf+'°'];
      const svg=svgThreeParallels(360,240,labels);
      qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b ‖ c</span>. הזווית ליד a היא <span class="math-expr">2x + 30</span>. הזווית ה<strong>חד-צדדית</strong> ליד c היא <span class="math-expr">'+cf+'°</span>. מצאו את <span class="math-expr">x</span>.<div class="diagram-box">'+svg+'</div>',
        options:opts,answer:opts.indexOf(correct),
        explanation:'a‖c → חד-צדדיות, סכום 180°: <span class="math-expr">(2x + 30) + '+cf+' = 180</span> → <span class="math-expr">2x = '+(180-cf-30)+'</span> → <span class="math-expr">x = '+xf+'</span>'});
    } else {
      const coInterior=180-angAtA;
      const correct=''+x;
      const d1=''+(x+4); const d2=''+(x-4>0?x-4:x+9); const d3=''+angAtA;
      const opts=shuffle([correct,d1,d2,d3]);
      const exprStr=c1+'x + '+b1;
      const labels=[exprStr,'',coInterior+'°'];
      const svg=svgThreeParallels(360,240,labels);
      qs.push({type:'mc',stem:'<span class="math-expr">a ‖ b ‖ c</span>. הזווית ליד a היא <span class="math-expr">'+exprStr+'</span>. הזווית ה<strong>חד-צדדית</strong> ליד c היא <span class="math-expr">'+coInterior+'°</span>. מצאו את <span class="math-expr">x</span>.<div class="diagram-box">'+svg+'</div>',
        options:opts,answer:opts.indexOf(correct),
        explanation:'a‖c → חד-צדדיות, סכום 180°: <span class="math-expr">('+exprStr+') + '+coInterior+' = 180</span> → <span class="math-expr">'+c1+'x = '+(180-coInterior-b1)+'</span> → <span class="math-expr">x = '+x+'</span>'});
    }
  }

  return qs;
}

function generateQuestions(level){
  if(level==='easy') return genEasy();
  if(level==='medium') return genMedium();
  if(level==='hard') return genHard();
  return genChallenge();
}

/* ===== PRACTICE RENDERING ===== */
function renderLevelTabs(){
  const container=document.getElementById('levelTabs');
  container.innerHTML='';
  ['easy','medium','hard','challenge'].forEach(lv=>{
    const btn=document.createElement('button');
    btn.className='level-tab'+(state.level===lv?' active':'');
    const done=scores[lv].filter(s=>s===1).length;
    const total=LEVEL_COUNTS[lv];
    btn.innerHTML=LEVEL_NAMES[lv]+(done>0?' <span class="tab-score">('+done+'/'+total+')</span>':'');
    btn.onclick=()=>switchLevel(lv);
    container.appendChild(btn);
  });
}

function switchLevel(lv){
  state.level=lv;state.qIndex=0;
  if(!questions[lv]) questions[lv]=generateQuestions(lv);
  if(!scores[lv].length) scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
  if(!answered[lv].length) answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  renderLevelTabs();renderQuestion();saveState();
}

function updateLevelProgress(){
  const lv=state.level;const total=LEVEL_COUNTS[lv];
  const done=answered[lv].filter(a=>a).length;
  document.getElementById('levelFill').style.width=(done/total*100)+'%';
  document.getElementById('levelText').textContent=done+' / '+total;
}

function renderQuestion(){
  const lv=state.level;const idx=state.qIndex;
  const qs=questions[lv];
  if(!qs) return;
  if(idx>=qs.length){renderLevelComplete();return}
  const q=qs[idx];
  const area=document.getElementById('questionArea');
  const isAnswered=answered[lv][idx];

  let html='<div class="q-card"><div class="q-number">שאלה '+(idx+1)+' מתוך '+qs.length+'</div>';
  html+='<div class="q-stem">'+q.stem+'</div>';

  if(q.type==='mc'){
    html+='<div class="q-options" id="qOpts">';
    q.options.forEach((opt,i)=>{
      const letter=LETTERS[i];
      let cls='q-opt';
      if(isAnswered){
        cls+=' disabled';
        if(i===q.answer) cls+=' correct';
        else if(scores[lv][idx]===0&&i===answered[lv][idx+'_sel']) cls+=' wrong';
      }
      html+='<div class="'+cls+'" data-i="'+i+'"><span class="q-opt-letter">'+letter+'</span><span dir="ltr" style="unicode-bidi:embed">'+opt+'</span></div>';
    });
    html+='</div>';
    if(!isAnswered) html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkMC()" disabled>בדקו</button>';
  } else if(q.type==='input'){
    html+='<div class="q-input-row"><input type="number" class="q-input" id="qInput" placeholder="תשובה" dir="ltr" aria-label="תשובה">';
    if(!isAnswered) html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkInput()">בדקו</button>';
    html+='</div>';
    if(isAnswered){
      html+='<div style="margin-top:4px;font-weight:700;direction:ltr">תשובה: '+q.answer+'</div>';
    }
  }

  if(isAnswered){
    const isCorrect=scores[lv][idx]===1;
    html+='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?'✅ נכון! ':'❌ ')+q.explanation+'</div>';
  }
  html+='<div id="qFeedback"></div></div>';
  area.innerHTML=html;

  if(q.type==='mc'&&!isAnswered){
    area.querySelectorAll('.q-opt').forEach(el=>{
      el.onclick=()=>{
        area.querySelectorAll('.q-opt').forEach(o=>o.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('qCheckBtn').disabled=false;
      };
    });
  }
  const inp=document.getElementById('qInput');
  if(inp&&!isAnswered){
    inp.focus();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkInput()});
  }

  updateLevelProgress();
  document.getElementById('qPrev').disabled=idx===0;
  document.getElementById('qNext').textContent=idx>=qs.length-1?'סיום':'הבא ←';
}

window.checkMC=function(){
  const lv=state.level;const idx=state.qIndex;const q=questions[lv][idx];
  const selected=document.querySelector('.q-opt.selected');
  if(!selected) return;
  const si=parseInt(selected.dataset.i);
  const isCorrect=si===q.answer;
  scores[lv][idx]=isCorrect?1:0;
  answered[lv][idx]=true;
  answered[lv][idx+'_sel']=si;

  document.querySelectorAll('.q-opt').forEach((el,i)=>{
    el.classList.add('disabled');el.onclick=null;
    if(i===q.answer) el.classList.add('correct');
    else if(i===si&&!isCorrect) el.classList.add('wrong');
  });
  document.getElementById('qCheckBtn').remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['✅ כל הכבוד!','✅ מעולה!','✅ נכון מאוד!','✅ יפה!'])+' ':'❌ לא נכון. ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();saveState();
};

window.checkInput=function(){
  const lv=state.level;const idx=state.qIndex;const q=questions[lv][idx];
  const inp=document.getElementById('qInput');
  const val=inp.value.trim();
  if(!val) return;
  const isCorrect=parseFloat(val)===q.answer;
  scores[lv][idx]=isCorrect?1:0;
  answered[lv][idx]=true;
  inp.classList.add(isCorrect?'correct':'wrong');
  inp.disabled=true;
  const btn=document.getElementById('qCheckBtn');if(btn)btn.remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['✅ כל הכבוד!','✅ מעולה!','✅ נכון!'])+' ':'❌ ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();saveState();
};

function nextQuestion(){
  const lv=state.level;
  if(state.qIndex>=questions[lv].length-1){renderLevelComplete();return}
  if(typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){
    if(typeof showAuthModal==='function')showAuthModal();
    return;
  }
  state.qIndex++;renderQuestion();saveState();
}
function prevQuestion(){if(state.qIndex>0){state.qIndex--;renderQuestion();saveState()}}

function renderLevelComplete(){
  const lv=state.level;
  const correct=scores[lv].filter(s=>s===1).length;
  const total=LEVEL_COUNTS[lv];
  const pct=Math.round(correct/total*100);
  const scoreClass=pct>=80?'':pct>=50?' medium-score':' low-score';
  const emoji=pct>=80?'🎉':pct>=50?'👏':'💪';

  document.getElementById('questionArea').innerHTML=
    '<div class="q-card"><div class="level-complete">'+
    '<div class="big-emoji">'+emoji+'</div>'+
    '<h2>סיימתם את רמת "'+LEVEL_NAMES[lv]+'"!</h2>'+
    '<div class="score-display'+scoreClass+'">'+correct+' / '+total+'</div>'+
    '<p style="color:var(--text-light);margin-bottom:16px">'+pct+'% הצלחה</p>'+
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'+
    '<button class="mini-btn" onclick="retryLevel()">🔄 נסו שוב</button>'+
    (lv!=='challenge'?'<button class="mini-btn accent" onclick="nextLevel()">▶ לרמה הבאה</button>':'')+
    '</div></div></div>';

  if(pct>=80) showConfetti();
  saveState();
}

window.retryLevel=function(){
  const lv=state.level;
  scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
  answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  questions[lv]=generateQuestions(lv);
  state.qIndex=0;
  renderLevelTabs();renderQuestion();saveState();
};

window.nextLevel=function(){
  const order=['easy','medium','hard','challenge'];
  const ci=order.indexOf(state.level);
  if(ci<order.length-1) switchLevel(order[ci+1]);
};

/* ===== SECTION SWITCHING ===== */
function switchSection(sec){
  state.section=sec;
  document.querySelectorAll('.section-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.section===sec);
  });
  document.getElementById('learnSection').style.display=sec==='learn'?'block':'none';
  document.getElementById('practiceSection').style.display=sec==='practice'?'block':'none';
  if(sec==='practice'){
    if(!questions[state.level]) questions[state.level]=generateQuestions(state.level);
    if(!scores[state.level].length) scores[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(-1);
    if(!answered[state.level].length) answered[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(false);
    renderLevelTabs();renderQuestion();
  }
  saveState();
}

/* ===== CONFETTI ===== */
function showConfetti(){
  const box=document.getElementById('confettiBox');
  box.innerHTML='';
  const colors=['#1a2f5a','#4a9eda','#10b981','#ef4444','#8b5cf6','#ec4899'];
  for(let i=0;i<50;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(6+Math.random()*8)+'px';
    c.style.height=(6+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*1.5)+'s';
    box.appendChild(c);
  }
  setTimeout(()=>box.innerHTML='',5000);
}

/* ===== INIT ===== */
function init(){
  loadState();
  Object.keys(LEVEL_COUNTS).forEach(lv=>{
    if(!scores[lv]||!scores[lv].length) scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
    if(!answered[lv]||!answered[lv].length) answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  });
  renderStep(state.step);
  if(state.section==='practice') switchSection('practice');
}
init();
</script>
