<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>זהות — מצאו את הזוגות | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0fff4;--card:#fff;--pri:#00b894;--pri-l:#d5f5e3;--ok:#27ae60;--ok-l:#e8f5e9;--no:#e74c3c;--no-l:#ffebee;--txt:#2c3e50;--txt2:#7f8c8d;--brd:#e0e0e0;--sh:0 4px 20px rgba(0,0,0,0.08);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;overflow-x:hidden}
.hd{background:linear-gradient(135deg,#00b894,#55efc4);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hd h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.hd p{font-size:1rem;opacity:0.9;position:relative}
.mb{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:20}
.mbtn{padding:8px 18px;border-radius:24px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.mbtn:hover{border-color:var(--pri)}.mbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ps{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd)}
.pr{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.pl{font-size:0.85rem;font-weight:600;color:var(--txt2);white-space:nowrap}
.ppb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pri),#55efc4);border-radius:10px;transition:width 0.5s}
.pss{display:flex;gap:16px}.ps2{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}
.tw{background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:52px;z-index:15;padding:0 8px}
.ts{display:flex;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--card);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.tb:hover{border-color:var(--pri)}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb.dn{border-color:var(--ok)}.tb.dn::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ok);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}
.hb{text-align:center;padding:8px;background:#fff3cd;color:#856404;font-weight:600;font-size:0.9rem;display:none}.hb.show{display:block}
.ct{max-width:800px;margin:0 auto;padding:20px 16px 80px}
/* Palette */
.palette{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:12px;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px;position:sticky;top:96px;z-index:12}
.pc{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.pc:hover{transform:scale(1.15)}.pc.on{border-color:#2d3436;transform:scale(1.2);box-shadow:0 0 0 3px rgba(0,0,0,0.15)}
.plb{font-size:0.8rem;font-weight:600;color:var(--txt2);padding:0 8px;display:flex;align-items:center}
/* Card */
.mc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:24px;border:3px solid transparent;transition:all 0.3s;animation:fi 0.4s ease both;position:relative}
.mc.ok{border-color:var(--ok);background:var(--ok-l)}
.mc.dw{touch-action:none}.mc .dc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;border-radius:var(--r)}
.mc.done .dc{display:none}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mn{width:30px;height:30px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.mht{font-size:0.85rem;color:var(--txt2);font-weight:500}
.ig{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;padding:10px}
.gi{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;cursor:pointer;transition:all 0.25s;-webkit-user-select:none;user-select:none;border-radius:var(--rs);border:3px solid var(--brd);position:relative;background:var(--card)}
.gi:hover:not(.done){border-color:var(--pri);background:var(--pri-l);transform:scale(1.08)}
.gi:active:not(.done){transform:scale(0.95)}
.gi.pk{border-color:var(--pri);background:var(--pri-l);box-shadow:0 0 0 3px rgba(0,184,148,0.3);transform:scale(1.1)}
.gi.done{cursor:default}
.gi.circled::before{content:'';position:absolute;top:-6px;left:-6px;right:-6px;bottom:-6px;border:4px solid var(--circ-color,var(--pri));border-radius:50%;z-index:12;animation:cpop 0.4s ease forwards}
.gi.wf{border-color:var(--no);background:var(--no-l);animation:shake 0.5s}
.gi .emoji{font-size:2.8rem;line-height:1}
@keyframes cpop{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
.ccnt{text-align:center;font-size:0.85rem;color:var(--txt2);margin-top:10px;font-weight:600}
.cfb{text-align:center;margin-top:8px;font-weight:700;font-size:0.95rem;min-height:22px;opacity:0;transition:opacity 0.3s}
.cfb.show{opacity:1}.cfb.ok{color:var(--ok)}.cfb.bad{color:var(--no)}
.ld{background:linear-gradient(135deg,var(--pri),#55efc4);border-radius:var(--r);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--sh);display:none;animation:fi 0.4s}
.ld.show{display:block}.ld .big{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.ld h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}.ld p{opacity:0.9}
.ld .sc{font-size:2.2rem;font-weight:900;margin:12px 0}
.acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--rs);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s}
.btn:hover{transform:translateY(-1px)}.bw{background:#fff;color:var(--pri)}.bo{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}
@media print{body{background:#fff}.hd{background:none;color:#000;padding:10px 0;border-bottom:2px solid #000}.hd::before{display:none}
.mb,.ps,.tw,.acts,.ld,.hb,.ccnt,.cfb,.palette{display:none!important}.ct{padding:8px 0}
.mc{box-shadow:none;border:2px solid #999;page-break-inside:avoid}.gi{border-color:#ccc}
.dc{display:none!important}.ph{display:block!important}.plh{display:block!important;text-align:center;color:#666;font-size:0.8rem;margin-top:8px}}
.ph{display:none;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
.plh{display:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes mp{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@media(max-width:600px){.hd h1{font-size:1.5rem}.mc{padding:16px 12px}.mbtn{padding:6px 12px;font-size:0.8rem}.tb{padding:6px 12px;font-size:0.75rem}.gi{width:65px;height:65px}.gi .emoji{font-size:2.2rem}.ig{gap:10px}.pc{width:28px;height:28px}.palette{gap:4px;padding:8px}}
</style>
</head>
<body>
<div class="hd"><h1>🔗 זהות</h1><p>מצאו את הזוגות הזהים!</p></div>
<div class="mb nopr">
<button class="mbtn on" onclick="setM('click')" id="mc1"><span>👆</span> לחיצה</button>
<button class="mbtn" onclick="setM('draw')" id="mc2"><span>✏️</span> ציור עיגול</button>
<button class="mbtn" onclick="window.print()"><span>🖨️</span> הדפסה</button>
</div>
<div class="ps nopr"><div class="pr"><span class="pl">התקדמות:</span><div class="ppb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pss"><span class="ps2" style="color:var(--ok)">✅ <span id="g1">0</span></span><span class="ps2" style="color:var(--no)">❌ <span id="g2">0</span></span></div></div></div>
<div class="tw nopr"><div class="ts" id="tabs"></div></div>
<div class="hb" id="hb">✏️ בחרו צבע וציירו עיגול סביב כל פריט — שני פריטים זהים באותו צבע!</div>
<div class="ct" id="area"></div>
<script>
const COLORS=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60','#1abc9c','#3498db','#2980b9','#9b59b6','#8e44ad','#e84393','#fd79a8','#00cec9','#6c5ce7','#fdcb6e','#55efc4','#74b9ff','#a29bfe','#fab1a0','#2d3436'];

const LV=[
{id:1,t:'פירות',items:['🍎','🍌','🍇','🍊']},
{id:2,t:'חיות',items:['🐱','🐶','🐸','🐰']},
{id:3,t:'אוכל',items:['🍕','🍔','🍩','🧁']},
{id:4,t:'תחבורה',items:['🚗','✈️','🚌','⛵']},
{id:5,t:'טבע',items:['🌸','🌲','🍄','🌻']},
{id:6,t:'ספורט',items:['⚽','🏀','🎾','🏈']},
{id:7,t:'בגדים',items:['👕','👟','👒','🧦']},
{id:8,t:'חרקים',items:['🐞','🦋','🐝','🐛']},
{id:9,t:'ים',items:['🐟','🐬','🦀','🐙']},
{id:10,t:'כלים',items:['✂️','🔨','🖊️','📏']},
{id:11,t:'שמיים',items:['☀️','🌙','⭐','🌈','☁️']},
{id:12,t:'מוזיקה',items:['🎸','🥁','🎹','🎻','🎺']},
{id:13,t:'בית',items:['🏠','💡','📺','🔑','🛋️']},
{id:14,t:'אתגר — מעורבב',items:['🐱','🍎','🚗','🌸','⚽','✂️']},
{id:15,t:'אתגר — הרבה',items:['🐶','🍌','✈️','🌲','🏀','👕','🐞']}
];

let cur=0,md='click',g1=0,g2=0,res={},pk=null,selCol=COLORS[0];
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
const E1=['!מעולה 🔗','!זוגות מושלמים ⭐','!יופי 👏','!מדהים 🌟'];

function rTabs(){const el=document.getElementById('tabs');el.innerHTML=LV.map((l,i)=>`<button class="tb ${i===cur?'on':''} ${res[l.id]?'dn':''}" onclick="go(${i})">${l.t}</button>`).join('');setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}

function rLv(){
const lv=LV[cur],ar=document.getElementById('area'),isDw=md==='draw';
const pairs=[];
lv.items.forEach((e,i)=>{pairs.push({e,pid:i});pairs.push({e,pid:i})});
const shuffled=sh(pairs);
const n=lv.items.length;

let h=`<div class="ph">🔗 זהות — ${lv.t}</div>`;

// Color palette
h+=`<div class="palette" id="pal"><span class="plb">🎨 צבע:</span>`;
COLORS.forEach((c,i)=>h+=`<div class="pc ${i===0?'on':''}" style="background:${c}" data-c="${c}" onclick="pickCol(this)"></div>`);
h+=`</div>`;

h+=`<div class="mc ${isDw?'dw':''}" id="q0" data-total="${n}" data-matched="0" data-wrong="0">`;
if(isDw) h+=`<canvas class="dc" id="cv0"></canvas>`;
h+=`<div class="mh"><div class="mn">🔗</div><span class="mht">💡 ${isDw?'בחרו צבע וציירו עיגול סביב כל פריט — שני זהים באותו צבע':'לחצו על שני פריטים זהים'}</span></div>`;
h+=`<div class="ig">`;
shuffled.forEach((item,i)=>{
  h+=`<div class="gi" data-pid="${item.pid}" data-idx="${i}" ${md==='click'?'onclick="sel(this)"':''}>`;
  h+=`<span class="emoji">${item.e}</span>`;
  h+=`</div>`;
});
h+=`</div>`;
h+=`<div class="ccnt" id="cnt0">0 / ${n} זוגות</div>`;
h+=`<div class="cfb" id="fb0"></div>`;
h+=`<div class="plh">צבעו כל זוג פריטים זהים באותו צבע</div>`;
h+=`</div>`;

h+=`<div class="ld" id="ld"><div class="big">🔗</div><h2 id="lt"></h2><p id="ls"></p><div class="sc" id="lsc"></div><div class="acts"><button class="btn bw" onclick="retry()">🔄 נסה שוב</button>${cur<LV.length-1?'<button class="btn bo" onclick="nxt()">➡️ הבא</button>':''}<button class="btn bo" onclick="window.print()">🖨️ הדפס</button></div></div>`;

ar.innerHTML=h;
if(isDw) initDraw();
rTabs();uPr();
}

function pickCol(el){
  document.querySelectorAll('.pc').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');selCol=el.dataset.c;
}

// Click mode
function sel(el){
  if(el.classList.contains('done'))return;
  const card=document.getElementById('q0');
  if(!pk){
    el.classList.add('pk');
    el.style.borderColor=selCol;
    el.style.backgroundColor=selCol+'20';
    pk=el;return;
  }
  if(pk===el){el.classList.remove('pk');el.style.borderColor='';el.style.backgroundColor='';pk=null;return}
  if(pk.dataset.idx===el.dataset.idx){pk.classList.remove('pk');pk.style.borderColor='';pk.style.backgroundColor='';el.classList.add('pk');el.style.borderColor=selCol;el.style.backgroundColor=selCol+'20';pk=el;return}

  pk.classList.remove('pk');

  if(pk.dataset.pid===el.dataset.pid){
    const color=selCol;
    [pk,el].forEach(item=>{
      item.classList.add('done','circled');
      item.style.setProperty('--circ-color',color);
      item.style.borderColor=color;
      item.style.backgroundColor=color+'20';
    });
    pk.style.animation='mp 0.4s';el.style.animation='mp 0.4s';
    g1++;card.dataset.matched=parseInt(card.dataset.matched)+1;
    uCnt();
  } else {
    pk.style.borderColor='';pk.style.backgroundColor='';
    pk.classList.add('wf');el.classList.add('wf');
    g2++;card.dataset.wrong=parseInt(card.dataset.wrong)+1;
    const a=pk,b=el;
    setTimeout(()=>{a.classList.remove('wf');b.classList.remove('wf')},600);
  }
  pk=null;uPr();
}

function uCnt(){
  const c=document.getElementById('q0'),t=parseInt(c.dataset.total);
  const m=parseInt(c.dataset.matched);
  document.getElementById('cnt0').textContent=m+' / '+t+' זוגות';
  if(m>=t){
    const w=parseInt(c.dataset.wrong),fb=document.getElementById('fb0');
    if(w===0){c.classList.add('ok');fb.textContent=E1[Math.floor(Math.random()*E1.length)];fb.classList.add('ok','show')}
    else{c.classList.add('bad');fb.textContent=`מצאתם הכל עם ${w} טעויות 💪`;fb.classList.add('bad','show')}
    c.classList.add('done');setTimeout(showD,600);
  }
}

// Draw mode — circle around individual items
function initDraw(){
  document.getElementById('hb').classList.add('show');
  const card=document.getElementById('q0');
  const cv=document.getElementById('cv0');
  if(!cv)return;cv.width=card.offsetWidth;cv.height=card.offsetHeight;
  const ctx=cv.getContext('2d');
  let dw=false,pts=[];

  cv.addEventListener('pointerdown',function(e){
    if(card.classList.contains('done'))return;
    e.preventDefault();e.stopPropagation();
    dw=true;pts=[];
    ctx.clearRect(0,0,cv.width,cv.height);
    const r=cv.getBoundingClientRect();
    ctx.beginPath();ctx.moveTo(e.clientX-r.left,e.clientY-r.top);
    ctx.strokeStyle=selCol;ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';
    pts.push({cx:e.clientX,cy:e.clientY});
  },{passive:false});

  cv.addEventListener('pointermove',function(e){
    if(!dw)return;e.preventDefault();e.stopPropagation();
    const r=cv.getBoundingClientRect();
    ctx.lineTo(e.clientX-r.left,e.clientY-r.top);ctx.stroke();
    pts.push({cx:e.clientX,cy:e.clientY});
  },{passive:false});

  cv.addEventListener('pointerup',function(e){
    if(!dw)return;e.preventDefault();dw=false;
    setTimeout(()=>ctx.clearRect(0,0,cv.width,cv.height),300);
    if(pts.length<10)return;

    // Find center of drawing
    let cx=0,cy=0;pts.forEach(p=>{cx+=p.cx;cy+=p.cy});cx/=pts.length;cy/=pts.length;

    // Find closest non-done item
    const items=card.querySelectorAll('.gi:not(.done)');
    let best=null,bestD=Infinity;
    for(const it of items){
      const r=it.getBoundingClientRect();
      const d=Math.sqrt((cx-(r.left+r.width/2))**2+(cy-(r.top+r.height/2))**2);
      if(d<Math.max(r.width,r.height)*1.5&&d<bestD){bestD=d;best=it}
    }

    if(!best)return;

    // If no pending pick — this is the first of the pair
    if(!pk){
      best.classList.add('pk','circled');
      best.style.setProperty('--circ-color',selCol);
      best.style.borderColor=selCol;
      best.style.backgroundColor=selCol+'20';
      pk=best;
    } else {
      // Second pick
      if(best===pk||best.dataset.idx===pk.dataset.idx)return;

      if(pk.dataset.pid===best.dataset.pid){
        // Match!
        const color=selCol;
        best.classList.add('done','circled');
        best.style.setProperty('--circ-color',color);
        best.style.borderColor=color;
        best.style.backgroundColor=color+'20';
        pk.classList.remove('pk');pk.classList.add('done');
        g1++;card.dataset.matched=parseInt(card.dataset.matched)+1;
        uCnt();
      } else {
        // No match
        pk.classList.remove('pk','circled');
        pk.style.borderColor='';pk.style.backgroundColor='';pk.style.removeProperty('--circ-color');
        pk.classList.add('wf');best.classList.add('wf');
        g2++;card.dataset.wrong=parseInt(card.dataset.wrong)+1;
        const a=pk,b=best;
        setTimeout(()=>{a.classList.remove('wf');b.classList.remove('wf')},600);
      }
      pk=null;
    }
    uPr();
  },{passive:false});

  cv.addEventListener('pointercancel',function(){dw=false;ctx.clearRect(0,0,cv.width,cv.height)});
}

function showD(){
  res[LV[cur].id]=true;const w=parseInt(document.getElementById('q0').dataset.wrong);
  const t=parseInt(document.getElementById('q0').dataset.total);
  const el=document.getElementById('ld');
  document.getElementById('lsc').textContent=(t-Math.min(w,t))+' / '+t;
  if(w===0){document.getElementById('lt').textContent='🏆 מושלם!';document.getElementById('ls').textContent='מצאתם את כל הזוגות!'}
  else if(w<=2){document.getElementById('lt').textContent='👏 כל הכבוד!';document.getElementById('ls').textContent='כמעט מושלם!'}
  else{document.getElementById('lt').textContent='💪 סיימתם!';document.getElementById('ls').textContent='נסו שוב לשיפור!'}
  el.classList.add('show');el.scrollIntoView({behavior:'smooth',block:'center'});rTabs();
}

function go(i){cur=i;pk=null;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function nxt(){if(cur<LV.length-1){cur++;pk=null;rLv();window.scrollTo({top:0,behavior:'smooth'})}}
function retry(){pk=null;rLv();window.scrollTo({top:0,behavior:'smooth'})}
function setM(m){md=m;pk=null;document.getElementById('mc1').classList.toggle('on',m==='click');document.getElementById('mc2').classList.toggle('on',m==='draw');if(m==='click')document.getElementById('hb').classList.remove('show');rLv()}
function uPr(){const d=Object.keys(res).length;document.getElementById('pf').style.width=Math.round(d/LV.length*100)+'%';document.getElementById('g1').textContent=g1;document.getElementById('g2').textContent=g2}
rLv();
</script>
  <script src="../../../../js/auth-gate.js"></script>
</body>
</html>
