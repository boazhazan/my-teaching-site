<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>זוויות צמודות וקודקודיות | כיתה ז׳ — מתמטיקה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&family=Rubik:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a2f5a;--primary-dark:#0f1d3d;--primary-light:#d6e4f7;
  --accent:#4a9eda;--accent-dark:#2b7cb8;
  --text:#1e293b;--text-light:#64748b;
  --bg:#ffffff;--bg-soft:#f8fafc;--border:#e2e8f0;
  --success:#10b981;--error:#ef4444;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
}
body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#f0f9ff 0%,#e0f2fe 50%,#f0f9ff 100%);min-height:100vh;color:var(--text);line-height:1.6}
h1,h2,h3,.step-title{font-family:'Rubik','Heebo',sans-serif}

/* Top bar */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-family:'Rubik',sans-serif;font-size:1.05rem;font-weight:700;color:var(--primary-dark)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.85rem;font-weight:600}
.topbar a:hover{text-decoration:underline}

/* Section toggle */
.section-toggle{display:flex;justify-content:center;gap:0;margin:16px auto;max-width:340px;background:var(--bg);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
.section-btn{flex:1;padding:10px 20px;border:none;border-radius:999px;background:transparent;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.95rem;font-weight:700;color:var(--text-light);transition:.3s}
.section-btn.active{background:var(--primary);color:#fff;box-shadow:var(--shadow-md)}

/* Container */
.container{max-width:760px;margin:0 auto;padding:0 16px 40px}

/* ===== TEACHING SECTION ===== */
#learnSection{animation:fadeIn .4s ease}
.step-progress{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:0 4px}
.step-progress-bar{flex:1;height:8px;background:var(--border);border-radius:999px;overflow:hidden}
.step-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:999px;transition:width .4s ease}
.step-progress-text{font-size:.8rem;color:var(--text-light);font-weight:600;white-space:nowrap}
.step-card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:28px 24px;animation:slideIn .4s ease}
.step-title{font-size:1.35rem;font-weight:700;color:var(--primary-dark);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.step-card p{margin-bottom:12px;font-size:.95rem;line-height:1.7}
.step-card .highlight{background:var(--primary-light);border-right:4px solid var(--primary);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600}
.step-card .warning{background:#fef2f2;border-right:4px solid var(--error);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600;color:#991b1b}
.step-card .success-box{background:#ecfdf5;border-right:4px solid var(--success);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0;font-weight:600;color:#065f46}
.step-card .rule-box{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;padding:16px;border-radius:var(--radius);margin:16px 0;text-align:center;font-size:1.1rem;font-weight:700}
.step-card .example{background:var(--bg-soft);border:1px solid var(--border);padding:14px;border-radius:var(--radius-sm);margin:10px 0;font-size:1rem}
.step-card .example .arrow{color:var(--primary);font-weight:800;margin:0 6px}
.step-card code,.expr{font-family:'Courier New',monospace;background:var(--primary-light);padding:2px 8px;border-radius:4px;font-weight:700;color:var(--primary-dark);font-size:1.05em;direction:ltr;display:inline-block}
.math-expr{direction:ltr;unicode-bidi:embed;display:inline;font-family:'Rubik',sans-serif;font-weight:700;color:var(--primary)}

/* Interactive elements inside steps */
.mini-table{border-collapse:collapse;margin:12px auto;direction:ltr}
.mini-table th,.mini-table td{border:2px solid var(--border);padding:8px 16px;text-align:center;font-size:1rem}
.mini-table th{background:var(--primary-light);color:var(--primary-dark);font-weight:700}
.mini-table td{background:var(--bg)}
.mini-input{width:80px;padding:6px;border:2px solid var(--border);border-radius:var(--radius-sm);text-align:center;font-size:1rem;font-family:inherit;font-weight:700;transition:.3s}
.mini-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(26,47,90,.15)}
.mini-input.correct{border-color:var(--success);background:#ecfdf5}
.mini-input.wrong{border-color:var(--error);background:#fef2f2}
.mini-btn{padding:8px 20px;border:none;border-radius:999px;background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:700;transition:.25s;margin:4px}
.mini-btn:hover{background:var(--primary-dark)}
.mini-btn.accent{background:var(--accent);color:#fff}
.mini-btn.accent:hover{background:var(--accent-dark)}
.mini-btn:disabled{opacity:.5;cursor:not-allowed}
.reveal{display:none;animation:fadeIn .5s ease}
.reveal.show{display:block}
.feedback-inline{margin-top:8px;padding:8px 12px;border-radius:var(--radius-sm);font-weight:600;font-size:.9rem;animation:fadeIn .3s}
.feedback-inline.ok{background:#ecfdf5;color:#065f46}
.feedback-inline.err{background:#fef2f2;color:#991b1b}
.quiz-options{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.quiz-opt{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;transition:.25s;background:var(--bg)}
.quiz-opt:hover{border-color:var(--primary);background:var(--primary-light)}
.quiz-opt.selected{border-color:var(--primary);background:var(--primary-light);font-weight:700}
.quiz-opt.correct-answer{border-color:var(--success);background:#ecfdf5;font-weight:700}
.quiz-opt.wrong-answer{border-color:var(--error);background:#fef2f2}
.step-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.summary-item{background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.summary-item .s-icon{font-size:2rem;margin-bottom:6px}
.summary-item .s-title{font-weight:700;color:var(--primary-dark);margin-bottom:4px;font-size:.9rem}
.summary-item .s-text{font-size:.82rem;color:var(--text-light)}

/* Step nav */
.step-nav{display:flex;justify-content:space-between;margin-top:16px;gap:8px}
.step-nav-btn{padding:10px 28px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.25s}
.step-nav-btn.primary{background:var(--primary);color:#fff}
.step-nav-btn.primary:hover{background:var(--primary-dark)}
.step-nav-btn.secondary{background:var(--bg);color:var(--text);border:2px solid var(--border)}
.step-nav-btn.secondary:hover{border-color:var(--primary);color:var(--primary)}
.step-nav-btn:disabled{opacity:.4;cursor:not-allowed}

/* ===== PRACTICE SECTION ===== */
#practiceSection{display:none;animation:fadeIn .4s ease}
.level-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.level-tab{padding:8px 20px;border-radius:999px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:700;color:var(--text-light);transition:.25s;white-space:nowrap}
.level-tab.active{border-color:var(--primary);background:var(--primary);color:#fff}
.level-tab .tab-score{font-size:.75rem;font-weight:400;margin-right:4px}
.level-progress{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.level-progress-bar{flex:1;height:6px;background:var(--border);border-radius:999px;overflow:hidden}
.level-progress-fill{height:100%;background:var(--success);border-radius:999px;transition:width .4s}
.level-progress-text{font-size:.8rem;color:var(--text-light);font-weight:600;white-space:nowrap}

.q-card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:24px;animation:slideIn .3s ease}
.q-number{font-size:.8rem;color:var(--text-light);font-weight:600;margin-bottom:4px}
.q-stem{font-size:1.05rem;margin-bottom:16px;line-height:1.7}
.q-stem code,.q-stem .expr{font-size:1.1em}
.q-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.q-opt{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;transition:.25s;background:var(--bg);display:flex;align-items:center;gap:10px}
.q-opt:hover:not(.disabled){border-color:var(--primary);background:var(--primary-light)}
.q-opt.selected{border-color:var(--primary);background:var(--primary-light);font-weight:700}
.q-opt.correct{border-color:var(--success)!important;background:#ecfdf5!important;font-weight:700}
.q-opt.wrong{border-color:var(--error)!important;background:#fef2f2!important}
.q-opt.disabled{cursor:default;opacity:.85}
.q-opt-letter{width:28px;height:28px;border-radius:50%;background:var(--bg-soft);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;transition:.25s}
.q-opt.selected .q-opt-letter{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-opt.correct .q-opt-letter{background:var(--success);color:#fff;border-color:var(--success)}
.q-opt.wrong .q-opt-letter{background:var(--error);color:#fff;border-color:var(--error)}

.q-input-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.q-input{width:120px;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:1.1rem;font-family:inherit;font-weight:700;text-align:center;transition:.3s;direction:ltr}
.q-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(26,47,90,.15)}
.q-input.correct{border-color:var(--success);background:#ecfdf5}
.q-input.wrong{border-color:var(--error);background:#fef2f2}

.q-check-btn{padding:10px 28px;border-radius:999px;border:none;background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.25s;box-shadow:var(--shadow)}
.q-check-btn:hover{background:var(--primary-dark)}
.q-check-btn:disabled{opacity:.5;cursor:not-allowed}

.q-feedback{margin-top:12px;padding:12px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:.92rem;animation:fadeIn .3s}
.q-feedback.correct{background:#ecfdf5;border-right:4px solid var(--success);color:#065f46}
.q-feedback.wrong{background:#fef2f2;border-right:4px solid var(--error);color:#991b1b}

.q-nav{display:flex;justify-content:space-between;margin-top:16px}
.q-nav-btn{padding:10px 24px;border-radius:999px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:700;color:var(--text);transition:.25s}
.q-nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.q-nav-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-nav-btn.primary:hover{background:var(--primary-dark)}
.q-nav-btn:disabled{opacity:.4;cursor:not-allowed}

/* Level complete */
.level-complete{text-align:center;padding:24px;animation:fadeIn .5s}
.level-complete .big-emoji{font-size:4rem;margin-bottom:12px}
.level-complete h2{font-size:1.4rem;color:var(--primary-dark);margin-bottom:8px}
.level-complete .score-display{font-size:1.8rem;font-weight:800;color:var(--success);margin-bottom:16px}
.level-complete .score-display.medium-score{color:#f59e0b}
.level-complete .score-display.low-score{color:var(--error)}

/* Celebration confetti */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;top:-10px;animation:confettiFall linear forwards}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  100%{transform:translateY(105vh) rotate(720deg) scale(.3);opacity:0}
}

/* SVG angles */
.angle-svg{display:block;margin:12px auto;max-width:100%}

/* Print button */
.print-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--primary);color:#fff;cursor:pointer;font-size:1rem;box-shadow:var(--shadow);transition:.25s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.print-btn:hover{background:var(--primary-dark);transform:scale(1.1)}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* Responsive */
@media(max-width:600px){
  .container{padding:0 10px 30px}
  .step-card,.q-card{padding:18px 14px}
  .step-title{font-size:1.15rem}
  .step-summary-grid{grid-template-columns:1fr}
  .section-toggle{max-width:280px;margin:12px auto}
  .section-btn{font-size:.88rem;padding:8px 14px}
  .q-opt{padding:10px 12px;font-size:.9rem}
  .topbar-title{font-size:.9rem}
}

/* Print */
@media print{
  .topbar,.section-toggle,.step-nav,.q-nav,.print-btn,.level-tabs,.confetti-container,.q-check-btn{display:none!important}
  body{background:#fff;font-size:11pt}
  .step-card,.q-card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;page-break-inside:avoid}
  .container{max-width:100%}
  .q-feedback{break-inside:avoid}
}
</style>
</head>

<script>
/* ===== SVG HELPERS ===== */
function svgTwoLines(w,h,ang,markA,markB,labelA,labelB,labelC,labelD){
  /* Two lines crossing at center. ang = angle of first line from horizontal (degrees).
     markA/markB: 'adjacent','vertical','none' — colors the pair.
     labels optional. Returns SVG string. */
  var cx=w/2,cy=h/2,r=Math.min(w,h)*0.42;
  var rad1=ang*Math.PI/180, rad2=(ang+90)*Math.PI/180;
  /* line endpoints — we only need two lines through center */
  /* Line 1: angle ang */
  var x1=cx+r*Math.cos(rad1),y1=cy-r*Math.sin(rad1);
  var x2=cx-r*Math.cos(rad1),y2=cy+r*Math.sin(rad1);
  /* Line 2: angle (180-ang) from positive x — i.e. supplementary direction */
  /* Actually for 2 intersecting lines we want a different angle. Let's use 180-ang for the second line */
  var ang2=(180-ang)*Math.PI/180;
  var x3=cx+r*Math.cos(ang2),y3=cy-r*Math.sin(ang2);
  var x4=cx-r*Math.cos(ang2),y4=cy+r*Math.sin(ang2);

  var svg='<svg class="angle-svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">';
  svg+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#1a2f5a" stroke-width="2.5"/>';
  svg+='<line x1="'+x3+'" y1="'+y3+'" x2="'+x4+'" y2="'+y4+'" stroke="#1a2f5a" stroke-width="2.5"/>';
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="#1a2f5a"/>';
  /* arc marks */
  var arcR=28;
  function arcPath(startAng,endAng,color){
    var sa=startAng*Math.PI/180,ea=endAng*Math.PI/180;
    var sx=cx+arcR*Math.cos(-sa),sy=cy+arcR*Math.sin(-sa);
    var ex=cx+arcR*Math.cos(-ea),ey=cy+arcR*Math.sin(-ea);
    var large=Math.abs(endAng-startAng)>180?1:0;
    return '<path d="M'+sx+' '+sy+' A'+arcR+' '+arcR+' 0 '+large+' 0 '+ex+' '+ey+'" fill="none" stroke="'+color+'" stroke-width="2.5"/>';
  }
  /* angles: ang, 180-ang, ang (vertical), 180-ang (vertical) */
  /* The 4 angles at intersection: ang, 180-2*ang+ang = ... let me think differently.
     Line1 goes at angle `ang` from horizontal. Line2 goes at angle `180-ang`.
     The 4 sectors (going counterclockwise from Line1 right end):
       sector A: from ang to (180-ang)  => size = 180-2*ang
       sector B: from (180-ang) to (ang+180) => size = 2*ang
       sector C: from (ang+180) to (360-ang) => size = 180-2*ang (vertical to A)
       sector D: from (360-ang) to (ang+360) => size = 2*ang (vertical to B)
  */
  var angA=180-2*ang; /* sector between the two lines on top */
  if(markA==='adjacent'){
    svg+=arcPath(ang,180-ang,'#4a9eda');
    svg+=arcPath(180-ang,ang+180,'#ef4444');
  } else if(markA==='vertical'){
    svg+=arcPath(ang,180-ang,'#4a9eda');
    svg+=arcPath(ang+180,360-ang,'#4a9eda');
    svg+=arcPath(180-ang,ang+180,'#ef4444');
    svg+=arcPath(360-ang,ang+360,'#ef4444');
  }
  /* labels */
  var lblR=42;
  function putLabel(midAng,txt,color){
    var ma=midAng*Math.PI/180;
    var lx=cx+lblR*Math.cos(-ma),ly=cy+lblR*Math.sin(-ma);
    return '<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="'+(color||'#1a2f5a')+'" font-family="Rubik,Heebo,sans-serif">'+txt+'</text>';
  }
  if(labelA) svg+=putLabel((ang+180-ang)/2+ang/2,labelA,'#4a9eda');
  if(labelB) svg+=putLabel((180-ang+ang+180)/2,labelB,'#ef4444');
  svg+='</svg>';
  return svg;
}

/* Generic SVG: two lines through center with given angle between them, label 4 angles */
function svgIntersection(size,angleDeg,labels,colors){
  /* angleDeg = the acute angle at intersection. labels = [top,right,bottom,left] or fewer */
  var w=size,h=size,cx=w/2,cy=h/2,r=w*0.42;
  var a=angleDeg*Math.PI/180;
  /* Line1: horizontal-ish tilted so acute angle = angleDeg */
  var half=a/2;
  /* Line 1 at angle +half from horizontal, Line 2 at angle -half */
  var c1=Math.cos(half),s1=Math.sin(half);
  var c2=Math.cos(-half),s2=Math.sin(-half);
  var svg='<svg class="angle-svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">';
  svg+='<line x1="'+(cx-r*c1)+'" y1="'+(cy+r*s1)+'" x2="'+(cx+r*c1)+'" y2="'+(cy-r*s1)+'" stroke="#1a2f5a" stroke-width="2.5"/>';
  svg+='<line x1="'+(cx-r*c2)+'" y1="'+(cy+r*s2)+'" x2="'+(cx+r*c2)+'" y2="'+(cy-r*s2)+'" stroke="#1a2f5a" stroke-width="2.5"/>';
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="#1a2f5a"/>';
  /* arcs for the 4 angles */
  var arcR=24;
  var anglesStart=[90-angleDeg/2, 90+angleDeg/2, 270-angleDeg/2, 270+angleDeg/2];

  if(!colors) colors=defColors;
  if(!labels) labels=[];
  for(var i=0;i<4;i++){
    var sa=(anglesStart[i])*Math.PI/180;
    var ea=(anglesStart[i]+anglesSweep[i])*Math.PI/180;
    var sx=cx+arcR*Math.cos(sa),sy=cy-arcR*Math.sin(sa);
    var ex=cx+arcR*Math.cos(ea),ey=cy-arcR*Math.sin(ea);
    var large=anglesSweep[i]>180?1:0;
    svg+='<path d="M'+sx.toFixed(1)+' '+sy.toFixed(1)+' A'+arcR+' '+arcR+' 0 '+large+' 0 '+ex.toFixed(1)+' '+ey.toFixed(1)+'" fill="none" stroke="'+(colors[i]||defColors[i])+'" stroke-width="2.5"/>';
    if(labels[i]){
      var ma=(anglesStart[i]+anglesSweep[i]/2)*Math.PI/180;
      var lx=cx+(arcR+18)*Math.cos(ma),ly=cy-(arcR+18)*Math.sin(ma);

  svg+='</svg>';

}

function renderStep(idx){
  state.step=idx;
  const s=steps[idx];
  const fill=((idx+1)/TOTAL_STEPS*100).toFixed(0);
  document.getElementById('stepFill').style.width=fill+'%';
  document.getElementById('stepText').textContent='שלב '+(idx+1)+' מתוך '+TOTAL_STEPS;
  document.getElementById('stepContent').innerHTML='<div class="step-card"><div class="step-title">'+s.title+'</div>'+s.render()+'</div>';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===TOTAL_STEPS-1?'לתרגול ←':'הבא ←';
  if(s.init) s.init();
  saveState();
}
function nextStep(){if(state.step<TOTAL_STEPS-1)renderStep(state.step+1);else switchSection('practice')}
function prevStep(){if(state.step>0)renderStep(state.step-1)}

/* ===== EASY (20 questions) ===== */
function genEasy(){
  rng=mulberry32(dateSeed+100);
  const qs=[];

  /* Q1-Q5: Identify type — adjacent / vertical / neither (SVG + MC) */
  for(let i=0;i<5;i++){
    const angDeg=RI(30,75);
    const types=['adjacent','vertical','none'];
    const chosen=types[i%3===0?0:i%3===1?1:2];
    let svg,correctHeb,explain;
    if(chosen==='adjacent'){
      /* two rays from same point on a line */
      svg='<svg class="angle-svg" width="260" height="150" viewBox="0 0 260 150">'
        +'<line x1="10" y1="110" x2="250" y2="110" stroke="#1a2f5a" stroke-width="2.5"/>'
        +'<line x1="130" y1="110" x2="'+(130+80*Math.cos(angDeg*Math.PI/180)).toFixed(1)+'" y2="'+(110-80*Math.sin(angDeg*Math.PI/180)).toFixed(1)+'" stroke="#1a2f5a" stroke-width="2.5"/>'
        +'<circle cx="130" cy="110" r="3" fill="#1a2f5a"/>'
        +'<path d="M150 110 A20 20 0 0 0 '+(130+20*Math.cos(angDeg*Math.PI/180)).toFixed(1)+' '+(110-20*Math.sin(angDeg*Math.PI/180)).toFixed(1)+'" fill="none" stroke="#4a9eda" stroke-width="2.5"/>'
        +'<path d="M110 110 A20 20 0 0 0 '+(130+20*Math.cos(angDeg*Math.PI/180)).toFixed(1)+' '+(110-20*Math.sin(angDeg*Math.PI/180)).toFixed(1)+'" fill="none" stroke="#ef4444" stroke-width="2.5"/>'
        +'<text x="160" y="100" font-size="14" font-weight="700" fill="#4a9eda" font-family="Rubik,sans-serif">α</text>'
        +'<text x="100" y="95" font-size="14" font-weight="700" fill="#ef4444" font-family="Rubik,sans-serif">β</text>'
        +'</svg>';
      correctHeb='צמודות';
      explain='הזוויות חולקות קודקוד וצלע משותפת, והצלעות האחרות על ישר — צמודות.';
    } else if(chosen==='vertical'){
      svg=svgIntersection(220,angDeg,['α','β','α','β']);
      correctHeb='קודקודיות';
      explain='הזוויות נמצאות מול מול בחיתוך שני ישרים — קודקודיות.';
    } else {
      /* two separate angles, no shared vertex */
      svg='<svg class="angle-svg" width="260" height="140" viewBox="0 0 260 140">'
        +'<line x1="20" y1="110" x2="100" y2="110" stroke="#1a2f5a" stroke-width="2"/>'
        +'<line x1="20" y1="110" x2="60" y2="40" stroke="#1a2f5a" stroke-width="2"/>'
        +'<path d="M42 110 A22 22 0 0 0 38 85" fill="none" stroke="#4a9eda" stroke-width="2.5"/>'
        +'<text x="55" y="95" font-size="13" font-weight="700" fill="#4a9eda" font-family="Rubik,sans-serif">α</text>'
        +'<line x1="160" y1="100" x2="240" y2="100" stroke="#1a2f5a" stroke-width="2"/>'
        +'<line x1="160" y1="100" x2="200" y2="35" stroke="#1a2f5a" stroke-width="2"/>'
        +'<path d="M180 100 A20 20 0 0 0 178 80" fill="none" stroke="#ef4444" stroke-width="2.5"/>'
        +'<text x="190" y="88" font-size="13" font-weight="700" fill="#ef4444" font-family="Rubik,sans-serif">β</text>'
        +'</svg>';
      correctHeb='אף אחד מהנ"ל';
      explain='הזוויות לא חולקות קודקוד — אינן צמודות ולא קודקודיות.';
    }
    const opts=shuffle(['צמודות','קודקודיות','אף אחד מהנ"ל']);
    qs.push({type:'mc',stem:svg+'<br>הזוויות <span style="color:#4a9eda;font-weight:700">α</span> ו-<span style="color:#ef4444;font-weight:700">β</span> הן:',options:opts,answer:opts.indexOf(correctHeb),explanation:explain});
  }

  /* Q6-Q10: α given, α and β adjacent, find β (input) */
  for(let i=0;i<5;i++){
    const alpha=RI(20,160);
    while(alpha===90) alpha=RI(20,160);
    const beta=180-alpha;
    qs.push({type:'input',stem:'<span class="math-expr">α = '+alpha+'°</span>. הזוויות α ו-β <strong>צמודות</strong>. מהו <span class="math-expr">β</span>?',answer:beta,explanation:'זוויות צמודות: <span class="math-expr">β = 180° − '+alpha+'° = '+beta+'°</span>'});
  }

  /* Q11-Q15: Two lines intersect, one angle given, find 3 others (MC with the triplet) */
  for(let i=0;i<5;i++){
    const a=RI(15,165);
    const b=180-a;
    const svg=svgIntersection(200,Math.min(a,180-a),['?','?','?',a+'°']);
    const correct=b+'°, '+a+'°, '+b+'°';
    const w1=a+'°, '+b+'°, '+a+'°';
    const w2=(b+1)+'°, '+(a-1)+'°, '+b+'°';
    const w3=b+'°, '+b+'°, '+b+'°';
    const opts=shuffle([correct,w1,w2,w3]);
    qs.push({type:'mc',stem:svg+'<br>שני ישרים נחתכים. זווית אחת = <span class="math-expr">'+a+'°</span>. מהן שלוש הזוויות האחרות (לפי הסדר)?',options:opts,answer:opts.indexOf(correct),explanation:'קודקודית = <span class="math-expr">'+a+'°</span>, שתי צמודות = <span class="math-expr">180° − '+a+'° = '+b+'°</span>'});
  }

  /* Q16-Q20: SVG with numeric values — compute missing angle (input) */
  for(let i=0;i<5;i++){
    const a=RI(25,155);
    const b=180-a;
    const showA=R()>.5;
    const givenVal=showA?a:b;
    const missingVal=showA?b:a;
    const svg=svgIntersection(200,Math.min(a,180-a),[showA?a+'°':'α',showA?'α':b+'°',showA?a+'°':'α',showA?'α':b+'°']);
    qs.push({type:'input',stem:svg+'<br>מצאו את <span class="math-expr">α</span>:',answer:missingVal,explanation:'הזוויות צמודות: <span class="math-expr">α = 180° − '+givenVal+'° = '+missingVal+'°</span>'});
  }
  return qs;
}

/* ===== MEDIUM (20 questions) ===== */
function genMedium(){
  rng=mulberry32(dateSeed+200);
  const qs=[];

  /* Q1-Q5: Given α, compute all 4 angles at intersection (MC) */
  for(let i=0;i<5;i++){
    const a=RI(20,160);
    const b=180-a;
    const svg=svgIntersection(200,Math.min(a,b),['α','β','γ','δ']);
    const correct='α='+a+'°, β='+b+'°, γ='+a+'°, δ='+b+'°';
    const w1='α='+a+'°, β='+a+'°, γ='+b+'°, δ='+b+'°';
    const w2='α='+a+'°, β='+b+'°, γ='+b+'°, δ='+a+'°';
    const w3='α='+b+'°, β='+a+'°, γ='+a+'°, δ='+b+'°';
    const opts=shuffle([correct,w1,w2,w3]);
    qs.push({type:'mc',stem:svg+'<br>שני ישרים נחתכים. <span class="math-expr">α = '+a+'°</span>. חשבו את כל הזוויות:',options:opts,answer:opts.indexOf(correct),explanation:'קודקודית: <span class="math-expr">γ = α = '+a+'°</span>. צמודות: <span class="math-expr">β = δ = 180° − '+a+'° = '+b+'°</span>.'});
  }

  /* Q6-Q10: Equation — (ax+b)° and (cx+d)° adjacent, find x (input) */
  for(let i=0;i<5;i++){
    const x=RI(5,40);
    const a1=RI(1,4);
    const a2=RI(1,4);
    /* a1*x + b1 + a2*x + b2 = 180, so b1+b2 = 180-(a1+a2)*x */
    const remainder=180-(a1+a2)*x;
    const b1=RI(Math.max(-30,remainder-60),Math.min(60,remainder+30));
    const b2=remainder-b1;
    const ang1=a1*x+b1;
    const ang2=a2*x+b2;
    if(ang1<=0||ang2<=0||ang1>=180||ang2>=180) {i--;continue;}
    const e1=(a1===1?'x':a1+'x')+(b1>=0?' + '+b1:' − '+(-b1));
    const e2=(a2===1?'x':a2+'x')+(b2>=0?' + '+b2:' − '+(-b2));
    qs.push({type:'input',stem:'שתי זוויות <strong>צמודות</strong>: <span class="math-expr">('+e1+')°</span> ו-<span class="math-expr">('+e2+')°</span>.<br>מצאו את <span class="math-expr">x</span>.',answer:x,explanation:'<span class="math-expr">('+e1+') + ('+e2+') = 180</span><br><span class="math-expr">'+(a1+a2)+'x'+(b1+b2>=0?' + '+(b1+b2):' − '+(-(b1+b2)))+' = 180</span><br><span class="math-expr">'+(a1+a2)+'x = '+(180-(b1+b2))+'</span><br><span class="math-expr">x = '+x+'</span>'});
  }

  /* Q11-Q15: One angle is N times the other, they're adjacent, find both (input) */
  for(let i=0;i<5;i++){
    const factor=RI(2,8);
    const small=180/(factor+1);
    if(small!==Math.floor(small)){i--;continue;}
    const big=factor*small;
    qs.push({type:'input',stem:'שתי זוויות <strong>צמודות</strong>. אחת גדולה <strong>פי '+factor+'</strong> מהאחרת.<br>מצאו את הזווית <strong>הקטנה</strong>.',answer:small,explanation:'נסמן את הקטנה <span class="math-expr">x</span>. אז <span class="math-expr">x + '+factor+'x = 180</span> → <span class="math-expr">'+(factor+1)+'x = 180</span> → <span class="math-expr">x = '+small+'°</span>. הגדולה: <span class="math-expr">'+big+'°</span>.'});
  }

  /* Q16-Q20: One angle smaller by N° than the other, they're adjacent, find both (input) */
  for(let i=0;i<5;i++){
    const diff=RI(10,80)*2; /* even so both are integers */
    const small=(180-diff)/2;
    if(small<=0||small!==Math.floor(small)){i--;continue;}
    const big=small+diff;
    qs.push({type:'input',stem:'שתי זוויות <strong>צמודות</strong>. אחת קטנה ב-<span class="math-expr">'+diff+'°</span> מהאחרת.<br>מצאו את הזווית <strong>הגדולה</strong>.',answer:big,explanation:'נסמן את הקטנה <span class="math-expr">x</span>. אז <span class="math-expr">x + (x + '+diff+') = 180</span> → <span class="math-expr">2x = '+(180-diff)+'</span> → <span class="math-expr">x = '+small+'°</span>. הגדולה: <span class="math-expr">'+big+'°</span>.'});
  }
  return qs;
}

/* ===== HARD (20 questions) ===== */
function genHard(){
  rng=mulberry32(dateSeed+300);
  const qs=[];
  const lineNames=[['OA','ER'],['PK','NG'],['DF','HL'],['QR','TS'],['BW','YJ']];
  const pointNames=['M','O','P','Q','R'];

  /* Q1-Q5: Named intersecting lines — vertical angle equation (input) */
  for(let i=0;i<5;i++){
    const x=RI(10,50);
    const a1=RI(1,3);
    const b1=RI(-20,30);
    /* vertical: a1*x+b1 = a2*x+b2, so pick a2<a1 and compute b2 */
    const a2=RI(1,a1===1?1:a1-1);
    const b2=a1*x+b1-a2*x;
    const val=a1*x+b1;
    if(val<=5||val>=175){i--;continue;}
    const ln=lineNames[i%5];
    const pt=pointNames[i%5];
    const e1=(a1===1?'x':a1+'x')+(b1>=0?' + '+b1:' − '+(-b1));
    const e2=(a2===1?'x':a2+'x')+(b2>=0?' + '+b2:' − '+(-b2));
    qs.push({type:'input',stem:'הישרים '+ln[0]+' ו-'+ln[1]+' נחתכים בנקודה '+pt+'.<br><span class="math-expr">∠'+ln[0][0]+pt+ln[1][0]+' = ('+e1+')°</span>, <span class="math-expr">∠'+ln[1][1]+pt+ln[0][1]+' = ('+e2+')°</span>.<br>הזוויות <strong>קודקודיות</strong>. מצאו את <span class="math-expr">x</span>.',answer:x,explanation:'קודקודיות → שוות: <span class="math-expr">'+e1+' = '+e2+'</span><br><span class="math-expr">'+(a1-a2)+'x = '+(b2-b1)+'</span><br><span class="math-expr">x = '+x+'</span>. הזווית = <span class="math-expr">'+val+'°</span>.'});
  }

  /* Q6-Q10: 3 segments through a point — relationships between angles (input) */
  for(let i=0;i<5;i++){
    /* Three lines through a point create 6 angles. We give 2 relationships and ask for x. */
    const x=RI(10,40);
    const factor=RI(2,4);
    const diff=RI(10,30);
    /* ∠A = factor*x, ∠B = x, ∠C = factor*x - diff */
    /* ∠A and ∠B are adjacent on a line: factor*x + x = 180 doesn't always work;
       Instead: 3 lines through a point, opposite angles equal. Let's use:
       ∠LCG = factor * ∠ICT, ∠ACG = ∠ICT - diff
       Where ∠LCG + ∠ACG + ∠ICT = 180 (on a line)
       factor*∠ICT + (∠ICT - diff) + ∠ICT = 180
       (factor+2)*∠ICT = 180+diff
    */
    const ict=(180+diff)/(factor+2);
    if(ict!==Math.floor(ict)||ict<=5||ict>=90){i--;continue;}
    const lcg=factor*ict;
    const acg=ict-diff;
    if(acg<=0){i--;continue;}
    const segPairs=[['LA','GI','RT'],['PB','HK','FN'],['QD','MJ','SW'],['YE','CU','VX'],['ZG','OI','WA']];
    const sp=segPairs[i%5];
    const pt=['C','O','K','N','T'][i%5];
    qs.push({type:'input',stem:'הקטעים '+sp[0]+', '+sp[1]+' ו-'+sp[2]+' נחתכים בנקודה '+pt+'.<br><span class="math-expr">∠'+sp[0][0]+pt+sp[1][0]+'</span> גדולה <strong>פי '+factor+'</strong> מ-<span class="math-expr">∠'+sp[1][1]+pt+sp[2][1]+'</span>,<br>ו-<span class="math-expr">∠'+sp[0][1]+pt+sp[1][0]+'</span> קטנה ב-<span class="math-expr">'+diff+'°</span> מ-<span class="math-expr">∠'+sp[1][1]+pt+sp[2][1]+'</span>.<br>שלוש הזוויות על ישר אחד (סכומן 180°). מצאו את <span class="math-expr">∠'+sp[1][1]+pt+sp[2][1]+'</span>.',answer:ict,explanation:'נסמן <span class="math-expr">∠'+sp[1][1]+pt+sp[2][1]+' = y</span>.<br><span class="math-expr">'+factor+'y + (y − '+diff+') + y = 180</span><br><span class="math-expr">'+(factor+2)+'y = '+(180+diff)+'</span><br><span class="math-expr">y = '+ict+'°</span>'});
  }

  /* Q11-Q15: Diagonals in quadrilateral — vertical angles (input) */
  for(let i=0;i<5;i++){
    const x=RI(30,150);
    const y=180-x;
    const svg=svgIntersection(200,Math.min(x,y),[x+'°','?','','']);
    qs.push({type:'input',stem:svg+'<br>BD ו-AC הם אלכסונים במרובע. הזווית המסומנת היא <span class="math-expr">'+x+'°</span>.<br>מצאו את הזווית הצמודה לה (המסומנת ב-<strong>?</strong>).',answer:y,explanation:'אלכסונים נחתכים → הזוויות צמודות: <span class="math-expr">? = 180° − '+x+'° = '+y+'°</span>'});
  }

  /* Q16-Q20: Extended sides of quadrilateral — find angles using vertical+adjacent (MC) */
  for(let i=0;i<5;i++){
    const alpha=RI(30,80);
    const beta=180-alpha;
    const gamma=alpha;
    const delta=beta;
    /* Quadrilateral with extended sides: exterior angles = vertical to interior */
    const svg=svgIntersection(220,Math.min(alpha,beta),[alpha+'°','β','γ','δ']);
    const correct='β='+beta+'°, γ='+gamma+'°, δ='+delta+'°';
    const w1='β='+alpha+'°, γ='+beta+'°, δ='+alpha+'°';
    const w2='β='+(beta-10)+'°, γ='+(gamma+10)+'°, δ='+delta+'°';
    const w3='β='+beta+'°, γ='+beta+'°, δ='+alpha+'°';
    const opts=shuffle([correct,w1,w2,w3]);
    qs.push({type:'mc',stem:svg+'<br>שני ישרים (המשכי צלעות של מרובע) נחתכים. <span class="math-expr">α = '+alpha+'°</span>.<br>חשבו את שאר הזוויות:',options:opts,answer:opts.indexOf(correct),explanation:'צמודות: <span class="math-expr">β = δ = 180° − '+alpha+'° = '+beta+'°</span>. קודקודית: <span class="math-expr">γ = α = '+alpha+'°</span>.'});
  }
  return qs;
}

/* ===== CHALLENGE (15 questions) ===== */
function genChallenge(){
  rng=mulberry32(dateSeed+400);
  const qs=[];

  /* Q1-Q5: Bisector + vertical angles (input) */
  for(let i=0;i<5;i++){
    /* Lines MB and DC intersect at O. NL bisects ∠MOD.
       ∠MOD = given. Bisector splits it into two equal parts.
       How many pairs of vertical angles? And what is ∠NOC? */
    const mod_angle=RI(40,140);
    if(mod_angle%2!==0){i--;continue;}
    const half=mod_angle/2;
    const moc=180-mod_angle;
    /* With bisector NL: we get 3 lines through O → 6 angles.
       ∠MON = half, ∠NOD = half, ∠DOB = moc, ∠BOL = half (vertical to MON),
       ∠LOC = half (vertical to NOD), ∠COM = moc (vertical to DOB).
       Actually: ∠NOC = ∠NOD + ∠DOC... let me think more carefully.
       MB is a line: M—O—B. DC is a line: D—O—C.
       ∠MOD = mod_angle. NL bisects it: ∠MON = ∠NOD = half.
       NL is a line: N—O—L.
       So we have 3 lines through O: MB, DC, NL. 6 angles around O.
       Going around: ∠MON=half, ∠NOD=half, ∠DOB=moc, ∠BOL=half, ∠LOC=half, ∠COM=moc.
       Check: half+half+moc+half+half+moc = 2*mod_angle+2*moc = 2*180 = 360 ✓
       ∠NOC = ∠NOD + ∠DOC. But ∠DOC = ∠DOB = moc. So ∠NOC = half + moc.
    */
    const noc=half+moc;
    qs.push({type:'input',stem:'הישרים MB ו-DC נחתכים בנקודה O. הישר NL <strong>חוצה</strong> את <span class="math-expr">∠MOD = '+mod_angle+'°</span>.<br>מצאו את <span class="math-expr">∠NOC</span>.',answer:noc,explanation:'NL חוצה את ∠MOD → <span class="math-expr">∠MON = ∠NOD = '+half+'°</span>.<br><span class="math-expr">∠DOC</span> קודקודית ל-∠MOB → <span class="math-expr">∠DOC = 180° − '+mod_angle+'° = '+moc+'°</span>.<br><span class="math-expr">∠NOC = ∠NOD + ∠DOC = '+half+'° + '+moc+'° = '+noc+'°</span>.'});
  }

  /* Q6-Q10: Multiple given angles at intersection, find unknowns (input) */
  for(let i=0;i<5;i++){
    /* 3 lines through a point: angles a, b, c, a, b, c going around (each opposite pair equal).
       a + b + c = 180. Give two, ask for the third plus reasoning. */
    const a=RI(20,80);
    const b=RI(20,80);
    const c=180-a-b;
    if(c<=5||c>=160){i--;continue;}
    const labels=['∠1','∠2','∠3'];
    const vals=[a,b,c];
    const askIdx=RI(0,2);
    const given=[];
    for(let j=0;j<3;j++){if(j!==askIdx) given.push(labels[j]+' = '+vals[j]+'°');}
    qs.push({type:'input',stem:'שלושה ישרים נחתכים בנקודה אחת.<br>'+given.join(', ')+'.<br>שלוש הזוויות '+labels[0]+', '+labels[1]+', '+labels[2]+' על ישר אחד (סכומן 180°).<br>מצאו את <span class="math-expr">'+labels[askIdx]+'</span>.',answer:vals[askIdx],explanation:'<span class="math-expr">'+labels[0]+' + '+labels[1]+' + '+labels[2]+' = 180°</span><br><span class="math-expr">'+labels[askIdx]+' = 180° − '+(180-vals[askIdx])+'° = '+vals[askIdx]+'°</span>'});
  }

  /* Q11-Q15: Bisector problem — advanced (input) */
  for(let i=0;i<5;i++){
    /* Points A, L, E on one line. Ray BD from point B on the line.
       BE bisects ∠ABD, BF bisects ∠DBL.
       ∠ABD = given. Find ∠EBF. */
    const abd=RI(40,160);
    if(abd%2!==0){i--;continue;}
    const dbl=180-abd;
    if(dbl%2!==0){i--;continue;}
    const abe=abd/2;
    const dbf=dbl/2;
    const ebf=abe+dbf; /* Actually ∠EBF = ∠EBD + ∠DBF = abd/2 + dbl/2 = (abd+dbl)/2 = 90° always! */
    /* This is a classic result: bisectors of adjacent supplementary angles are perpendicular. */
    qs.push({type:'input',stem:'הנקודות A, L, E על ישר אחד. מנקודה B על הישר יוצאת קרן BD.<br>BE חוצה את <span class="math-expr">∠ABD = '+abd+'°</span>, ו-BF חוצה את <span class="math-expr">∠DBL = '+dbl+'°</span>.<br>מצאו את <span class="math-expr">∠EBF</span>.',answer:90,explanation:'<span class="math-expr">∠EBD = '+abd+'° ÷ 2 = '+abe+'°</span><br><span class="math-expr">∠DBF = '+dbl+'° ÷ 2 = '+dbf+'°</span><br><span class="math-expr">∠EBF = '+abe+'° + '+dbf+'° = 90°</span><br>💡 חוצי זוויות צמודות תמיד מאונכים!'});
  }
  return qs;
}

function generateQuestions(level){
  if(level==='easy') return genEasy();
  if(level==='medium') return genMedium();
  if(level==='hard') return genHard();
  return genChallenge();
}

/* ===== PRACTICE RENDERING ===== */
function renderLevelTabs(){
  const container=document.getElementById('levelTabs');
  container.innerHTML='';
  ['easy','medium','hard','challenge'].forEach(lv=>{
    const btn=document.createElement('button');
    btn.className='level-tab'+(state.level===lv?' active':'');
    const done=scores[lv].filter(s=>s===1).length;
    const total=LEVEL_COUNTS[lv];
    btn.innerHTML=LEVEL_NAMES[lv]+(done>0?' <span class="tab-score">('+done+'/'+total+')</span>':'');
    btn.onclick=()=>switchLevel(lv);
    container.appendChild(btn);
  });
}

function switchLevel(lv){
  state.level=lv;state.qIndex=0;
  if(!questions[lv]) questions[lv]=generateQuestions(lv);
  if(!scores[lv].length) scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
  if(!answered[lv].length) answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  renderLevelTabs();renderQuestion();saveState();
}

function updateLevelProgress(){
  const lv=state.level;const total=LEVEL_COUNTS[lv];
  const done=answered[lv].filter(a=>a).length;
  document.getElementById('levelFill').style.width=(done/total*100)+'%';
  document.getElementById('levelText').textContent=done+' / '+total;
}

function renderQuestion(){
  const lv=state.level;const idx=state.qIndex;
  const qs=questions[lv];
  if(!qs) return;
  if(idx>=qs.length){renderLevelComplete();return}
  const q=qs[idx];
  const area=document.getElementById('questionArea');
  const isAnswered=answered[lv][idx];

  let html='<div class="q-card"><div class="q-number">שאלה '+(idx+1)+' מתוך '+qs.length+'</div>';
  html+='<div class="q-stem">'+q.stem+'</div>';

  if(q.type==='mc'){
    html+='<div class="q-options" id="qOpts">';
    q.options.forEach((opt,i)=>{
      const letter=LETTERS[i];
      let cls='q-opt';
      if(isAnswered){
        cls+=' disabled';
        if(i===q.answer) cls+=' correct';
        else if(scores[lv][idx]===0&&i===answered[lv][idx+'_sel']) cls+=' wrong';
      }
      html+='<div class="'+cls+'" data-i="'+i+'"><span class="q-opt-letter">'+letter+'</span><span dir="ltr" style="unicode-bidi:embed">'+opt+'</span></div>';
    });
    html+='</div>';
    if(!isAnswered) html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkMC()" disabled>בדקו</button>';
  } else if(q.type==='input'){
    html+='<div class="q-input-row"><input type="number" class="q-input" id="qInput" placeholder="תשובה" dir="ltr" aria-label="תשובה">';
    if(!isAnswered) html+='<button class="q-check-btn" id="qCheckBtn" onclick="checkInput()">בדקו</button>';
    html+='</div>';
    if(isAnswered){
      html+='<div style="margin-top:4px;font-weight:700;direction:ltr">תשובה: '+q.answer+'</div>';
    }
  }

  if(isAnswered){
    const isCorrect=scores[lv][idx]===1;
    html+='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?'✅ נכון! ':'❌ ')+q.explanation+'</div>';
  }
  html+='<div id="qFeedback"></div></div>';
  area.innerHTML=html;

  /* Set up MC click handlers */
  if(q.type==='mc'&&!isAnswered){
    area.querySelectorAll('.q-opt').forEach(el=>{
      el.onclick=()=>{
        area.querySelectorAll('.q-opt').forEach(o=>o.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('qCheckBtn').disabled=false;
      };
    });
  }
  /* Set up input enter key */
  const inp=document.getElementById('qInput');
  if(inp&&!isAnswered){
    inp.focus();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkInput()});
  }

  updateLevelProgress();
  document.getElementById('qPrev').disabled=idx===0;
  document.getElementById('qNext').textContent=idx>=qs.length-1?'סיום':'הבא ←';
}

window.checkMC=function(){
  const lv=state.level;const idx=state.qIndex;const q=questions[lv][idx];
  const selected=document.querySelector('.q-opt.selected');
  if(!selected) return;
  const si=parseInt(selected.dataset.i);
  const isCorrect=si===q.answer;
  scores[lv][idx]=isCorrect?1:0;
  answered[lv][idx]=true;
  answered[lv][idx+'_sel']=si;

  document.querySelectorAll('.q-opt').forEach((el,i)=>{
    el.classList.add('disabled');el.onclick=null;
    if(i===q.answer) el.classList.add('correct');
    else if(i===si&&!isCorrect) el.classList.add('wrong');
  });
  document.getElementById('qCheckBtn').remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['✅ כל הכבוד!','✅ מעולה!','✅ נכון מאוד!','✅ יפה!'])+' ':'❌ לא נכון. ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();saveState();
};

window.checkInput=function(){
  const lv=state.level;const idx=state.qIndex;const q=questions[lv][idx];
  const inp=document.getElementById('qInput');
  const val=inp.value.trim();
  if(!val) return;
  const isCorrect=parseFloat(val)===q.answer;
  scores[lv][idx]=isCorrect?1:0;
  answered[lv][idx]=true;
  inp.classList.add(isCorrect?'correct':'wrong');
  inp.disabled=true;
  const btn=document.getElementById('qCheckBtn');if(btn)btn.remove();
  document.getElementById('qFeedback').innerHTML='<div class="q-feedback '+(isCorrect?'correct':'wrong')+'">'+(isCorrect?pick(['✅ כל הכבוד!','✅ מעולה!','✅ נכון!'])+' ':'❌ ')+q.explanation+'</div>';
  renderLevelTabs();updateLevelProgress();saveState();
};

function nextQuestion(){
  const lv=state.level;
  if(state.qIndex>=questions[lv].length-1){renderLevelComplete();return}
  if(typeof AuthState!=='undefined'&&!AuthState.isLoggedIn()){
    if(typeof showAuthModal==='function')showAuthModal();
    return;
  }
  state.qIndex++;renderQuestion();saveState();
}
function prevQuestion(){if(state.qIndex>0){state.qIndex--;renderQuestion();saveState()}}

function renderLevelComplete(){
  const lv=state.level;
  const correct=scores[lv].filter(s=>s===1).length;
  const total=LEVEL_COUNTS[lv];
  const pct=Math.round(correct/total*100);
  const scoreClass=pct>=80?'':pct>=50?' medium-score':' low-score';
  const emoji=pct>=80?'🎉':pct>=50?'👏':'💪';

  document.getElementById('questionArea').innerHTML=`
    <div class="q-card"><div class="level-complete">
      <div class="big-emoji">${emoji}</div>
      <h2>סיימתם את רמת "${LEVEL_NAMES[lv]}"!</h2>
      <div class="score-display${scoreClass}">${correct} / ${total}</div>
      <p style="color:var(--text-light);margin-bottom:16px">${pct}% הצלחה</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="mini-btn" onclick="retryLevel()">🔄 נסו שוב</button>
        ${lv!=='challenge'?'<button class="mini-btn accent" onclick="nextLevel()">▶ לרמה הבאה</button>':''}
      </div>
    </div></div>`;

  if(pct>=80) showConfetti();
  saveState();
}

window.retryLevel=function(){
  const lv=state.level;
  scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
  answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  questions[lv]=generateQuestions(lv);
  state.qIndex=0;
  renderLevelTabs();renderQuestion();saveState();
};

window.nextLevel=function(){
  const order=['easy','medium','hard','challenge'];
  const ci=order.indexOf(state.level);
  if(ci<order.length-1) switchLevel(order[ci+1]);
};

/* ===== SECTION SWITCHING ===== */
function switchSection(sec){
  state.section=sec;
  document.querySelectorAll('.section-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.section===sec);
  });
  document.getElementById('learnSection').style.display=sec==='learn'?'block':'none';
  document.getElementById('practiceSection').style.display=sec==='practice'?'block':'none';
  if(sec==='practice'){
    if(!questions[state.level]) questions[state.level]=generateQuestions(state.level);
    if(!scores[state.level].length) scores[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(-1);
    if(!answered[state.level].length) answered[state.level]=new Array(LEVEL_COUNTS[state.level]).fill(false);
    renderLevelTabs();renderQuestion();
  }
  saveState();
}

/* ===== CONFETTI ===== */
function showConfetti(){
  const box=document.getElementById('confettiBox');
  box.innerHTML='';
  const colors=['#1a2f5a','#4a9eda','#10b981','#ef4444','#8b5cf6','#ec4899'];
  for(let i=0;i<50;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(6+Math.random()*8)+'px';
    c.style.height=(6+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*1.5)+'s';
    box.appendChild(c);
  }
  setTimeout(()=>box.innerHTML='',5000);
}

/* ===== INIT ===== */
function init(){
  loadState();
  Object.keys(LEVEL_COUNTS).forEach(lv=>{
    if(!scores[lv]||!scores[lv].length) scores[lv]=new Array(LEVEL_COUNTS[lv]).fill(-1);
    if(!answered[lv]||!answered[lv].length) answered[lv]=new Array(LEVEL_COUNTS[lv]).fill(false);
  });
  renderStep(state.step);
  if(state.section==='practice') switchSection('practice');
}
init();
</script>
