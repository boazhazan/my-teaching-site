<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>יוצא דופן — תרגול | בועז חזן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fef9f0;
  --card-bg: #ffffff;
  --primary: #4a90d9;
  --primary-dark: #357abd;
  --primary-light: #e8f2fc;
  --success: #27ae60;
  --success-light: #e8f5e9;
  --wrong: #e74c3c;
  --wrong-light: #ffebee;
  --accent: #f39c12;
  --accent-light: #fef9e7;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --pink: #e84393;
  --pink-light: #fce4ec;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #e8e8e8;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;overflow-x:hidden}

/* ===== Header ===== */
.app-header{background:linear-gradient(135deg,#4a90d9 0%,#2c6fbb 100%);color:#fff;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.app-header::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.app-header::after{content:'';position:absolute;bottom:-40px;left:-20px;width:120px;height:120px;background:rgba(255,255,255,0.06);border-radius:50%}
.app-header h1{font-family:'Rubik','Heebo',sans-serif;font-size:2rem;font-weight:800;position:relative;margin-bottom:4px}
.app-header p{font-size:1rem;opacity:0.9;position:relative}

/* ===== Mode Selector ===== */
.mode-bar{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--card-bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.mode-btn{padding:8px 18px;border-radius:24px;border:2px solid var(--border);background:var(--card-bg);font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.25s ease;white-space:nowrap}
.mode-btn:hover{border-color:var(--primary)}
.mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.mode-btn .icon{margin-inline-end:4px}

/* ===== Progress Bar ===== */
.progress-section{padding:12px 16px;background:var(--card-bg);border-bottom:1px solid var(--border)}
.progress-row{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto}
.progress-label{font-size:0.85rem;font-weight:600;color:var(--text-light);white-space:nowrap}
.progress-bar{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--success),#2ecc71);border-radius:10px;transition:width 0.5s ease}
.progress-stats{display:flex;gap:16px}
.stat{display:flex;align-items:center;gap:4px;font-weight:700;font-size:0.9rem}

/* ===== Level Tabs ===== */
.level-tabs-container{background:var(--card-bg);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:15;padding:0 8px}
.level-tabs{display:flex;gap:4px;overflow-x:auto;padding:10px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.level-tabs::-webkit-scrollbar{display:none}
.level-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:var(--card-bg);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.25s ease;white-space:nowrap;position:relative}
.level-tab:hover{border-color:var(--primary)}
.level-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.level-tab.completed{border-color:var(--success)}
.level-tab.completed::after{content:'✓';position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--success);color:#fff;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center}

/* ===== Exercise Container ===== */
.exercise-container{max-width:800px;margin:0 auto;padding:20px 16px 80px}

/* ===== Question Card ===== */
.question-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 18px;margin-bottom:20px;border:3px solid transparent;transition:all 0.3s ease;animation:fadeInUp 0.4s ease both}
.question-card:nth-child(2){animation-delay:0.1s}
.question-card:nth-child(3){animation-delay:0.2s}
.question-card.correct{border-color:var(--success);background:var(--success-light)}
.question-card.wrong{border-color:var(--wrong);background:var(--wrong-light)}

.q-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.q-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.q-hint{font-size:0.85rem;color:var(--text-light);font-weight:500}

/* ===== Options Grid ===== */
.options-grid{display:grid;gap:10px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-5{grid-template-columns:repeat(5,1fr)}
.grid-6{grid-template-columns:repeat(6,1fr)}

.option{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:var(--radius-sm);border:3px solid var(--border);background:#fafafa;cursor:pointer;transition:all 0.25s ease;position:relative;-webkit-user-select:none;user-select:none}
.option:hover:not(.disabled){border-color:var(--primary);background:var(--primary-light);transform:translateY(-2px);box-shadow:0 4px 12px rgba(74,144,217,0.15)}
.option:active:not(.disabled){transform:scale(0.97)}
.option.selected-correct{border-color:var(--success);background:var(--success-light);transform:scale(1.04)}
.option.selected-wrong{border-color:var(--wrong);background:var(--wrong-light);animation:shake 0.5s ease}
.option.reveal-answer{border-color:var(--success);background:var(--success-light)}
.option.disabled{cursor:default;opacity:0.7}

.option .vis{font-size:2.8rem;line-height:1;transition:transform 0.3s ease}
.option:hover:not(.disabled) .vis{transform:scale(1.12)}
.option.selected-correct .vis{animation:bounce 0.5s ease}

.option .svg-vis{width:60px;height:60px;display:flex;align-items:center;justify-content:center;transition:transform 0.3s ease}
.option:hover:not(.disabled) .svg-vis{transform:scale(1.12)}

.option .lbl{font-size:0.75rem;font-weight:600;color:var(--text-light)}
.option .st-icon{position:absolute;top:-7px;left:-7px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:#fff;opacity:0;transform:scale(0);transition:all 0.3s ease}
.option.selected-correct .st-icon{background:var(--success);opacity:1;transform:scale(1)}
.option.selected-wrong .st-icon{background:var(--wrong);opacity:1;transform:scale(1)}

/* ===== Circle Drawing Mode ===== */
.question-card.draw-enabled{position:relative;touch-action:none}
.question-card.draw-enabled .draw-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;border-radius:var(--radius)}
.question-card.done .draw-canvas{display:none}
.option.circled{position:relative}
.option.circled::before{content:'';position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px;border:4px solid var(--primary);border-radius:50%;z-index:12;animation:circleAppear 0.4s ease forwards}
.option.circled.correct-circle{border-color:transparent}
.option.circled.correct-circle::before{border-color:var(--success);border-width:5px}
.option.circled.wrong-circle{border-color:transparent}
.option.circled.wrong-circle::before{border-color:var(--wrong);border-width:5px}
@keyframes circleAppear{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
.draw-mode-hint{text-align:center;padding:8px;background:#fff3cd;color:#856404;font-weight:600;font-size:0.9rem;display:none}
.draw-mode-hint.show{display:block}

.feedback{text-align:center;margin-top:12px;font-weight:700;font-size:0.95rem;min-height:24px;opacity:0;transition:opacity 0.3s ease}
.feedback.show{opacity:1}
.feedback.ok{color:var(--success)}
.feedback.nope{color:var(--wrong)}

/* ===== Completion ===== */
.level-complete{background:linear-gradient(135deg,var(--success),#2ecc71);border-radius:var(--radius);padding:32px 20px;text-align:center;color:#fff;box-shadow:var(--shadow);display:none;animation:fadeInUp 0.4s ease}
.level-complete.show{display:block}
.level-complete .big-emoji{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite}
.level-complete h2{font-size:1.6rem;font-weight:800;margin-bottom:6px}
.level-complete p{opacity:0.9;margin-bottom:4px}
.level-complete .score{font-size:2.2rem;font-weight:900;margin:12px 0}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--radius-sm);font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.25s ease}
.btn:hover{transform:translateY(-1px)}
.btn-w{background:#fff;color:var(--primary)}
.btn-o{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.5)}

/* ===== All Complete ===== */
.all-complete{background:linear-gradient(135deg,#f39c12,#e67e22);border-radius:var(--radius);padding:40px 20px;text-align:center;color:#fff;box-shadow:var(--shadow-lg);display:none}
.all-complete.show{display:block}

/* ===== Print ===== */
@media print{
  body{background:#fff}
  .app-header{background:none;color:#000;padding:12px 0;border-bottom:2px solid #000}
  .app-header::before,.app-header::after{display:none}
  .mode-bar,.progress-section,.level-tabs-container,.actions,.no-print,.level-complete,.all-complete{display:none!important}
  .exercise-container{padding:8px 0}
  .question-card{box-shadow:none;border:2px solid #999;page-break-inside:avoid;margin-bottom:16px}
  .question-card.correct,.question-card.wrong{background:#fff;border-color:#999}
  .option{border:2px solid #aaa;background:#fff}
  .option.selected-correct,.option.selected-wrong,.option.reveal-answer{background:#fff;border-color:#aaa}
  .option .st-icon{display:none}
  .feedback{display:none}
  .print-circle{display:block!important}
  .print-header{display:block!important;text-align:center;font-size:1.4rem;font-weight:800;margin-bottom:12px;padding:8px 0;border-bottom:2px solid #000}
  canvas.circle-canvas{display:none!important}
}
.print-circle{display:none;position:absolute;top:3px;right:3px;width:22px;height:22px;border:2px solid #999;border-radius:50%}
.print-header{display:none}

/* ===== Animations ===== */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

/* ===== Responsive ===== */
@media(max-width:600px){
  .app-header h1{font-size:1.5rem}
  .app-header p{font-size:0.85rem}
  .option .vis{font-size:2.2rem}
  .option .svg-vis{width:48px;height:48px}
  .option .svg-vis svg{width:100%!important;height:100%!important}
  .option{padding:10px 4px}
  .option .lbl{font-size:0.65rem}
  .grid-5{grid-template-columns:repeat(5,1fr);gap:6px}
  .grid-6{grid-template-columns:repeat(6,1fr);gap:5px}
  .grid-4{grid-template-columns:repeat(4,1fr);gap:8px}
  .question-card{padding:18px 12px}
  .mode-btn{padding:6px 12px;font-size:0.8rem}
  .level-tab{padding:6px 12px;font-size:0.75rem}
  .q-hint{font-size:0.78rem}
}
@media(max-width:380px){
  .option .vis{font-size:1.8rem}
  .option .svg-vis{width:40px;height:40px}
  .grid-5{gap:4px}
}
</style>
</head>

// ===== STATE =====
let currentLevel = 0;
let mode = 'click'; // 'click' or 'draw'
let totalCorrect = 0, totalWrong = 0;
let levelResults = {};
const encourageOk = ['!מעולה 🎉','!נכון ⭐','!יופי 👏','!מדהים 🌟','!בול 🎯'];
const encourageNo = ['לא בדיוק 💪','כמעט! 🤔','ממשיכים! 😊'];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// ===== RENDER TABS =====
function renderTabs(){
  const c = document.getElementById('levelTabs');
  c.innerHTML = levels.map((lv,i) => {
    const cls = i===currentLevel?'active':'';
    const comp = levelResults[lv.id]?'completed':'';
    return `<button class="level-tab ${cls} ${comp}" onclick="goLevel(${i})" style="${i===currentLevel?'background:'+lv.color+';border-color:'+lv.color:''}">${lv.title}</button>`;
  }).join('');
  // scroll active tab into view
  setTimeout(()=>{const a=c.querySelector('.active');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100);
}

// ===== RENDER LEVEL =====
function renderLevel(){
  const lv = levels[currentLevel];
  const area = document.getElementById('exerciseArea');
  let html = `<div class="print-header">🔍 יוצא דופן — ${lv.title}</div>`;

  lv.questions.forEach((q,qi) => {
    const shuffled = lv.noShuffle ? q.opts : shuffle(q.opts);
    const gridClass = lv.cols===6?'grid-6':lv.cols===5?'grid-5':'grid-4';
    html += `<div class="question-card ${mode==='draw'?'draw-enabled':''}" id="q${qi}">
      ${mode==='draw'?`<canvas class="draw-canvas" id="canvas${qi}"></canvas>`:''}
      <div class="q-header">
        <div class="q-num" style="background:${lv.color}">${qi+1}</div>
        ${q.hint?`<span class="q-hint">💡 ${q.hint}</span>`:''}
      </div>
      <div class="options-grid ${gridClass}">
        ${shuffled.map((o,oi) => {
          const vis = lv.type==='svg'
            ? `<div class="svg-vis" style="color:${lv.color}">${S[o.s]||''}</div>`
            : `<span class="vis">${o.e}</span>`;
          return `<div class="option" data-correct="${!!o.c}" data-qi="${qi}" data-oi="${oi}"
            ${mode==='click'?`onclick="pick(this,${qi})"`:''}
            ><span class="print-circle"></span><span class="st-icon"></span>${vis}<span class="lbl">${o.l}</span></div>`;
        }).join('')}
      </div>
      <div class="feedback" id="fb${qi}"></div>
    </div>`;
  });

  html += `<div class="level-complete" id="lvComplete">
    <div class="big-emoji">🌟</div>
    <h2 id="lcTitle"></h2><p id="lcSub"></p>
    <div class="score" id="lcScore"></div>
    <div class="actions">
      <button class="btn btn-w" onclick="retry()">🔄 נסה שוב</button>
      ${currentLevel<levels.length-1?`<button class="btn btn-o" onclick="nextLevel()">➡️ הבא</button>`:''}
      <button class="btn btn-o" onclick="printCurrent()">🖨️ הדפס</button>
    </div>
  </div>`;

  area.innerHTML = html;
  area._answered = 0;
  area._correct = 0;
  area._total = lv.questions.length;

  if(mode==='draw') initDrawMode();
  renderTabs();
  updateProgress();
}

// ===== CLICK MODE =====
function pick(el, qi){
  const card = document.getElementById('q'+qi);
  if(card.classList.contains('done')) return;
  card.classList.add('done');
  const fb = document.getElementById('fb'+qi);
  const all = card.querySelectorAll('.option');
  all.forEach(o=>o.classList.add('disabled'));

  if(el.dataset.correct==='true'){
    el.classList.add('selected-correct');
    el.querySelector('.st-icon').textContent='✓';
    card.classList.add('correct');
    fb.textContent=encourageOk[Math.floor(Math.random()*encourageOk.length)];
    fb.classList.add('ok','show');
    area._correct++; totalCorrect++;
  } else {
    el.classList.add('selected-wrong');
    el.querySelector('.st-icon').textContent='✗';
    card.classList.add('wrong');
    fb.textContent=encourageNo[Math.floor(Math.random()*encourageNo.length)];
    fb.classList.add('nope','show');
    totalWrong++;
    all.forEach(o=>{if(o.dataset.correct==='true')o.classList.add('reveal-answer')});
  }
  area._answered++;
  updateProgress();
  if(area._answered===area._total) setTimeout(showLevelComplete,600);
}

// ===== DRAW MODE =====
function initDrawMode(){
  document.getElementById('drawHint').classList.add('show');
  const cards = document.querySelectorAll('.question-card.draw-enabled');
  cards.forEach(card => {
    const qi = parseInt(card.id.replace('q',''));
    const canvas = document.getElementById('canvas'+qi);
    if(!canvas) return;

    // Size canvas to card
    canvas.width = card.offsetWidth;
    canvas.height = card.offsetHeight;

    let ctx = canvas.getContext('2d');
    let drawing = false;
    let points = [];

    canvas.addEventListener('pointerdown', function(e){
      if(card.classList.contains('done')) return;
      e.preventDefault();
      e.stopPropagation();
      drawing = true;
      points = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const rect = canvas.getBoundingClientRect();
      const pt = {x: e.clientX - rect.left, y: e.clientY - rect.top, cx: e.clientX, cy: e.clientY};
      points.push(pt);
      ctx.beginPath();
      ctx.moveTo(pt.x, pt.y);
      ctx.strokeStyle = '#4a90d9';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }, {passive:false});

    canvas.addEventListener('pointermove', function(e){
      if(!drawing) return;
      e.preventDefault();
      e.stopPropagation();
      const rect = canvas.getBoundingClientRect();
      const pt = {x: e.clientX - rect.left, y: e.clientY - rect.top, cx: e.clientX, cy: e.clientY};
      points.push(pt);
      ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
    }, {passive:false});

    canvas.addEventListener('pointerup', function(e){
      if(!drawing) return;
      e.preventDefault();
      drawing = false;

      if(points.length < 10){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }

      // Find center of drawn shape
      let cx = 0, cy = 0;
      points.forEach(p => { cx += p.cx; cy += p.cy; });
      cx /= points.length;
      cy /= points.length;

      // Find closest option in this card
      const options = card.querySelectorAll('.option');
      let bestOption = null;
      let bestDist = Infinity;

      options.forEach(opt => {
        const r = opt.getBoundingClientRect();
        const optCx = r.left + r.width/2;
        const optCy = r.top + r.height/2;
        const dist = Math.sqrt((cx-optCx)**2 + (cy-optCy)**2);
        const maxDist = Math.max(r.width, r.height) * 1.5;
        if(dist < maxDist && dist < bestDist){
          bestDist = dist;
          bestOption = opt;
        }
      });

      setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); }, 300);

      if(bestOption){
        bestOption.classList.add('circled');
        setTimeout(() => confirmCircle(bestOption, qi), 400);
      }
    }, {passive:false});

    canvas.addEventListener('pointercancel', function(){
      drawing = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });
  });
}

function disableDrawMode(){
  document.getElementById('drawHint').classList.remove('show');
}

function confirmCircle(el, qi){
  const card = document.getElementById('q'+qi);
  if(card.classList.contains('done')) return;
  card.classList.add('done');
  const fb = document.getElementById('fb'+qi);
  const all = card.querySelectorAll('.option');
  all.forEach(o=>{o.classList.add('disabled');if(o!==el)o.classList.remove('circled')});

  if(el.dataset.correct==='true'){
    el.classList.add('circled','correct-circle');
    card.classList.add('correct');
    fb.textContent=encourageOk[Math.floor(Math.random()*encourageOk.length)];
    fb.classList.add('ok','show');
    area._correct++; totalCorrect++;
  } else {
    el.classList.add('circled','wrong-circle');
    card.classList.add('wrong');
    fb.textContent=encourageNo[Math.floor(Math.random()*encourageNo.length)];
    fb.classList.add('nope','show');
    totalWrong++;
    all.forEach(o=>{if(o.dataset.correct==='true')o.classList.add('reveal-answer')});
  }
  area._answered++;
  updateProgress();
  if(area._answered===area._total) setTimeout(showLevelComplete,600);
}

// ===== LEVEL COMPLETE =====
function showLevelComplete(){
  const lv = levels[currentLevel];
  levelResults[lv.id] = {correct: area._correct, total: area._total};
  const card = document.getElementById('lvComplete');
  document.getElementById('lcScore').textContent = area._correct + ' / ' + area._total;
  if(area._correct === area._total){
    document.getElementById('lcTitle').textContent = '🏆 מושלם!';
    document.getElementById('lcSub').textContent = 'כל התשובות נכונות!';
  } else if(area._correct >= area._total/2){
    document.getElementById('lcTitle').textContent = '👏 כל הכבוד!';
    document.getElementById('lcSub').textContent = 'עבודה טובה!';
  } else {
    document.getElementById('lcTitle').textContent = '💪 נסו שוב!';
    document.getElementById('lcSub').textContent = 'אפשר לשפר!';
  }
  card.classList.add('show');
  card.scrollIntoView({behavior:'smooth',block:'center'});
  renderTabs();
}

// ===== NAVIGATION =====
function goLevel(i){ currentLevel=i; renderLevel(); window.scrollTo({top:0,behavior:'smooth'}); }
function nextLevel(){ if(currentLevel<levels.length-1){currentLevel++;renderLevel();window.scrollTo({top:0,behavior:'smooth'});} }
function retry(){ renderLevel(); window.scrollTo({top:0,behavior:'smooth'}); }

// ===== MODE =====
function setMode(m){
  mode=m;
  document.getElementById('modeClick').classList.toggle('active',m==='click');
  document.getElementById('modeDraw').classList.toggle('active',m==='draw');
  if(m==='click') disableDrawMode();
  renderLevel();
}

// ===== PROGRESS =====
function updateProgress(){
  const done = Object.keys(levelResults).length;
  const pct = Math.round((done/levels.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('totalCorrect').textContent=totalCorrect;
  document.getElementById('totalWrong').textContent=totalWrong;
}

// ===== PRINT =====
function printCurrent(){ window.print(); }

// ===== INIT =====
const area = document.getElementById('exerciseArea');
renderLevel();
</script>
