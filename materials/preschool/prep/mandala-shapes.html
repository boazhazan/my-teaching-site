*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}

@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes popIn{0%{opacity:0;transform:scale(0.85)}100%{opacity:1;transform:scale(1)}}

.mbtn{padding:8px 18px;border-radius:20px;border:2px solid var(--border);background:#fff;font-family:'Heebo',sans-serif;font-weight:600;font-size:0.9rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;min-height:44px}

.tw{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:15;padding:0 8px}

.tb{flex-shrink:0;padding:6px 14px;border-radius:16px;border:2px solid var(--border);background:#fff;font-family:'Heebo',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;transition:all 0.25s;white-space:nowrap;min-height:44px;display:flex;align-items:center;justify-content:center}

.ct{max-width:900px;margin:0 auto;padding:20px 16px 80px;position:relative}
.legend-card{background:#fff;border-radius:var(--radius);border:2px solid var(--border);box-shadow:var(--shadow);padding:12px;margin-bottom:16px}
.legend-title{font-size:0.85rem;font-weight:700;color:var(--text-light);text-align:center;margin-bottom:8px}
.legend{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.leg-item{display:flex;align-items:center;gap:6px;padding:6px 12px;background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border);border-right-width:4px;font-size:0.85rem;font-weight:600;user-select:none;cursor:pointer;transition:all 0.2s}

.leg-item.active{background:var(--pri-light);box-shadow:0 0 0 2px var(--pri);transform:translateY(-1px)}
.sel-indicator{text-align:center;font-size:0.9rem;font-weight:600;color:var(--text-light);padding:8px;margin-bottom:12px}
.free-wrap{margin-right:auto}
.free-toggle{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700;font-size:0.82rem;padding:6px 10px;color:var(--text-light);transition:color 0.3s;border-radius:20px}
.free-toggle:hover{background:var(--bg-soft)}
.free-toggle.on{color:var(--text)}
.ft-track{width:40px;height:22px;border-radius:11px;background:#cbd5e1;position:relative;transition:background 0.3s;flex-shrink:0}
.ft-thumb{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;right:2px;transition:right 0.3s;box-shadow:0 1px 2px rgba(0,0,0,0.2)}
.free-toggle.on .ft-track{background:linear-gradient(135deg,#f97316,#ec4899,#8b5cf6,#2563eb,#10b981)}
.free-toggle.on .ft-thumb{right:20px}
.free-banner{display:none;text-align:center;padding:10px 16px;margin-bottom:12px;background:linear-gradient(135deg,#fef3c7,#fce7f3,#ede9fe);border-radius:var(--radius);font-weight:700;font-size:0.95rem;color:var(--text);animation:popIn 0.3s ease}
.free-palette{display:none;flex-wrap:wrap;justify-content:center;gap:8px;padding:12px;margin-bottom:16px;background:#fff;border-radius:var(--radius);border:2px solid var(--border);box-shadow:var(--shadow)}

.mandala-card{position:relative;width:100%;max-width:680px;margin:0 auto 16px;aspect-ratio:1/1;background:radial-gradient(circle,#f1f5f9 0%,#fff 70%);border-radius:var(--radius);border:2px solid var(--border);box-shadow:var(--shadow-md);overflow:hidden}
.mandala-card.glow{animation:glow 1s ease 3}
.ss{position:absolute;cursor:pointer;overflow:visible;transition:filter 0.2s}
.ss:hover .sp{stroke-width:3.5px}
.sp{stroke:#1e293b;stroke-width:2.5px;fill:none;transition:stroke 0.2s,fill 0.2s,fill-opacity 0.2s,stroke-width 0.2s}
.draw-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;display:none;touch-action:none}
.dm .draw-canvas{display:block}

.dm .leg-item{pointer-events:none;opacity:0.6;cursor:default}
.color-bar{display:none;justify-content:center;gap:8px;padding:10px;margin-bottom:16px;flex-wrap:wrap}

.color-btn{width:44px;height:44px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all 0.2s}

.progress-wrap{margin-bottom:20px;text-align:center}
.progress-text{font-size:0.9rem;font-weight:600;color:var(--text-light);margin-bottom:6px}

.progress-fill{height:100%;background:var(--ok);border-radius:3px;transition:width 0.4s ease}
.wrong-msg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--no);color:#fff;padding:8px 20px;border-radius:20px;font-weight:700;font-size:0.9rem;z-index:30;animation:popIn 0.3s ease;pointer-events:none}

.free-palette{gap:6px;padding:10px}

@media print{

body{background:#fff}.ct{padding:10px;max-width:100%}.hd{border-bottom:2px solid #000}
.mandala-card{break-inside:avoid;border:2px solid #000;box-shadow:none;background:#fff!important;max-width:100%;width:85vw;margin:0 auto}
.sp{stroke:#000!important;stroke-width:2px!important;fill:none!important}

{r:42,count:4,type:'pentagon',size:14,startAngle:22.5},
{r:48,count:4,type:'square',size:12,startAngle:0},
{r:48,count:4,type:'circle',size:12,startAngle:45}
]}
];
var FREE_COLORS=[
{name:'אדום',hex:'#ef4444'},{name:'כחול',hex:'#2563eb'},{name:'ירוק',hex:'#10b981'},
{name:'צהוב',hex:'#facc15'},{name:'כתום',hex:'#f97316'},{name:'סגול',hex:'#8b5cf6'},
{name:'ורוד',hex:'#ec4899'},{name:'חום',hex:'#92400e'},{name:'שחור',hex:'#1e293b'},
{name:'לבן',hex:'#ffffff'},{name:'תכלת',hex:'#38bdf8'},{name:'ירוק בהיר',hex:'#4ade80'},
{name:'זהב',hex:'#eab308'},{name:'כסף',hex:'#94a3b8'},{name:'טורקיז',hex:'#14b8a6'}
];
var cur=0,mode='click',ld=null,colored={},totalShapes=0,res=[];
var dCtx=null,dCvs=null,drawing=false,dColor='',drawBBox={};
var selectedColor='',selectedType='',wrongCount=0,freeMode=false;

function iconSVG(type,color,sz){sz=sz||24;return'<svg viewBox="0 0 40 40" width="'+sz+'" height="'+sz+'" style="stroke:'+color+';stroke-width:2.5;fill:'+color+';fill-opacity:0.15;vertical-align:middle">'+ICONS[type]+'</svg>'}

function init(){res=[];for(var i=0;i<LEVELS.length;i++)res.push('pending');buildTabs();goTo(0)}

function buildTabs(){var el=document.getElementById('tabs');el.innerHTML='';for(var i=0;i<LEVELS.length;i++){var b=document.createElement('button');b.className='tb'+(i===cur?' on':'')+(res[i]==='correct'?' dn':'');b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx)}})(i);el.appendChild(b)}}

function updateTabs(){var bs=document.querySelectorAll('.tb');for(var i=0;i<bs.length;i++){bs[i].className='tb'+(i===cur?' on':'')+(res[i]==='correct'?' dn':'')}if(bs[cur])bs[cur].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})}

function goTo(idx){
if(idx<0||idx>=LEVELS.length){showSumm();return}
cur=idx;colored={};totalShapes=0;wrongCount=0;
if(!freeMode){selectedColor='';selectedType=''}
document.getElementById('mcard').style.display='';
document.getElementById('mcard').classList.remove('glow');
document.getElementById('summ').classList.remove('show');
document.getElementById('comp').classList.remove('show');
updateTabs();gen();updateUI();
}

function gen(){
var def=LEVELS[cur];
var pal=PALETTES[def.palette];
var shapes=[],id=0;
for(var ri=0;ri<def.rings.length;ri++){
var ring=def.rings[ri];
var count=ring.count;
var startA=ring.startAngle||0;
for(var ci=0;ci<count;ci++){
var angle=(startA+ci*(360/count))%360;
var rad=angle*Math.PI/180;
var cx=50+ring.r*Math.cos(rad);
var cy=50+ring.r*Math.sin(rad);
shapes.push({type:ring.type,size:ring.size,x:cx,y:cy,rot:angle,id:id++,color:pal[ring.type]});
}
}
totalShapes=shapes.length;
ld={shapes:shapes,types:def.types,palette:pal};
renderLegend();renderShapes();updateProgress();
if(mode==='draw')setupDraw();
}

function renderLegend(){
var el=document.getElementById('legend');el.innerHTML='';
for(var i=0;i<ld.types.length;i++){
var t=ld.types[i],c=ld.palette[t];
var item=document.createElement('div');
item.className='leg-item';
if(selectedType===t)item.classList.add('active');
item.style.borderRightColor=c;
item.setAttribute('data-type',t);
item.innerHTML=iconSVG(t,c,22)+'<span>'+NAMES[t]+'</span><span style="display:inline-block;width:16px;height:16px;background:'+c+';border-radius:3px;margin-right:2px"></span>';
(function(type){item.onclick=function(){selectLegendColor(type)}})(t);
el.appendChild(item);
}
updateSelectedIndicator();
}

function selectLegendColor(type){
if(freeMode)return;
selectedType=type;
selectedColor=ld.palette[type];
var items=document.querySelectorAll('.leg-item');
for(var i=0;i<items.length;i++){
items[i].classList.toggle('active',items[i].getAttribute('data-type')===type);
}
updateSelectedIndicator();
}

function updateSelectedIndicator(){
var el=document.getElementById('selColor');
if(!el)return;
if(!selectedColor||freeMode){
el.innerHTML='🎨 צבע נבחר: <span style="color:var(--text-light)">לא נבחר</span>';
}else{
el.innerHTML='🎨 צבע נבחר: <span style="display:inline-block;width:18px;height:18px;background:'+selectedColor+';border-radius:4px;vertical-align:middle;border:1px solid rgba(0,0,0,0.15);margin:0 4px"></span><strong>'+NAMES[selectedType]+'</strong>';
}
}

function updateUI(){
var isClick=mode==='click',isDraw=mode==='draw';
document.getElementById('legendCard').style.display=freeMode?'none':'';
document.getElementById('selColor').style.display=(!freeMode&&isClick)?'':'none';
document.getElementById('freeBanner').style.display=freeMode?'':'none';
document.getElementById('freePal').style.display=freeMode?'flex':'none';
document.getElementById('cbar').style.display=(!freeMode&&isDraw)?'flex':'none';
document.getElementById('clearBtn').style.display=freeMode?'':'none';
document.getElementById('prog').style.display=freeMode?'none':'';
}

function toggleFreeMode(){
freeMode=!freeMode;
var btn=document.getElementById('freeToggle');
var label=document.getElementById('ftLabel');
btn.classList.toggle('on',freeMode);
label.textContent=freeMode?'חופשי!':'תרגול';
colored={};wrongCount=0;selectedColor='';selectedType='';
if(freeMode){
renderFreePalette();
}else if(ld){
renderLegend();
}
if(ld){
renderShapes();
updateProgress();
}
if(mode==='draw'){
if(freeMode){
dColor='';if(dCtx)dCtx.strokeStyle=dColor;
}else if(ld){
buildColorBar();
}
}
updateUI();
}

function renderFreePalette(){
var el=document.getElementById('freePal');el.innerHTML='';
for(var i=0;i<FREE_COLORS.length;i++){
var c=FREE_COLORS[i];
var btn=document.createElement('button');
btn.className='fpc';
btn.dataset.color=c.hex;
btn.title=c.name;
btn.style.background=c.hex;
if(c.hex==='#ffffff')btn.style.border='3px solid #cbd5e1';
(function(b){btn.onclick=function(){selectFreeColor(b)}})(btn);
el.appendChild(btn);
}
}

function selectFreeColor(btn){
selectedColor=btn.dataset.color;
var bs=document.querySelectorAll('.fpc');
for(var i=0;i<bs.length;i++)bs[i].classList.remove('active');
btn.classList.add('active');
if(mode==='draw'){
dColor=selectedColor;
if(dCtx)dCtx.strokeStyle=dColor;
}
}

function clearAllShapes(){
colored={};
var paths=document.querySelectorAll('.sp');
for(var i=0;i<paths.length;i++){
paths[i].style.stroke='';paths[i].style.fill='';paths[i].style.fillOpacity='';
}
if(dCtx&&dCvs)dCtx.clearRect(0,0,dCvs.width,dCvs.height);
}

function shapeSVG(s){
var sz=s.size,w,h,inner,pad=3;
switch(s.type){
case'circle':w=h=sz;inner='<circle class="sp" cx="'+(sz/2)+'" cy="'+(sz/2)+'" r="'+(sz/2-pad)+'"/>';break;
case'square':w=h=sz;inner='<rect class="sp" x="'+pad+'" y="'+pad+'" width="'+(sz-2*pad)+'" height="'+(sz-2*pad)+'"/>';break;
case'triangle':w=sz;h=Math.round(sz*0.866);inner='<polygon class="sp" points="'+(sz/2)+','+pad+' '+pad+','+(h-pad)+' '+(sz-pad)+','+(h-pad)+'"/>';break;
case'rectangle':w=Math.round(sz*1.4);h=Math.round(sz*0.7);inner='<rect class="sp" x="'+pad+'" y="'+pad+'" width="'+(w-2*pad)+'" height="'+(h-2*pad)+'"/>';break;
case'diamond':w=Math.round(sz*0.72);h=sz;var mx=w/2,my=h/2;inner='<polygon class="sp" points="'+mx+','+pad+' '+(w-pad)+','+my+' '+mx+','+(h-pad)+' '+pad+','+my+'"/>';break;
case'pentagon':w=h=sz;var r=sz/2-pad,cx2=sz/2,cy2=sz/2,pts=[];
for(var i=0;i<5;i++){var a=(i*72-90)*Math.PI/180;pts.push((cx2+r*Math.cos(a)).toFixed(1)+','+(cy2+r*Math.sin(a)).toFixed(1))}
inner='<polygon class="sp" points="'+pts.join(' ')+'"/>';break;
}
return'<svg class="ss" data-id="'+s.id+'" data-type="'+s.type+'" viewBox="0 0 '+w+' '+h+'" style="left:'+s.x+'%;top:'+s.y+'%;width:'+w+'px;height:'+h+'px;transform:translate(-50%,-50%);z-index:'+(200-sz)+'" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';
}

function renderShapes(){
var area=document.getElementById('sarea');area.innerHTML='';
for(var i=0;i<ld.shapes.length;i++)area.insertAdjacentHTML('beforeend',shapeSVG(ld.shapes[i]));
for(var id in colored){
if(colored.hasOwnProperty(id)){
var svg=area.querySelector('.ss[data-id="'+id+'"]');
if(svg){
var path=svg.querySelector('.sp');
var c;
if(freeMode){c=colored[id]}else{var type=svg.getAttribute('data-type');c=ld.palette[type]}
path.style.stroke=c;path.style.fill=c;path.style.fillOpacity='0.5';
}
}
}
if(mode==='click'){var els=area.querySelectorAll('.ss');for(var i=0;i<els.length;i++){(function(el){el.addEventListener('click',function(){handleShapeClick(el)})})(els[i])}}
}

function handleShapeClick(el){
if(freeMode){handleFreeClick(el)}else{handleExerciseClick(el)}
}

function handleExerciseClick(el){
var id=parseInt(el.getAttribute('data-id')),type=el.getAttribute('data-type');
var path=el.querySelector('.sp');
if(!selectedColor){
el.style.animation='shake 0.4s';
setTimeout(function(){el.style.animation=''},400);
showMsg('בחרו צבע קודם!');
return;
}
if(colored[id]){
delete colored[id];
path.style.stroke='';path.style.fill='';path.style.fillOpacity='';
el.style.animation='none';void el.offsetWidth;el.style.animation='shapeBounce 0.3s ease';
setTimeout(function(){el.style.animation=''},300);
updateProgress();
return;
}
var correctColor=ld.palette[type];
if(selectedColor===correctColor){
colored[id]=true;
path.style.stroke=correctColor;path.style.fill=correctColor;path.style.fillOpacity='0.5';
el.style.animation='none';void el.offsetWidth;el.style.animation='shapeBounce 0.3s ease';
setTimeout(function(){el.style.animation=''},300);
updateProgress();checkComplete();
}else{
wrongCount++;
el.style.animation='shake 0.4s';
path.style.fill='#ef4444';path.style.fillOpacity='0.3';
(function(p,eid){setTimeout(function(){
el.style.animation='';
if(!colored[eid]){p.style.fill='';p.style.fillOpacity=''}
},400)})(path,id);
showMsg('הצבע לא מתאים!');
updateProgress();
}
}

function handleFreeClick(el){
var id=parseInt(el.getAttribute('data-id'));
var path=el.querySelector('.sp');
if(!selectedColor){
el.style.animation='shake 0.4s';
setTimeout(function(){el.style.animation=''},400);
showMsg('בחרו צבע קודם!');
return;
}
if(colored[id]===selectedColor){
delete colored[id];
path.style.stroke='';path.style.fill='';path.style.fillOpacity='';
}else{
colored[id]=selectedColor;
path.style.stroke=selectedColor;path.style.fill=selectedColor;path.style.fillOpacity='0.5';
}
el.style.animation='none';void el.offsetWidth;el.style.animation='shapeBounce 0.3s ease';
setTimeout(function(){el.style.animation=''},300);
}

function updateProgress(){
if(freeMode)return;
var count=Object.keys(colored).length;
var text='צבעתם '+count+' מתוך '+totalShapes;
if(wrongCount>0)text+=' | טעויות: '+wrongCount;
document.getElementById('progText').textContent=text;
document.getElementById('progFill').style.width=Math.round(count/totalShapes*100)+'%';
}

function checkComplete(){
if(freeMode)return;
if(Object.keys(colored).length>=totalShapes){
res[cur]='correct';updateTabs();
document.getElementById('mcard').classList.add('glow');
var els=document.querySelectorAll('.ss');
for(var i=0;i<els.length;i++){var p=els[i].querySelector('.sp');p.style.animation='colorPulse 0.5s ease';p.style.animationDelay=(i*0.04)+'s'}
setTimeout(showComp,900);
}
}

function showComp(){
var ov=document.getElementById('comp');ov.classList.add('show');
var last=cur>=LEVELS.length-1;
document.getElementById('cEmoji').textContent=last?'🏆':'🎉';
document.getElementById('cTitle').textContent=last?'סיימתם הכל!':'כל הכבוד!';
var msg=last?'צבעתם את כל המנדלות!':'צבעתם נכון את כל הצורות!';
if(wrongCount>0)msg+=' ('+wrongCount+' טעויות)';
document.getElementById('cMsg').textContent=msg;
}

function nextLevel(){
document.getElementById('comp').classList.remove('show');
for(var i=cur+1;i<LEVELS.length;i++){if(res[i]!=='correct'){goTo(i);return}}
showSumm();
}

function replay(){document.getElementById('comp').classList.remove('show');res[cur]='pending';goTo(cur)}

function showSumm(){
document.getElementById('mcard').style.display='none';
document.getElementById('legendCard').style.display='none';
document.getElementById('prog').style.display='none';
document.getElementById('selColor').style.display='none';
document.getElementById('freeBanner').style.display='none';
document.getElementById('freePal').style.display='none';
document.getElementById('clearBtn').style.display='none';
document.getElementById('comp').classList.remove('show');
var s=document.getElementById('summ');s.classList.add('show');
var g=document.getElementById('sgrid');g.innerHTML='';
var hasP=false;
for(var i=0;i<LEVELS.length;i++){var item=document.createElement('div');item.className='summ-item';
var st=res[i],sc=st==='correct'?'done':'pend';
var tx=st==='correct'?'✅':'⬜';
if(st!=='correct')hasP=true;
item.innerHTML='<div class="sn">'+(i+1)+'</div><div class="ss-txt '+sc+'">'+tx+'</div>';
item.onclick=(function(idx){return function(){goTo(idx)}})(i);g.appendChild(item)}
var br=document.getElementById('sbrow');br.innerHTML='';
if(hasP)br.innerHTML+='<button class="pill secondary" onclick="retryPending()">❓ שלבים שלא הושלמו</button>';
br.innerHTML+='<button class="pill primary" onclick="retryAll()">🔄 הכל מחדש</button>';
updateTabs();
}

function retryFiltered(fn){var first=-1;for(var i=0;i<res.length;i++){if(fn(res[i])){res[i]='pending';if(first===-1)first=i}}buildTabs();if(first>=0)goTo(first)}
function retryPending(){retryFiltered(function(s){return s!=='correct'})}
function retryAll(){retryFiltered(function(){return true})}

function setMode(m){
mode=m;var bs=document.querySelectorAll('.mbtn');
for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');
if(m==='click')bs[0].classList.add('on');else if(m==='draw')bs[1].classList.add('on');
var ct=document.getElementById('ct');
if(m==='draw'){
ct.classList.add('dm');setupDraw();
if(!freeMode){buildColorBar()}
else{dColor=selectedColor||'';if(dCtx)dCtx.strokeStyle=dColor}
}else{ct.classList.remove('dm')}
if(ld)renderShapes();
updateUI();
}

function buildColorBar(){
var bar=document.getElementById('cbar');bar.innerHTML='';
var colors={},first='';
for(var i=0;i<ld.types.length;i++){var t=ld.types[i],c=ld.palette[t];if(!colors[c]){colors[c]=true;if(!first)first=c;bar.innerHTML+='<button class="color-btn'+(first===c?' active':'')+'" data-color="'+c+'" style="background:'+c+'" onclick="pickColor(this)"></button>'}}
bar.innerHTML+='<button class="color-btn clr" onclick="clearDraw()">🗑️</button>';
dColor=first;
}

function setupDraw(){
dCvs=document.getElementById('cvs');if(!dCvs)return;
var card=document.getElementById('mcard');var dpr=window.devicePixelRatio||1;
dCvs.style.width=card.clientWidth+'px';dCvs.style.height=card.clientHeight+'px';
dCvs.width=card.clientWidth*dpr;dCvs.height=card.clientHeight*dpr;
dCtx=dCvs.getContext('2d');dCtx.scale(dpr,dpr);
dCtx.lineCap='round';dCtx.lineJoin='round';dCtx.lineWidth=4;dCtx.strokeStyle=dColor;
dCvs.onpointerdown=startDr;dCvs.onpointermove=moveDr;dCvs.onpointerup=endDr;dCvs.onpointercancel=endDr;
}

function startDr(e){e.preventDefault();drawing=true;drawBBox={minX:1e9,minY:1e9,maxX:-1e9,maxY:-1e9};var p=drPos(e);updateBB(p);dCtx.strokeStyle=dColor;dCtx.beginPath();dCtx.moveTo(p.x,p.y)}
function moveDr(e){if(!drawing)return;e.preventDefault();var p=drPos(e);updateBB(p);dCtx.lineTo(p.x,p.y);dCtx.stroke();dCtx.beginPath();dCtx.moveTo(p.x,p.y)}
function endDr(){if(!drawing)return;drawing=false;detectShapes()}
function drPos(e){var r=dCvs.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
function updateBB(p){if(p.x<drawBBox.minX)drawBBox.minX=p.x;if(p.x>drawBBox.maxX)drawBBox.maxX=p.x;if(p.y<drawBBox.minY)drawBBox.minY=p.y;if(p.y>drawBBox.maxY)drawBBox.maxY=p.y}

function detectShapes(){
var card=document.getElementById('mcard'),w=card.clientWidth,h=card.clientHeight;
var bx1=drawBBox.minX/w*100,by1=drawBBox.minY/h*100,bx2=drawBBox.maxX/w*100,by2=drawBBox.maxY/h*100;
var wrongShown=false;
for(var i=0;i<ld.shapes.length;i++){var s=ld.shapes[i];
if(!freeMode&&colored[s.id])continue;
if(s.x>=bx1-5&&s.x<=bx2+5&&s.y>=by1-5&&s.y<=by2+5){
var svg=document.querySelector('.ss[data-id="'+s.id+'"]');if(!svg)continue;
if(freeMode){
if(!dColor)continue;
colored[s.id]=dColor;
var p=svg.querySelector('.sp');p.style.stroke=dColor;p.style.fill=dColor;p.style.fillOpacity='0.5';
svg.style.animation='shapeBounce 0.3s ease';(function(el){setTimeout(function(){el.style.animation=''},300)})(svg);
}else if(dColor===ld.palette[s.type]){
colored[s.id]=true;var p=svg.querySelector('.sp');p.style.stroke=ld.palette[s.type];p.style.fill=ld.palette[s.type];p.style.fillOpacity='0.5';
svg.style.animation='shapeBounce 0.3s ease';(function(el){setTimeout(function(){el.style.animation=''},300)})(svg);
}else{
svg.style.animation='shake 0.4s';(function(el){setTimeout(function(){el.style.animation=''},400)})(svg);
if(!wrongShown){wrongShown=true;showMsg('הצבע לא מתאים לצורה הזו!')}
}
}}
if(dCtx&&dCvs)dCtx.clearRect(0,0,dCvs.width,dCvs.height);
if(!freeMode){updateProgress();checkComplete()}
}

function showMsg(text){
var existing=document.querySelector('.wrong-msg');
if(existing)existing.remove();
var msg=document.createElement('div');msg.className='wrong-msg';msg.textContent=text;
document.body.appendChild(msg);setTimeout(function(){msg.remove()},1500);
}

function pickColor(btn){dColor=btn.dataset.color;var bs=document.querySelectorAll('.color-btn');for(var i=0;i<bs.length;i++)bs[i].classList.remove('active');btn.classList.add('active');if(dCtx)dCtx.strokeStyle=dColor}
function clearDraw(){if(dCtx&&dCvs)dCtx.clearRect(0,0,dCvs.width,dCvs.height)}

window.addEventListener('resize',function(){if(mode==='draw')setupDraw()});
init();
</script>
</body>
</html>
